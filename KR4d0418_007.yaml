body:
  text: 滹南遺老集卷之七滹南王若虛從之論語辨惑四子曰君子恥其言而過其行晦菴曰恥者不敢盡之意過者欲有餘之辭蓋以而字故此生論耳初若可喜而義訓終不安止當從舊作者七人雖不見主名其文勢似與上文為一章子曰字疑衍君子固窮當從注疏伊川以為固守其窮好事者或取之而實不然蓋子路之意止疑君子不當窮而非論處窮也夫子言固有窮時但不若小人之濫耳伊川之義蓋亦在其中而遂以固字為説則過矣子曰由知德者鮮矣呼其名而告之以謂人之能是者少耳意在警子路亦不可知然其文勢則非直指之也而説者皆云為愠而發過矣且中間有告子貢多學一貫之章則既已間斷安得通為一時之事哉蓋孔子世家亦載此而一貫語上加子貢作色四字所以生學者之疑嗚呼解經不守其本文而信傳記不根之説亦見其好異喜鑿矣斯民也三代之所以直道而行也南軒曰春秋之時風俗雖不美然民無古今之異三代之所以直道而行者亦此民耳所説甚好然記者以此屬于聖人無毁譽之下義終齟齬疑是兩章而脫其子曰字晦菴解小不忍之義曰婦人之仁匹夫之勇皆是夫慈愛而無斷婦人之仁也果敢而輕發匹夫之勇也二義不同豈有一言而兼二義者哉謂其俱通而並存之則可矣然君子未有以殘忍之忍教人者雖王氏嘗有此訓詳其文義止從舊注為長子謂民之于仁甚于水火馬融曰水火及仁皆民所仰而生者然蹈水火或時殺人蹈仁未嘗殺人所以仁為甚王弼曰民之逺于仁甚于水火見有蹈水火者未嘗見蹈仁者邢氏疏兩存之而近世諸儒多從融義以文義觀之弼説為是子曰當仁不讓于師周式楊傑以師為衆張九成以讓為責劉原父吳元長則曰當仁而傳道可以為人師喈不近人情不足取程氏曰為仁在巳無與讓若善名在外不可不讓恐夫子之意亦不及此唯晦菴云言當勇往而必為雖師亦無所讓斯得之矣蓋此乃甚之之辭非真語師對也學者當以意逆之天下有道庶人不議止當如舊説而張九成以為窺議王室之意至引髙歡見魏政不綱退結豪傑事此過正之論也夫子答子張恭寬信敏惠章晦菴載一李氏者之説曰此章及六言六蔽五美四惡之類皆與前後文體大不相似其言無謂不足信也晦菴擇取衆説頗為精簡如此等事何必録哉東坡以患得之當為患不得之蓋闕文也余以為然子以博奕賢于無所用心晦菴載李氏之説曰非教人博奕也以甚言無所用心之不可耳可謂能以意逆志矣楊氏曰飽食逸居無所用心則放僻邪侈將無所不為故以是而係其心豈不猶賢于已乎南軒亦云信如斯言則是聖人真欲使人為之矣苟其人了不用心于他善將恃此以為足乎甚非立教之本意故不取夫子聞子遊絃歌一章本無疑義王輔之曰子與其徒戲亦可乎曰戲者人情之所不免但不為虐而巳而謝上蔡曰小國寡民而以治天下之道治之真乃牛刀割雞耳聖人之哂固宜然恐二三子疑之因以務大忽小故從而釋之吕與叔亦云辨之則愈惑故自受以為戲竊謂不然夫使為上者知所以愛人為下者知所以敬上是道也安往而可廢而謂不當施之小國之間乎彼其心止以聖人不應有戲是故妄生此論林氏曰聖人一話一言無非教者前言戲之觀子遊之對耳武城之治達天下可也其説甚佳孔子謂殷有三仁而記者曰微子去之箕子為之奴比干諫而死當紂之無道三人者皆嘗諫爭而不能救也微子知其顛隮之不免故遁于荒野而避之二子不去而一𬒳囚一見殺皆出于不幸耳而其愛君憂世忠貞惻怛之誠則三人之所同故孔子俱稱其仁初不在于去就之迹也後人泥于記者之言以為三人之所為不同者各有深意而孔子之所取亦不過此遂委曲而為之説王氏曰微子不去無以存殷之祀箕子不奴無以貽天下之法比干不死無以示人臣之節楊傑亦云微子仁于其親比干仁于其君箕子仁于萬世林少頴曰去者仁之清奴者仁之和死者仁之任張無垢曰比干之節易明而箕子之仁難言微子存商祀其仁為大故居二子之先皆過論也甚者又曰紂無道而周有道故微子去紂而歸周以為親戚叛之之證若然乃名教之罪人尚足言仁乎洪範一書誠為大典然亦歸周之後因武王之問而陳之耳使其平居果有意于垂世則著之簡册足矣縱復不然未為大過而乃坐視國亡佯狂苟免以俟興王而付此恐仁者亦所不忍也楊氏曰三人者各得其本心故同謂之仁范氏曰三人者皆可以有天下故均之曰仁二説皆疏而范氏尤甚也博學而篤志切問而近思大勢則兩句相耦細分則四者各為用東坡曰博學而志不篤則大而無成泛問而逺思則勞而無功偏枯而不類矣朱氏不必敗子夏曰君子信而後勞其民信而後諫尹氏曰事上使下皆以信為主人之不信者皆已之信不足以取信故也晦菴亦云事上使下皆須誠意交孚而後可以有為王𬗋微廣之曰仰以事君必先罄盡忠赤深結主知而使上見信俯以臨民必先誥誠號令感化人情而使下見信下既見信則以之役使雖勞不怨上既見信則以之獻替無言不從是道也出于至誠而已其説甚佳蓋此信字在我者之事耳而世人多錯認了人臣畏罪而不言輒以是借口曰上不吾信也或一諫不從則奉身而去自謂無愧于其心嗚呼彼亦常先盡其在我者乎子夏曰大德不踰間小德出入可也夫惟大德之人然後周旋中節而不踰間小德則不能故乍出乍入而無定尹氏曰有一不善是出入也此説得之曰可云者猶言中人之性可上可下耳非可之謂也舊疏曰不責其偹故曰可晦菴云大德小德者大莭小莭也人當先立乎其大者小者或未盡合理亦無害此則認為許可之可矣夫細行不矜終為大德之纍跬步必謹猶憂其過舉也而謂小節有時而踰間豈君子之訓哉晦菴既已失之而又載吳氏之説以為此章不能無弊噫子夏本言小德之無常而學者乃以為語之病亦已誣矣吳氏者何人也賢賢易色章既云子夏之言其弊將至于廢學而于此復云子夏之過斯人何其不幸也子夏曰君子之道焉可誣也穎濵古史論曰善乎子夏之教人也始于灑掃應對進退而不急于道使來者自盡于學曰引月長而道自至孔子曰君子上逹小人下逹達之有上下出乎其人而非教之力也今世之教者聞道不明而急于夸世非性命道德不出于口雖禮樂刑政有所不言矣而况于灑掃應對進退也哉教人未必知而學者未必信矜為大言以相欺天下之偽自是而起此子夏之所誣也蘇氏之言深切時病豫故表而出之子夏曰仕而優則學學而優則仕舊説以仕優為優間有餘力學優為德業優長豈有一字而二義不若皆訓為有餘力也上蔡曰學與仕一也學優則仕亦優仕優則學亦優何必讀書然後為學無垢從而廣之曰仕之與學皆以優遊處為極耳優遊則見理明白雖萬事紛紜千古治亂皆能灼知其所以然而從容以應故能起當今之弊壞斷千古之興亡仕而如此雖不挾䇿讀書而天下之理巳在此矣豈非學乎學而如此雖不涖官行法而天下之理巳在此矣豈非仕乎此論甚新人亦多喜之者以豫觀之不唯于語法不順而義亦未完也夫學之優者雖不涖官而施于德業是亦為政強名曰仕猶或可也不知仕之所以見理明白灼知千古之治亂者何從而得之故有天資通敏暗合古人者要不可恃之以為足也而曰是亦為學何必讀書可乎此説果行則學有時而廢矣豫不得不辨夫子言孟莊子之孝以不改父之臣與政為難能東坡曰聞孟獻子之孝不聞莊子也遂疑為獻字之誤夫聖人以為孝則固孝矣而必求他證而後信不亦過乎鄧氏獻子有賢德莊子未有聞焉而能用其臣守其政其孝所以為難此雖順于經而未見所以難之義南軒曰父之臣與政果善固當奉而行之不幸而有悖于理害于事者則當察而更之是乃致其誠愛于親矣莊子之不改意者其政雖未盡善而亦不致悖理害事之甚故有取其不忍改也蓋善而不改乃其當耳不必稱難能惡而不改則是成父之惡不可稱難能也胡寅曰莊子之繼世也必其先臣先政有不利于已者他人不能不改而莊子能之是以稱其難是二説者可謂有理矣而胡氏尤親切學者其詳焉子貢曰紂之不善不如是之甚也是以君子惡居下流天下之惡皆歸焉晦菴曰卑下之處衆流之所歸不善之地惡名之所聚言人當常自警省不可一置其身于不善之地非謂紂無罪而虛被惡名也其説甚佳東坡以為子貢言此者蓋不許武王代紂之事而張無垢亦稱其有恕紂之心賢于孟子賊仁殘義之説皆謬見也子貢之意在使人慎所居而二子乃為恕紂而甚武王不亦異乎子貢雖惡稱人之惡者亦何至湔洗桀紂以為忠厚哉湯武大義聖人固有定論矣今乃妄坐訾毁而為獨夫是亦惑之甚也堯曰咨爾舜至公則説東坡謂其雜取禹謨湯誥泰誓武成之文而顛倒失次不可復考蓋孔子之遺書編簡絶亂有不可知者故置之不論而道學諸公曲為義訓以為聖人微言深旨子謂東坡之説為近人情故從之程氏曰曰豫小子履上當脫一湯字嗚呼豈特此一字而巳哉孔子謂政當屏四惡而其一曰出納之吝謂之有司與暴虐賊同稱夫當出則出當納則納自有道存豈容或吝蓋非謂在君為不可而有司亦不當耳物君之所命也而有司掌之出納君之所命也而有司奉之豈有君不吝于上而有司當吝于下乎上下同心以歸于至當三代之直道也自世之鄙夫懼失陷而獲罪求增羡以為能是故習成此風而不能免孔子所謂有司者亦就其弊而言之耳而王安石遂以屯膏吝嗇為臣道之正其所見顧不鄙哉以此談經安得不戾聖人以此為政安得不害天下滹南遺老集卷七
