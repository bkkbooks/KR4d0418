front:
  text: 滹南遺老集卷之十二
  hash: sha256:aad09f738199aca30dbe4cf7486eba54683e8d5f07c59770c3e86b8ced91b1c4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0418_SBCK_012-1a}
body:
  text: 滹南王若虚從之史記辨惑四議論不當辨史氏之評因人事之善惡而正其是非以示勸戒而禆教化故可貴也遷之贊田完徒謂易術幽明非通人逹才孰能注意此固不必道者而又云田乞及常所以比犯二君專齊國之政非必事勢之漸然也盖若遵厭兆祥云則亂臣賊子皆得以天命自觧而無所懲矣豈史氏之所宜言乎孔子世家贊云余讀孔氏書想見其爲人夫聖人道徳光𬒳萬世雖鄙夫孺子皆知之矣而遷因讀書始想見其爲人之大概非所宜言仲尼弟子傳賛云學者多稱七十二子之徒譽者或過其寔毁者或損其真鈞之未覩厥容貌則論語弟子籍出孔氏古文近是余以弟子名姓文字悉取論語弟子問并次為篇疑者闕焉予謂論人者亦據其行事而已豈必容貌之覩以貌取人孔子㦯失之而遷顧以為準平且遷所引雑説鄙事有不足信者又豈皆論語之所載耶魏世家賛云説者皆曰魏以不用信陵君故國削弱至于亡余以天方令秦平海内其業未成魏雖得阿衡之佐曷益乎此大謬之説也魏之亡既廹于秦興而非人謀之所䏻救則秦之亡亦廹于漢興而無可為者也而遷于本紀乃取賈生之論以不任忠賢罪二世何哉夫無忌之徒固未足以益國然遷之失言不得為罪也循吏傳賛云孫叔敖出一言郢市復子産病死鄭民號哭公儀子見好布而家婦逐石奢縦父而死椘昭君立李離過殺而伏劍晋文以正國法無乃少評論総結之語乎吕不韋贊曰孔子之所謂聞者其吕子乎按孔子所謂聞者似逹而非者也雖不取于君子然不韋亦不足當之也項羽傳贊云吾聞之周生舜目盖重瞳子又聞項羽亦重瞳子羽豈其苗裔耶何興之暴也陋哉此論人之形貌容有偶相同者羽出舜後千有餘年而獨以此事遂疑其為苗裔不亦迂乎商均舜之親子遺體在焉然不聞其亦重瞳也而千餘年之逺裔乃必重瞳耶周生何人所據何書而上知古帝王之形貌正復有據亦非學者之所宜􅊰也夫舜以元徳升聞四岳薦之帝堯試之上當天心下允衆望然後踐天子之位其得之固有道矣豈專以異相之故而暴興者哉使舜果由此而興則羽之成功亦應畧等奚其不旋踵而剿滅也遷輕信愛竒𥘉不知道故其􅍝妄每如此後世状人君之相者類以舜瞳為羙談皆史遷之所啟而後梁朱友敬自恃重瞳當為天子因作亂而伏誅亦本此之誤也悲夫司馬遷賛䔥何云與閎夭散宜生争烈賛韓信則云可以比周召太公之徒賛周勃則云伊尹周公何以加夫史氏儗人必于其倫不可不慎也以何信等軰而上方三代聖賢談何容易哉至論張耳陳餘則又譏其異于太伯季子遷之品藻陋矣遷論壺遂云天子方倚以為相㑹遂卒不然壺遂之内亷行修斯鞠躬君子也夫鞠躬特折身耳而以為君子之盛徳何也且天子以輔相期之而充其所有纔止于是乎李廣傳云其射見敵急度不中不發發即應弦而倒用此其将兵數困辱其射虎亦多為所傷此在隂里容或有之然亦失之意料非史氏所可必者也汲鄭賛無他褒貶獨嘆其有勢則賔客十倍無勢則否至并載翟公署門事此何足道而著之史評哉滑稽傳首云孔子曰六藝于治一也禮以節人楽以發和書以道事詩以道意易以神化春秋以道義太史公曰天道恢恢豈不大哉談言㣲中亦何可以觧紛夫天道恢恢巳不見發明滑稽之意而六藝之事又何所干渉也貨殖傳云無巖䖏竒士之行而長貧賤好語仁義亦足羞也貧賤而羞固已甚􅍝而好語仁義者又可羞乎遷之罪不容誅矣外戚世家序云夫婦之際人道之大倫也禮之用唯㛰姻為兢兢夫樂調而四時和隂陽之變萬物之統也可不慎哉人能弘道無如命何甚哉妃匹之爱君不能得之于臣父不能得之于子况卑下乎既驩合矣或不能成子姓能成子姓矣或不䏻要其終豈非命也哉孔子罕稱命盖難言之也非通幽明之變惡能識乎性命哉夫一婦人之遇否亦不足道矣且凢人事孰非命者而遷于此反覆致意何其費辭也人能弘道之語其意尤疎滹南遺老集卷十二
