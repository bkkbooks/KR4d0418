front:
  text: 滹南遺老集卷之四十五
  hash: sha256:cb8348f74f96c16247b9d77e4178720118760a3d3c37634f9cf07e09e01f32aa
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0418_SBCK_045-1a}
body:
  text: 滹南王若虛從之祖唐臣愚庵序鶴臺祖君唐臣命其居室曰愚庵因以自號既經喪亂流寓河朔非復庵中主人矣猶為題榜以求詩文于士大夫嗚呼凡物有其實而後得其名實無有焉名烏從生實固不可誣而名固欲其正也今先生才敏而識明行髙而業精蓋世所謂賢且智者而顧加此稱是視薰以蕕指渭為涇也無乃乖戾而不合乎人情邪且先生安靜寡欲不求聞逹與物無競而物亦莫之攖不必嫉邪憤世如栁宗元逺害全身如寧武子果何取乎此也意者直出于至謙故歟古之君子其德甚盛則其心愈謙其責已也重其取名也亷雖有軼群絶俗之資而自視欿然常若不及此其尊而光卑而不可踰者善而無伐所以為顔氏聖而不居所以為孔子其與浮􅏥衒露急于人知虛而為盈處之不疑者豈可同日而語哉先生于是乎過人逺矣丙申春二月滹南遺老王某序復之純交説并序之純嘗為交説以見譏令贅談中以若虛名篇者是也其𥘉本自為一首蓋辭氣意旨出于莊列可謂竒作使其處身果能如此雖古之逹者無以過也而何其取怒之多歟豫讀而悲之乃復以是説云狂生既以交説規慵夫已尋以忤物獲罪杜門索居將無意于世慵夫因人而寄聲曰子之病果革矣已實行行謂人之亢憫我將顛而子則先是何其言之近似而踐迹之乖歟子之病果革矣怨之不可媒也禍之不可賈也雖微子言吾寧不知逐逐而群疇非吾鄰形交迹接何者可絶鍊修調適之善而吾病始兆悟而藥之治飬以方寬中溫外茹柔吐剛駐其明而內視凝其聰而反聽行之期月乃復其常心平氣和百邪不攻乃愈而康子獨日臻以逹膏肓醫望而走無施其良嗟夫殆哉無以招之彼孰汝尤無以結之彼孰汝仇待物太狹謀身未周睢盱倣佛蔑睨九州羣歡以咻凶乘禍鳩勢窮力竭而投諸囚以伏于幽閴氏之與居稿伯之為遊悒悒兮而私自憐孑孑乎其遺世而無求也吾絶物邪抑子絶也山淵之峻子將趨而過今胡其摧汝車而沉汝舟豺虎之毒子將不之攖今胡其齕汝趾而嚙汝喉出于外者亦既然矣伏于中者竟如何哉顧嘗憂我今為子憂蓋將持吾之所以自治者而復以治子豈能從我而兾其少瘳乎狂生聞之不覺汗下移刺仲澤虛舟堂銘泛而遊載沉載浮隨其流聽其所止而休此非所謂虗舟者歟萬物相刃乎無窮要不可容吾意智者困勇者殘而至人免于無所纍先王既以是而身訖矣雖放心委形以行于斯世可也四醉圖贊泰和辛酉冬豫赴調京師清河垣之振之劉君景元俱以待舉客太學一日同飲市中既暮皆醉三子者就宿豫邸枕籍而臥𥘉不記也未旦而覺呼童張燈則餘樽在焉即命重酌復成小醉擁衾散髮相對怡然顧而樂之以為他日或不能復得矣振之將圖其形而名以四醉因命序而贊之以記一時之美事云漠乎其如忘其聲茫乎其如忘其形神融氣泰無欲而無營渺乎其如物之莫攖也不為劉伶唯以酒為名不為屈平衆皆醉而獨醒蓋不放不拘不晦不明不濁不清隨其所適而寓其情者也林下四友贊東垣彭子升悅王士衡權周晦之嗣明皆豫心契也晦之于豫為親故其相知最早後遊京師始識士衡于稠人間言論慷慨遂如平生當是時泛見子升而未熟也已而復定交于觴次豫年為長子升次之士衡又次之而晦之最少吾四人者臭味相似而氣義相投也故不結而合既合而歡至于益深而莫之間其好惡馭舍互有短長而要歸其中辨爭譏刺間若不能相容而終于無憾方其居在里中行必偕宴必共詩雖不多而嘲戲贈答時出數語以相娛酒雖不廣而花時月夕一杯一杓亦自不廢也嘗約他年為林下之逰且各為别號以自寄焉蓋豫以慵夫而豫升以淡子士衡為狂生而晦之則放翁也曰淡曰慵曰狂曰放世以為怪而自謂其真施于仕途固非所宜而在隱居則無害也是故安之而不疑焉是約已遂想像而贊之云盤礴兮岩阿容與兮煙蘿籍豐草兮偃臥訴長風兮浩歌塵海邈其如隔渺髙軒兮不我過險而風波密而網羅突而干戈如四人者何士衡真贊身雖寒而道則富貌若鄙而心甚妍庸夫孺子皆得易而侮王公大人莫不知其賢豈俯仰從容滑稽玩世而胸中自有卓然者也跋寶墨堂記趙翰林以文章字畫名天下片辭寸𥿄人爭求之嘗為故參政僕散公作寶墨堂記仍親繕寫尤為竒特自經喪亂散落不存而近入田君信之之手方且什襲深藏以為珍玩既而聞公子祐在因復歸之噫渠家獲所士不失舊物固幸甚矣而田君能捐已之愛以成此美事亦灑落可嘉也跋王進之墨本孝經孝弟百行之冠冕孝經六藝之喉襟聖人大訓不待贊揚而後知也學者自童稚讀書必始于此而考其行身能踐履者鮮矣李君追慕其親以不得竭力為恨而淪于非道為憂故常玩意于斯文而名卿珍翰以昭于不朽觀其自𫐠亹舋不絶愛敬之誠藹然而見非深于踐履能如是乎吾友王進之得其墨本而寶蓄之仍圖函丈之像以冠其首而益以翰林公志語且將併刻焉即其所好亦可以知其為人也上周監察夫人生朝門庭爽朗瑞氣氤氲夫人之誕長也煌煌綺羅洋洋絲竹家人之拜祝也渺惟愚甥實與此榮固無以薦誠惟天為髙惟地為厚惟川瀆不竭惟山嶽不朽敢焚香酌酒拜首啓手以為夫人壽貧士歎甑生塵瓶乏粟北風蕭蕭吹破屋入門兩眼何悲涼稚子低眉老妻哭世無魯子敬蔡明逺之真丈夫故應餓死填溝谷蒼天生我亦何意蓋世功名實不足試將短刺謁朱門甲第紛紛厭粱肉白髮嘆清晨梳短髮已見數莖白妻孥驚且吁謂我應速摘我時笑而答區區亦何必此身終委形毁棄無足惜况爾毛髮間乃欲強修飾畢竟滿頭時復將安所擇題淵明歸去來圖靖節迷途尚爾賖苦將覺悟向人誇此心若識真歸處豈必田園始是家孤雲出岫暮鴻飛去住悠然兩不疑我自欲歸歸便了何須更説世相遺拋却微官百自由應無一事挂心頭銷憂更藉琴書力借問先生有底憂得時草木竟欣榮頗為行休惜此生乘化樂天知浪語看君于世未忘情名利醉心濃似酒貪夫衮衮死紅塵折腰不樂翻然去此老猶為千載人趙內翰求成南訪道圖詩辭不獲已乃作絶句以戲復為之解云得道由來不必勞癡兒舍父漫逋逃間間老子還多事持向伽藍打一遭竹木蕭森蔭緑苔幽襟自愛北軒開主人無説吾何恨乘興而來興盡回答鄭州辨禪師見戲代髙防禦酒肆淫房即道場一時作戲亦何妨吾師自墮泥犂獄更笑春風栁絮狂再至故園述懷五絶日日天涯恨不歸歸來老淚更沾衣傷心何啻遼東鶴不獨人非物亦非荒陂依約認田園松菊存亡不必論我自無心更懷土不妨猶有未招魂山杏溪桃化棘榛舞臺歌館墮灰塵春來底事堪行處門外流鶯枉喚人回思夢裡繁華事幸及當年樂此身間立斜陽看兒戲憐渠虛作太平人艱危嘗盡鬢成絲轉覺歡譁不可期幾度哀歌仰天問何如還我未生時山谷于詩每與東坡相抗門人親黨遂謂過之而今之作者亦多以為然豫嘗戲作四絶云駿步由來不可追汗流餘子費奔馳誰言直待南遷後始是江西不幸時信手拈來世已驚三江衮衮筆頭傾莫將險語誇勍敵公自無勞與若爭戲論誰知是至公蝤蛑信美恐生風奪胎換骨何多樣都在先生一笑中文章自得方為貴衣鉢相傳豈是真已覺祖師低一著紛紛法嗣復何人王子端云近來陡覺無佳思縱有詩成似樂天其小樂天甚矣豫亦嘗和為四絶功夫費盡謾窮年病入膏肓不可鎸寄與雪溪王處士恐君猶是管窺天東塗西抹鬪新妍時世梳妝亦可憐人物世衰如鼠尾後生未可議前賢妙理宜人入肺肝麻姑搔癢豈勝鞭世間筆墨成何事此老胸中具一天百斛明珠一一圓絲毫無恨徹中邉從渠屢受群兒謗不害三光萬古懸宫女圍碁圖盡日羊車不見過春來雨露向誰多爭機決勝元無事永日消磨不奈何滹南遺老集卷四十五
