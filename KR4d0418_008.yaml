  text: 滹南遺老集卷之八
  hash: sha256:a1507334687b52e1bd32599c6da9c9da48e8b23e9c1061421504ebc2da279545
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0418_SBCK_008-1a}
body:
  text: 滹南王若虛從之孟子辨惑孟子謂說詩者不當以文害辭辭害志以意逆志是為得之趙氏曰欲使後人深求其意以解其文不但施于說詩也此最知言蓋孟子之言隨機立教不主故常凡引人于善地而已故雖委巷野人之所傳苟可駕說以明道皆所不擇其辭徑其氣勵其變縱橫而不測蓋急于救世而然以孔子微言律之若參差而不合所以生學者之疑誠能以意逆志而求之如合符契矣趙氏雖及知此而不能善為發明是以無大功于孟子司馬君實著所疑十餘萹蓋淺近不足道也蘇氏解論語與孟子辨者八其論差勝自以去聖人不逺及細味之亦皆失其本㫖張九成最號深知者而復不能盡如論行仁政而王王者之不作曲為護諱不敢正言而猥曰王者王道也此猶是鄭厚輩所見至于對齊宣湯武之問辨任人食色之惑皆置而不能措口嗚呼孟之意難明如此乎伊川解取傷亷曰如朋友之饋是可取也然巳能自足則不可取之便傷亷豫以為孟子之意止謂于義一何如耳豈論已之有無哉義所當取也巳雖有餘取之何害果不當取雖其不足亦不可也其說與傷惠則曰可以無與而與之則却于合者無以與之如博施濟衆固聖人所欲也然五十者方衣帛七十者方食肉如使四十者衣帛五十者食肉豈不更好然力或不足則當衣帛食肉者反不足矣所以傷惠此又迂濶之甚也孟子亦曰與之不當則將以為惠而適害之耳何勞曲說嗚呼明經如程氏亦可謂難得矣然時有此等故未能盡厭乎人心仲尼不為已甚者蓋每事適中皆無大過耳或者見論語疾不仁之言及孟子論泄栁假干木事亦有已甚字遂專以此意解之失之拘矣然已甚之事在他人或有之非所以論仲尼也聖人于本分之外無毫末之過豈至于已甚而後不為乎南軒解久假而不歸曰假之則非真有矣而謂烏知其非有此闡幽以示人之意蓋五霸暫假而遽歸者也使其假而能久久而不歸則必有非苟然者孰曰非已有乎蓋有之者不係于假而假于不歸耳孟子斯言與人為善而開其自新之道所以待天下後世者可謂宏𥙿矣其說甚好晦菴曰假之終身而不知其非真有又有云假之雖久終非已物陋哉斯言也天下之人不能皆上性君子多方教人要以趨于善而已故利而行之勉强而行之皆在所取以為成功則一也若如朱氏之言自非堯舜舉皆徒勞而無益誰復可進哉方渠未成書時嘗有此義質于南軒南軒答之如今所說而卒從巳意甚矣好髙而不通也東坡曰假之與性亦異矣使孔子觀之不終日而决何不知之有嗚呼孟子豈誠不能辨此乎蘇氏幾于不解事孟子曰男女授受不親禮也嫂溺援之以手者權也東坡曰嫂溺援之亦禮也與李泰伯之說同夫孟子云此固正禮然有時而從權耳豈謂權即非禮乎二子可謂以辭害志矣子産以乘輿濟人于溱洧孟子曰惠而不知為政夫橋梁之政野人皆知之曽謂子産而不及知乎此必有司之不職或偶圯壈而子産適見因以救一時之急豈專以此為惠而孟子亦豈誠譏子産哉蓋世有不知本末如移民移粟遺衣遺食之徒故借其事以為戒耳東坡遂以孟子為失張子韶既知其出于一時而復求子産之病以實孟子之言是皆非也東坡以孔子去食存信之義破孟子禮輕食色重之論以為使從其說則禮之亡無日矣張九成亦疑其非而置之不說豫謂不然子貢以去取為决故孔子以去取决之任人以輕重相明故孟子以輕重明之其勢然耳使任人之問如子貢之問則孟子之所答亦將如孔子之所答矣孟子之言未可瑕疵南軒頗見其㫖但辭不能達耳孟子語人每言性善此止謂人之資稟皆可使為君子蓋誘掖之教而蘇氏曰孟子有見于性而離于善善非性也使性而可以謂之善則亦可以謂之惡其說近於釋氏之無善惡辨則辨矣而非孟子之意也吕東萊曰以君子之言借小人之口發之則天下見其邪而不見其正以小人之言借君子之口發之則天下見其正而不見其邪是故大誥之篇入于王莽之筆則為奸說陽虎之語編于孟子之書則為格言非變其言也氣變則言隨之變也慵夫曰以論似髙而實非也言之邪正顧人何如豈氣所能變哉莽之文奸固不待辨而陽虎之語人皆疑焉夫陽虎志于為富而不在仁故以仁之害富者言之孟子志于為仁而不在富故以富之害仁者言之陽虎若曰為仁則不得致富故為富者不暇顧仁孟子若曰為富則必致賊仁故為仁者不當務富此其所以異耳先儒曰言有可採不以人廢誤矣虎之口豈有善言哉至于仁富不能兩立則理勢之固然者故孟子舉之以為滕文厚斂之戒自反而不縮雖褐寬博吾不惴焉不字為衍不然則誤耳此甚明白而釋者依違不辨何也孟子必有事焉而勿忘之說或以心字屬上句㦯以屬下句豫以文勢觀之語皆不安中間或有脫誤未可為斷然之說也章子出妻屏子終身不養此止是畜養之養若所謂女子小人為難養者而注疏晦菴皆云不使養巳即是奉養之意當作去聲讀非也吕東萊䇿問進士孟子論孔子集大成之說云譬之金玉則智始而聖終譬之巧力則聖至而智中以智為尚則害前說以聖為尚則害後說此雖一時科舉之文實有可疑學者不得不辨也以豫觀之當云智譬則力聖譬則巧後說字誤耳孟子對齊宣聞誅一夫紂未聞弒君也而說者疑焉豫以為警時君之語耳滹南遺老集卷八
