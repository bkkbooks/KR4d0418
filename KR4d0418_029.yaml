front:
  text: 滹南遺老集卷之二十九
  hash: sha256:5421bd5cee0c0e7a5718b3dd2d9a7f33038d7dff30f2c9bbeaf6b314f911f2a4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0418_SBCK_029-1a}
body:
  text: 滹南王若虚從之臣事實辨蕭何治未央宫髙祖見其壮麗怒曰天下匃匃勞苦數歲成敗未可知是何治宫室過度也何曰天下未定故可因以治宫室且天子以四海爲家非令壮麗亡以重威上悦唐明皇時太廟四室壊上素服避正殿時将幸東都以問宋璟蘇題對曰陛下三年之制未終遽爾行幸恐未當天心災異為戒願且停車駕又問姚崇則曰太廟屋材皆苻堅時物嵗乆朽腐而壊適與行期相㑹何足異也且王者以四海為家陛下以闗中不稔幸東都百司供擬巳備不可失信上大喜從之嗚呼古人以家四海為言者多矣事雖不同率皆以廓人主之大度而破其𥚹狹之心而蕭何以之啟奢靡姚崇以之勸逸㳺信乎六經之言有時可以文姦也據二主𥘉懐戒懼之意正當相順以成其羙而何等乃以邪説引之於惡罪孰大焉然何語雖非特以自解其失情猶可恕崇方失寵因此迎合遂復相位則其用心之鄙尤不容誅也唐元宗幸洛以崤谷道隘不治欲免河南尹及知頓使官宋廣平諌之既見從矣乃復請曰陛下罪之以臣言而免之是代陛下受徳也迄令待罪朝堂而後赦上善之嗚呼臣以進言為忠君以納諌為聖上下同心以求真是此唐虞三代所以直道而行也自後世䛕臣専以歸恩分謗為爱君于是人主始諱其過而耻屈於下矣孰謂堂堂如宋公者而亦為此態乎李希烈攻寕陵劉昌令守陴内顧者斬昌孤甥張俊居西北未嘗内顧而捽下斬之士有固志故能解其圍杜牧之所記如此嗚呼無罪而殺其所親以之警衆雖云成功害理甚矣故宋子京不取以為好事者傳㑹此葢有功於昌而東坡譏笑之信蘇氏之學駁而不醇也或問張廵許逺如何曰忠矣然而未仁殺一不辜而得天下仁者不為守一城而食人三萬口其忍為之乎寕使賊殺豈容自食故予嘗謂其死節之名固千古不可磨而食人之罪亦萬刼不能滅也或曰為已則不可為國何害曰為已與為國等耳天下只有一箇是或又曰圖大事者不顧其小曰守城之事小食人之事大三萬口之命而謂之小事何邪使江淮果由此而保亦不足道况其未必哉為廵等計可走則走不可則戰戰不勝而死之足以塞為臣之責矣國之存亡付之天可也盖當時公論亦多尤之李翰軰曲為辨説詎能服人之心而史臣猥曰議者遂定嗚呼去古逾逺義理不明於天下士大夫以名節自髙而卒不免害道者可勝數哉郭子儀不理發塜盗盖主名未得且王事方急因以觧危疑而安反惻耳其心非不痛也而楊龜山以為能忘物我豈不悖哉此流於荘列之薄非所以為人子之訓也李西平屯渭槗熒惑守歳乆之乃退賔佐皆賀以為星家之福因請速進兵西平曰天子野次臣下知死敵而已天象髙逺誰得知之既克長安乃謂之曰嚮非相拒也五星盈縮無常萬一復来守歲我軍不戰自潰矣皆謝非所及予謂西平處此固善然終不當語人其機已泄他日安可再用哉抑君危而臣死敵義自當耳天象吉凶寔不暇問亦無事乎此機也陽城之事退之永叔皆論其非而范純夫辨之以爲寔有所待且譏永叔不成人之羙盖以城之素行非畏禍苟容者又卒有沮延齡救陸贄事故爾云云要之徳宗之朝不必待七年而後可言爲臣之法當以韓歐爲正唐史稱陸宣公貶忠州避謗不著書恐未必然宣公經濟之學本非立言者方其得志則發而見於用否則嘿而已矣不然公處昏君邪臣閒直言鯁論未嘗有所屈豈其一遇斥逐而遽爾長忌邪史氏之期公淺矣韓退之不善處窮哀號之語見於文字世多譏之然此亦人之至情未足深怪至潮州謝表以東封之事迎憲宗是則罪之大者矣封禪忠臣之所諱也退之不忍須臾之窮遂為此䛕恱之計髙自稱譽其鋪張歌誦之能而不少讓葢冀幸上之一動則可憐之態不得不至於此其不及歐蘇逺矣柳子厚附麗小人以得罪天子所謂自貽伊戚者安於流落可也而乃刺譏怨懟曽無責巳之意其起廢之說悲鳴可憐至有羡于病顙馬躄浮圗既不知非又何其不知命也李徳𥙿不由科第進且以牛李譏切父政之故遂深疾進士嘗謂武宗曰朝廷顯官須公卿子弟為之盖少習其業而熟於朝廷臺閣之儀寒士雖有過人之才不能閑習也世以其言為不公而楊中立力為辨之慵夫曰在地人言之固無嫌自徳𥙿而言雖曰非私人不信矣若謂人材色色有之不必進士則可乃欲専仕公卿子弟豈得爲公論哉天下之事豈徒習家業熟朝儀者所能辨而才誠過人則亦何有於此等哉自古由寒素爲名臣者何可勝數膏梁紈綺子焯焯者幾人而遽以此薄天下之士顧不𥚹淺而可笑邪使徳𥙿麄人猶不足深責彼其著書論事實皆本於儒學獨以激於私意遂爲是過正之說卒以忌克禍及搢紳至於斥死而不悛其天資小人也哉唐哀帝時朱全忠欲以牙将張廷範為太常卿宰相裴樞謂太常卿當以清流為之持之不下全忠怒而殺樞歐陽子曰一太常卿與社稷孰為重使樞等不死尚惜一卿其肯以國與人乎雖樞等不能存唐必不亾唐而獨存也范純夫非之以為樞乃全忠之黨從其大而違其細以竊天下之虗譽非有忠義之心能為社稷者也葛勝仲曰自古奸臣有簒奪之志必誅異己者曹操殺荀彧司馬懿殺王經未有同巳而誅之者樞果從其大而違其細全忠自當以意曉尚何甘心投之濁流李振之謀耳振嘗曰王欲圗大事而樞軰朝廷之難制者故令殺之昭宗時樞爲汴州宣諭以與全忠素善故全忠聴命修貢獻不絶後雖因全忠言而復相然能持之以正則始進不足累也當以歐陽子爲正慵夫曰葛氏之言當矣然歐公亦許之太過所以起純夫之辨若樞者有書生之直氣而無不可奪之大節耳新唐書孝友傳劉君良四世同居隋末荒饉妻勸其異居因易置庭樹鳥雛令闘且鳴家人怪之妻曰天下亂禽鳥不相容况人邪君良即與兄弟別處月餘宻知其計因斤去妻曰爾破吾家乃復召兄弟同居君子曰使君良果篤於友悌者豈一婦人可得而閒之既已為所愚而至於乖離矣雖知過而改亦何足入傳也王朴薦扈載於李榖乆而不用云非不知其才然載命薄恐不能勝朴曰公為宰相以進賢退不肖為職乃言命邪已而召拜知制誥及為學士歳中病卒時年三十六議者以榖能知人而朴能薦士予謂人之於事亦盡其當為者而已朴能薦士信然糓之知人不足道也且人誠有命則夀夭貴賤固已一定而不可逃豈宰相所能予奪而損益哉榖言亦偶中耳馮道忘君事讎萬世罪人無復可論者而蘇子由曲為辨說以為合於管晏之不死雖無管仲之功而附於晏子庶幾無媿嗚呼是豈可以為比哉子糾小白均為亡公子而小白先入既已為君内外安之𥘉無異議則齊國小白之有也糾不復爭而仲亦無必死之義故曰紏未成君仲未成臣孔子固嘗辨之矣崔杼弑荘公而立景公景公亦齊之􅏷也荘公之讎在崔杼而不在景公則晏子不死而事之亦可也及杼盟大夫之不巳與者則晏子不肯焉使杼而自立晏子其肯事之乎是固不得以爲比也又以對徳光之問爲能活中國受郭威之拜爲能重朝廷且曰簒奪之際雖賁育無所致其勇而道以談笑拜跪却之非盛徳不能如此其言區區尤爲可笑使此事果實亦何救乎大節之虧况其不然乎葢道之對徳光諂以求媚耳𥘉豈在民徳光之不殺適其不欲耳何有於道至於威之拜道道之不荅特平生長幼之禮不能遽改於一朝者也威之屈伸漢之輕重固不繫於此夫有汲黯之直節而後弭劉安之謀有周訪之威望而後能沮王敦之志若道者販君賣國習以爲常此乃姦雄之所易而取之者而謂其能却人於談笑拜跪之間乎夫惟威之視道不足以害其事故待以舊好而無閒道亦知其不吾忌也故受之如常日而無嫌不然威其肯爾而道其敢爾邪道之迎湘陰也揣威無實立之志不能以大義動之正論論之而徒要其無使妄語而已行未及還威巳代漢道復俯首而事之矣所謂以拜起折威者果足信乎議者曽不考其素要其終而惑於適然疑似之跡亦巳謬矣為臣至於馮道萬善不足贖百說不能文也使如道者猶可以貸焉豈復有人理哉胡安定曰生民不至肝腦塗地者道有力焉雖事讎無傷也王介甫則方之伊尹富文忠則目為大人其餘紛紛者不論也乃知逐臭之夫今古不乏而堯桀之是非有時而顛倒歐陽子為道傳鄙薄貶斥若将不齒然於此等亦以為誠然而不能辨何邪茆荆産云道欺盡五代人又欺到宋朝諸公此若賊伎倆亦自高嗚呼道何足以欺人哉直之者陋見耳吾嘗論之士大夫誦先王之書食人主之禄而敢昌言以馮道為是者皆當伏不道之誅也王沂公有言恩欲歸已怨使誰當歐公每誦之以為得大臣體予謂人臣雖不當收恩然賢才豈可不求雖不當避怨然人情亦豈可輕失沂公惟主斯言遂至於不肯薦人歐公惟主斯言遂至於喜犯衆怒皆用心之過也王介甫詩云今人未可非商鞅商鞅能令政必行又曰秦晉區區等亡國可能王衍勝商君介甫𥘉以唐虞之事責神廟以臯䕫稷契自任漢唐而下皆所不道何其髙也及其憤新法之不行則甘心為商鞅而羡慕之又何其卑也滹南遺老集卷之二十九
