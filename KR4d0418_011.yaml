front:
  text: 滹南遺老集卷之十一
  hash: sha256:f19218822137ae43fc78cb9aff5fbb1a6c991fb91290d186b422aae0bdc1b0e8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0418_SBCK_011-1a}
body:
  text: 滹南王若虚從之史記辨惑三取舍不當辨遷史之例惟世家最無謂顔師古曰世家者子孫為大官不絶也諸侯有國稱君降天子一等耳雖不可同乎帝紀亦豈可謂之世家且既以諸侯為世家則孔子陳渉将相宗室外戚等復何預也抑又有大不安者曰紀曰傳曰表曰書皆篇籍之目也世家特門第之稱猶强族大姓云爾烏得與紀傳字為類也然古今未有知其非者亦可􅏜矣然則列國宜何稱曰國志國語之類何所不可在識者定之而已史記諸世家往往随年附見他國大事至于列傳亦㦯有之徒亂其文無関義理夫左氏編年夲紀諸國之事或先經以始事或後經以終義互相發明故可也如遷史者各有傳記足以自見何必爾耶近代蘇子容嘗自言其強記之法云吾每以一歲中大事爲目欲記當年事則不忘矣如某年改元其年有某事某年命相其年有某事則記事之一法也太史公書恐亦此意嗚呼史書法言也豈徒偹強記而巳哉蘇氏之說不足信魯世家有云往年冬晋殺其君厲公孔子世家有云明歲子路死于衛子路傳有云是時子貢爲魯使于齊魏世家有云其後十四歲而孔子相魯夫當年事且不宜附而又及徃年明歲同時十数年之後者何耶禹之平水土箕子之作洪範史但言其事目足矣而全載二書甚無謂盖聖經自傳不待表出徒増冗滯耳劉子元唯知孟堅地理志全寫禹貢之非而不譏遷史之謬何耶遷采摭異聞小説習陋傳疑無所不有許由之事既知其非矣而又惑于箕山之冡殆是胸中全無一物也史記老子傳訓誨孔子如門弟子而孔子嘆其猶龍者盖出于荘周寓言是何足信而遂以爲寔録乎至于成王剪葉以封唐叔周公吐握以待士孔子不假盖于子夏曽子以蒸梨而出妻皆委巷之談戦國諸子之所記非聖賢之事而一切信之子由爲古史遷之妄􅍝去之殆盡矣而猶有此等盖可恨云伯夷傳云余悲伯夷之意睹軼詩可異焉傳曰云云傳曰二字吾所不暁索隱云謂吕氏春秋韓詩外傳也信如是說則遷所記古人事孰非摭諸前書者而此獨稱傳乎新城三老董公遮說漢王以為兵出無名故不成明其為賊敵乃可服者此殊切于義理故孟堅全載其説而遷但云説以義帝死故太簡而不偹矣且止于義帝死故則謂之告可也何必云説哉吕后之名既列于本紀其事跡始末亦随處具見而外戚世家又云吕娥姁為髙祖正后男為太子及戚姬等事恐不湏也若唐武氏事跡猥多記中所不可悉故再入后妃傳其例自别吕后紀末云代王立為天子二十三年崩謚為孝文皇帝按此言代王為天子但以終誅吕之事耳其崩與謚則本紀自具何必及之耶吕后紀先云封吕􅎐為臨光侯不言􅎐之為誰而後乃云太后女弟吕􅎐失其次矣豈前所稱者别為一人耶漢文諸詔班固皆書詔而遷稱上曰按其文意當以詔字為是竇嬰傳云景帝欲用嬰嬰固辭上曰天下方有急王孫寕可讓耶王孫嬰之字也班氏著之傳首是矣今遷不著讀者何以知之始既不著則當云字謂耳然嬰貴戚大臣非他附見者亦不宜用此法也義縱傳云寗成家居上欲以為郡守御史大夫弘曰臣居山東為小吏時寗成為濟南都尉其治如狼牧羊成不可使治民上乃拜成為関都尉歲餘関東吏􅊢郡國號曰寕見乳虎無值寗成之怒此正當入本傳而書于縱傳何耶雖下有破碎其家事亦不湏也張湯傳云趙禹爲人亷倨爲吏以來舍無食客公卿相造請禹禹終不報謝務在絶知友賔客之請孤立行一意而巳見文法輙取亦不覆案求官属隂罪此叚與湯事非必相湏亦止當併于禹傳至亷頗趙奢張蒼周昌魏其武安等傳皆是類也律書之首以爲律爲萬事根本而其于兵械尤重武王伐紂吹律聼聲推孟春以至于季冬殺氣相并而音尚宫同聲相從乃物之自然此固可矣乃復偹論帝王以來用兵之事而終于漢文獻共百姓樂業㡬七百言何関于律意哉斯寔無謂之甚而邵氏極稱之以爲此其髙古雄深非他人拘窘所能到者嗚呼文章必有規矩凖繩雖六經不能廢頋乃以疎濶爲髙深緻宻爲拘窘何等謬論也又有謂此本爲兵書者若果兵書復安用許多律吕事大都皆出于畏遷而不敢議其非故妄云云耳史之立傳自忠義孝友循吏烈女儒學文苑與夫酷吏佞倖隐逸方術之類或以善惡示勸戒或以技能偹見聞皆可也至于滑稽㳺俠刺客之属既巳㡬于無謂矣若乃貨殖之事特市井鄙人所為是何足以汚編録而遷特記之乎班固徒譏遷之稱述崇勢利而羞賤貧然亦不知其傳之不必立也是故􅊞而存之范曄而下皆無此目得其體矣史記索隐謂司馬相如傳不宜在西南夷下大宛傳不宜在酷吏㳺俠之間此論固當然凡諸夷狄當以類相附則匃奴亦豈得在李廣衛青之間乎循吏儒林而下一節之人皆居列傳之末盖得體矣及至刺客乃獨第之李斯之上循吏則第之汲鄭之上復何意哉滹南遺老集卷十一
