front:
  text: 滹南遺老集卷之二十二
  hash: sha256:10496e673d08cdc5f4fdc4fde2f1532a2e2f2d3523db424f1bc151bd6b872f60
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0418_SBCK_022-1a}
body:
  text: 滹南王若虛從之新唐書辨作史與他文不同寧失之質不可至于蕪靡而無實寧失之繁不可至于疏略而不盡宋子京不識文章正理而惟異之求肆意雕鐫無所顧忌以至字語詭僻殆不可讀其事實則往往不明或乖本意自古史書之弊未有如是之甚者嗚呼筆力如韓退之而順宗實録不愜衆論或勸東坡重修三國志而坡自謂非當行家不敢當也以祁輩竒偏之識而付之斯事非其宜矣劉器之嘗曰新唐書好簡略其辭故其事多欎而不明遷固載相如文君事幾五百字而讀之不覺其繁使子京記之必曰少嘗竊卓氏以逃而已文章豈有繁簡要當如風行水上出于自然不出于自然而有意于繁簡則失之矣唐書進表曰其事則增于前其文則省于舊新唐所以不及兩漢文章者正在此兩句而反以為工何哉可謂切中其病歐公與宋子京分修唐史其文體不同猶氷炭也初書成將進吏白舊例止署局中官髙者一人姓名云某等撰而歐公官髙當書公曰宋公傳列傳用功深而為日久豈可掩其名於是紀志書公而列傳書子京子京聞之喜曰自古文人多相凌掩而不讓此事前所未有也以豫觀之歐公正不肯承當耳唐子西云晚學遽讀新唐書輒能壞人文格吾不知此論併紀志而言之耶抑其獨指列傳也歐公之作縱不盡善無壞人之理若子京者其自壞也已甚豈直它人哉溫公作通鑑未嘗用子京一語蓋知所決擇矣子京譏舊史猥釀不綱而以傳逺自許今之學者類皆歆艷以為新奇舊史幾廢劉器之嘗言二書各有短長未易優劣以愚觀之舊史雖陋猶為本分且不失當時之實寧無新書可也吕夏卿預修新書其言云韓愈使王庭湊之莭舊史不書今乃書之所以明臣子之義也太宗拒魏徴諫殺田舍翁之語舊史則書今不書之所以掩人君之過也豫謂子京書退之事則當其削太宗事非也此而削之則長孫后之賢復沒而不彰矣所貴乎史臣者善惡必存以示勸戒故謂之直筆豈以掩人君之過為賢乎且帝雖有過因后言而遽改焉是亦從諫之美也何庸諱哉吕氏之說甚謬魏徴諫長樂公主資送事舊史載于長孫后傳是矣今移于公主傳甚未當也䔥銑𬒳圍謂羣下曰天不祚梁數歸于滅若待力屈必害黎元豈以我一人致傷百姓及城未拔冝先出降諸人失我何患無君乃以太牢告廟率官屬詣軍門降曰當死者唯銑百姓非有罪也請無殺掠銑雖草竊一時而顛沛之際其言可愛如此可以為萬世法豈得不載新史乃皆略之而其贊但云以好言自釋於下然則所謂好言者後世何從見之哉銑對髙祖逐鹿之語與所謂田橫南面非負漢朝者皆中理之論而子京亦削之髙祖卒誅銑直以其不屈而慙怒耳非能折其口也子京云僞辨易窮且極稱髙帝之聖蓋不獨去取失當而其褒貶亦殊未安也通鑑云李承嘉附武三思詆尹恩貞于朝思貞曰公附㑹姦臣將圗不軌先除忠臣耶或謂忠貞曰公平日訥於語言今廷折承嘉何敏耶思貞曰物不能鳴者激之則鳴承嘉恃威權相凌僕義不受屈亦不知言從何而至也舊史思貞傳不見此事新史則云或問思貞公敏行何與承嘉辨答曰石非能言者而或有言子京以孔子有云君子欲訥于言而敏于行遂以敏行代言訥豈有行敏遂不當辨曲直者且左傳載石言于晉蓋物憑而為怪耳亦豈激之而鳴之意哉子京疏謬甚多此最可笑者也又云承嘉恃權而侮吾義不辱此一侮字屬上句則下句不成語屬下句則上句尤不成語矣疾雷不及掩耳此兵家成言𥘉非偶語古今文士未有改之者宋子京于李靖傳乃易疾雷為震霆易掩為塞不惟失真且其理亦不安矣雷以其疾故不及掩耳而何取于震掩且不及復何暇塞哉此所謂欲益反弊者也當斷不斷反受其亂成言也陳叔逹嘗引以諫髙祖而子京則曰失而不斷反蒙其亂蓬生麻中不扶自直成言也髙宗嘗舉以告劉禕之而子京則曰蓬在麻不扶而挺栁楚賢聞髙祖兵興說太守堯君素曰君子見幾而作不俟終日轉禍為福今其時也子京復略其辭曰君子見幾而作俟終日耶其膏盲之病類如此古人稱炙手可熱者蓋甚之之辭而非實事也故但可施之詩句諺語耳而新史稱楊國忠權勢可炙韋渠年勢熖可炙田令孜權寵可炙既已非矣而復謂李義府門如沸湯王伾等門若沸羮者豈不益乖耶史稱杜如晦云當時浩然歸里王徽云公議浩然歸重鄭餘慶云公論浩然歸重許孟容云四方浩然想見其風古人用浩然字多矣曷嘗以為歸重想見之意哉張公藝九世同居髙宗問之書忍字百餘以對蓋言忍之甚也新書去百餘字意不完矣蕭俯假文昌勸穆宗銷兵請密詔天下有兵處每歲百人之中限八人逃死不𥙷此本分語也新史則云詔天下鎮兵十之歲限一為逃死此却似總分天下兵為十也且其法本千百人中去八人而子京之數乃及十人豈不失當時之實乎杜正倫虞世南等嘗論事稱旨太宗謂之曰我聞神龍可優而馴然喉下有逆鱗觸之則殺人人主有逆鱗卿等遂不避犯觸各進封事常能如此朕豈慮危亡哉人主稱鱗亦取類云耳子京輒云遂犯吾鱗不幾指斥乎又改豈慮字為其慮亦便道不過通鑑云索元禮與萬國俊兢為訊囚酷法或以椽關手足而轉之謂之鳯凰曬翅或以物絆其腰引枷向前謂之驢駒拔撅又有仙人獻果玉女登梯之狀新唐元禮傳但載其一云號曬翅不知曬何翅也舊史李揆試進士設經史于庭而引貢士謂之曰大國選士但務得才經籍在此請恣尋檢而新書改云可盡所欲言盡言何關尋檢事封倫言于髙祖曰秦王恃有大功不服居太子之下新書改云頡禎太子此豈當時真語且頡頏上下飛也如何便作得不服居下意又說建成作亂曰為四海者不顧其親漢祖乞羹此之謂也新書但云乞羹者謂何若無舊史安知其為髙祖事哉劉德威對太宗云律文失入者減三等失出者减五等法之為等不一而新史削去等字是總以十分為率而論也舊史云元宗聞顔真卿抗賊事喜謂左右曰朕不識顔真卿形狀何如所為得如此通鑑改為作何狀此亦無傷至新書乃云何如人則是總言其性行也太宗聞李君羡小字五娘云何物女子如此勇猛通鑑云乃爾勇健語雖異而意則同新史云乃此健耶一此字便不完韋夏卿責從弟軌誼受金曰顧當是哉崔湜岑羲聞韋凑直諫曰公敢是耶其病一也君羡武安人封武逹郡公為左武衛將軍在元武門帝以其皆有武字遂因告者誅之而新史直云皆武也不亦乖乎劉蕡下第李邰謂人曰蕡逐我留吾顔其厚耶下第何可言逐也趙宗儒遷吏部侍郎德宗召見勞曰曩與先臣並命尚念之耶古者人臣稱其亡父于君則有先臣之辭君稱于臣未見其例子京好改舊語而往往反不如之李雍對或人曰不顛不狂其名不彰而新史云不如是名亦不傳王求禮折蘇味道曰三月雪為瑞雪臘月雷亦為瑞雷耶新史云果以為瑞則冬月雷渠為瑞雷耶李邰曰劉蕡不第我輩登科實厚顔新史曰蕡逐我留吾顔其厚耶李右折仇士良曰京師之亂始自訓注訓注之起始自何人新史云亂京師者訓注也然其進孰為之先此等逺不及舊語也李綘傳云帝嘗稱太宗元宗之盛云朕不佞欲庶幾二祖之道德風烈無愧諡號不為宗廟羞何行而至此乎絳曰陛下誠能正身勵已尊道德逺邪佞進忠直與大臣言敬而信無使小人參焉與賢者遊親而禮無使不肖與焉去官之無益于治者則才能出斥宫女之希御者則怨曠消將帥擇士卒勇矣官師公吏治輯矣法令行而下不違教化篤而俗必遷如是可與祖宗合德號稱中興夫何逺之有言之不行無益也行之不至無益也帝曰美哉斯言朕將書諸紳子京之文類從僻澀至此一假獨華靡偶􅓻幾似進士䇿一時對答之間豈得如是舊史絳傳無之未知其何所本也舊史方伎傳云崔善為纍擢尚書左丞諸曺史惡其聰察以其短而傴嘲之曰崔子曲如鈎隨例得封侯髆上全無項胸前别有頭而新史但云曲如鈎例封侯何耶後漢劉寬不喜盥浴京師以為諺史不載其語者必以俚甚故耳子京果嫌其俚則削之可也改之可乎焬帝見李密瞻視異常謂字文述曰勿令宿衛而新史但云無入衛乃是面戒密也楊素問密曰何虞書生耽學若此新史減虞字便别却本意素謂諸子曰吾觀李密識度汝等不及新史云非若等輩意亦不明姚崇汰僧僞濫者舊史但云還俗而子京云髮而農此何等語且萬二千人豈無歸異業者而悉為農乎此可以一笑也王叔文既敗每誦杜甫詩云云而子京但曰誦杜甫諸葛祠詩以自况若無舊史證之不知其誦何語也况杜集諸葛廟詩非止一篇乎新史載閻立本為主爵郎中時太宗與侍臣泛舟春苑池見異鳥容與波上召立本侔狀閣外傳呼畫師閻立本據本傳𥘉不言其善畫其兄立德傳但云父毗本以工藝進故立德與立本皆機巧有思而立德事業不過制衣服營宫室之類然則安知立本之善畫哉傅奕傳𥘉不言善數學其病亦猶是也故不若舊史為明又謂閻則先當玄宗在藩時以善割蒙寵吾不知何所割也張柬之謂李多祚曰將軍居北門幾何曰三十年矣張巡問李懷忠曰君事胡幾何曰二朞夫幾何云者但多少之名耳豈足包時字之義宋廣平教張說救魏元忠云若獲罪流竄其榮多矣此本分語也舊史以榮為芬芳新書作芬香皆甚紕繆舊史云李義琰改葬父母使舅氏移其舊塋子京云使舅家移瑩而兆其所兆其所三字想煞用心來然既使移舊塋則便知就其地矣何必如此費力兼三字自非典實語武后遣醫人却內安金藏五藏以桑白皮為線縫合語固近俗然子京云褫桑􅪂紩之大小怪樣也漢書稱兒寬以儒術飾吏事而新唐謂員半千不顓任吏常以文雅粉澤漢武稱何武所居無赫赫之名去後常見思而新唐謂薛戎居官時無灼灼可驚者已罷則懷之子京於文字其實處不及古人而專以易置字語為新徒勞甚矣舜稱耄期倦于勤蓋老而倦于勤也新史哥舒翰等贊云主德耄勤王徽傳云僖宗西狩徽追帝不及墮崖樾間楊行密傳云小校王稔依樾步戰裴敬彛傳云曾祖子通居母喪有白烏巢冡樾樾樹隂耳直以為林木可乎蘇世長指披香殿曰此煬帝作邪何雕麗底此底字訓致而作至字用誤矣通鑑戴至德為右僕射劉仁軌為左僕射更日受牒訴仁軌常以美言許之至德必據理難詰由是時譽皆歸仁軌有老嫗欲詣仁軌陳牒誤詣至德至德覽之未終嫗曰本謂是解事僕射乃不解事僕射邪歸我牒據此是老嫗明知至德也而新史但云今乃非是則意不完矣王燾傳云母有疾彌年不廢帶古今但言不解帶耳廢字何義也滹南遺老集卷二十二
