  - {type: variant, offset: 650, length: 0, content: '', WYG: 集四十五巻續編一巻金王若虗撰若虗宇從之自號慵夫藁城人金承安二年經義進士歴官左司諫轉延州刺史入為翰林直學士金亡後㣲服歸里自稱滹南遺老越十年與劉祁東游卒於泰山事迹具金史文藝傳史稱若虛有慵夫集滹南遺老集均曰若干巻不詳其數千頃堂書目載滹南遺老集四十五巻與王鶚序合慵夫集雖著於錄而巻數亦缺考大德三年王復翁序稱以中州集所載詩二十首附巻則慵夫集元時已佚惟此集存耳此本凡五經辨惑二巻論語辨惑五巻孟子辨惑一巻史記辨惑十一巻諸史辨惑二巻新唐書辨三巻君事實辨二巻臣事實辨三巻議論辨惑一巻著述辨惑一巻雜辨一巻謬誤雜辨一巻文辨四巻詩話三巻雜文及詩五巻與四十五巻之數合然第三巻惟論語辨惑序一篇總論一篇僅三頁有奇與他巻多寡懸殊疑傳寫佚此一巻後人割第四巻首三頁改其標題以足原數而續編一巻則又後人所附益也蘇天爵作安熙行狀云國初有傳朱子四書集註至北方者滹南王公雅以辨博自負為説非之今考論語孟子辨惑乃雜引先儒異同之説斷以己意其間疑朱子者有之而從朱子者亦不少實非專為辨駁朱子而作天爵所云不知何據觀其稱陳天祥宗若虗之説撰四書辨疑因熙斥之遂焚其稿今天祥之書具存無焚稿事則天爵是説特欲虛張其師表章朱子之功耳均非實錄也其五經辨惑頗詰難鄭學於周禮禮記及春秋三傳亦時有所疑然所攻者皆漢儒附會之詞亦頗樹偉義觀其自稱不深於易即於易不置一詞所論實止四經則亦非强所不知者矣史記辨惑諸史辨惑新唐書辨皆考証史文掊擊司馬遷宋祁似未免過甚且或毛舉細故失之煩瑣然所摘遷之自相牴牾與祁之過於彫斵中其病者亦十之七八君事實辨臣事實辨皆所作史評史事議論辨惑著述辨惑皆品題先儒之是非其間多持平之論頗足破宋人之拘攣雜辨二巻於訓詁亦多訂正文辨尊蘇軾而於韓愈間有指摘詩話尊杜甫而於黄庭堅多所訾議葢若虗詩文不尚劖削鍜鍊之格故其論如是也統觀全集偏駮在所不免然金元之間學有根柢實無能出若虗右者吳澄稱其博學卓識見之所到不苟同於衆亦可謂不虗美矣乾隆四十一年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書滹南}
