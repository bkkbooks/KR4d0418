front:
  text: 滹南遺老集卷之四十一
  hash: sha256:1701a34ec0ce771b60f4708523fc334daa93632f2a343540029470278834d83a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0418_SBCK_041-1a}
body:
  text: 滹南王若虚從之雜文詩附揖翠軒賦并序沃人崔公有竹軒曰揖翠其子逹之求詩文于士大夫予亦為之賦云物之在天下皆妙理之所寓也人之扵物必有所慕而所以慕之亦必有故也故或取深山窮谷以為家指泉石風月以爲友是豈迂僻矯激不近扵人情誠有得乎其趣也沃川崔公賢明之属生于畎畝而不俗後其居爲園中其園爲亭而周其亭以竹叢髙映宻牕户爲肅森乎其如張緑惟而羅碧玉也夫天壌之閒佳花美木大有可以娱心而悦目者然公皆不以爲可觀惟此君焉是欲對玩吟嘯朝夕容與乎其中若與之相忘而不足此其意果安在哉吾可即之而知其所属獨不見夫此君乎歲暮天寒百物既迍氷雪交摧凄颷號振芬香艶色莫不零落敗散至于共盡而無餘而吾此君宛然自若獨立而能神盖其禀扵内者有足恃是以凌乎外者無所挫自世所難得之物而非夫漫生雜出暫榮俄朽之常品凡根也而我公慕之則又可因之而得其為人意其勁挺堅確卓乎不羣舉世皆怯而我獨勇衆人既屈而我獨伸濁穢有所不能汚險難有所不能亂本然之氣無適而不存也然則公不徒愛其色則取其質不徒玩之于其目誠體之扵其身若夫披風節月含烟臥雨千態萬状皆公之所外也吾何敢陳嗚呼公今逝矣而子璋嗣吾聞之孝者善繼人之志而述其事則登公之堂想其所取扵此君盍亦思所以自属如其庸懦委靡依違頋忌與時變遷一折而瘁豈特厚顔扵此君亦失公之本意矣瑞竹賦并序東垣有孝友之家曰許氏者兄弟輯睦為一鄉最其居室之南得瑞竹焉由地而上十二節而分為二又六節而復合君子謂其有以致之也許氏圖之以求文于作者僕辭不獲亦漫賦云天何為者耶視之蒼蒼詰之宴㝠不可得而名日月五星風雨雷霆寒暑晦㝠此雖有所必至而其参乎人者固可惑也孰知其徵萬物何為者耶隨氣而生不擇其地紛綸雜㳫殊状異類怪竒偉麗非常可喜盖無所不有焉孰知其為瑞然感名之説自古人不廢也不惟舉之于其口而又筆之扵其書跡推類附毫釐纎悉以為不啻如合符雖自信不惑者時出而辨之然亦不敢决其無何哉人有是行天有是應二者適稱足以據而為證也盖出扵物理之當然合扵人情之至公而其論乃定許氏之瑞何為而出吾嘗考其素而得其實兄弟相好閨門相輯鄉黨稱其徳誰無兄弟曾是不率妒忌忿疾以相撿拾隂營私積以自植立至其既極乃絶以析者皆是也此則上友下敬塤箎其翕始終以之有死無易我心既孚間言莫入可謂純正篤寔一出扵自然而非夫矯飾以求名跡者之所及也惟其同氣而異體雖異體而卒同心故斯竹也始扵一而中為二既二矣而復合于一也噫許氏之家宜獲報者而報又相似則天意所在猶不可必乎雖然天之扵許氏不應如是而遂已許氏之為善不應以是而自足亦何必圖冩鎸刻偁述記録以自羙而夸未俗耶吾為之説曰人有因物而知勉物有因言而加顯盖立徳雖扵錫類而傳家欲其及逺故夫所以區區扵此而未能忘情者殆亦憫時俗之己乖慮後嗣之或替而特以為勸耳頋豈淺哉寕晋縣令吴君遺愛碑昔予閒居扵東垣聞沃州寕晋有賢令尹民樂其政歌而舞之聲化藹然愈乆益播心窃慕焉既而知其為吴君公妙也予與之同年而昧其平生獨謂君讀書為儒能以壮年取髙第此必有以過人而其優為一邑固所宜者盖秩满来府始獲拜之儀度表表望而知其不凡即之愈深不覺嘆服益以所傳不誣可信翌日别去予亦㝷走雕隂三年復来不知君之安所在且為何職居未幾松水之民有乞書其前宰之政者問其主名則公妙也從而徵其寔則曰自吾令下車賦役以平刑罸以清奸宄不遏而懲仁亷不率而興煦風冷槁蘇暍醒民飽而嬉相忘乎無事斯亦古人之至化也盖其剛柔適中緩急得所勤故不廢事簡故不優民明無不察毫髪莫欺而其寛也又足以有容政是以和而克用又此其大凡也長上有徳而下不知其罪大矣知焉而無報罪又甚焉吾儕小人其曷以報公著之金石大書深刻昭不朽而垂無極所以報也蕞爾弊邑則唯是之知書與不書公何損益哉然所以示吾心之不忘則非是莫可也故敢以託嗚呼羙矣在他人猶當不辭况吾公妙哉守令之重尚矣而得人寔難故赤子每不得乳于其母言良吏者必予兩漢然自今考之可以屈指数則若公妙者豈易得而其民之遇之也顧不幸而可喜耶宜彼之言不妄而予亦樂為之道也公妙諱微咸平之平郭人登第于承安之丁已其始任建州軍判既以廉陞故超授寕晋云真定縣令國公徳政碑爲治莫如重守令而令爲甚盖其于民最親而理亂之原于是乎在也故一縣得人則一縣之事舉在在得人而天下平也真定劇邑其宰之尤不可非其才雲中國公明敏人也既下車譁者以静悍者以柔冤者有以告聴斷如神官無留事稱異政焉其去也其氏舍之而不忍挽而留之而不得也思有以紀其遺愛而示其攀戀之心有倡之而請言于予者曰我公其賢哉自吾身之所及見與夫故老之所傳吾邑凡更幾令言令之賢如公者幾人我公而去誰其嗣之吾儕小人徳公之賜而顧無以報也獨欲形容其萬一而鑱諸石以慰吾心以傳扵天下後世或庶幾焉其材具矣敢属之子噫智可以欺王公而不可以欺豚魚力可以得天下而不可以得匹夫匹婦之心事固有非人之所能強致者民至愚而神者也其心有同然之好惡其口有同然之毁譽有以服其心則比閭之徒可使之俛首而聴命不然國之得失長上之是非皆将喧囂謗議扵其下盖有謗之而不信刼之而不從者孰謂其可以強之而使吾譽之哉予近始識公而聞其名者舊矣昔者既甞為府參軍聲華藹然為前後之冠民既已像而祠之碑而頌之矣至扵去而之他復来而治此莫不皆然未至而人傒之既至而人安之去則思之而不能忘此果何從而得耶合一人之情易也至于一邑而昏然兹不難哉合一邑之情易也至于所至而皆然兹不難哉是必有大過人者而非可苟也而羿之注矢左右俯仰皆可以命中而庖丁之㳺刄批隙導窽無非理閒之自然何獨至扵為政者而疑之哉公之跡足以聳動人之耳目而膾炙其口者甚多列而著之非惟煩不可舉而且復害公之全故獨論其能得斯民之公心與夫所至皆然者以見之其亦足矣噫無寔之譽君子不以為榮無寔而譽人君子謂之愧辭若公者殆可以為榮而予亦庶乎其無愧也哉王氏先塋之碑王氏之先譜亡不可考世居鹿泉農隐不仕其最近者諱傑字邦美始知讀書今行軍參謀守道之父也好古樂善而尚氣輕財務周人之急教其子弟一以孝友忠言里閈少年有悍戾不率者亦必委曲鎸諭使之改而後已由是中外重之兄詠早世二孤玠瑀藐然可憐公親撫視以至成人而玠為名進士夫人李氏温雅慈祥偹諸婦徳與公俱以上夀終所生三子其仲則參謀君也未冠失怙近扵家累屈跡刀筆中貞祐𥘉宣撫司以人望選充本縣尉時甫離兵火遺黎反側未安而為長吏者方貪殘以逞一日衆變自令丞以下悉肆至君側肩拜而歡呼曰惡者除之善者奉之可也保我百姓非公而誰即以縣事歸君未幾改主真定簿今萬户史侯之立君勞為多擢慶原軍節度副使㝷復召置幕中恩顧益隆遂專腹心之寄君資豪爽而愷愷多可見者皆悦而親侯既以碩徳宏量髙出一時而君復以忠厚濟之政簡風恬逺邇咸頼其從征四方一軍所至獨多全活率君力也平居喜賔客車騎盈門窮日夜不厭有孔北海之風而于文士尤厚收攬薦延惟恐不至搢紳以為依歸儕類或譏其太過而不屑也故言河朔從事之賢者君為稱首焉一日語夫人程氏曰吾出微賤才能勲業無踰人者夤縁幸㑹驟至顯榮非祖考之靈其何以及此而墳壠蕭然沒沒扵蓬藜榛棘之間狐兎雜居殆不忍視吾罪大矣每一念及未甞不痛心疾首今将具禮而新之庶幾死可以瞑目程素剛明因力賛曰斯亦妾之素志也誠不可緩于是戒徒命工更其宅兆増之垣墉以至凡五服内瘞而未葬者皆次第而遷附焉然後完羙可觀無復遺恨既而又曰古者墓有碑碑有文所以垂世也而未之具猶為闕典乃以其辭来請予于玠為同舍生于君為門下客情親契厚勢不得辭竊惟追遠之説魯語存焉報本之義禮經著焉此天理人倫之至而名教之所先也為人後者生盡愛敬死極哀戚立身揚名以顯其親宜若足矣而又思所以致羙乎松楸而増光乎泉壌表其行寔大書深刻為不朽之説使夫耒者頋瞻想像歆羡而咨嗟豈非所謂追逺報本者固不能已邪王氏之善慶既當為之發揚而参謀君孝徳始終尤不可不紀乃叙其大畧而系之以銘曰岡阜在後澗溪在前繄王氏之阡有閟其室既完既堅有巋其碑是磨是鎸不有所肇孰開其先不有所繼孰大其傳徳厚流光理亦宜然于以昭之於千萬年李仲和墓碣銘若虚有心契曰李君諱仝字仲和博州髙唐人孝扵親順扵長仁扵僕妾其待朋友尤推誠尚氣節確乎可託以死也然性介少諧合素不為鄉曲所重徑行直視傍不覩太山輕薄子戲侮其後而不之覺人以為癡而笑靣目嚴冷疎扵禮貌箕踞袒跣不能一作謹媚状向人人復以為傲而怒志大論髙以匹夫憂天下毎欲危言呌閶闔以取時名而不計其利害人又以為恠而哀然仲和俱不屑也明昌閒予以從師客縣中閉門索居不妄應接而思與跌宕不羈之士㳺既得仲和語合意豁然大適為忘形交乆之益親一日不見相覓如求亡仲和好古文而尤喜論詩譏彈激賞中其羙疵睥睨儕流鮮能滿其意者始以詞賦干有司累不合既易經學遂克取髙㨗驚人㝷復齟齬然志愈厲氣不少哀謂富貴終可致後去家㳺京師徧謁一時鉅公顯人閒投之以所業兾幸撼動借聲勢因有所諧卒不售也予與仲和别十年閲人益多觀交態益熟而思仲和益深日在雕隂甞得其手書并雜著盈卷覧之太息悵然有懐以為昔人相憶或千里命駕東垣去齊西非甚逺平居多暇獨不能一徑往握臂道胸臆何耶秩滿東還當必遂此心若復不獲兹則有数歸及相臺或告仲和卒矣且曰渠比從事浮屠學参究孜孜自以有得既又習辟榖法因不食死仍説偈言以辭世云嗚呼仲和素嗜雜學聞輒欣慕予甞力排之能折其口而不能奪其心也其竟以是終乎予愧仲和見遇之厚而無以報憐其有大志而卒窮不偶恨其思之十年欲一復見而弗果乃書其行已之㮣而為之銘将寄其家俾刻諸其墓以冩吾心以傳諸後世以慰仲和之靈焉仲和無子取其兄子為後春秋若干卒扵某年某月日而塟以某月日銘曰維世之交其道以市權奔利合否焉則止靣而不心滔滔皆是有不其然如吾李子不幸短命死矣故朝列大夫劉君墓碣銘東垣劉君諱某字鼎臣予之執友也髙才博學以詞賦為名進士興定五年舉天下第一授應奉翰林文字時闗右優攘鄜畤𬒳兵帥臣紇石烈承詔往援表君從事執政難之不得已乃遣至則城䧟遂不知所終今二十年矣其家以歲月既深理窮望絶懼夫魂爽之無依也扵是招之以塟于先塋而請予銘其墓義不可辭則為叙次而銘之君資可愛幼而老成接物温温笑談有味見者皆悦而親𥘉自以所業過人意氣鋭甚謂當立取榮名而数竒不偶累舉未從一時儕輩收羅殆盡至扵後生新進亦往往先登而君欎滯如故繼遭䘮亂生理日艱晚逹汴梁纔試充史院書冩不勝落寞日者推其命咸謂無科第分君畧通其説亦以為然一旦雄㨗喜出望外方将馳騁快意以償平生而遽有是遘所謂命者果何如哉斯可哀而亦可怪也先娶董氏再娶李氏子四人董所出長曰燧以䕃𥙷官次曰煒次曰炤次曰煥孫男三人長曰坦次尚幼君累遷朝列大夫其從政之歲盖四十有七云銘曰其得也遲而塟之速其榮也不足而哀有餘孰主張者有銜不怯雖然名占甲科亦既成其志沒于王事抑又得其死有子有孫足以奉其祀憂樂同盡竟何校哉新宫孔固䰟兮歸来滹南遺老集卷四十一
