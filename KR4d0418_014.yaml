front:
  text: 滹南遺老集卷之十四
  hash: sha256:f27db5d8f5d327eb78f90d370776ce2c9eb9ac610d350167ee3f0573b156000d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0418_SBCK_014-1a}
body:
  text: 滹南王若虛從之史記辨惑六姓名冗復辨夏本記云禹之父曰鯀鯀之父曰帝顓頊顓頊之父曰昌意昌意之父曰黃帝禹者黃帝之元孫而顓頊之孫也禹之曽大父昌意及父鯀皆不得在帝位為人臣劉子元史通點煩云顓頊紀中具言黃帝是顓頊祖矣此篇云禹是顓頊孫則其上不得更言黃帝之元孫既云昌意及鯀不得在帝位則下文不當復云為人臣也遂除五十七字誠大中其病然遷書率皆此類可勝道哉今略舉之如此紀既明叙啓為禹之子矣及即位又曰帝啓禹之子衛世家既明敘蒯瞶為出公之父矣及蒯聵立又曰是為莊公莊公者出公之父也晋世家既明叙公子重耳為獻公之子矣及重耳立又曰是為文公晋文公重耳晋獻公之子也其後又曰重耳即位為晋君是為文公晋厲公八年閏十二月欒書中行偃囚厲公迎公子周而立之是為悼公悼公元年正月書等弒厲公智瑩迎公子周來至絳刑雞與大夫盟而立之是為悼公魯世家云宣公卒子成公黑肱立是為成公管蔡世家云武王同母兄弟十人長曰伯邑考次曰武王發次曰管叔鮮次曰周公旦次曰蔡叔度次曰曹叔振鐸次曰成叔武次曰曰霍叔處次曰康叔封次曰冉季載季載最少同母兄弟十人唯發旦賢左右輔文王故文王舍伯邑考而以發為太子是為武王夫冉季載次第在末自可知其最少何必更言前巳言同母兄弟十人亦何必重舉前既稱武王發何必又云是為武王武王賢而立止宜入夲紀耳康叔封冉季載既見于此矣而衛世家復云康叔名封武王同母少弟其次尚有冉季載季載最少蔡平侯卒靈侯般之孫東國攻平侯子而自立是為悼侯悼侯父曰隱太子友者靈侯之太子平侯立而殺隱太子故平侯卒而隱太子之子東國攻平侯子而代立是為悼侯田完世家云田乞卒子常代立是為田成子及常卒又云常諡為成子吳王濞傳既云髙帝兄劉仲之子也而又云劉仲子沛侯濞年二十有氣力義縱傳既云縱有姊姁以醫幸王太后而又云拜義姁弟縱為中郎若是之類皆當為史通之所點也史記稱人姓名冗復為甚正是不及諸史處殷紀云武丁以雉雊而懼祖巳曰王勿憂先修政事祖巳乃訓王曰此正當云乃訓之曰越世家云勾踐棲㑹稽欲殺妻子燔寶器觸戰以死大夫種止勾踐曰止當云止之陳世家云孔寧儀行父請殺泄冶公弗禁遂殺泄冶止當云遂殺之吳世家云季札使于鄭見子産如舊交謂子産曰鄭之執政侈難將至矣止當云謂之趙世家云自叔帶以下五世而生趙夙趙夙晉獻公之十六年伐霍魁耿而趙夙為將伐霍中間多趙夙字又云趙盾卒子朔嗣趙朔景公之三年朔為晋將下軍叔鄭中間多趙朔字季布傳云丁公為項羽逐窘髙祖彭城西短兵接髙祖急顧丁公曰兩賢豈相厄哉于是丁公引兵而還漢王遂解去及項羽滅丁公謁見髙祖髙祖以丁公徇軍中丁公為項王臣不忠使項王失天下者乃丁公也遂斬丁公曰使後世為人臣者無效丁公安用許多丁公字耶蕭相國世家贊云蕭相國何于秦時為刀筆吏録録未有竒節及漢興依日月之末光何謹守管籥因民之疾奉法順流與之更始謹守管籥上多却何字周昌嘗燕時入奏事髙帝方擁戚姬昌還走帝逐得騎周昌項止當云騎其項髙后使使召周昌周昌至謁髙后髙后怒而罵周昌止當云既至后怒而罵郅都為中尉丞相條候至貴倨也而都揖丞相止當云都揖之臨江王徵詣中尉府對簿臨江王欲得刀筆為書謝上而都禁吏不豫魏其侯使人以間豫臨江王多兩臨江王字止當云欲得刀筆以間豫之竇太后中都以漢法于是遂斬郅都止當云于是斬之主父偃傳云是時徐樂嚴安俱上書言世務各一事徐樂曰云云嚴安上書曰云云重却上書二字天子召見三人乃拜主父偃徐樂嚴安為郎中止當云俱拜為郎中偃以齊主自殺下吏上欲勿誅公孫弘曰主父偃本首惡陛下不誅主父偃無以謝天下乃遂族主父偃止當云不誅無以謝天下遂族之張湯傳云上疑湯有姦問湯湯不謝湯又作驚多一湯字董仲舒傳云弟子以次相受業或莫見其靣蓋三年董仲舒不窺于園何必更言姓名郭解得罪公孫弘議當大逆無道遂族郭解翁伯翁伯解之字也傳首既著之次尤為贅劉子元駁遷書曰宋世家𥘉云襄公即位而仍謂宋襄公吳世家云闔閭越世家云勾踐皆于其號上加吳王越王字句句未嘗捨之其論甚當然此乃遷全體之病也凡稱某王類加國號凡舉人名每連姓氏冗復蕪穢最是不滿人意處班范而下乃始淨盡焉滹南遺老集卷十四
