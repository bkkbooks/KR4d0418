front:
  text: 滹南遺老集卷之五
  hash: sha256:03a050cb985360794a5df9548da7a5dadb9b9cf611fac98803d2c77257562599
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0418_SBCK_005-1a}
body:
  text: 滹南王若虚從之論語辨惑二宰予晝寝夫子有朽木糞土之喻且曰始也聼人之言則信其行今因予而改之舊説以為廢墮于學嗚呼一晝寝之􅆘雖聖人不免焉且夫學之勤惰行之真偽何足以卜之而夫子怒之至是乎葢其惰也非止於一朝而夫子之怒亦有素矣特因是而發耳不然則予之耽寝日以為常記者語簡而不盡其詳亦不可知荆公曰宰予之大罪在于行不頋言則晝寝之過為不足責東坡曰晝居于内非有疾不可予盖好内而懐安者皆求之大過也其餘説者尚多迂陋益甚無足辨焉始吾於人此一章而再稱子曰胡氏疑其衍文或非一日之言予謂以語法􅀚之只是一章其為衍文無疑也家語載夫子之言曰吾以言取人失之宰我以貌取人失之子羽斯果夫子之言乎曰非也好事者因論語而附㑹爲之耳夫子所謂始吾于人聼其言而信其行今也聼其言而􅀚其行因予改之者特一時忿怒之辭非謂平居一聼人言遂信其行也天下之人行不副言者多矣使夫子隨聼而遽信之所失者豈特宰予邪言猶可也至于以貌取人雖愚夫知其不可而謂聖人爲之乎夫子之於人好惡必察毁譽必試賜之辨師之堂堂曽不足以欺之顔子之愚猶必退省其私而後信何獨於宰予子羽而鹵莽如是哉吾固疑非夫子之言也子貢曰我不欲人之加諸我也吾亦欲無加諸人夫子以為非爾所及范純夫曰君子修其在已者其在人者不可必也已欲無加諸人易使人無加于已難巳所不欲勿施於人則無加于人矣而欲人無加于巳雖聖人不能也顔子之行犯而不挍則巳矣豈能使人無犯乎其説甚好然注䟽本如此程氏曰我不欲人之加諸我吾亦欲無加諸人仁也施諸已而不願亦勿施於人恕也恕或能勉之仁則非子貢所及强生穿鑿殊無謂也晦菴曰我不欲人之加諸我者我亦不欲以此加人􅁍只是已所不欲勿施於人巳也字爲者字於文爲悖矣又云此仁者之事故非子貢所及予謂如彼之說亦只是恕何足爲仁乎林少頴曰此正已所不欲勿施于人之意然此以爲非所及而彼則曰終身可行者葢自謂能之則不許甘於不能則告之乃聖人抑􅀭之意皆是曲説無足取焉子貢曰夫子之文章可得而聞其言性與天道不可得而聞也考諸論語六經夫子實罕言之故雖髙弟有不得聞者葢自漢以来學者莫敢輕議而近代諸公皆以為聞而歎羙之辭或又曰聖人之文章句句字字無非性與天道者吾不知其果何所見也歐陽子嘗謂聖人不窮性為言或雖言而不究學者當力修人事之寔而性命非其所急此於名教不為無功而衆共嗤黜以為不知道髙論既興末流日甚中才庸質例以上達自期章句之未知己指六􅀴為糟粕談􅀇説妙聼者茫然而律其所行顛倒錯繆者十八九此亦何用于世哉愚謂歐陽子不失為通儒而是説譊譊者未必無罪于聖門也嗚呼度徳量力切問而近思孔孟之教人必始于此後生小子盍亦少安寕失之固無涉于􅄭寕處其卑而不至于僣焉則善矣季文子三思而後行子聞之曰再斯可矣夫人之行事固不厭其思至于畏慎太過則亦不必也文子其太過也與故聖人以中道約之以為如是亦足而已近代李􅀖直獨得此意鄭氏曰賢而寡過不必三思蘇氏曰􅂯愈於一而况三乎程氏曰再則定三則私意起其説皆偏而程氏尤甚思至于三何遽為私意邪程子又以文子使􅀳求䘮之禮為證按文子至􅀳而果遭之則正得思之力也何過之有葢事有不必再思亦有不止於三思者􅀄無定論也吕岱戒諸􅁑恪曰世方多難子毎事必十思恪曰季文子三思而後行夫子曰再斯可矣今君令恪十思明恪之劣也岱無以荅時咸謂之失言夫以元遜之流而剛狠自用卒至於殺身則吕君之戒固未爲失然而無荅者豈以彼既自䕶其短故不復與之辨與抑亦膠於夫子之言而未能以意逆志也夫子以㣲生髙爲不直孔氏曰用意委曲非爲直人東坡曰髙古之過直人也乞醯以應求非孔子之所謂不直而髙平日之所謂不直也凡人情之所安者皆髙之所不可至其重違人之求而乞以與之雖髙不免此之謂不􅁇孔子因其不􅁇而譏之耳無垢曰直謂直情徑行也髙殷勤委曲以徇人情如此孰謂其徑行而不恤乎夫子葢美之也嗚呼從孔氏則幾于狷介而不通蘇張之論髙矣而於文勢訓義又爲不順是三者猶未安也謝顯道云周濟急難何害爲直然在當時其設心恐不若是夫子親見其事故語止于此而意已達矣今未可以乞醯認為不直林少穎云是必髙不謂之乞諸隣而與故也二説與鄙意暗同夫人求于我我適無而隣幸有公乞而明與之隣不為病而求者之望備焉兩不相傷聖人􅀅為之而安有不直之譏意者竊取諸隣而名為已有紿其人而為惠耳偽而不真故聖人惡之晦菴譏其掠羙市恩葢得之矣子曰十室之邑必有忠信如丘者焉不如丘之好學也或訓焉為何而属之下句廐焚子退朝曰傷人乎不問馬或讀不為否而属之上句意謂聖人至謙必不肯言人之莫已若聖人至仁必不至賤畜而無所恤也義理之是非姑置勿論且道世之為文者有如此語法乎故凡觧􅀴其論雖髙而於文􅀔語法不順者亦未可遽從况未髙乎夫子以顔氏簟瓢陋巷不改其樂為賢周濓溪每令學者㝷仲尼顔子樂處􅀁樂何事夫樂天知命而胸中有道義之味則外物不能累矣豈必有所指哉今乃如衲子下句曰什麽是受用吾門中何事此等語吕與叔詩云學如元凱方成癖文似相如反􅀋俳獨立孔門無一事輸他顔子得心齋一時好事者争諷誦之予按論語中庸繫辭􅀁載葢夫子之於顔氏博之以文約之以禮使欲罷不能而彼其所從事者皆遷善改過服膺克已之寔若乃􅈥支體黜聡明心齋坐忘等語此出於荘周之徒而吾黨引之以為美談誣先賢而惑後學其風殆不可長也子謂子夏曰女爲君子儒無爲小人儒均是儒也而有君子小人之辨葢其心術不謹趨向一差則要利盗名文姦濟惡皆學之力也末流或至叛聖人害天下而不顧非小人而何程氏曰君子儒爲已小人儒爲人王平甫張南軒亦同荆公曰君子一以貫之小人尚雜博王補之亦同沈道原曰君子者楊雄所謂大知而小人則所謂小知也范純夫曰君子學其内小人徇其外君子所治者本小人所治者末劉原甫曰君子􅀅行之小人􅀅言之謝顯道曰君子志於義小人志於利尹材曰君子通其理小人誦其数皆不足以盡之吕東萊曰小人者非險賤不正之謂也果險險不正安得謂之儒葢如言必信行必果之􅀋予謂不然儒者所業之名耳豈以行為小人遂不謂之儒乎夫小人之稱有二而指細民者不與焉其曰硜硜小人小人樊湏從其小體為小人之􅀋此謂所見淺狹對大人而言者耳自餘以對君子者皆險賤不正之属也游夏之在聖門文學雖勝而行寔未醇則夫子以是警之葢不為過子曰回也其心三月不違仁伊川曰三月天道小變之節言其乆也過此則聖人矣子由曰性之必仁如水之必清火之必明然方土之未去也水必有泥薪之未盡也火必有煙土去則水清薪盡則火明人而不仁物有以害之也物之害既盡心一而不雜未嘗不仁也若顔子者性亦治矣而土未盡去薪未盡化力有所未逮也故能三月不違而未能終身東坡云夫子黙而察之閲三月之久而造次顛沛無一不出於仁是以知其終身弗畔也予以東坡為當設使顔子有時而違仁亦必因事而􅀤如所謂日月至焉者豈有恰限三月輙一次違之之理若云三月之後不復可保則何足為顔子乎澹䑓滅明行不由徑非公事未嘗至宰室程氏曰由徑者謂踐田疇之􅀋也使小道便於往来由之何害予亦謂誠意苟通不必因公事而後可見滅明狷介之士不足為通方子㳺特取其所長而巳王子微云大道甚夷而民好徑徑者邪也所行不由正道者皆徑也此論太髙恐非其實史記稱滅明状貌甚惡孔子以為材薄既已受業退而脩行明施乎諸侯孔子聞之曰吾以貌取人失之子羽而家語乃曰子羽有君子之容而行不勝其貌故孔子有是言又曰滅明有君子之姿孔子嘗以容貌望其才其才不克孔子之望何其相反邪以論語証之史記為近宰我問井有仁焉之説舊説以為仁者必濟人于患難聞有仁人墮井􅀅自投下從而出之世儒多取林少穎謂仁當作人而伊川曰仁者好仁不避患難雖告之以赴井為仁亦􅀅從之予謂從舊注則仁字不安從伊川則逝字難説此當兩存之要之伊下闕未集予小子其承厥志記曰武王善􅁇人之志善述人之事豈以武王行事而不以文王之心爲心文王素所不欲者而一旦爲之豈誣稱文王之志哉葢孔子之所稱者􅀔可以取而不忍爲也武王之卒伐者義至于盡而不容已也學者拘于世俗之見而不知聖賢公天下之大義豈足與語此哉子罕言利一章說者雖多皆牽强不通予謂利者聖人之所不言仁者聖人之所常言所罕言者唯命耳然而云爾者予不觧也姑闕之子貢曰有羙玉於斯韞櫝而藏諸求善賈而沽諸夫子荅以待賈南軒曰待賈者循乎天理求善賈則心已先動矣其説甚好此便是義利之分子在川上曰逝者如斯夫不含晝夜注疏以為嘆時事之不留古今多取此意程氏曰此道體也天運而不已日往則月來寒往則暑来水流而不息物生而不窮皆與道為體運乎晝夜未嘗巳也君子法之自强不息及其至也純亦不已自漢以来儒者皆不識此意予謂孔子指水而云其所寓意未可曉也諸子之言亦俱説得去然安知其果然哉程氏之論雖有益學者要為出于臆度而遂謂自漢以来無識之者何其自信之篤邪葢未敢從子畏於匡沈道原曰君子畏乎在我者不畏其在天者不能窮理盡性而取禍此則在我者君子所當畏也既以窮理盡性矣雖有一朝之患君子不患矣然則孔子何為畏匡也曰此記者之云耳猶言作易者其有􅁨患乎以文王與紂之事也夫窮理盡性然後能作易何􅁨患之有故匡人之圍一事􅀚之則為可畏以理考之則非聖人之所畏也其説甚佳未可與權與唐棣之華詩舊説以為一章謂唐棣之華偏然反而復合權道亦先反常而後至于大順李清臣辨之曰􅁠之為名猶物之在􅁠能不失其輕重而已其於道之大􅀴葢未嘗戾而人倫之大􅀴未嘗亂也公羊氏始有反經之説焉孔子言可與立未可與權既已句㫁而别舉逸詩之文彼作詩者因兄弟之􅆾離而喻之以唐棣子曰未之思也夫何逺之有葢云兄弟之不親由已之友悌不至耳意謂詩人失辭所以刪而不取而釋者附之于􅁠以符公羊之説豈不􅄭哉此論為勝觧詩之義雖未敢必而其為兩章者决無疑也晦菴不知詩之所指止當闕之而云上二句本無意義但以興起下句則當矣程氏曰自漢以下更無人識􅁠字此言亦太峻矣唐徳宗還自興元欲因迎扈軍威使人代李楚琳陸贄諫曰若此則事同脅執議者或謂之􅁠臣窃未喻其理􅁠之為義取􅀋􅁠衡易一帥而􅃜萬乗之義得一方而結四海之疑乃是重其所輕而輕其所重謂之􅁠也不亦反乎以反道為􅁠任数為智君上行之必失衆臣下用之必䧟身歴代所以多䘮亂而長姦邪由此誤也􅀚宣公之論豈可謂自漢以下無識􅁠字者邪鄉黨一篇皆聖人起居飲食之常而弟子私記之雖左右周旋莫不中禮節然亦有本無意義者而學者求之太過如車中不内顧不疾言不親指食不語寝不言之􅀋此止是端荘重厚耳不撤薑食不得其醬不食止是性之所嗜耳至于食不厭精膾不厭細食饐而餲魚餒肉敗色惡臭惡者不食凡人皆然何必孔子東坡以為雜記曲禮非獨孔子之事皆置不説此固太甚然如張九成輩妄為誇誕務以張大聖人而不知其非實至謂與春秋相表裏其不近人情亦豈足盡信哉晦菴釋不得其醤不食曰惡其不備也予稱君子食無求飽又以士恥惡衣食為不足議夫豈以一物不備而不食哉彼事事必求義理則宜其陋之至是也晦菴觧食不語寝不言云荅述曰語自言曰言此何可分而妄為注釋只是變文耳康子饋藥拜而受之曰丘未達不敢甞楊氏曰不敢嘗慎疾也必告之直也予謂人以善意饋藥而告之以疑不敢嘗凡人交際皆知其不可况孔子之于康子乎且使饋藥無廹使面嘗之理何必以此語忤之當是退而謂人之辭記者簡其文故一曰字而足耳孔子廐焚而不問馬葢其已見故不必問初豈有深意哉特弟子私疑而記之耳後人因其記之遂􅄭意而為之説本不湏著此三字鄭氏以為貴人賤畜而然夫君子之待畜固輕于人然不應無情如此張子韶之說美矣至舉敝帷不棄等語以􅀤明忠厚之心亦所謂矯枉過正也不疾言不親指孔子在車時其端重固如此而說者以爲恐惑人不知此事有何惑人者若曲禮所謂登城不指城上不呼則有此理矣滹南遺老集卷五
