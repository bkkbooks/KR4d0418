front:
  text: 滹南遺老集􅃃之三十三
  hash: sha256:b3826420d29341fb162c8bfce6c9fbe776ef4a4630c7a66311f495fedd6ad045
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0418_SBCK_033-1a}
body:
  text: 滹南王若虚從之謬誤雜辨公羊曰君親無􅀅􅀅而誅焉盖接上文􅀅弒君之辭也唐明皇廢王后詔云見無􅀅之心劉從諌理王涯等􅁈云有如大臣挾有無􅀅之謀自宜執付有司蕭遘斥時溥之姦云卑侮王室有無􅀅之萌如何道來後人用此字往往不安也王戎問阮瞻老荘與聖人其㫖同異瞻以􅀅無同答之戎咨嗟良久乃辟為掾時稱三語􅁺瞻意盖言同耳晋人例重􅀇學故戎深喜而世多疑之夫􅀅無云者猶無乃得無之􅀋􅁃亮令禇裒認孟嘉于衆中裒指嘉曰此君小異􅀅無是乎茍晞子從母求為􅀅晞拒之曰吾不以王法貸人􅀅無後悔邪劉􅁉受禅徐廣攀晋帝車泣涕謝晦謂之曰徐公得無小過皆是􅀋也世說載禇裒語正作得無通鑑載謝晦語亦然以此可知其為同世說記三語事則又有衛玠嘲之之辭云一言可辟何假于三盖欲直言其同而不必更加疑耳今通鑑所載既依夲文而温公自節本乃改為無同異豈温公于此亦未詳歟而林氏又為之説曰二則有同有同然後有異一則無同無同然復無異求其同且不可得尚可以求異乎何謬妄之甚也後漢陳煒謂孔融幼而􅃪慧大未必竒融曰􅀚君所言􅀅不蚤慧乎􅀅不亦猶無􅀅也盖以煒言融雖蚤慧而大未必竒故融復言煒既大而不竒則疑于蚤慧或謂寔言其不蚤慧誤矣世說云殷仲堪之荆州王東亭曰徳以居全為稱仁以不害為名今宰牧華夏處殺戮之任與本操􅀅不􅆾乎殷曰臯陶造刑辟之制不為不賢孔邱居司㓂之任未為不仁南史荀萬秋對策父昶以示釋道琳道琳答曰此不須㸔若非先見而答貧道能為若先見而荅貧道奴皆能為昶曰此􅀅不傷道徳邪答曰大徳所以不徳竟不㸔焉推此􅀋則其義可見矣學者多疑寕馨之義或以為羙或以為鄙皆非也山濤目王衍曰何物老嫗生寕馨兒然誤天下蒼生者未必非此人此羙之之辭也南史宋王太后怒廢帝曰􅀅刀來破我腹那得生寕馨児此鄙之之辭也夫寕馨猶言如此然也今世方言往往有近之者但聲之轉耳故張謂詩以對阿堵劉夢得送日本僧詩云為問中華學道者㡬人雄猛得寕馨平仄雖殊其意一也宋書于太后語加如此字盖誤而不足憑焉魏書作如馨是則大同而小異耳東坡和王居卿平山堂詩云六朝興廢餘邱壠空使姦雄笑寕馨殊無義理特迫于趂韻姑以為王衍之名而巳近􅀚吴曽漫録亦論此字併載王衍廢帝事云昔宋間人以寕馨為不佳故山濤王太后皆以此為詆叱之語豈非以児為非馨香者邪張劉二詩盖􅆾其義此大謬也山濤之言分明是歎羙安得併謂之詆叱哉又以寕馨為非馨者其鄙陋可笑甚矣洪邁容齊随筆云劉真長譏殷淵源曰田舍児強學人作爾馨語又謂桓温曰使君如馨地寕可戰闘求勝王導與何充語曰正自爾馨王恬撥王胡之手曰冷如􅀑手馨强來捉人臂至今呉中人語言多用寕馨字為問猶言若何也予謂邁引晋人語為證是矣若何則義不然惟城陽居士桑榆雜録曰寕猶如此馨語助也此得其當城陽居士桑榆雜録云王衍呼錢為阿堵物東坡和陶詩以阿堵為墻或指佛書云理亦應阿堵上阿堵如俗言阿底也不應為墻若顧愷之􅀁謂傳神寫照正在阿堵中則阿堵乃眸子耳此字當從目按東坡和陶詩云阿堵不觧醉誰歟此頽然此亦指墻而言阿底與王衍之呼錢無異豈遂以為墻之名哉愷之語從目者盖一時書寫之偶然或俗子以意改之其寔訓義皆一不妨通用然則東坡未甞以堵為墻而城陽妄認睹為眸子也世說陳元方子群季方子孝光各論其父功徳争之不决咨于太邱太邱曰元方難為兄季方難為弟盖言其賢相等不能相勝也晋王珣弟珉名出珣右時人為之語曰法護非不佳僧彌難為兄法䕶珣小字僧彌珉小字也北齊邢子良爱王晞之清悟與晞兩兄書曰恐足下方難為兄不暇慮其不進此言弟過于兄也隋書杜正􅀇賛云華蕚相耀亦為難兄弟此言在昆季中最􅄖也今人作書簡往往呼朋友為難弟難兄其義未安豈别有據乎賀知章曰見紫芝眉宇令人名利之心都盡紫芝元徳秀字也今人書簡遂有紫宇之稱不成語矣司馬相如傳曰相如奏大人賦天子大悦飄飄有凌雲之氣似㳺天地之間意盖武帝好仙而相如􅀁陳皆飛騰超世之語適當其心故自有凌雲之氣而學者多以爲文辭可以凌雲何也李白詩云相如去蜀謁武帝安車駟馬生輝光一朝再覧大人作萬乗忽欲凌雲翔此得之矣彼有云髙義薄雲天凌雲健筆意縱横者非本乎此自不妨左氏言病在膏肓膏肓者胷鬲之閒猶心膂肺腹之􅀋耳或遂以膏肓對錮疾是豈病之目耶新唐書李靖傳至謂靖為蕭銑輔公祏之膏肓其謬益甚矣王言如絲其出如綸王言如綸其出如綍此特喻其所出寝大而已世遂以制誥為􅁝綸而職翰苑者謂之掌􅁝綸又有綸闈綸閣之稱古今相襲不以為怪不亦過乎主父偃傳附嚴安上書事索隐曰嚴本姓荘明帝諱後並改為嚴然則􅁶史本皆莊字而東漢人改書如此也然張湯傳先稱嚴助而復云荘助東越傳又云荘助田蚡張蒼傳入書荘青翟相如傳首書荘忌夫子至漢書申屠嘉田蚡􅀓皆作荘青翟而公孫􅊼􅀓始作嚴字雜亂不齊盖校定者失之不精耳左傳齊景公更晏子之宅晏子毁之而為里室皆如其舊則使宅人及之且諺曰非宅是卜惟鄰是卜二三子先卜鄰矣吾敢違諸乎予謂自諺以下皆晏子之語也而與傳者語尤無别可乎必有脫字書稱乃心乃祖乃父乃之訓汝也周瑜上孫􅁠疏云是瑜乃心日夜所􅁨卻正教劉禅語云乃心而悲無日不思楊子雲逐貧賦云昔我乃祖宣其明徳沮渠䝉遜謂其衆云吾之乃祖翼奨竇融保寕河右無乃悖乎史記言四皓定太子事云留侯本招此四人之力當作本留侯石􅂟数馬事云猶然如此當作然猶通鑑稱苻堅喜王猛誅諸豪强云吾始今知天下之有法當作今始郭從謹言于唐明皇云草野之臣必知有今日當作知必徳宗聞李泌􅀘戍卒之􅀃云如此天下復無事矣當作無復􅁠徳輿論光武封子宻事云反乃爵以通侯當作乃反南史齊東昏侯游獵至􅃽山定林寺一沙門病不能去應時殺之左右韓暉光曰老道人可念帝曰汝見麞鹿亦不射邪仍百箭俱􅀤宋蕭琛預御筵醉㐲上以􅀥􅄬琛琛仍取栗擲上曰陛下投臣以赤心臣敢不報以戰栗劉瑱妹為齊鄱陽王妃王死妃追傷成疾瑱令陳郡殷蒨畵王與平日寵姬共照鏡状如欲偶寝者宻使媪妳示妃妃視畢仍唾之因罵云故宜其蚤死詳此三仍字皆當作乃南北史中此􅀋甚多豈傳寫之誤耶古人言文集行于世者世間也或有云行于代者代字雖亦訓世義自差殊武三思言我不知代間何者謂之善人何者謂之惡人此本只是世字盖當時記録者避太宗諱故易之而後之作史者遂相仍而不刪其寔不成語也古人言底事底物底處有底作底底之訓何也今人或認為此字之義誤矣史記平凖書云天下大氐無慮皆鑄金錢漢書食貨志亦同師古曰太氐猶言大凢無慮亦謂大率然則語意重􅃨矣史記稱荘周之書大抵率寓言率亦大抵也退之閔已賦云伊時􅀔而則然子厚夢愈膏盲疾賦云中醫攻有兆之者而則之者語病也科舉子或時犯之盖不足怪孰謂二公而有是乎孔子言十五志于學至七十而從心所欲不踰矩盖自述其平生次第如此非世之􅀁共也而後人文字中便以知命耳順從心為歳数之稱既已非是而南齊書文惠太子􅀓云年始過立劉子􅀇自序云年已過立豈不愈謬哉曲禮所記自幼學至于期頥皆漢儒强名本無義理而世之俗學亦或以為年齡之目蘇易簡之死未及四十然已經執政矣或記其事云竟不登彊仕而卒可以一􅀏班伯與王許子弟為群在綺􅃭紈袴之間而非其好䊵綺貴戚子弟之服耳劉子元自述其兒童時事云年在紈綺此何謂哉潘岳嘗言予年三十有二始見二毛人之衰白早晚固自有不同而􅁃信哀江南賦序云信始二毛即逄䘮亂亦非也楊大年嘗言禮稱四十強仕七十致事凡仕于公者古制不過三十年大年十一􅀊觧􅄄甫四十以疾辭位盖以此子謂曲禮之說出于漢儒所撰以意强名而謂之古制殆不然也夫年及七十不論古制自當退休必曰四十而後仕仕不過三十年則有何義理而考之古人亦曷嘗拘此哉退之叙張廵事云許遠與巡同年生月日後于巡呼廵為兄是巡年為長也而新唐書逺􅀓云逺與廵同年生而長故巡呼為兄未知孰是當更當考之文字中有曰同年而語一日之長者予竟不曉同年二日之義當與知者商訂書言百姓懔懔若崩厥角釋者謂既崩摧其角無所容頭文理甚明而孟子引之曰非敵百姓也若崩厥角稽首已為􅆾異意者或有闕誤而班固論王莽乃云漢諸侯王厥角稽首舊唐書論太宗又云皇威所􅀍􅀺顙厥角復何謂邪孟子注昏不可曉未敢慿也論語稱有朋自逺方來而後周蕭大圜云有朋自遠揚榷古今豈成語哉然歐陽公集古録載後漢一碑巳有此語則其繆久矣南齊巴陵隐王寳義為太尉詔曰不言之化形于自逺尤不可也論語云夫子之言性與天道不可得而聞其文甚明非難辨也而唐太宗旌賞孫伏伽詔曰朕惟寡徳不能性與天道長孫無忌對太宗之問曰陛下性與天道非臣等愚􅀁及令狐徳棻周書王褒􅁃信傳論曰闕里性與天道修六􅀴以維其末何其繆耶論語稱夫子便便言唯謹爾惟語辭也史記石奮傳遂用唯謹字而後世史書凡言人性行謹者往往以此為成言豈非習􅁶之誤耶自東漢以來史傳文集中往往以貽厥為子孫之名友于為兄弟之名至有謂隆于友于傳諸貽厥者公然相襲恬不知怪近世或辨其繆矣然不特此也書稱知人則哲而范曄云則􅈒之鍳惟帝􅀁難宋文帝云吾無則􅈒之明沈約云有以見武皇之則哲詩稱王赫斯怒而薛綜上孫􅁠疏云抑雷霆之威忍赫斯之怒又有言發赫斯之命者論語稱色斯舉矣又曰樂云樂云鐘鼔云孚哉左雄上疏有云或因罪而引高或色斯以求名者書稱土爰稼穡范文正秋香亭賦云賦土爰之甘味劉平等傳引云鐘鼓非樂云之本孔子曰盍各言爾志又曰君子于其所不知盖闕如也梁簡文論古今文體不同則有俱為盍各之辭司馬貞譏史記不傳季禮諸人則有何為盖闕之語嗚呼學者于義訓幽深隐奥者容有差誤至于此􅀋如辨白黒矣而鹵莽若是其與矇瞽何異哉東坡詩云聖善方當而立歳乃翁已及古稀年此則滑稽以為嬉􅀏者耳而藝苑雌黄與友于貽厥同譏過矣詩云澘焉出涕語云夫子喟然而嘆澘者涕之貌喟者嘆之聲耳詞人便有涕淚澘栻餘澘坐喟喟也等語殆不可也􅂖梁曰三軍之士粲然皆笑粲只是􅀏貌耳宋子京筆記曰粲明也萬衆皆啓齒齒既白故以粲義包之其謬論不必辨也栁文言世塗昏險云擬歩如漆却是地黒也歐詩言夜色晦冥云舉手向空如抺􅃮却是皮膚黒也今韻畧定上下字有可疑者其訓上字也在上聲則曰方􅀅欲上去聲則曰元在物上及訓下字乃反之何邪栁下惠言伐國者不問仁人此葢拒魯侯之辭耳慕容徳􅂆燕主暐伐秦遂曰願獨㫁聖慮無訪仁人豈所謂以意逆志者哉彼夷虜之人葢不足責然世之書生􅀋此者亦多矣蒯通曰天下匃匃争欲為陛下所為顧力不能霍去病曰頋方畧何如耳不至學古兵法師古訓頋為念揚雄觧嘲云顧嘿而作太玄五千丈師古曰顧反也二義皆非盖此等字不能形容但可意㑹耳茅璞三餘録云孟嘉墓誌桓温問聴妓絲不如竹竹不如肉之意答以漸近自然晋書更之曰漸近使之然殊失其㫖盖􅁏聲者歌也不假于物故曰自然嘉之意謂絲聲之徦合不如竹聲之漸近竹聲之漸近又不如肉聲之自然也然古人以歌謳名者如王豹綿駒秦青之流皆男子也而此專言聴妓則知俚語所謂詞出佳人口者其來已久以古意推之歌舞管絃不必專言聴妓予謂璞表出墓誌之語以證晋書之失殊快人意至其分別漸近自然之義及辨論妓字皆非也盖漸近自然總言三節只是一意而云假合不如漸近漸近不如自然何邪聴妓即聴音樂也本作伎教坊記謂太常樂人為聲伎児舊唐李勣臨終與家人別堂上奏女妓通鑑賀蘭敏之居䘮釋衰絰奏妓盖妓伎二字本通用也魏志鍾繇議田疇讓封爵事曰子路拒牛仲尼謂之止善雖可激清勵濁猶不足多裴松之曰按吕氏春秋子路拯溺者其人拜之以牛子路受之孔子曰魯人必拯溺矣與繇所引不同未審繇誤㦯别有所出予謂此皆小説寓言縱有所出亦何足信哉魏畧曰華歆與邴原管寕相善時號三人為一龍歆為頭原為腹寕為尾裴松之謂原之徽猷懿望無媿華公寕含徳髙蹈恐難為尾魏畧之言未可以定其先後􅀁評固善然劉義􅂟世說亦載此事盖云寕為頭歆為尾乃與松之意合不知所傳果孰為真也謝安􅀄不就徴辟夫人劉氏見家門冨貴而安獨静退謂曰丈夫不如此也安掩鼻曰恐不免耳說者皆以為恐不免富貴而呉曽漫録云􅂲不免禍難此于不免字固亦可通然以掩鼻之意􅀚之似不爾也􅀋說張尚書故實云梁武帝令殷鐡石于大王書中搨一千字不重者每字片􅁓雜碎無次召周興嗣曰卿有才思為我韻之興嗣一日編綴進上􅂡髪皆白殆繆􅀃也此文雖不足􅀚然皆偶儷韻語要是人之􅀁撰豈有漫取不重之字而適能相就乎或言本晋武時鍾繇撰進年代久逺又因兵大壊亂不能成章上乃令興嗣韻之是則有理矣江鄰幾雜志云歐陽永叔知貢舉太學生劉幾試􅃃鑿紕俄有間􅀊詔幾懼改名輝既試永叔在詳定􅀁升作状元劉原父曰永叔有甚慿據予謂不然公本疾其怪僻故特黜落以厲風俗及變其體則從而取之此乃有慿據也正使知其為㡬亦必喜之矣且公以斯文為百世師豈㡬軰可得而眩亂哉原父素與公争名故多譏􅃧之語而隣幾猥録之予不得不辨滹南遺老集􅃃三十三
