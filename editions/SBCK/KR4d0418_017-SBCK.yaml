front:
  text: 滹南遺老集卷之十七
  hash: sha256:f748a79a9415cfc1d0d6cb5ba1095b27ae3eada7b02491c2a43c7800791acd36
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0418_SBCK_017-1a}
body:
  text: 滹南王若虚從之史記辨惑九疑誤辨酈生説髙祖復立六國後張良發八難古今稱頌以為羙談竊嘗有所疑焉彼其言曰湯伐桀而封其後于􅂎者度能制桀之死命也今陛下能制項籍之死命乎武王伐紂而封其後于宋者度能得紂之頭也今陛下能得項籍之頭乎此論甚疎夫桀紂已滅然後湯武封其後而良云度能制桀死命得紂之頭豈封于未滅之前耶且湯武所以封之者重絶人之世耳非以計其利害也奈何其以項籍之命為此哉酈生所以説帝者特欲係衆人之心庶幾叛楚而附漢耳非使封諸項氏也奈何其以湯武之事􅀔相較哉湯武雖殊時事理何異制死命與得其頭亦何以分而列為兩莭表商容之閭釋箕子之拘封比干之墓此本三事而良并之者以其一體也至于倒置干戈休馬放牛獨非一體乎而復析之爲三何哉班氏頗見其非而乃并湯武事爲一而但云度能制其死命豈以死命字不属桀紂而属其後歟然終與項籍事不􅀋也既以湯武爲一事故又分楚唯無疆以下爲第八節盖二書已自參差矣近世胡寅謂是時髙祖未稱尊而子房呼陛下作史者之過也然則八難之目安知其無誤耶漢書老父相吕后及二子皆貴及見髙祖曰卿者夫人兒子皆以君如淳曰以或作似顔氏破其説當矣然史記正作似豈誤歟酈生既自有傳而朱建傳後又叙生􅀄見沛公及下陳留事大同小異而詞頗浮誇此必禇先生輩附入之猶田仁之􅀋也漢文以公主嫁匈奴使宦者中行説傳之説不欲行漢彊使之説曰必我行也為漢患者漢書但云必我而無行字此恐錯誤若曰為漢患者必我也或云必我行為漢患矣如此乃順司馬相如傳贊云相如雖多虚辭濫説然其要歸引之莭儉此與詩之風諫何異揚雄以為靡麗之賦勸百風一猶騁鄭衞之聲曲終而奏雅不已虧乎前漢書全引此語子嘗疑之按遷傳雖不著其死之歲月然去遷既死後其書稍出宣帝時遷外孫楊惲祖述其書遂宣布焉則其死不過在昭宣之間耳而雄以成帝元延之初始自蜀遊京師年七十一卒于王莽天鳯五年逆而推之宣帝之二十年雄乃始生遷著書時安得雄之言乎是必孟堅所續而後人誤附于史記耳公孫宏主父偃贊云公孫宏行義雖修然亦遇時漢興八十餘年矣上方卿文學招俊乂以廣儒墨宏為舉首主父偃當路諸公皆譽之及名敗身誅士争言其惡悲夫舉首字下意似不足豈有闕文乎滹南遺老集卷之十七
