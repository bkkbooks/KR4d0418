front:
  text: 滹南遺老集卷之二十五
  hash: sha256:aa261e00bd3d378acb30f216f4f946197decac807f0f9cd0c188bbcbf7f2ce8b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0418_SBCK_025-1a}
body:
  text: 滹南王若虚從之君事實辨漢髙祖謂吴王濞状有反相因附其背云漢後五十年東南有亂豈汝􅁘應劭曰髙祖有聰略及相徑可知至于東南有亂克期五十占者所知也斯言良是然謂其能知反相亦恐未必然盖因占者而意之耳列子所謂疑鄰人之􅀼鈇者也不然英彭陳豨之徒何爲無所見耶李徳􅁉云漢髙祖嬖戚姫愛如意思其久安至于悲歌不樂豈不知除去吕后必無後禍實以惠帝闇弱不能自􅄃權綱其􅀅相皆平生故人俱起豊沛非吕后剛強不能臨制所以存之爲社稷計也老蘇小宋皆襲此論嗚呼使吕后當殺雖爲惠帝不得不殺如其不然亦何名而殺之后自布衣佐帝定天下有功而無罪奈何以戚姫如意故而􅃍置之死地哉妬忌婦人之常况吕氏之悍乎而且以妾逼妻以庶子而易長嫡髙祖之過也若又殺后豈不益甚哉故寕隐忍而委之亦可謂能自克者矣或曰王諸吕而危劉氏非后之罪乎曰身後之變髙祖安知就使能知罪未發而逆誅之在他人猶不可而可施于妻子之間乎為論不求義理之安而惟詭異之貴古人本分之事而强以權術處之是故惡夫曲辨之士也髙祖聞韓王信欲與匃奴謀攻漢漢使人覘匃奴冒􅉐匿其壮士肥牛馬但見老弱及羸畜使者十軰來皆言可擊上使劉敬復往還報曰兩國相擊此宜夸矜見所長而今徒見羸瘠老弱此必欲見短伏竒兵以爭利而不可擊也上怒械繫敬于廣武既而果困于平城及得觧斬先使十軰而封敬為侯議者曰是舉也髙祖實專之盛氣色期于必行敬之言利害明甚然不從而械繫焉彼十使者非佞則愚其言可擊何足深恠而皆殺之乎使幸而得志且復殺敬矣何髙祖惟知殺人而曽不罪已也髙祖使隨何誘黥布去楚既至帝方踞牀洗足召使人見布大怒悔來欲自殺及出就􅃕帳御食飲從官如漢王居布又大喜過望議者以為始折其氣而終收其心此盖鼓舞英雄之術以予􅀚之帳御之具素所處也若夫踞洗而見則平生常態殆與見酈生無異彼其傲慢凌侮每每如是人皆知之矣溺冠􅀐項靡所不至而顧獨謂此為術乎使其誠出于是亦非駕馭之道吾方湏人之力以濟其意遣使説之使之背主而滅族及其至也乃迎辱之此何理也使布乗其悔怒不就舍而就去是又生一敵也豈為得計哉王者之于人接之以禮而待之以誠然後可以􅀗其用髙祖惟其無禮而不誠此諸侯所以相踵而叛也而古今以為羙談何耶漢髙祖桮羮之語天地所不容項伯謂為天下者不顧家此姑以寛觧羽意耳然世之議者幾何不如是非惟不罪而或又為之􅀃理嗚呼天下之事有大于殺父者乎幸而羽從項伯之諌使羽當時遂殺之帝雖成功􅀅何面目以立于人上哉漢髙祖􅀄朝太公如家人父子禮家令􅀃太公曰天亡二日民無二王皇帝雖子人主也太公雖父人臣也奈何令人主拜人臣如此則威重不行太公因謂髙祖不可以我亂天下法上心善家令言于是下詔尊太公為太上皇荀悦曰雖天子必有尊也家令之言過矣史記索隠表出之予為廣其説曰君臣之義非所施于家而父子之分無時而可變也所謂上亡二王者此自以國法論耳何與乎所生之親咸邱􅀩以瞽叟朝為問孟子斥之以為齊東野人之語且曰孝子之至莫大乎尊親尊親之至莫大乎以天下飬為天子父尊之至也以天下飬飬之至也夫天下適足為飬親之具則人主之名豈得而壓父哉舜既為天子而父瞽叟自若瞽叟未嘗為太上皇帝子舜自若然則君父並立于天下國自國家自家兩不相渉本無窒碍尊號之有無􅀄不足為輕重也若曰父以子貴子為天子而父為匹夫情所不安則可矣而謂父無尊號即為人臣而不當受人主之拜可乎家令惟知主不可以拜臣而不知子不可以臣父也晉劉寳云髙祖善家令者善其發悟已心因得尊崇父號非善其令父敬巳未必然也彼誠欲發悟上心何不直以其意告之而云威重不行耶自鄙人所見止于如是耳其詔曰人之至親莫親于父子故父有天下􅀓歸于子子有天下尊歸于父此人道之極也其言是矣至謂平暴亂安天下皆太公之教訓則又非也使太公無教訓之功遂不可尊崇乎盖帝于天理本明而家令蔽之故雖加尊崇而卒入于不善也末流至于後世遂專以家事為私動持義掩恩之説人主泰然享長上之朝覲唐時至有父母拜王妃舅姑拜公主之令而恬不知恠又其甚者故借親属以明法而市不狗之名雖誅夷􅇧肉而不以爲慊或反有徳色天理人道滅絶無餘曽禽獸之不若皆家令之遺意也髙祖以櫟釡之故怨其嫂及即位封諸親属而嫂之子獨不得太上皇以爲言帝曰某非忘封之也爲其母不長者耳乃封其子信爲羮頡侯君子曰漢祖小人也以一飰之故而蓄怨不忘以及其子太公有言猶以醜名加之羮頡是何稱號哉殆不若不封之愈也而嫂不長者已尚得為長者乎髙祖疑張敖反吕后数言張王以魯元公主故不宜有此帝曰使張敖㨿天下豈少而女乎是吕氏猶知有人情親属之義而帝直以㓂盗視之由已之貪得無恩捐骨肉而不難故量人如此耳丁謂嘗言漢祖非英雄至目為田舍翁雖似太過亦頗快人近代諸儒以道學相髙尚論古人毫􅁵必計如漢祖者何足多道而毎稱其天資不可及張南軒􅀡云使其知學則湯武之賢亦不難到愚之惑滋甚矣張安道題漢祖廟云縱酒疎狂不治生中陽有土不歸畊偶因世亂成功業更向翁前與仲爭此雖詩人一時之言實中其病方帝始亡頼時豈誠有取天下之計而可必其成功者乎顧乃對衆矜􅃷以愧其父兄甚矣自欺而不知禮也漢祖之平生可考而知也委太公于爼机而無營救意棄孝恵魯元于道路而無顧藉心飾亡頼之非則誇示其足懐櫟釡之􅂩則怒及其姪嬖􅃂如意而㡬使冢嫡廢踞罵張敖而不以子婿畜韓信元勲本無異志而数施譎詐畏偪而不終蕭何素契足諒雅懐而未免猜嫌至械繫而後已鄭君以不忘故主而逐之李布雍齒以舊嘗窘已而幾殺之其行事如此而議者猶謂寛仁大度誠信使人吾不知其説也漢文帝却千里馬而光武以之駕鼓車林少頴曰華歆擲金不若管寕揮鋤而不顧以是為二帝之􅄖劣陋哉斯言人主之道在于罷貢獻絶貪求為天下後世法孝文之慮逺矣林氏乃以心術無礙律之果如此􅀃則箕子之歎象箸召公之戒旅􅋙其私􅁨過計也􅁘且夫千里之駿而以駕皷車亦非物理人情之正固不若却之為愈也漢武老且死意欲立昭帝而􅁨其子少母壮或至于亂也遂殺鈎弋大人時暴風揚塵百姓感傷盖其違天理而拂人情耳顧乃矜語左右自以為明史臣又曰諸為武帝生子者無男女其母無不譴死豈可謂非賢聖哉昭然逺見為後世計慮固非淺聞愚儒之所及慵夫曰漢武子是為不道矣殺一不辜而得天下君子不為無罪而殺人無時可也况以逆料未必然之事而殺其所親乎彼誠以為治亂由人自當别有所處不然付之定數一女子何與焉母子天倫也立其子必殺其母是母乃子之賊而子乃母之累也其為戾不已甚乎釣弋之事借使行一時之權而曰凡生子者皆譴死然則後宫誰敢舉子者匹夫之為其家慮猶君之為其國慮也使天下之人皆如武帝之用心殺人其可勝計而親戚之間豈復有恩義哉故夫武帝之安其後者乃所以絶其後非惟不仁抑亦不智矣末流至于元魏之始遂以此為定制椒庭􅁨恐皆祈祝不願生冡嫡有輒相勸為自安計讀之令人惨然此固凶毒殘酷之所為殆禽獸之所不忍而帝自為明史臣又從而賛譽之何其恠也葉永嘉曰漢武一生顛倒臨終一莭却事事做得是嗚呼立昭帝託霍光是矣鈎弋之誅安得為是髙祖晚年使周勃為太尉而属之以安劉氏顧孝惠暗弱而吕后強暴意亦􅁨其身後之變矣然卒不殺后而議者不以為過焉則亦其情有所不能安而理有不得不然者孰謂武帝此舉可為法哉東坡曰漢武無道了不足觀惟踞厠見衛青不􅃣不見汲黯為可取青奴材雅冝䑛痔正應踞厠見之蘇子于是失言矣豈有天子見大􅀅軍而可踞厠者乎奴材在彼君臣之禮不容廢也汲黯出守淮陽過大行李息論張湯奸邪必敗状勸息言之息畏湯不敢也後湯果敗武帝聞黯與息言乃抵息罪嗚呼黯在朝廷靣攻湯惡者屡矣帝不能從至于疎斥雖因此増秩而七年不復召竟死于郡豈真能重黯者而顧追恨李息耶漢武時隆慮公主子昭平君尚帝女夷安公主隆慮主病因以金千斤錢千萬為昭平君豫贖死罪上許之隆慮主卒昭平君日驕醉殺主􅀓廷尉請論死左右皆以許贖為言上垂涕曰法令者先帝所造也用弟故而違先帝之法吾何面目入髙廟乎乃可其奏東方朔上壽以為誅不擇􅇧肉此五帝三王所難也傭夫曰武帝之守法是矣而所以致其死者誰之過歟夫貴戚之子制之猶懼其逞也而又許以不死彼何惮而不為哉使當主請之時即以髙帝法語之􅀅不至于此矣利一時之貲而貽後曰之悔知守法于其終而不知防患于其始武帝之志荒矣滹南遺老集卷之二十五
