body:
  text: 滹南遺老集卷之九滹南王若虚從之史記辨惑一採摭之誤辨上詩頌言古帝命武湯又曰武王載斾謂之武者詩人之􅀁加也殷紀乃云湯曰吾甚武號曰武王聖人决無此語燕世家云民人思召公之政懐棠􅀣不敢伐賛又云甘棠且思之况其人乎謂之愛棠􅀣則可云懷與思不可也尚書堯典帝曰疇咨若時登庸放齊曰􅏷子朱啟明帝曰疇咨􅀂予采驩兠曰共工方鳩僝功帝􅀁謂若時若予采者其義雖不甚明要之是兩事而本紀于後節但云堯又曰誰可者􅁍只是申前事也舜典稱四罪而天下咸服言刑之當而巳史記帝堯本紀云舜言于帝請流共工于幽陵以變北狄放驩兜於崇山以變南蠻遷三苗於三危以變西戎殛鯀於羽山以變東夷至舜紀則引左􅀓所載渾沌窮竒檮杌饕餮之事云流四凶族遷于四裔以御魑魅文雖差殊其為四罪一也一則曰變四夷一則曰御魑魅舜之意果安在哉盖二者皆陋説不足取焉且此事止當作舜紀而復見于堯止當從􅀴而反取于􅀓紀之語不亦冗而雜乎夏本紀載臯陶之言曰翕受普施九徳咸事俊乂在官百吏肅謹母教邪􅁋竒謀非其人居其官是謂亂天事索隐曰此取尚書皐陶謨為文㫁絶殊無次第即班固所謂疎畧牴牾者也嗚呼豈特此一節而然哉殷本紀云湯還亳作湯誥維三月王自至于東郊告諸侯群后母不有功于民勤力乃事予乃大罸殛汝母予怨曰古禹臯陶久勞于外其有功乎民民乃有安東為江北為濟西為河南為淮四瀆已修萬民乃有居后稷降播農殖百榖三公咸有功于民故后有立昔􅃖尤與其大夫作亂百姓帝乃弗予有状先王言不可不勉曰不道母之在國女母我怨以令諸侯予謂此皆不成文理今湯誥之書具在􅂚嘗有此遷何􅀁據而載之也尚書湯誥篇末云咎單作明居而咸有一德乃伊摯復政􅀅歸時所陳在太甲三篇之下次第明甚不可亂也史記乃謂咸有一德作于湯時而列之湯誥之後明居之前豈非誤歟殷本紀云太甲既立不明伊尹放之桐宫三年悔過迎而授之政太甲修德諸侯咸歸百姓以寕伊尹嘉之乃作太甲訓三篇褒太甲夫三篇之書雖曰伊尹作然自始至終皆史氏􅀁録豈獨伊尹褒嘉而作乎封禪書舉殷太戊時伊陟賛巫咸事云巫咸之興自此始按尚書咸乂四篇不見其文莫曉何義孔氏但以巫咸爲臣姓名而遷遂以爲巫覡據周公作君奭言巫咸乂王家與伊尹伊陟臣扈甘􅌉等同列盖一代之勲賢而謂巫覡之􅀋可乎且其間又有曰巫咸者正使爲巫覡亦是其名爲咸安得謂自此而興乎索隐引楚詞爲証彼楚詞何足稽也列子言有神巫字季咸自齊來能言人死生壽夭豈因而亂乎書序云伊陟賛于巫咸作咸乂四篇君奭云巫咸乂王家夫賛而作書者一時之事耳乂王家者縂言其功業也而殷本紀云伊陟賛之于巫咸治王家有成作咸乂何也盤庚篇云民咨胥怨言咨嗟而相怨也史記乃曰咨胥皆怨何等語耶盤庚三篇几以告諭臣民之不欲遷者史記既畧言其大㫖矣而復云帝小辛立殷復衰百姓思盤庚而作不已乖乎殷本紀云武丁祭成湯明日有飛雉登􅂦耳而呴武丁懼祖已乃訓王曰云云武丁修政行徳天下咸驩殷道復興武丁崩祖庚立祖巳嘉武丁之以祥雉為徳立其廟爲髙宗遂作髙宗彤日及訓考之于書此篇即祖已訓王之詞其曰髙宗者史氏追稱耳諸篇之體皆然而云武丁既沒祖已嘉之而作繆矣且立廟稱宗自國家之事豈獨出祖已之意哉髙宗之訓乃書篇名自當全著而但云及訓此復失之太簡矣宋世家云微子度紂終不可諫欲死之及去未能自决乃問太師少師曰云云太師若曰云云誠得治國國治身死不恨爲􅂮終不得治遂亡則微子既巳去矣而復記箕子之􅀁以奴比干之􅀁以死而終之曰微子以爲父子有骨月而臣主以義属父有過子三諫不聼則随而號之人臣三諫不聼則可以去矣于是太師少師乃􅂆微子去遂行何邪此殆似梦中語也殷紀云紂􅁋亂不止微子数諫不聼乃與太師少師謀遂去比干强諫紂紂剖比干􅀚其心箕子懼佯狂爲奴紂又囚之殷之太師少師乃持其祭樂器奔周按尚書㣲子篇􅀁謂太師少師即箕子比干也今乃言奔周與書所記異矣而周紀又云紂殺王子比干囚箕子太師疵少師彊抱其樂器而奔周則遷􅀁謂太師少師者其樂工邪􅀂殷紀􅀁稱亦止于樂工則微子何至與此輩謀决去就而此輩之奔亦何為併持祭器乎至宋世家則曰武王克殷微子持其祭器造于軍門前後参差殆不可曉齊世家云武王自盟津還師與太公此作㤗誓魯世家云武王伐紂至牧野周公佐武王作牧誓按尚書二篇皆王言也而一以為與太公作一以為周公佐之而作何所據也且作㤗誓何加一此字書序云武王既勝殷􅀖諸侯班宗􅃔作分器分器自是篇名而周紀乃云作分殷之器物失其名矣金縢一書盖周公嘗請代武王之死已乃納册匱中而秘其事武王既䘮群叔流言毁公公東征二年罪人斯得作䲭鴞之詩以貽成王而未敢誚及因天變以啟金縢之書得公代武王之説于是悔過自新而迎公以還其文甚明史記魯世家既載周公納册金縢及羣叔流言周公東征之事至于封康叔營洛邑還政成王則又云初成王少時病周公自揃其爪沉之于河以祝于神曰王少未有識奸神命者乃旦也亦蔵其册于府成王病有瘳及王用事人或譛公公奔楚成王􅀤府見公禱書乃泣反公公卒之後始有因天變啟金縢事如書之所記戾于經矣然䝉恬對胡亥亦引周公揃爪及奔楚之事則􅀾國以來固已有此陋説而子長爱竒因以亂之耳抑不知所謂小子其迎者認為何義也周本紀云成王既遷殷遺民周公以王命告作多士無􅇣魯世家云周公恐成王有􅀁淫􅇣乃作多士無􅇣自今考之多士為殷民而作者也無􅇣為成王而作者也在本紀則併無􅇣為告殷民在世家則併多士為戒成王混淆差互一至于此盖不惟牴牾于􅀴而自相矛盾亦甚矣至世家雜舉二篇之㫖支離錯亂不成文理讀之可以􅀤笑衛康叔世家舉酒誥之㫖云誥以紂所以亡者以􅁋于酒酒之失婦人是用故紂之亂自此始案酒誥之文曷嘗有用婦人語燕世家云周公攝政當國踐阼召公疑之作君奭君奭不悦周公周公乃稱湯時有伊摯格于皇天云云夫既云召公疑之作君奭而又云君奭不悦周公周公以告之尚書所載之語無乃重􅃨乎且謂之君者猶爾汝也或但稱君或連其名皆周公靣呼之辭而遂云君奭不悦周公可乎周紀云成王既崩召畢二公以太子釗見于先王廟申告以文王武王之為王業之不易務在節儉毋多欲以篤信臨之作顧命今其書但載成王末命使之率循天卞爕和天下以答􅀭文武之訓而已􅂚嘗有二公申告之事哉周紀云康王即位徧告諸侯宣告以文武之業以申之作康誥以書考之此篇乃康王之誥耳若康誥則成王􅀁以命康叔者也其􅓎誤如此且本紀既先序周公作康誥酒誥等篇而于此復云書豈有兩康誥邪周紀云穆王閔文武之道缺乃命伯冏申誡太僕國之政作冏命復寕絶不成文理淮夷徐戎反伯禽帥師伐之于肹誓曰云云作此肹誓何用四字或謂太史公文皆不見先秦古書故其記二帝三王事多與尚書不同此爱之者曲為之説也按武帝嘗詔孔安國作􅀓史記儒林􅀓亦具言孔氏有古文尚書而安國以今文讀之盖尚書滋多于是則其書當時已博矣縦未列于學宫子長豈得不見只是採摭不精耳彼其􅀁取于他書者亦多牴牾而不合豈皆以不見之故邪或問禘之説子曰知其説者之于天下也其如示諸斯乎指其掌孔子自指掌而言耳封禅書引之直云其于治天下也視其掌不已疎乎孟武伯問子路仁乎子曰千乗之國可使治其賦也不知其仁問冉求則曰千室之邑百乗之家可使為之宰也不知其仁論語所記云爾史記仲由􅀓云季康子問仲由仁乎孔子曰千乗之國可使治其賦不知其仁而冉求􅀓則曰季康問冉求仁乎孔子曰千室之邑百乗之家可使治其賦仁則吾不知問子路孔子曰如求夫問者孟武伯而遷以爲季康子孔子所荅非惟與論語不同而二􅀓亦自相乖戾􅂽疎甚矣論語載孔子在陳之言云歸與歸與吾黨之小子狂簡斐然成章不知􅀁以裁之初不言其何爲而􅀤也孟子亦載之曰盍歸乎來吾黨之士狂簡進取不忘其初此正是一事但辭少異耳史記世家乃兩存之而各著其言之之由吾意其妄爲遷就也論語閔子騫辭費宰之命曰如有復我者則吾必在汶上矣盖一時拒使者之言也史記子騫􅀓直云不仕大夫不食汚君之禄如有復我者必在汶上矣殆不成文理論語云子在齊聞韶三月不知􅁏味司馬遷意其太久也遂加學之二字夫經有疑義闕之可也以意増損可乎然史記如此者何可勝数孔子答陳司敗昭公知禮司敗以孔子為黨巫馬期特傳其語而已既非期之言行又非孔子之訓誨而専著此以為期􅀓甚無謂也論語云子罕言利與命與仁而遷併以言為與字豈􅀓寫之誤歟論語逹巷黨人稱孔子博學無所成名彼但云人而史記以為童子何所據也孔子世家云季康子問政曰舉直錯諸枉則枉者直司馬氏索隐云哀公問何為則民服子曰舉直錯枉則民服今以為答康子盖撮畧論語而失事寔按論語􅀁謂舉直錯諸枉􅀎使枉者直乃答樊遲問知之言耳然則遷之所引既誤而司馬氏辨之者亦非也南容􅀓云容問羿奡禹稷事夫子不答容出子曰君子哉􅀂人尚德哉􅀂人國有道不廢國無道免于刑戮三復白圭之玷以其兄之子妻之按論語此是三章不相附属而遷合之為一殆不可讀也孔子嘗謂子貢曰予一以貫非多學而識者盖泛以告之耳而史記以為在陳蔡時因子貢作色而云不知一貫之説何以寛子貢也子張問行孔子語之以忠信篤敬此亦平居之􅀁􅊰明而史記又謂因陳蔡之困而􅀤何所據耶孔子世家載楚狂接輿歌曰往者不可諫􅀆來者猶可追也加兩助字不惟非其本語抑亦亂其聲韻矣仲由􅀓云子路喜從逰遇長沮桀溺荷蓧文人彼亦偶從夫子耳便謂其喜從逰何以知也且此事亦不必録孔子世家云西狩見麟曰吾道窮矣喟然嘆曰莫我知夫子貢曰何為莫知子曰不怨天不尤人下學而上逹知我者其天乎不降其志不辱其身伯夷叔齊乎謂栁下惠少連降志辱身矣謂虞仲夷􅇣隐居放言行中清廢中􅁠我則異于是無可無不可曰弗乎弗乎君子病沒世而名不稱焉吾道不行矣吾何以自見于世哉乃因史記作春秋以論語考之以上三章皆泛稱子曰不記其在何時因何事也而遷著于此盖亦􅄭意云爾其論夷恵之属尤無謂也孔子世家縂書行事有云食于有䘮者之側未嘗飽也是日哭則不歌見齊衰瞽者雖童子必變三人行必得我師德之不修學之不􅊰聞義不􅀎徙不善不能改是吾􅁨也史氏之所記孔子之所自言豈可混而不别遷採􅀴摭􅀓大抵皆踳駁而二帝三王紀齊魯燕􅀳宋衛孔子世家仲尼弟子􅀓尤不足􅀚也孟子初見梁王王汛問利國之説孟子以仁義答之他日又以挫􅗮于鄰國之故求􅀁以洒其恥者孟子復􅂆之以施仁政分明是兩節而魏世家云惠王曰寡人不佞兵三折于外太子虜上􅀅死國以空虚以羞先君宗廟社稷寡人甚醜之􅅱不逺千里辱幸至敝邑之廷􅀅何以利吾國孟軻曰君不可以言利為人君仁義而巳矣何以利為文辭雜亂矣或疑孟子􅂆齊伐燕孟子辨之甚明而燕世家乃云孟軻謂宣王曰此文武之時不可失何從得邪此直以或疑而意之耳􅈋璞曰司馬遷不信真孟子而信假孟子誠中其病舜本紀云象以舜為已死乃止舜宫居鼓其琴舜往見之象鄂不懌㨿孟子乃是象徃入舜宫舜在床琴也左􅀓曰鄭武公夫人武姜生荘公及叔叚荘公寤生驚姜氏故名曰寤生遂惡之而爱叚杜注云寤寐而莊公已生故驚而惡之史記曰武姜生太子寤生生之難夫人勿爱後生少子叔叚叚生易夫人爱之予謂如左氏之説荘公之生盖易矣夫人特以怪異而惡之耳遷反謂之難而又謂叚生易何邪此雖無係于利害亦可以􅀤一笑也左傳記石碏之言云陳桓公方有寵于王劉子玄謂陳侯尚存未當稱謚當矣如魯世家云公子揮欲為隐公殺桓公隐公不從揮反譛隠公于桓公曰隐公欲遂立去子子其圖之請為子殺隐公其病猶左氏也春秋荘公七年夏四月辛夘夜中星隕如雨夫如雨云者直言其状之多􅀂雨故以為異而記之後世史書五行志亦時有載此者左氏乃謂與雨偕而下杜預遂以如訓而盖失之矣至史記宋世家則併舉之曰宋地霣星如雨與雨偕下豈不愈􅓎哉魯荘公七年四月辛夘夜中星隕如雨僖公十六年正月戊申隕石于宋五是月六鷁退飛過宋都左氏云隕石于宋隕星也史記世家乃謂宋襄公七年宋地霣星如雨與雨偕下六鶂退蜚按春秋星隕如雨初不指其在宋且荘公七年之四月與僖公十六年之正月相去亦逺矣安得併為宋地同時之事乎盖見左氏釋隕石為隕星故誤誌焉而隕石之事反遺而不書荒疎甚矣據左氏􅀓注魯僖公為閔公庶兄故夏父弗忌曰新􅀑大故􅀑小而史記乃云湣公􅀍弑季友自邾奉湣公弟申入立之是為􅁵公釐公亦荘公少子未知孰是左氏云季文子卒無衣帛之妾無食粟之馬無蔵金玉無重器偹君子是以知季文子之忠于公室也相三君矣而無私積可不謂忠乎史記則云家無衣帛之妾廐無食粟之馬府無金玉以相三君于文為悖衛世家云蒯瞶與渾良夫盟曰免子三死無所與按左氏但云三死無與無與即免也今更加免子二字不亦贅乎吴世家云季札自衛如晋􅀅􅃕于􅀫聞鐘聲曰異哉吾聞之辨而不徳必加于戮夫子􅀗罪于君以在此懼猶不足而又可以畔乎夫子之在此猶燕之巢于幕也君在殯而可以樂乎遂去之文子聞之終身不聼琴瑟衛世家云季子過􅀫孫文子為擊磬曰不樂音大悲使衛亂乃此矣一以為鐘一以為磬此未足􅀷病然如前説則是文子自作樂而季子適聞之也如後説則是文子為札而作也前説則罪其不自愧懼而安于誤樂後説則以音聲之悲而知其為亂之懲是何􅆾異而不同邪按前説本于左氏當以為是後説正有他㨿亦相矛盾而不應取也且左氏但言又何樂而史記改之云可以畔乎其義亦􅆾盖􅀗罪于君即所謂畔也而何在于擊鐘邪司馬貞既知其非矣而曰畔字當讀為樂亦强為之説也史記稱宰予與田常為亂夷其族前人辨之曰齊相闞止亦字子我故遷誤以為然考之左氏先書闞止而後稱子我注言子我即闞止也今齊世家亦然而田完世家乃云子我者闞止之宗人則其􅍝誤豈獨宰予之事哉齊世家書子我為闞止而田完世家作監止楚世家稱昭王名珍而伍員􅀓作軫衛世家稱荘公名蒯瞶而仲由􅀓作蕢瞶衛世家云孟黶敵子路而仲由􅀓作壺黶是不當從一乎滹南遺老集卷九
