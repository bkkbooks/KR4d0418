front:
  text: 滹南遺老集卷之四十五
  hash: sha256:cb8348f74f96c16247b9d77e4178720118760a3d3c37634f9cf07e09e01f32aa
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0418_SBCK_045-1a}
body:
  text: 滹南王若虚􅀙之祖唐臣愚庵序鶴䑓祖君唐臣命其居室曰愚庵因以自號既經䘮亂流寓河朔非復庵中主人矣猶為題榜以求詩文于士大夫嗚呼凡物有其寔而後得其名寔無有焉名烏􅀙生寔固不可誣而名固欲其正也今先生才敏而識明行髙而業精盖世所謂賢且智者而頋加此稱是視薰以蕕指渭為涇也無乃􅆾戾而不合乎人情邪且先生安静寡欲不求聞逹與物無競而物亦莫之攖不必嫉邪憤世如栁宗元逺害全身如􅇞武子果何取乎此也意者直出扵至謙故欤古之君子其徳甚盛則其心愈謙其責已也重其取名也亷雖有軼群絶俗之資而自視欿然常若不及此其尊而光卑而不可踰者善而無伐所以為顔氏聖而不居所以為孔子其與浮􅏥衒露急扵人知虚而為盈處之不疑者豈可同日而語哉先生于是乎過人逺矣丙申春二月滹南遺老王某序復之純交說并序之純甞爲交􅀃以見譏令贅談中以􅀂虚名篇者是也其􅀄本自爲一首盖辭氣意㫖出扵荘列可謂竒作使其處身果能如此雖古之逹者無以過也而何其取怒之多欤予讀而悲之乃復以是說云狂生既以交說規慵夫已㝷以忤物􅀗罪杜門索居􅀅無意扵世慵夫因人而􅀉聲曰子之病果革矣已寔行行謂人之亢憫我将顛而子則先是何其言之近似而踐迹之􅆾欤子之病果革矣怨之不可媒也禍之不可賈也雖微子言吾寕不知逐逐而群疇非吾鄰形交跡接何者可絶鍊修調適之善而吾病始兆悟而藥之治飬以方寛中温外茹柔吐剛駐其明而内視凝其聰而反聴行之期月乃復其常心平氣和百邪不攻乃愈而康子獨日臻以逹膏肓毉望而走無施其良嗟夫殆哉無以招之彼孰汝尤無以結之彼孰汝仇待物太狭謀身未周睢盱彷彿􅌸睨九州羣讙以咻凶乗禍鳩􅀔窮力竭而投諸囚以伏扵幽閴氏之與居槁伯之為㳺悒悒􅀆而私自憐孑孑乎其遺世而無求也吾絶物邪抑子絶也山淵之峻子􅀅趋而過今胡其摧汝車而沉汝舟豺虎之毒子􅀅不之攖今胡其齕汝趾而嚙汝喉出扵外者亦既然矣伏于中者竟如何哉頋甞􅁨我今為子􅁨盖􅀅持吾之所以自治者而復以治子豈能從我而兾其少瘳乎狂生聞之不覺汗下移刺仲澤虚舟堂銘泛而㳺載沉載浮隨其流聴其所止而休此非所謂虗舟者欤萬物相刄乎無窮要不可容吾意智者困勇者殘而至人免扵無所累先王既以是而身訖矣雖放心委形以行扵斯世可也四醉圖賛㤗和辛酉冬予赴調京師清河垣之振之劉君景元俱以待舉客太學一日同飲市中既暮皆醉三子者就宿予邸枕籍而臥􅀄不記也未旦而􅁴呼童張燈則餘樽在焉即命重酌復成小酔擁衾散髪相對怡然頋而樂之以為他日或不能復得矣振之􅀅圖其形而名以四醉因命序而賛之以記一時之羙事云漠乎其如􅁯其聲􅃼乎其如􅁯其形神融氣泰無欲而無營􅄅乎其如物之莫攖也不為劉伶唯以酒為名不為屈平衆皆醉而獨醒盖不放不拘不晦不明不濁不清隨其所適而寓其情者也林下四友賛東垣彭子升悦王士衡􅁠周晦之嗣明皆予心契也晦之于予爲親故其相知最早後㳺京師始識士衡扵稠人間言論慷慨遂如平生當是時泛見子升而未熟也已而復定交扵觴次予年爲長子升次之士衡又次之而晦之最少吾四人者臭味相似而氣義相􅄬也故不結而合既合而􅂬至扵益深而莫之間其好惡馭舍互有短長而要歸其中辨争譏刺間􅀂不能相容而終扵無憾方其居在里中行必偕宴必共詩雖不多而嘲戯贈答時出数語以相娱酒雖不廣而花時月夕一杯一杓亦自不廢也甞約他年為林下之逰且各為别號以自􅀉焉盖予以慵夫而予升以澹子士衡為狂生而晦之則放翁也曰澹曰慵曰狂曰放世以為怪而自謂其眞施于仕途固非所宜而在隐居則無害也是故安之而不疑焉是約已遂想像而賛之云盤礴􅀆岩阿容與􅀆烟蘿籍豊草􅀆偃臥愬長風􅀆浩歌塵海邈其如隔􅄅髙軒􅀆不我過險而風波宻而網羅突而干戈如四人者何士衡真賛身雖寒而道則富貌􅀂鄙而心甚妍庸夫孺子皆得易而侮王公大人莫不知其賢豈俯仰從容滑稽玩世而胸中自有卓然者也跋寳墨堂記趙翰林以文章字畫名天下片辭寸􅁓人争求之甞為故参政僕散公作寳墨堂記仍親繕冩尤為竒特自經䘮亂散落不存而近入田君信之之手方且什襲深藏以為珍玩既而聞公子祐在因復歸之噫渠家􅀗所士不失舊物固幸甚矣而田君能捐已之爱以成此美事亦灑落可嘉也跋王進之墨本孝經孝弟百行之冠冕孝經六藝之喉衿聖人大訓不待賛揚而後知也學者自童稚讀書必始扵此而考其行身能踐履者鮮矣李君追慕其親以不得竭力為恨而淪扵非道為􅁨故常玩意扵斯文而名卿珍翰以昭于不朽􅀚其自􅄒亹舋不絶爱敬之誠藹然而見非深扵踐履能如是乎吾友王進之得其墨本而寳蓄之仍圖函丈之像以冠其首而益以翰林公誌語且􅀅併刻焉即其所好亦可以知其為人也上周監察夫人生朝門庭爽朗瑞氣氤氲夫人之誕長也煌煌綺羅洋洋􅁝竹家人之拜祝也􅄅惟愚甥寔與此榮固無以薦誠惟天為髙惟地為厚惟川凟不竭惟山嶽不朽敢焚香酌酒拜首啓手以為夫人壽貧士歎甑生塵瓶乏粟北風蕭蕭吹破屋入門兩眼何悲凉稚子低眉老妻哭世無魯子敬蔡明逺之真丈夫故應餓死填溝谷蒼天生我亦何意盖世功名寔不足試􅀅短刺謁朱門甲第紛紛厭􅆝肉白髪嘆清晨梳短髮已見数莖白妻孥驚且吁謂我應速摘我時􅀏而答區區亦何必此身終委形毁棄無足惜况爾毛髪間乃欲强修飾畢竟滿頭時復􅀅安所擇題淵明歸去来圖靖節迷途尚爾賖苦􅀅覺悟向人誇此心􅀂識真歸處豈必田園始是家􅀌雲出岫暮鴻飛去住悠然兩不疑我自欲歸歸便了何湏更説世相遺抛却㣲官百自由應無一事挂心頭銷􅁨更藉琹書力借問先生有底􅁨得時草木竟欣榮頗為行休惜此生乗化樂天知浪語㸔君扵世未忘情名利醉心濃似酒貪夫衮衮死紅塵折腰不樂翻然去此老猶為千載人趙内翰求成南訪道圖詩辭不􅀗已乃作絶句以戯復為之觧云得道由來不必勞癡兒舍父漫逋逃閑閑老子還多事持向伽藍打一遭竹木蕭森䕃緑苔幽􅁭自愛北軒開主人無説吾何恨乗興而來興盡廻答鄭州辨禪師見戯代髙防禦酒肆􅁋房即道場一時作戯亦何妨吾師自墮泥犂獄更􅀏春風栁絮狂再至故園述懐五絶日日天涯恨不歸歸来老淚更沾衣傷心何啻遼東鶴不獨人非物亦非􅂽陂依約認田園松菊存亾不必論我自無心更懷土不妨猶有未招魂山杏溪桃化􅁄榛舞䑓歌館墮􅁅塵春來底事堪行處門外流鶯枉喚人回思夢􅂻繁華事幸及當年樂此身閒立斜陽㸔兒戯憐渠虚作太平人艱危甞盡髩成􅁝轉覺讙譁不可期幾度哀歌仰天問何如還我未生時山谷于詩毎與東坡相􅎨門人親黨遂謂過之而今之作者亦多以為然予甞戯作四絶云駿歩由來不可追汗流餘子費奔馳誰言直待南遷後始是江西不幸時信手拈來世已驚三江衮衮筆頭傾莫􅀅險語誇勍敵公自無勞與若争戲論誰知是至公蝤蛑信美恐生風奪胎換骨何多様都在先生一􅀏中文章自得方為貴衣缽相傳豈是真已覺祖師低一著紛紛法嗣復何人王子端云近來􅈝覺無佳思縱有詩成似樂天其小樂天甚矣予亦甞和為四絶功夫費盡謾窮年病入膏肓不可鎸􅀉與雪溪王處士恐君猶是管窺天東塗西抺闘新妍時世梳妝亦可憐人物世衰如䑕尾後生未可議前賢妙理宜人入肺肝麻姑搔癢豈勝鞭世間筆墨成何事此老胷中具一天百斛明珠一一圓􅁝毫無恨徹中邉從渠屢受群児謗不害三光萬古懸宫女圍碁圖盡日羊車不見過春來雨露向誰多争機决勝元無事永日消磨不奈何滹南遺老集卷四十五
