front:
  text: 滹南遺老集卷之十六
  hash: sha256:465be8a4a8c065adfb41f176eca007748d536dc97bd97af6f8e62191bd6c7a97
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0418_SBCK_016-1a}
body:
  text: 滹南王若虚從之史記辨惑重叠載事辨楚荘王圍鄭鄭伯迎降之辭既載于楚世家又載于鄭世家莊王縣陳申叔時為牽牛徑田之喻既載于楚世家又載于陳世家荘王圍宋華元告以析骨食子之急既載于楚世家又載于宋世家陳恒殺闞止事既詳見于齊世家而又見于田完世家陳乞立陽生事亦然子路死難事既詳見于衞世家而又見于本傳陳厲公齊懿仲卜田完事止宜載于完世家而又全載于陳世家專諸刺吳王僚事止宜載于本傳而又載于吳世家楚平王執伍奢召二子事止宜詳見于子胥傳而又全見于楚世家子胥諫吳王之言吳王賜死之事子胥􅀅死之語亦止宜見于子胥傳而楚越世家又皆載之闔廬􅀅死属太子報越事載于呉世家是矣而又見于子胥傳春秋書天王狩河陽事載于孔子世家矣而又見於晉世家又見於周本紀項羽遷義帝事既載于羽本紀而又見于髙帝紀陳平間楚君臣事既載于項羽紀而又見于本傳張良難酈生事既載于髙帝紀而又見於本傳酈生責髙祖倨見事止宜載于本傳而又見于帝紀緹縈上書救父事載于孝文紀而又見于倉公傳近來孔毅夫雜説論晉史王隠諫祖約弈棊事兩傳俱出謂之繁文而嚴有翼著藝苑雌黄亦摭新唐重􅃨事以為病獨未見遷書之失耶吳世家云季札聘于魯請觀周樂其言云云使于齊説晏子曰子速納邑與政乃免于難齊國之政將有所歸未得所歸難未息也使于鄭見子産如舊交謂子産曰鄭之執政侈難將至矣政必及子子為國慎以禮不然鄭國將敗適衞説蘧瑗史狗史猶公子荆公叔􅀤公子朝曰衞多君子未有患也適晉説趙文子韓宣子魏獻子曰晉國其萃于三家乎將去謂叔向曰君侈而多良大夫皆富政將在三家吾子直必思自免于難凡此皆以見季子之明識著之可矣至魯世家襄公二十九年云吳延陵季子使魯間周樂盡知其意鄭世家簡公二十二年云吳使延陵季子于鄭見子産如舊交謂曰鄭之執政侈難將至政將及子子為政必以禮不然鄭將敗衞世家獻公後三年云吳延陵季子使過衞見蘧伯玉史鰌曰衞多君子其國無故晉世家平公十四年云呉延陵季子來使與趙文子韓宣子魏獻子語曰晉國之政卒歸此三家矣是何必哉管蔡世家既備言武王崩成王少管蔡疑周公之為不利故挾武庚作亂周公承以王命誅之矣而衞世家又詳出之何若但云周公既誅管蔡乎趙世家贊云吾聞馮王孫曰趙王遷其母倡也嬖于悼襄王悼襄王廢嫡子嘉而立遷遷素無行信䜛故誅其良將李牧用郭開豈不謬哉至馮唐傳稱李牧之功曰是時趙幾覇後㑹趙王遷立其母倡也用郭開䜛而誅李牧予謂趙王遷所以奪嫡而立則由其母見嬖之故若乃信䜛而誅李牧倡何與焉此句為贅而班書亦存之過矣竇嬰傳云梁孝王者孝景弟也其母竇太后愛之梁孝王朝因昆弟燕飲是時上未立太子酒酣從容言曰千秋之後傳梁王太后驩嬰引巵進諫按帝言傳位孝王事世家自具何不但輕道過滹南遺老集卷之十六
