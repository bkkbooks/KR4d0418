front:
  text: 滹南遺老集卷之四十
  hash: sha256:7d87acfce73020ece4f3418954a0842ae961e49451995a30a97d2f3961ebfa0d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0418_SBCK_040-1a}
body:
  text: 滹南王若虚從之詩話荊公有兩山排闥送青來之句雖用排闥字讀之不覺其詭異山谷云青州從事斬関來又云殘暑巳促装此排闥等耳便令人駭愕山谷閔雨詩云東海得無􅁈死婦南陽應有卧雲龍得無猶言無乃耳猶欠有字之意卧雲龍真龍耶則豈必南陽指孔明耶則何関雨事若曰遺賢所以致旱則迂濶甚矣清明詩云人乞􅀕餘驕妾婦士甘焚死不封侯士甘焚死用介之推事也齊人乞􅀕餘豈寒食事哉若泛言所見則安知其必驕妾婦盖姑以取對而不知其疎也此􅀋甚多食􅀲有感云田中誰問不納履坐上適來何處蝇是固皆􅀲事然其語意豈可相合也奕棊云湘東一目誠甘死天下中分尚可持以湘東目為棊眼不愜甚矣且此聨豈專指輸局耶不然安可通也接花云雍也本犂子仲由元鄙人升堂與入室只在一揮斤揮斤字無乃不安且取喻何其迂也士㑹自秦還晉繞朝贈之以䇿盖當時偶以此耳非送行者必須䇿也而山谷送人詩云願卷囊書當贈鞭又云折栁當馬䇿亦無謂矣秦繆公謂蹇叔曰中壽爾墓之木拱矣盖墓木也山谷云待而成人吾木拱此何木耶山谷牧牛圖詩自謂平生極至語是固佳矣然亦有何意味黄詩大率如此謂之竒峭而畏人􅀃破元無一事弔邢淳夫云眼㸔白璧埋黄壤何况人間父子情既下何况字須有他人猶悼痛之意乃可猩毛筆云身後五車書按荘子施恵多方其書五車非所讀之書即所著之書也遂借為作筆寫字此以自肎耳而吕居仁稱其善詠物而曲當其理不亦異乎只平生幾両􅄚細味之亦疎而㧞毛濟世事尤牽强可笑以予􅀚之此乃俗子謎也何足為詩哉詩人之語詭譎􅀉意固無不可然至于太過亦其病也山谷題恵崇畫圗云欲放扁舟歸去主人云是丹青使主人不告當遂不知王子端叢臺絶句云猛拍闌干問廢興野花啼鳥不譍人若譍人可是怪事竹荘詩話載法具一聨云半生客裏無窮恨告訢梅花說到明不知何消得如此昨日酒間偶談及之客皆絶倒也山谷贈小鬟驀山溪詞世多稱賞以予􅀚之眉黛壓秋波儘湖南水明山秀儘字似工而寔不愜又云婷婷嫋榒恰近十三餘夫近則未及餘則巳過無乃相窒乎春未透花枝瘦止謂其尚嫩如豈􅞦梢頭二月􅀄之意耳而云正是愁時候不知愁字属誰以為彼愁耶則未應識愁以為巳愁耶則何為而愁又云只恐遠歸來緑成隂青梅如豆按杜牧之詩但泛言花巳結子而已今乃􅃌為青梅限以如豆理皆不可通也古之詩人雖趣尚不同體制不一要皆出于自得至其詞逹理順皆足以名家何甞有以句法繩人哉魯直開口論句法此便是不及古人處而門徒親黨以衣缽衣相傳號稱法嗣豈詩之真理也哉魯直于詩或得一句而終無好對或得一聨而卒不能成篇或偶有得而未知可以贈誰何嘗見古之作者如是哉山谷自謂得法于少陵而不許于東坡以予􅀚之少陵典謨也東坡孟子之流山谷則楊雄法言而巳魯直論詩有奪胎換骨點鐡成金之喻世以為名言以予􅀚之特剽竊之􅃛者耳魯直好勝而恥其出于前人故為此强辭而私立名字夫既已出于前人縦復加工要不足貴雖然物有自然之理人有同然之見語意之間豈容全不見犯哉盖昔之作者􅀄不校此同者不以爲嫌異者不以爲夸随其所自得而盡其所當然而已至其妙䖏不專在于是也故皆不害爲名家而各傳後世何必如魯直之措意邪蜀馬良兄弟五人而良眉間有白毫時人爲之語曰馬氏五常白眉最良盖良寔白眉而良不在乎白眉也而北齊陽休之贈馬子結兄弟許云三馬俱白眉山谷送秦少游云秦氏多英俊少㳺眉最白豈不可笑哉王直方詩話云秦少㳺甞以真字題邢淳夫扇云月團新碾瀹花甆飲罷呼兒課楚辭風定小軒無落葉青蟲相對吐秋絲上谷見之乃于扇背作小草云黄葉委庭􅀚九州小蟲催女獻功裘金錢滿地無人費百斛明珠苡薏秋少㳺後見之復云逼我太甚予謂黄詩語徒雕刻而殊無意味盖不及少㳺之作少㳺所謂相逼者非謂其詩也惡其好勝而不讓耳未少章論江西詩律以為用崑體功夫而造老杜渾全之地予謂用崑體功夫必不能造老杜之渾全而至老杜之地者亦無事乎崑體功夫盖二者不能相兼耳􅈋璞評劉夷叔長短句謂以少陵之肉傳東坡之骨亦猶是也且食莫踟蹰南風吹作竹此樂天食筍詩也朱喬年因之曰南風吹起籜龍兒戢戢滿山人未知急喚蒼頭斸烟雨明朝吹作碧參差年年乞與人間巧不道人間巧更多此楊朴七夕詩也劉夷叔因之曰只因􅀅巧􅂌人間定􅁍向人間乞取此江西之餘􅂀欲益反損正堪一笑而曽端伯以喬年為􅀧化精巧􅈋荆産以夷叔為文婉而意尤長嗚呼世之末作方日趨于詭異而議者又從而簧鼔之其為􅁦何所不至哉王仲宣召試館中詩有日斜奏罷長楊賦之句荆公改為奏賦長楊罷云如此語乃健是矣然意無乃復窒乎張文潜詩云不用為文送窮􅀑直須圖事祝錢神唐子西云脱使真能去窮鬼自童無以致錢神夫錢神所以不至者惟其有窮􅀑在耳二子之語似可喜而寔不中理也李師中送唐介詩雜壓寒刪二韻冷齋夜話謂其落韻而緗素雜記云此用鄭谷等進退格藝苑雌黄則疑而兩存之予謂皆不然謂之落韻者固失之太粗而以為有格者亦私立名字而不足據古人何甞有此哉意到即用􅀄不必校古律皆然胡乃妄為云云也但律詩比古稍嚴必親隣之韻乃可耳冷齋夜話去前軰作花詩多用羙女比其状如曰若教觧語應傾􅀦任是無情也動人誠然哉山谷作酴醿詩曰露濕何郎試湯餅日烘荀令炷爐香乃用羙丈夫比之特為出􅀋而吾叔淵材咏海棠則又曰雨過温泉浴妃子露濃湯餅試何郎意尤佳也慵夫曰花比婦人尚矣盖其于􅀋為宜不獨在顔色之間山谷易以男子有以見其好異之僻淵材又雜而用之益不倫可笑此固甚紕繆者而惠洪乃節節歎賞以爲愈竒不求當而求新吾恐他日復有以白晳武夫比之者矣此花無乃太麄鄙乎魏帝疑何􅀰傅粉止謂其白耳施于酴醿尚可比海棠則不􅀋矣且夫雨過露濃同于言濕而已果何所異而引之爲對耶楊軒牡丹詩云楊妃歌舞態西子巧讒䰟利劎斫不断餘妖鍾此根東坡咏酴醿以吳宫紅粉命意而終之之曰餘妍入此花山谷咏桃花以九疑蕚緑花命意而終之曰猶記餘情開此花咏水仙以凌波仙子命意而終之曰種作寒花􅀉愁絶是皆以羙人比花而不失其為花近世士大夫有以墨梅詩傳于時者其一云髙髻長眉滿漢宫君王圖玉按春風龍沙萬里王家女不著黄金買􅀞工其一云五換隣鐘三唱雞雲昏月淡正低迷風􅄕不著欄杆角瞥見傷春背面啼子甞誦之于人而問其咏何物莫有得其彷彿者告以其題猶惑也尚不知為花况知其為梅又知其為􅀞哉自賦詩不必此詩之論興作者誤認而過求之其􅁦遂至于此豈獨二詩而已東坡眉石硯醉道士石等篇可謂横放而曠逺然亦未甞去題也而論者猶戒其専力于是則秉筆者曷少貶乎予嘗病近世墨梅二詩以為過及􅀚宋詩選陳去非云粲粲江南萬玉妃别来幾度見春歸相逄京洛渾依舊祗有緇塵染素衣曽元象云憶昔神遊姑射山夢中栩栩片時還氷膚不許㝷常見故隠輕雲薄霧間乃知此􅁦有自來矣張舜民謂樂天新樂府幾乎罵乃為􅀌憤吟五十篇以壓之然其詩不􅀓亦畧無稱道者而樂天之作自􅀂也公詩雖渉淺易是大才殆與元氣相侔而枉斐之徒僅能動筆􅀋敢謗傷所謂爾曺身與名俱㓕不廢江河萬古流也蕭閒云風頭夢吹無跡盖雨之至細若有若無者謂之夢田夫野婦皆道之而雷溪注以為夢中雲雨又曰雲夢澤之雨謬矣賀方回有風頭夢雨吹成雪之句又云長廊碧瓦夢雨時飄洒豈亦如雷溪之説乎蕭閒憶恒陽家山云誰幻出故山邱壑謂予心目注以故山為江左非也只是指恒陽而已好在斜川三尺玉公宅前有池可三畝號小斜川三尺字以廣狹深淺言之俱不安注以為潄玉堂泉按此堂自在北潭中豈相干渉予官門山甞得板本乃是􅅕字意其不然盖如言幾頃玻璃之􅀋耳暮涼白鳥歸喬木乃宅前真景也而注云潔身而退如白鳥之歸林何其妄哉前人有紅塵三尺險中有是非波之句此以意言耳蕭閑詞云市朝氷炭裏滿波瀾又云千丈堆氷炭便露痕跡樂天望瞿塘詩云欲識愁多少髙于灔預堆蕭閑送髙子文詞云歸興髙于灔澦堆雷溪澷注盖不知此出䖏耳然樂天固望瞿塘故即其所見而言泛用之則不切矣蕭閒樂善堂賞荷花詞云胭脂膚瘦薰沉水翡翠􅌉髙走夜光世多稱之此句誠佳然蓮體寔肥不宜言瘦予友彭子升嘗易膩字此似差勝若乃走珠之狀惟雨露中然後見之㩀詞意當時不應有雨也山黛月波之􅀋盖搃述所見之景而雷溪注云言此花以上為眉波為眼雲為衣不亦異乎至一枝梅緑横氷蕚淡雲新月炯疎星之句亦如此説彼無真見而􅄭意求之宜其繆之多也蕭閒使髙麗詞云酒病頼花毉􅁍世皆以花為婦人非也此詞過䖏既有離索餘香􅀵拾新愁之語豈復有婦人在乎以文􅀔􅀚之亦不應爾其所謂花盖真花也言其人已去頼以觧酲者獨有此物而已必當時之寔事李後主詩云酒惡時拈花蕋嗅公咏花詞亦喜用酲心香字盖取其清徹之氣以滌除惡味耳蕭閒自鎮陽還兵府贈離筵乞言者云待人間覔箇無情心緒着多情換此篇恨别之意故以情為苦而還羡無情終章言之宜矣使髙麗詞亦云無物比情濃覔無情相博次第未應及此也謝安謂王羲之曰中年以來傷于哀樂羲之曰年在桑榆自然至此正頼絲竹陶冩恒恐兒軰覺减其􅂬樂之趣坡詩用其事云正頼􅁝與竹陶冩有餘􅂬夫陶冩云者排遣消釋之意也所謂􅂬樂之趣有餘􅂬者非陶冩其􅂬因陶冩而􅂬耳蕭閒屢使此字而直云陶冩􅂬情陶冩餘􅂬舊􅂬􅀂為陶冩似背元意近􅀊諸公以作詩自名者甚衆然往往持論太髙開口輒以三百篇十九首為凖六朝而下漸不滿意至宋人殆不齒矣此固知本之説然世間萬變皆與古不同何獨文章而可以一律限之乎就使後人所作可到三百篇亦不肯悉安于是矣何者滑稽自喜出竒巧以相誇人情固有不能已焉者宋人之詩雖大體衰于前古要亦有以自立不必盡居其後也遂鄙薄而不道不已甚乎少陵以文章為小技程氏以詩為間言語然則凡辭逹理順無可瑕疵者皆在所取可也其餘􅄖劣何足多較哉滹南遺老集卷四十
