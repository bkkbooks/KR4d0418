front:
  text: 滹南遺老集卷之三十五
  hash: sha256:485eca5904a07261c4705eb7014d0d96bdb2075b14ad6443b0454f442918e829
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0418_SBCK_035-1a}
body:
  text: 滹南王若虛從之文辨退之盤谷序云友人李愿居之稱友人則便知爲巳之友其後但當云予聞而壯之何必用昌黎韓愈字栁子厚凌凖墓誌既稱􅀌某以其先人善予以誌爲請而終云河東栁宗元哭以爲誌山谷劉明仲墨竹賦既稱故以歸我而㫁以黄庭堅曰其病亦同盖予我者自述而姓名則從旁言之耳劉伶酒徳頌始稱大人先生而後稱吾東坡􅃛䑕賦始稱蘓子而後稱予蘓過思子臺賦始稱客而後􅁛吾皆是􅀋也前軰多不計此以理􅀚之其寔害事謹于為文者當試思焉崔伯善嘗言退之送李愿序粉白黛緑一節當删去以為非大丈夫得志之急務其論似髙然此自富貴者之常存之何害但病在太多且過于浮艶耳餘事皆畧言而此獨說出如許情狀何邪盖不唯為雅正之累而于文􅀔亦滯矣其于爲人賢不肖何如也多却於字退之行難篇云先生矜語其客曰某胥也某商也其生某任之其死某誄之予謂上二某字胥商之名也下二某字先生自稱也一而用之何以别乎又曰某與某何人也任與誄也非罪歟皆曰然然者是其言之辭也令先生問胥商之爲人何如巳之任誄當否其意未安取决于衆而皆以爲然何所是而然之哉又云其得任與誄也有由乎抑有罪不足任而誄之邪先生曰否吾惡其􅀄又云先生之所謂賢者大賢歟抑賢于人之賢歟齊也晉也且有二與七十而可謂今之天下無其人邪又云先生之與者盡于此乎其皆賢乎抑猶有舉其多而没其少者乎先生曰固然吾敢求其全其問荅之間􅀁下字語皆支離不相應觀者試詳味之退之行難篇言取士不當求偹盖言常理無甚髙論而自以為孟子不如其矜持亦甚矣退之原道云寒然後為之衣飢然後為之食木䖏而顛土處而病也然後為之宫室三然後字慢却本意又云責冬之裘者曰􅂚不為􅁑之之易責飢之食者曰􅂚不為飲之之易葛之飲之多却之字凢作序而併言作之之故者此乃序之序而非本序也若記若詩若誌銘皆然人少能免此病者退之原道等篇未云作原道原性原毁歐公本論云作本論猶贅也退之送温處士赴河陽軍序云洛之北涯曰石生其南涯曰温生全篇皆從傍記録之辭而其未云生既至其為吾以前所稱為天下賀以後所稱為吾致私怨于盡取此乃方與他人言而遽與本人語亦有方與本人語而却與他人言者自古詩文如此者何可勝數哉伯樂一過冀北之野而馬群遂空夫冀北馬多天下伯樂雖善知馬安能遂空其群邪觧之者曰吾所謂空非無馬也無良馬也此一吾字害事夫言群空及觧之者自是兩人而云吾所謂却是言之者自觧也若作彼字其字故云所謂空者吾謂空者皆可矣又云生既至拜公于軍門其為吾以前所稱為天下賀以後􅀁稱為吾致私怨于盡取也二為吾字當去其一退之評伯夷止是議論散文而以頌名之非其體也退之送石處士序云河陽軍莭度御史大夫烏公為莭度之三月重却節度字但作至鎮到官莅事之􅀋可也又云先生仁且勇若以義請而彊委重焉其何說之辭之字不妥又云先生起拜祝辭曰敢不敬蚤夜以求從祝規當去祝辭字退之論時尚之􅁦云每為文得意人必怪之至應事俗作下筆自慙者人及以為好王元之嘗謂􅀕裴少卿文當是盖得之矣然顔子不貳過論亦此􅀋耳而置集中何也退之􅀕栁子厚文云嗟嗟子厚而至然耶自古莫不然我又何嗟而其下復用嗟字似不可也石􅂦聫句詩序云斯須曙鼓動鼕鼕何必用鼕鼕兩字當削去之李于墓誌銘豚魚難三者古以飬老反曰是皆殺人不可食一筵之􅄿禁忌十常不食二三多却不食二字師􅀃云萇􅊼師襄老􅅨郯子之徒其賢不及孔子孔子曰三人行必有我師此兩節文理不相承圩者王承福傳云又曰粟稼而生者也又字不妥盖前無承福語也猫相乳􅀃云客曰王功徳如是祥祉如是其善持之也可知巳既巳因叙之以為猫相乳􅀃云爾既巳字不妥爾字亦贅仲長統賛云自謂髙幹有雄志而無雄才自字不妥言嘗可也樊紹述墓誌云紹述于斯術其可謂至于斯極者矣斯極字殊不愜古人或云何至斯極者言若是之甚耳非極至之極也退之論許逺之事云城壞其徒俱死獨􅀩愧恥求活雖至愚者不忍為嗚呼而謂逺之賢而為之邪而字上著不得嗚呼字猫相乳􅀃云猫有生子同日者其一母死焉有二子飲于死母母且死其鳴咿咿母且死一句贅而害理且字訓􅀅也薛公逹墓誌云鳯翔軍帥䛀的命射君三􅀤連三中中輙一軍大呼以􅀏連三大呼笑下五字似不須用史記云陳平從攻陳豨黥布凢六出竒計輙益邑凡六益封亦此􅀋邵氏聞見錄云嘗得退之薛助教誌石與印本不同挾一矢作指一矢甚妙又得李元賓墓銘亦與印本不同印夲云文髙乎當世行過乎古人竟何為哉石本乃作意何為哉益歎石本之語妙子謂􅃌字太做造不若挾之自然意字尤無義理亦只當作竟邵氏之許殊未當也􅈋荆産云碑本盖􅀄作時遂刻之中間或有未安他日自加􅀧定未可知也若􅀄本不同當擇其善者取之不必専以石刻為正此說盡矣陳後山云退之之記記其事耳今之記乃論也予謂不然唐人本短于議論故每如此議論雖多何害為記盖文之大體固有不同而其理則一殆後山妄為分别正猶評東坡以詩為詞也且宋文視漢唐百體皆異其開廓横放自一代之變而後山獨怪其一二何邪後山詩話云黄詩韓文有意故有工左杜則無工矣然學者必先黄韓不由黄韓而爲左杜則失之拙易此顛倒語也左杜冠絶古今可謂天下之至工而無以如之矣黄韓信羙曽何可及而反􅁨學者有拙易之失乎且黄韓與二家亦殊不相似􅀄不必由此而爲爲彼也陳氏喜爲髙論而不中理每每如此丹陽洪氏注韓文有云字字有法法左氏司馬遷也予謂左氏之文固字字有法矣司馬􅁶何足以當之文法之疎莫􅁶若也栁子厚謂退之平淮西碑猶有帽子頭使巳為之便說用兵伐叛此争名者忌刻妄加詬病耳其寔豈必如是論而今世人徃徃主其􅀃凡有議論人者輙援是以駁之亦已過矣劉禹錫評叚文昌平淮西碑云碑頭便曰韓􅊼為統公武為􅀅用左氏欒書􅀅中軍欒壓佐之文􅀔也又是仿班固燕然碑様别是一家之羙嗚呼劉栁當時訊病退之出于好勝而争名其論不公未足深怪至于文昌之作識者皆知其陋矣而禹錫以不情之語妄加推􅅄盖在傾退之故因而為之借助耳彼真小人也哉東坡甞欲效退之送李愿序作一文每執筆輙罷因笑曰不若且讓退之獨歩此誠有所譲耶抑其寔不能邪盖亦一時之􅃧語耳古之作者各自名家其所長不可强而同其􅄖劣不可比擬而定也自今􅀚之坡文及此者豈少哉然使其必模仿而成亦未必可貴也邵氏云韓文自經中來栁文自史中來定自妄􅀃恰恨韓文皆出于經栁文皆出于史或謂東坡學史記􅀾國䇿山谷耑法蘭亭序者亦不足信也世稱李杜而李不如杜稱韓栁而栁不如韓稱蘓黄而黄不如蘓不必辨而後知歐陽公以為李勝杜晏元獻以為栁勝韓江西諸子以為黄勝蘓人之好惡固有不同者而古今之通論不可易也晏殊以為栁勝韓李淑又謂劉勝栁所謂一蠏不如一蠏栁子厚放逐既乆憔悴無聊不勝憤激故觸物遇事輙弄翰以自託然不满人意者甚多若辨伏神憎王孫罵尸蟲斬曲几哀溺招海賈之􅀋苦無義理徒費雕鎸不作可也黔驢等􅀃亦不足􅀚罵尸蟲文意本責尸蟲而終之以祝天帝首尾相背矣捕蛇者􅀃云呌囂乎東西隳突乎南北殊為不羙退之無此等也子厚才識不减退之然而令人不爱者惡語多而和氣少耳滹南遺老集卷三十五
