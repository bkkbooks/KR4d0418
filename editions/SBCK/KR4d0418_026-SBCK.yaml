front:
  text: 滹南遺老集卷之二十六
  hash: sha256:b3445855aad2d3a8a47fe7c4960352ed0943b0d021d5ac7d20a441e959257a27
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0418_SBCK_026-1a}
body:
  text: 滹南王若虚從之君事實辨光武封功臣鄧禹呉漢皆食四縣丁恭議曰古者封侯不過百里强榦弱枝所以為治也今封四縣不合法制帝曰古之亡國皆以無道未嘗聞功臣地多而滅亡者也近世議者以光武為非予謂恭固逺慮然光武知本之言其可廢哉治天下者無道徳仁義以相維持而欲恃區區之法制以沮奸雄而弭禍亂盖亦難矣東坡嘗言三國志注中好事甚多而惜其遺漏自今􅀚之信然如曹操征烏桓還自謂幸勝而偏賞先諌者可以為千古法也操一生所行􅀋皆不道之事獨此一莭有光清史而陳夀略之豈非闕典之甚哉先主以私憾殺張􅁉孔明表請其罪報曰芳蘭生門不得不鋤嗚呼先主天資仁厚有古賢君之風至于此舉乃與曺操無異惜哉晉史山濤傳云鬲令􅀽毅賂公卿以求虗譽遺濤絲百斤濤不欲為異于時受而藏于閣上後毅事露濤取絲付吏積年塵埃印封如􅀄王戎亦嘗受人布司􅀠糾之武帝謂朝臣曰戎豈懐私苟得者正當不欲為異耳嗚呼古人所謂不為異者不為崖異絶俗之事而已臨財之際雖一介必有義存豈容自汚而猥之尚同為貴哉戎本貪夫豈無足責濤既受其物矣印封雖在何以自明且濤又嘗以盗官稻田為李憙所劾則非真䏻清潔者也而史臣亦以此恕之何􅁘武帝身為人主宜以莭儉厲俗始自貴近而王愷與石崇爭侈乃以己物助之戎也犯贓則為之䕶諱而貸其罪天下安得不亂哉宋文帝甞故令諸子晚食曰欲其識有飢苦以節儉御物唐明皇帥太子以下芟麦于宫中曰欲其知稼穡之艱難嗚呼人主之教子當使親師傅通古今義理既明百行自正曽謂此等可以制其心乎宋孔熈先􅀓學文史兼通數術有縱横才志文帝時為散􅀐侍􅀰不為時知憤憤不得志乃與范􅁮謀亂事覺窮治望風吐欵辭􅂔不撓上竒其才遣人慰勉曰以卿之才而􅆡于集書省理應有異志此乃我負卿也又謂執政曰孔熈先年四十而猶為散郎安得不作賊君子謂宋文帝于是失言矣人臣至于叛逆復何才之足惜且士之進退自有命存縱其淹抑終身亦當委順奈何以小不如意遂圗不􅁤乎由帝之言是使狂躁之徒得以藉口而無忌惮豈所以為訓哉嗚呼彭城王同氣之親雖犯嫌􅂩本無他腸尚可聴其自親以全友爱之義重以㑹稽之哀祈扶令育之死諫而帝卒殺之不疑顧乃眷眷于熈先小子人何其心術之悖也隋文帝每謂趙緯曰朕于卿無所爱惜但卿骨相不當貴耳此非人主之言而亦非其本心也特綽之抗􅀡帝不能堪故耳唐太宗嘗云奴告主反此弊事也謀反不能獨存必與人共成之何患不發而使奴告􅁘自今有告者乃受仍斬之君子曰太宗之立法是矣惜其猶以利害言也夫以奴告主理所不容自當禁之縱使無由得發亦豈可許乎乃不學之過也唐太宗録囚有劉恭者頸有勝文自云當勝天下坐是繋獄帝曰天將興之非朕所能除若無天命勝文何為乃釋之齊人段志充請帝致政于太子大臣乞誅之詔曰朕之有罪是其真也若其無罪是其狂也亦􅇚之此可謂寛明矣然于李君羡則以䜟記之文而殺劉洎則以廢立之語而殺或恠其不能以斯心加諸彼是不然恭志充軰凡人皆知其不足道故無所動其心君羡與洎則觸其真諱惡之機故不能自克耳武后能容蘇安恒而不容魏元同劉禕之亦是􅀋也唐明皇酺宴命三百里内刺史縣令各率所部音樂集于樓下以較勝負懐州刺史以車載樂工數百皆衣文綉服箱之牛皆為虎豹犀象之状魯山令元德秀惟遣樂工数人連􅃑而歌于蒍于上曰懐之人其塗炭乎立以刺史為散官君子曰城中好髙髻四方髙一尺明皇耽于􅁋樂天下方且風靡而傚之而又親詔守令責其角勝則彼惟知求勝以取恱盖亦不足恠也乃因徳秀之諷而罰懐州刺史信有過矣而導之者獨無罪乎卒不自克至于㓂亂父興中原受祻而不可觧塗炭者豈止懐州之人哉憲宗朝李絳李吉甫數爭論于上前禮部尚書同平章事權徳輿居中無所可否上鄙之徳輿罷守本官范氏唐鑑稱其明慵夫曰憲宗黜徳輿誠是然吉甫謟邪屢為絳所屈帝常􅀡絳而謂吉甫專為恱媚則其可鄙盖甚于徳輿矣顧乃存之而不去其後絳亦罷免而吉甫獨寵任終身至以議謚貶張仲方而特賜曰忠何其眷之深歟然則帝之明未足多也憲宗元和三年求試賢良方正舉人牛僧孺李宗閔皇甫湜深陳時政之失皆後髙第上亦嘉之詔中書􅄖與處置宰臣李吉甫惡其言􅀡泣訴于上且誣考官不公上乃貶諸考官而僧孺等乆之不調慵夫曰三子以􅀡言應詔其心非有他也帝既嘉之即當擢用而施行以示至公其誰敢議顧乃狥吉甫之私情而為之報怨牛李之􅂩有自來矣帝每以朋黨疑臣下而不知巳爲朋黨之根也唐武后時徐元􅂟父爽爲縣尉趙師韞所殺元􅂟復手殺師韞后欲赦死陳子昻議以爲枕戈讎敵人子之義誅罪禁亂王法之綱非義不可訓人亂綱不可明法且元􅂟所以能義動天下者以其忘生而反于徳也若釋之以利其生是奪其徳􅉻其義非所謂殺身成仁全死忘生之節宜正國之典寘之以刑然後旌其閭墓可也時韙其言後栁子厚駁之曰旌與誅不得並誅其可旌則黯刑旌其可誅則壊禮若師韞以私怨虐非辜州牧不知罪刑官不知問而元􅂟能報之是守禮而行義也執事者宜有慚色將謝之不暇而又何誅其或父不免于罪而師韞之誅不愆于法是死于法而非死于吏讐天子之法而戕􅆢法之吏是悖驁而􅇒上也執而誅之所以正􅀖典而又何旌當取公羊受誅不受誅之義以㫁之元和中梁悦報父讐殺秦杲報有司曰㨿禮經則義不同天徴法令則殺人者死禮法二事皆王政之大端宜令詳議韓退之曰聖人丁寕其義于經而深沒其文于律􅀅使法吏一㫁于法而經術之士得引經而議也宜定其制凡復父讐者事發具申尚書省集議奏聞酌其宜而處之勅杖恱一百流循州明皇時張瑝張秀亦以父讐殺楊汪議者多言宜加矜宥張九齡欲活之而裴耀卿李林甫以為亂國法帝然之謂九齡曰孝子之情義不顧死殺人而赦此塗不可啓也乃下􅃯曰國家設法期于止殺各伸為子之志誰非狥孝之人展轉相讐何有限極臯陶作士法在必行曽参殺人亦不可恕使河南府杖殺之考比三事惟明皇所處為不可易子昻等議似髙要非正法盖禮記周官及公羊氏復讐之􅀃皆亂世事不足信也楚靈王聞羣公子􅀍殺自投于車下曰人之爱其子亦如余乎侍者曰甚焉王曰予殺人子多矣能無及此乎唐文宗惑楊賢妃之譖幾廢太子永已而永暴薨後帝因􅀚樂見童子縁橦而其父來往走其下􅊄然流涕曰朕為天子不能全一子乃誅教坊宫人嘗構害太子者十數人嗟夫惻隐之心人皆有之父子之道出于天性靈王因巳子之死而始悟殺人子之為非文宗見他人之爱子而後知巳子不全之可恨者昏蔽如此宜其懵于天下之理也温公極稱周世宗之羙而曰大功未成中道而夭盖太平之業天將啓聖人而授之非人謀之所及予謂温公歸之天數是矣以爲將啓聖人則媚主之辭也世宗天資豈宋祖之所敢望而如宋祖者其足謂之聖人乎使世宗而在太平之期可以立待何必宋祖哉宋主征李煜煜遣徐􅉗朝京師言其師出無名且曰煜以小事大如子事父未有過失奈何見伐宋主曰爾謂父子爲兩家可乎􅉗無以對而退歐公載其事于五代史而論之曰嗚呼大哉何其言之簡也王者之興天下必歸于一統可來者來之不可者伐之期于掃蕩一平而後巳周世宗征淮南詔捃摭前事務較曲􅀡以為辭何其小哉慵夫曰歐公之言過矣自古出師未嘗無名而加人之罪者必有辭而後可曲􅀡之理正所當較也宋主此舉果何名而何辭哉偶􅉗及父子之喻因得以是而折之夫父子固不當為兩家矣而宋之與唐何􅃍有父子之分哉天下非一人之所獨有也此疆彼界容得分㨿而並立小事大大保小亦各盡其道而已有罪則伐無罪則巳自三代以來莫不然豈有必皆掃蕩使歸于一統者哉世宗既服江南清源莭度使劉從效請置進奏院于京師􅀡􅀠中朝詔報曰江南近服方務綏懐卿若置邸上都與彼抗衡受而有之罪在于朕勉事舊君且宜如故如此則于卿䔍始終之義于朕盡柔逺之宜鍾謨入貢帝問曰江南亦治兵修守偹乎對以不敢帝曰向時則為仇敵今日則為一家大義以定保無他虞然人生難期至於後日事不可知歸語汝主可及吾時完城郭繕甲兵㨿守要害為子孫計世宗徳度如此其視宋主何啻天壌而反以較曲􅀡為小乎宋主之􅀄出師撫曹彬背曰㑹取㑹取彼本無罪只是自家著他不得此則情實之語也歐公一代正人而曲媚本朝妄􅎖主闕在臣子之義雖未為過而史書垂世之言安可不出于大公至正􅁘不載可也唐將劉臣容討黄巢幾擒而後縱之曰國家喜負人不若留賊以為富貴之資議者議其以鷹犬自期其言誠是然如巨容軰何足責哉宋主太祖命曹彬平江南許以使相及回惟賜錢五十萬曰更為朕平太原然後與卿此非以鷹犬使人􅁘而宋儒每稱其吝惜名器夫人君之于臣遇之以禮而示之以誠故人樂為之用果惜名器則如勿許然宋祖素多􅁠詐本不為名􅄊計也嗚呼使彬而君子何必以此待之如其小人則亦不復肯盡力矣嘗以彬之行事考之盖所謂君子者則宋祖非惟失所以使人而又見其不能知人也滹南遺老集卷之二十六
