front:
  text: 滹南遺老續集􅃃之四十六
  hash: sha256:e9a82664f8d7caa5f421af827408654c163454f1fb967696b32a0966337fe480
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0418_SBCK_046-1a}
body:
  text: 滹南王若虚從之攄憤非存驕謇心非徼正直譽浩然方寸間自有太髙處平生少諧合舉足逄怨怒禮義􅀄不愆謗訕亦奚顧孔子自知明桓魋非􅀁懼孟軻本不逄豈為臧氏沮天命有窮逹人情私好惡以此常泰然不作身外慮贈王士衡王生非狂者乃以善哭稱每至欲悲時不間醉與醒音詞初惻愴涕泗隨縱横問之無所言坐客􅀏且驚王生不暇䘏若出諸其誠嗟我與生友此意猶未明􅁝染動墨悲麟亡傷孔情韓哀峻嶺陟阮感窮途行涕流賈太傳音抗唐衢生古来哭者多其哭非無名生其偶然欤何苦摧形神如其果有為為爾同發聲感秋西風撼庭柯踈葉鳴䇿䇿天地一蕭條羇懐亦岑寂青春怳如昨轉盻年半百自從長大来轉覺日月廹功名非所慕老大不足恤怛然感時心自亦不能釋清晨梳短髪己見数莖白刀鑷雖可施殆似兒子劇此身委蜕耳毁棄無足惜况于毛髪間而乃强修飾青青如陸展星星行復出畢竟白滿頭復将何所摘生日自祝空囊無一錢羸軀兼百疾况味何蕭條生意渾欲失清晨聞喧呼親舊作生日􅀄我未免俗隨分畧脩飾舉觴即自祝醉語盡情寔神仙恐無從富貴安可必修短卒同歸何足喜與戚一祈粗康健二願早閒適衣食無大望但要了晨夕萬事不我攖一心常自得優㳺終吾身志願􅀙此畢失子妍妍掌中児舍我一何遽其來誰使之而復奄然去平生三舉子隨滅如朝露頋我能無悲其如有天数自從學道來衆苦頗易度有後固所期誠無亦何懼人生得清安政以累輕故婚娶眼前勞託遺身後慮百年曽幾何為此雛稚誤頋語長號妻此理亦應喻憶之純三首幼􅀊求真契中年得偉人傾懐當一靣投分許終身燈火談元夜鸎花逐勝春何時重一􅀏胷次欲生塵其二靣目三年隔音書萬里遥宦途俱蹭蹬日事各蕭條志大謀常拙身􅀌道易消夲無當世用隐䖏㑹相招其三儁氣䡖天下髙情到古人銜盃曼卿放下筆老坡神時論誰􅄖劣人材自屈伸窮愁湏理遣不必淚沾巾復􅀉二首志大言髙與世違拂衣真作竹林㱕黄塵道口風波惡未必先生自處非其二自􅀏趨塵亦強顔食謀未免敢言閑紫芝果可充饑腹􅀙子玉屏巖石間病中二首學道今何得謀生乆不成藍衫幾棄物絳帳亦虚名事拙應天意交踈即世情煩􅁨時自觧感觸又還生其二欎欎窮愁意營營乆病身詩情渾欲減藥物但相親未得驅窮鬼終湏問大鈞三時勞慰拊甚愧古人真感懐枉却全家仰此身書生那是治生人百􅁨耿耿填胸臆强作􅂬顔慰老親自􅀏酒得数杯還已足詩過兩韻不能神何湏豪逸攀時傑我自世間隨分人别家到了身安是本圖何湏身外覓浮虚誰能置我無饑地却把微官乞與渠慵夫自號身世飄然一瞬間更􅀅辛苦送朱顔時人莫笑慵夫拙差比時人得少閑西城賞蓮呈晦之晦之自號放翁舊賞回頭已隔年髙花又見出新妍偶成濁酒狂歌㑹恰及斜風細雨天樂事適來偏有興閑身常得分無縁作詩莫怪多誇語差比放翁先著鞭滹南遺老續集􅃃四十六
