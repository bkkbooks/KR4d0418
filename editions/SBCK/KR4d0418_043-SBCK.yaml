front:
  text: 滹南遺老集卷之四十三
  hash: sha256:b60af854a011e39a4e806518ff5667a7b1ae10f7373f32a9e50c3f9f4e0016fe
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0418_SBCK_043-1a}
body:
  text: 滹南王若虚從之進士彭子升墓誌君諱悦字子升世為真定人父椿􅀅仕郎大興安次主簿子升幼明悟過人倜儻有立志讀書為文悉得其妙處承安五年擢經義進士第調冀州録事判官仁政温温民到于今不忘秩滿注濵州塩管勾徙知鄧州穰縣事其政如其冀而風聲氣熖有加居無何忽得狂疾䘮心若物慿者言動可怪自謂㝠司有所拘竟赴井死盖年三十四矣嗚呼異哉子升金玉比徳心地坦夷和氣溢于眉􅊿見者無賢不肖皆悦而親君子謂其必􅀗善報言論慷慨儀度不凢剛大之氣困而不折及其得志果若固有之君子謂其宜享大任如何不淑至斯極也初􅀅仕君亦以吉人稱鄉里好學而貧甚辛苦憔悴人不堪其病晚登一第則到官未滿而亡僅予隨奪得不償䘮君子謂天之于彭氏也已薄及子升復振而後釋然大慰以謂嗇乎彼者固􅀅豊乎此也乃大不然則夫幽明之説禍福之徴其可以理詰歟子升之在穰也予為鄭之管城甞以官事㑹汴梁既畢且散予歸意甚急子升曰人生行止無常而吾徒㑹合為尤難顧不能更少從容乎予欣然為一日留痛飲極􅂬夜艾而罷翌日相别于馬上反顧戀戀彼此有可憐色初豈知其遂為永訣也抑予心又有所感焉追惟曩昔同居于里中與今恩州司判王君士衡浹水主簿周君晦之忘形莫逆為兄弟交年壯氣銳馳騁于一時雖方以功名相勉而既甞有暮年林下之期仍見于文字以傳諸好事者夫豈徒戯語而已哉實庶㡬行其志而踐乎此也一旦飄零南北相望如晨星固已歎舊㳺之莫􅁇而後約之無涯孰謂堂堂如子升者而遽云長逝乎世事違人不如意者十八九榮衰聚散未始有極則生者雖存又可保其所終耶故予于此不獨悼吾良友之不幸而撫事興懷無非可以太息而流涕也子升之殁以大安已已八月之二十四日而其家用明年八月塟于西城之先塋俾予書而銘之子升娶武氏子一人曰興祖云銘曰既秀而枯有不祛命也奈何已矣悲夫保義副尉趙公墓誌公諱彦姓趙氏世為真定藁城人祖某父某皆農隐不仕公少剛果敢為無畏惮天眷間朝廷以南伐徵兵公適出有司即取公兄公聞即走歸自陳彼才力不我若請自代遂行不一辤妻子人義而壯之㑹事平還天資純質治生尤勤儉細故躬親不懈服食器皿期于僅足自餘無毫毛非分用日夕蹙蹙恒若不足教諸子孫及所以語他人亦唯是見諸情侈者咄嗟惡弃殆不能與言故卒大其家以名一邑承安二年以耆老受官保義副尉後二年冬十一月庚子終享年八十八素康彊少疾至是猶能日自興起行歩了無床枕滯􅀅終謂其子淵曰吾常歎人之子孫鮮克以義終祖宗積累之業一旦不難割散之骨肉相視一旦如道路人惡孰甚焉爾其帥下以嚴處之以均無息無頗無速乖離以􅈥我家其孫曰元英者以進士擢第則又特戒曰惟爾所獲亦惟我祖宗實有􅂟爾無遂獨庇爾􅅌必及其餘以荅我祖宗意其遺志如此初娶靳氏先公卒晚娶張氏子三人長曰汴以從軍官至敦武校尉次曰温皆早卒淵其季也女四人長適靳氏次傅氏次周氏王氏男孫八人幼者二餘悉克自立亦或有後女孫九人幼及寡者三餘悉得所歸噫公之所享多矣富貴壽康子孫蕃昌人或一二人之不􅀗公則兼之兹不多歟故其殁也君子無大恨其家殁後二十一日塟諸先塋祔以靳氏而貴銘于若虚若虚于公爲舊親既又爲孫壻故辭而不得免銘曰萬事畢一生足斯而慊焉復何欲新宫孔固惟􅁻卜左右前後皆其族安其神樂其真以利其嗣人焚驢誌歳已未河朔大旱逺邇焦然無主頼鎮陽帥自言憂農督下祈雨甚急厭禳小數靡不為之竟無騐既乆恠誣之説興適民家有産白驢者或指曰此旱之由也雲方興驢輙仰號之雲輙散不留是物不死旱胡得止一人臆倡衆萬以附帥聞以為然命亟取􅀅焚之驢見夢于府之属其曰􅁈哉焚也天禍流行民自罹之吾何預焉吾生不幸為異􅀋又不幸堕于畜獸乗􅀒駕馭惟人所命驅叱鞭箠亦惟所加勞辱以終吾分然也􅀂乃水旱之事豈其所知而欲寘斯酷歟孰誣我者而帥從之禍有存乎天有因乎人人者可以自求而天者可以委之也殷之旱也有桑林之禱言出而雨衛之旱也為伐刑之役師興而雨漢旱卜式靖烹􅊼羊唐旱李中敏乞斬鄭注救旱之術多矣盍亦求諸是􅁼乎求之不得無所歸咎則存乎天也委焉而已不求諸人不委諸天以無稽之言而謂我之愆嘻其不然􅁀巫投魃既已迂矣今兹無乃復甚殺我而有利于人吾何爱一死如其未也焉用為是以益惡濫殺不仁輕信不智不仁不智帥胡取焉吾子其属也敢私以訢某謝而覺請諸帥而釋之人情􅀄不懌也未幾而雨則彌月不觧潦溢傷禾􅀊卒以空人無復議驢哀鴈詞并序昔予居故人安仲和家􅀅殺鴈食客見而不忍為作哀之之詞今三十餘年矣近讀趙公誡殺生文有動于心因追録之以附其後雖文采不足􅀚者取其意可也烏之逺害宜莫如鴻浩浩長風寥寥逺空邈乎㝠􅄥去萬里而無窮頋乃不幸而網羅之中刀机是委饔飱是充吁嗟乎其恫爐且熾􅂦且沸宰夫礪刃而欲前坐客垂涎而思噬而猶神意自若低回睥睨不知禍期之行至可不哀邪捕者伊何貪于貨鬻用者伊何悦乎口腹我利我欲物罹其酷是以知人雖有生之至靈而亦其至毒也髙而林莽深而川淵逺而窮邉倮鱗介羽胎􅆑濕化皆有以致之而陳乎其前封割臠膾蒸燔烹煎濯腥滌翔窮甘極鮮一邑之内一朝之間已有不可勝言者矣人亦嘗以己而推之乎一毛之去皆知惜寸膚之損皆知病所以自待如此其至也而獨于物不為之少憐雖吾之智力可役而君之而彼之蠢愚至死而不能訴然其賦形禀氣同得于天故亦未甞不苦則􅆭而樂則舒惡夭閼而重生全奈何􅁀殄不恤以為當然孰雪其􅁈孰懲其愆豈天有厚薄固以彼而奉此乎抑􅀄無所主而自生自殖自攘自擊􅀔强者勝而専不然何其太偏也庖厨之逺君子以為仁已既不忍則假手于他人夫其畏怖之情觳觫之態可以想而知也何必見之之素臨之之親聞之曰物我􅀋也􅀋無分别滋味之在我可賖性命之于彼極切至哉言乎即是佛説亦何必持乎誡律推明罪業􅀚地獄之變相指刀兵之凶刼人惟為舌之所謾是以安為而不屑嗚呼戒之敢告來􅈒髙思誠咏白堂記有所慕于人者必有所悦乎其事也或取其性情徳行才能技藝之所長與夫衣服儀度之如何以想見其彷彿甚者至有易名變姓以自比而目之此其嗜好趨向自有合焉而不奪也吾友髙君思誠葺其所居之堂以為讀書之所擇樂天絶句之詩列之壁間而榜以詠白盖􅀅日玩諸其目而諷誦諸其口也一日見告曰吾平生深慕樂天之為人而尤愛其詩故以是云何如予曰人物如樂天吾復何議子能于是而存心其嗜好趨向亦豈不佳然慕之者欲其學之而學之者欲其似之也慕焉而不學學焉而不似亦何取乎其人耶盖樂天之為人冲和静退逹理而任命不為榮喜不為窮􅁨所謂無入而不自得者今子方皇皇干禄之計求進甚急而得䘮之念交􅀾于胸中是未可以樂天論也樂天之詩坦白平易直以冩自然之趣合乎天造厭乎人意而不為竒詭以駭末俗之耳目子則雕鎸粉飾未免有侈心而馳騁乎其外是又未可以樂天論也雖然其所慕在此者其所歸必在此子以少年豪邁如川之方増而未有涯涘則其􅀔固有不得不然者􅀂其加之歳年而博以學至于心平氣定盡天下之變而返乎自得之􅂣則樂天之妙庶乎其可同矣姑俟他日復為子一觀而評之門山縣吏隐堂記門山之公署舊有三老堂盖正寝之西故􅆹之東連甍而稍庳今以之舘賔者也予到半年葺而新之意所謂三老者必有主名然求其圖誌而無得訪諸父老而不知客􅂉問焉毎患其無以對也既乃易之為吏隐吏隐之説始于誰乎首陽為拙柱下為工小山林而大朝市好竒之士往往舉為羙談而尸位苟禄者遂因以藉口盖古今恬不之恠嗟乎出處進退君子之大致吏則吏隠則隠二者判然其不可亂吏而曰隠此何理也夫任人之事則􅁨人之􅁨􅈽関擊柝之職必思自效而求其稱岩穴之下畎畝之中毉卜釋道何所不可隐而頋隐于是乎此姦人欺世之言吾無取焉然則名堂之意安在曰非是之謂也謂其為吏而猶隠耳􅀌城斗大􅆌乎在窮山之巔煙火蕭然强名曰縣四際荒險􅆭目而傷心過客之所顧瞻而咨嗟仕子之所鄙薄而弃置非廹于不得已者不至也始予得之親友失色弔而不賀予固戚然以􅁨至則事簡俗淳便于踈􅂴頗有以自慰乎其心及西陲多驚羽檄交馳使者旁午于道路而縣以僻阻獨若不問者憐邑疲于奔命曽不得一日休而吾常日髙而起申申自如冠􅅁鞍馬幾成長物由是處之益安惟恐其去也或時與客幽㝷而曠望䕃長林藉豊草酒酣一笑身世兩忘不知我之属乎官也此其與隠者果何以異吾聞江西筠州以民無嚚訟任其刺史者號為守道院夫郡守之居而得以道院稱之則吾堂之榜雖曰隐焉其誰曰不可哉恒山堂記真定古名鎮形􅀔雄壮冠于河朔其府署規模適相稱副而恒山堂宏䴡特出又為之甲焉堂廣七楹其髙九仭望之欎欎如翬斯飛俯瞰北潭偹諸勝㮣求其經始于何代與夫主名之為誰則圖誌無傳近世沈括言潭園􅀄號海子未可􅀚逮王鎔治之遂可圖畫斯堂或者亦出于其時乎而呉中復咏行宫以為宋祖征劉承鈞常駐蹕于此故老或云堂即宫之南門而卒莫能詳也其在金􅀦率王侯貴戚處之例事豪奢務加増飾故益以完羙毎府僚宴集其上綺羅照野絲管沸天㳺人指􅀧咨嗟邈在仙境誠一􅀖之偉􅀚也兵火之餘署舎盡廢獨堂在焉而􅀊月既深寝至頺􅁦大元乙酉中萬户史公實来公以妙齡貴顯而居具慶之下日思所以奉二親之􅂬謂可以偹燕息而資􅀚覧者莫若堂也由是特為之作新易腐朽􅀘罅漏支持欹傾凡當營理者靡不及之盖期月而後畢則大饗賓客稱觴為夀以落其成而遣使致書属予為記噫予去􅀦三十年白首歸来時移事改田廬鄉井殆不可復識追惟曩昔􅄅如隔生豈知尚有恒山堂􅁘夫物之盛衰其極必反廢興成毁相㝷于無窮盖理之常然而不足怪然皆有数存乎其間自䘮亂以來繁華共盡崇樓傑􅀚莫不化為虚空如斯堂者絶無僅有固已幸矣而復為有力者新之宛然舊物閱世自如豈可謂偶然哉抑此不足論也予聞之有非常之功者必享非常之福公上􅀅之才膺方靣之􅀉定亂措安澤􅀍于生民甚厚功孰大焉宜其窮侈羙極尊榮快意一時無不可者頋乃自安于儉陋而致羙乎其親賢于衆人遠矣是則不可以不著且予平生欲一登堂臨眺而竟不果今既辱公知當得預賔席之末因之寓目以償夙心亦殘年之一適也于是乎書滹南遺老集卷四十三
