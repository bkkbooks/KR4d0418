front:
  text: 滹南遺老集卷之二十四
  hash: sha256:3223399cb03e3b52dbf92dadc7c8869e374ce0fd2eb9400876d83293217024ee
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0418_SBCK_024-1a}
body:
  text: 滹南王若虗從之新唐書辨下張籍􅀓載韓愈荅籍論佛老書甚無謂特以無事可録姑填塞云耳呉元濟􅀓後全載平淮西碑文亦不必也磨碑事舊史載于韓愈傳而新史附于元濟􅀓不若舊史為當魚朝恩嘗講易覆餗之義以譏元載時盖釋奠于國子監也新史但云㑹􅇚菜朝恩又嘗邀郭子儀同游章敬寺而新書但云約修具裴度􅀓云􅀄徳宗多猜忌朝士有相過從者金吾輒伺察以聞而新書但云尚苛伺無乃太簡乎太宗恕宇文士及曰魏徴常勸我逺佞人意疑是汝今果然通鑑記如此新史無意疑是汝字則義不完矣邢君才􅀓云其屈巳好士􅀋此盧承􅂟云其能著人善􅀋此古人或言皆此􅀋或言􅀋如此今云􅀋此則義不足矣呉湊言宫市事曰宜料中官髙年謹信者平賈和售以息衆讙宫市大抵强買民間物平售字殊不安只作平市字可也古人文字中時有渉俗語者正以文之則失真是以寕存而不去而宋子京直要句句變常此其所以多戾也明皇雜録記李林甫驕二相事以為抑揚自得而巳子京改為軒驁無少譲此固無害而益以喜津津出眉宇間之語舊史稱裴度状貌但云不逾中人而子京又加以退然兩字此復何從而得哉盖亦想像而言之耳舊史云孔戣嘗論李渉交結状倖臣側目人為危之戣髙歩公卿間以方嚴見惮新史云戣自以適所志軒軒甚得杜暹􅀓云能以公清勤約自􅀅亹亹為之凡状貌之辭非親見者不可道子京史官追記􅀓聞之事而每喜此等或云談王伯衮衮不厭或云其議論纚纚可聼或云介介自修稜稜有風岸謂李石載仇士良􅀓侃侃不干虗譽介介不至顯官皆過也舊史云郭宏覇死舊唐書作郭覇時洛陽槗壊行李􅁦之至是功畢則天嘗問羣臣曰比在外有何好事􅃕人張元一對曰百姓喜洛陽橋成幸郭宏覇死此即好事新史改云外有佳事􅁘此一耶字便别却本意盖本是無故而問今却是疑而審之也通鑑云劉悟與客􅀚角觝之戯自揺肩攘臂以􅂇其􅀔新書改為盱衡攘臂助其決舊史云楊思朂得俘囚多生剥其靣或􅋇髪際掣去頭皮新史改為剥靣􅋇腦裭髪皮以示人便不分明人皆言利病而子京每云病利人皆言可否而子京或云否可雖義理無異而讀之不明矣此等猶求異于人不已甚乎肅鈞為諌議大夫盧文操盗庫財髙宗以其職主幹當自盗罪死鈞曰囚罪誠死然恐天下聞謂陛下重貨輕法任喜恕殺人詔原死予謂罪死罪誠殞俱道不過須加當字乃可耳栁仲郢有父風矩牛僧孺歎曰非積習名教安及此􅁘安字下不得劉允濟曰史官善惡必書使驕王賊臣懼此權顧輕哉顧字下不得徳宗謂李自良曰卿于進退寕不有禮蕭俛賛曰俛議銷兵寕不野哉寕字下不得蕭復以擅發京畿觀察使儲粟削階停職或弔之復曰苟利于人胡責之辭胡字下不得李栖筠􅀓云闗中舊仰鄭白二渠溉田而豪戚壅上游取磑利奪農用十七栖筠諸皆撤毁􅀊得租二百萬民頼其入白居易為杭州刺史浚李泌六井民頼其汲􅂚若只云頼其利也蘇弁􅀓曰平賦緩役略煩苛人頼其寛寛字尤贅陸贄􅀓云始帝倉卒變故每自尅責贄曰陛下引咎堯舜意也然致㓂者乃羣臣罪意指盧􅂎等帝䕶􅂎因曰卿不忍歸過朕有是言哉哉字當作乎始帝倉卒變故亦不成語也令狐徳棻傳髙宗常召宰相及宏文舘學士問何修而王何爲而覇二者孰先德棻對曰如欲用之王道爲最而行之爲難髙宗曰令之所行何政爲要此本分語也新史云帝問曰何修而王若而覇又當孰先對曰若用之王爲先而莫難帝曰今兹何爲而要語意不足矣太宗戒尉遲敬徳曰國家大事惟賞與罰非分之恩不可数行勉自修飾無貽後悔此本分語也新史云悔可及乎語意皆非是蕭復嘗言事徳宗曰陛下臨御之􅀄聖徳光被自用楊炎盧􅂎惛瀆皇猷以致今日此本分語也新史云陛下厥􅀄清明自楊炎盧􅂎放命穢盛徳播越及兹殆不可讀􅀽髙爲給事中徳宗􅀅起盧􅂎爲饒州刺史髙當草詔見宰相盧翰劉從曰􅂎當國矯誣隂賊斥忠􅁩傲明徳反易天常使宗祏失守天下疣痏才示貶黜今還授大州天下其謂何古人言天下傷殘或曰瘡痍或曰瘡痏皆可今言疣痏乃聱耳豈可與瘡􅀋哉又奏曰杞罪萬誅陛下止貶新州俄又内移今復拜刺史誠失天下望帝曰􅂎不逮是朕之過荅曰􅂎天資詭險非不逮彼固所餘古人但言當萬死萬誅字未見其例恐是子京所改不逮所餘何等昏昧語也王琚􅀓云自傭于楊州富商家識非庸人以女嫁之識字上當有其家其主等字又云太子在潞州銅鞮令張暐性豪殖喜賓客弋獵事厚􅆢太子數集其家亦當重言太子或去厚􅆢字可也豪殖二字亦一處不得又云琚性豪侈其處方靣去故就新受饋遺至數百萬去故就新之意昏不可曉豈謂車服器皿之􅀋􅁘中間云侍衛呵止計􅀅安便公主謀益甚語皆不成視日薄乃得出賜賚接足義皆不安也林藴􅀓云藴辨給嘗有姓崔者矜氏族藴折之曰崔抒弑齊君林放問禮之本􅄖劣何如耶其人俯首不能對前史中固有載口辨嘲謔者至如此語亦何足録哉李宻等賛云煬帝失徳天醜其為吉温傳云李林甫才其為朱桃推傳云人莫測其為温庭筠傳云執政鄙其為馮河清傳云衆義其為崔逺傳云世慕其為此􅀋甚多古人言所為有為則有之矣单為字未嘗道也子京言人物相比倫之意輒用軰字或曰時無軰者或曰未有軰者或曰古未有軰或曰殆無其軰至魏徴諌太宗亦云陛下欲逺軰唐舜此若非好語而子京每喜用之何其僻也韓充傳云乗機決䇿無餘悔世推善􅀅餘悔善􅀅字皆道不過何易于為益昌令刺史常乗春與賓属泛舟出益昌索民挽繂易于身引舟曰方春百姓耕且蚕惟令不事可任其勞挽繂耕且蚕皆非史體不事亦不成語也崔日用嘗謂人曰吾平生所事皆適時制變不専始謀所事字道不得李勣姊病勣親爲煑粥火燎其鬚其姊止之勣曰姊老勣亦老雖欲乆爲姊煑粥其可得乎新史改之曰雖欲数進粥尚㡬可殊不如舊史只一進字亦别却本意天后時宰相豆盧欽望請停京官九品以上兩月俸助軍興王求禮奏曰天子富有四海何待九品俸使宰相奪之以濟軍國用乎后曰止此句道不過鄭權􅀓云識詣魁然以魁字状識詣固巳過矣而盧景亮􅀓云志義崒然又有稱造詣嶄逺者豈不益甚哉周智光􅀓云代宗命趙縦書帛内􅁡丸召郭子儀姜公輔􅀓云朱滔以宻褁書邀朱泚劉季述􅀓云割􅅁内􅁡丸告孫徳昭此本䗶書耳􅁡字何義也張薦救顔真卿疏云去正月中云云權徳輿貞元十九年上陳闕政曰去十四年云云按古今言去年去􅀊者前一年耳子京此語未見其例也李百藥􅀓云轉側㓂亂中數􅀍偽署危得不死張元素􅀓云切諌太子承乾承乾夜遣户奴伹繫危脱死安禄山􅀓云賊􅀅􅀋慓勇無逺謀日縱酒嗜聲色財利車駕危得入蜀終無進躡之患按前史有曰危得之危殺之危猶参差㡬及之意俗言則險也子京殊不悟此乃顛倒用之何其悖也張元素諫太宗修洛陽宫魏徴名勁挺今監本作梗挺聞之歎曰張公論事有囬天之力予謂魏徴之直世所共聞不必云名勁挺也劉仁軌為陳倉尉有折衝都尉魯寕坐事繫獄自恃髙班慢罵仁􅁤仁􅁤杖殺之太宗怒命追至長安靣詰之仁􅁤曰寕對百姓辱臣如此臣實忿而殺之上悦擢為櫟陽丞此通鑑所載新史但言寕豪縱犯法縣莫敢屈仁􅁤約不再犯寕暴横自如而無慢罵事若止于􅀩暴何足為辱乎又以櫟陽為咸陽不知是否裴子餘舉明經累􅀘鄂縣尉時同列李朝隠程行諶皆以文法著稱子餘獨以詞學知名或問陳崇業曰子餘與朝隠行諶􅄖劣崇業曰譬如春蘭秋菊俱不可廢也新史改云蘭菊異芬胡可廢者不如舊語多矣且異芬字何從得之哉成汭攻䕫州軍人韓楚言嘗誶辱汭汭耻之曰有如禽賊當支觧以逞及夔州不守楚言妻李語夫曰君嘗辱軍且支觧不如前死楚言不決李礪刀席下方共食復語之夫曰未可知李取刀㫁其首并殺三子乃自剄二夫字止當作楚言則天􅀓云操奩具坐重幃而國命移何必操奩具字后妃傳賛云或稱武􅅊亂唐同一轍武持久韋亟減何哉議者謂否否字不安張九齡􅀓云徳宗賢其風烈賢字不安劉子元􅀓云年十二父授古文尚書業不退父怒楚督之及聞為諸凡講春秋左氏冐徃聴之退輒辨析所疑歎曰書如是兒何怠予始讀之不能曉及見史通自叙則云㓜􅆢庭訓早遊文學年在紈綺便愛古文尚書每苦其辭艱瑣難為諷讀雖屡逄捶撻而其業不成嘗聞家君為諸兄講春秋左氏傳每廢書而聼逮講畢即為諸兄説之因歎曰若使書皆如此吾不復怠然後了然無疑而􅁴子京踈畧之病為惡也􅅊述􅀓云入元行沖室􅀚書不知􅆍食言忘則可不知則過矣王忠嗣􅀓上與論兵應對蠭起應對下不宜言蠭起二字張説􅀓云多引天下知名士以佐佑王化粉澤典章成一王法此譽之太過兼不是史氏叙事語張説首倡封禅議此謟䛕之事非正人所宜為而􅀓賛褒稱以為文物之盛豈良史體哉李泌􅀓云常持黄老􅀑神之説為時人所譏切譏切固有成言矣而其賛復云議者切而不與一切字兼得譏字否禇遂良一代正人其譖劉洎事􅀄不甚明但洎嘗訴之云爾胡致堂疑李義府所教理或然也新史遂謂二人不相中故遂良誣奏洎引馬周為左而遂良執不已帝感之遂賜死洎之賛曰為􅎱忌所乗卒䧟罪誅而其賛遂良示以此為疵病至霍仁師􅀓又云􅀍遇尤渥禇遂良忌之何行禇公之淺也李光顔􅀓云其師勁悍常為諸軍􅄡􅄡字不安渾城射賊􅀅李立節貫其左眉死之凡事死節則曰死之古今成言也致人死而曰死之無此例也盧奕懐慎少子也拜御史中丞自懐慎奐及奕三居其官清節似之似之道不得盧􅂎􅀓云父奕見忠義傳􅂎不耻惡衣菲食人未悟其不情咸謂有祖風節祖懐慎也􅀓首但言其父而不見其祖讀者何以知之陳少游􅀓云或欲對衆切問以屈之少游據引淹該問窮而對有餘夫對者隨問而應者也無問則無對今曰問窮而對有餘何耶􅅊景駿為貴鄉令有母子相訟者景駿曰令少不天常自痛爾幸有親而忘孝耶按左傳鄭伯曰􅀌不天欒盈曰我實不天凡言不天者不為天所祐耳非專指䘮親也後人往往誤用劉季述幽昭宗于少陽院鎻其門鎔鐵錮之此甚明白而子京乃云液金以完鐍若無舊文何可曉耶且錮者取其牢耳豈謂闕而完之乎詭異如此宜其有札闥洪休之戯也魏氏春秋好用左􅀓語以易舊文裴松之譏弹甚當凡人文體固不必拘至于記録他人之言豈可過加潤色而失其本真子京唐書雖詔勅章疏􅀋皆變亂以從已意至于詩句諺語古今成言亦或芟改不已甚乎滹南遺老集卷之二十四
