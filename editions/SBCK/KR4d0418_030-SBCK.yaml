front:
  text: 滹南遺老集卷之三十
  hash: sha256:bbcd0bc845852d4295509fbd709e3394bebc5bddaf3fb921097386050d06c489
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0418_SBCK_030-1a}
body:
  text: 滹南王若虚從之議論辨惑范􅁮史論云義重於生舍生可也生重於義全生可也夫義當生則生義當死則死義者所以主生死而非對立之物也豈有時而輕重哉義重於生已為語病又可謂生重於義乎雖然此自漢以來學者之所共蔽􅁮也淑人何足以知之唐蘇頲論夷齊四皓􅄖劣云四皓見賢於子房夷齊稱仁於宣父與其稱仁於宣父不猶愈於見賢於子房哉鄙哉斯言為論不求是非之真而徒􅀝古人以為重殊可笑也吕東莱曰競駑驥者至伯樂而定競是非者至孔子而定然隨伯樂而譽馬未免為不知馬随孔子而譽人未免為不知人其相去一何逺哉老蘇諌論曰蘇秦張儀吾取其術不取其心龍逄比干吾取其心不取其術予謂挾儀秦之術者必無逄干之心存逄干之心者固無事乎儀秦之術也蘇氏喜縱横而不知道故所見如此邵氏聞見録云顔子得位為堯舜孟子得位為湯武此繆論也聖賢事業易地則皆然何嘗有决擇之意彼徒見顔子窮居陋巷黙無所為而孟子㳺􅀃諸侯急於救世遂敢臆度而為是斬絶之論豈知顔孟者哉蘇武不降匃奴名重千古而當時止得典属國世皆恨之陳季雅曰臣子合當事不當受重賞此論雖高在臣子自處可也施於國家則不可顯忠遂良成湯之所以昌崇徳報功武王之所以治信如陳氏之言則善善之道亡而勵世之具廢矣温公排孟子而歎服楊雄荆公廢春秋而崇尚周禮東坡非武王而以荀彧為聖人之徒人之好惡有大可怪者司馬君實正直有餘而寛假曺操蘇子由道學甚髙而奨飾馮道皆繆戾之見不足為長厚也司馬温公論曹操簒漢以為非取之漢而取之盗手失言之罪萬古不磨胡致堂力攻之是矣及其論蕭道成當討蒼梧劉智逺不必赴晉難乃皆引以相明而不廢何邪是非有定理而前後反覆以􅁶就已意此最立言之大病也東坡以武王伐殷為非聖人斬然不疑至其論范蠡之去荀彧之死則皆許以聖人之徒是何靳於武王而輕以予二子也蘇子由論曺操曰使其主盟諸夏而不廢舊君上可以為周文王下猶不失為桓文公不能忍而甘心于九錫之事此荀文若之所以為恨也胡寅論王敦曰使其回悖逆之心有事於中原與劉焜祖逖之徒犄角進取必可以克復舊物不此之慮而甘為叛臣其亦不善擇術矣其論朱温曰為全忠計既下韓建服李茂真經理長安紀綱朝政率天下方鎮以敬順之道唐若未亡吾固事之若天命改授亦不容釋嗟夫二子之意則善矣抑不思彼三賊者可以是而望之乎書生之迂濶如此子由雜誌記道人犯罪不可加刑事其言甚鄙非惟屈法容姦有害正理而區區妄意於神仙殊為可笑盖蘇氏議論濶疎者非一而此等又其尤也三良殉葬秦伯之命詩人刺之左氏議之皆以見繆公之不道而後世文士或反以是罪三子􅁑立方曰君命之於前衆驅之於後三良雖欲不死得乎此説為當東坡詩云顧命有治亂臣子得從違魏顆真孝爱三良安足希若以魏顆事律之則正可責康公耳栁子厚所謂從邪陷厥父吾欲討彼狂是也吕氏博議反覆曲折以辨三子之非刻覈尤甚始予猶謂是少年塲屋之文出於一時之率爾而讀詩記黄鳥篇復引蘇氏語為解乃知其􅀁見之蔽盗終身也鄭厚曰王道備而帝徳銷史法盡而經意逺予謂王道不殊於帝徳史法無害於經意直厚之鄙見如是􅁘鄭厚以歐陽子作史辨太深而法太盡予謂辨無太深法無太盡論其當否則可矣鄭厚曰使湯武不爲亂臣賊子倡未必後世敢兆是亂也予謂不然聖人與天爲徒而以大義公天下遇所當爲固不暇逺􅁨後世而亂臣賊子亦不必藉口而後發梟獍豺狼之惡何嘗有所因乎且魏晉而下凡簒奪者皆以禪譲爲名然則堯舜亦爲亂臣賊子倡乎以是論湯武陋矣厚又云以湯武順天應人非得己者此丨書生􅀁知也嗚呼順天應人易之所稱也厚雖鄙薄聖賢其於孔子猶若有􅀁憚者至是􅀃則併孔子而不取矣小人無状一至於此天下之事亦有非書生所知者多名教之理而書生不知則誰復知之且厚獨非書生􅁘何其背本之甚也如厚之徒固不足道然湯武之是非古今多疑之予不可不辨鄭厚小子敢為議論而無忌憚湯武伊周至於孟子皆在所非或至詆罵至漢祖蕭曺平勃之徒則尊為聖賢而亟偁之復以歐公譏病唐太宗為薄佞夫之口其足慿乎鄭厚曰江河之流多渾渾棟梁之材多磥砢至亷者以穢飬之至羙者以醜襲之衣錦尚褧之義也無管仲之三歸具官塞門及坫則仲一淺丈夫也必不能九合諸侯一匡天下民到于今受其賜無蕭何之強買賤貰則何一介士也必不能鎮國家撫百姓為一代宗臣無霍光之隂妻邪謀寵女立后則光一忍人也必不能當廟堂擁幼君處廢立之際臨大節而不可奪嗚呼自古跌宕不覊之士往往畧細謹犯非法君子取其􅀁長恕而不責則有之今曰必如是而後可以了大事然則凡修身慎行者舉皆碌碌而無足取矣亦何以學為哉世惟知其訕薄湯武伊周之非而不知此等尤名教之罪人也韓退之嘗曰孟氏醇乎醇荀楊大醇而小疵以子􅀚之孟氏大醇而小疵楊子無􅀘荀卿反害不足論醇疵也退之三器論以為階太平之治歸天人之心者不在是其言惬當出人意表在韓集中當為第一然辭采不足􅀚亦如范蠡招大夫種議故不入内篇惜哉柳子厚㫁刑時令四維貞符等論皆覈實中理足以破千古之惑而東坡痛非之乃知秦漢諸儒迂誕之病雖蘇氏亦不免也柳子厚非國語雖不盡佳亦大有是處而温公東坡深罪之未為篤論也通鑑一書妙絶古今雖萬世不能易也惟荀或評為可恨耳當刪去之正閏之􅀃吾從司馬公性命之􅀃吾從歐陽公􅀕禮之􅀃吾從蘇翰林封建之􅀃吾從范太史餘論雖髙吾弗信之矣甚矣中道之難明也戰國諸子託之以寓言假􅀃漢儒飾之以求節繁文近世之士􅂙之以禪機元學而聖賢之實益隐矣滹南遺老集卷之三十
