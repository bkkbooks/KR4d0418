front:
  text: 滹南遺老集卷之二十
  hash: sha256:ca11aabf577c95965de97cf0cf97e1d53b6c0abc79d1e43c5c9a57cdafc1e9cb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0418_SBCK_020-1a}
body:
  text: 滹南王若虚從之諸史辨惑五帝之名史記以黄帝為首書序以少吴為首其説不同要之少昊黄帝之子顓頊黄帝之孫帝嚳黄帝之曾孫而堯帝嚳之子也􅀄皆傳之子孫至于堯舜其子不肖不足以付大器乃始有禪讓之事斯盖不得已之變而或者遂云五帝官天下三王家天下何其妄也皇降而帝帝降而王名􅃅之異耳堯舜揖譲湯武征誅世變之殊耳若夫其道則未嘗不一而商鞅説秦孝公乃謂􅀄以帝道再以王道魏徴亦云行帝道而帝行王道而王鄭厚又云王道備而帝徳消皆淺陋之見也父死子􅁇天理人情之常也自天子至庻人自王至覇自古至今未有能易者其或及于旁支付諸他姓則必其􅀔所當然而出于不得已可謂之變而不可以為常也而漢人之説曰殷道親親立弟周道尊尊立子殷道質質者法天親其所親故立弟周道文文者法地敬其本始故立長子周道太子死立適孫殷道太子死立其弟此何所稽也天下無二道聖人無兩心故曰前聖後聖其揆一也典章制度時或損益不同至于名教人倫豈容殊致尊親之道孰可偏廢而云殷獨親親周獨尊尊非謬妄乎盖秦漢以來言三代者毎毎如此以殷紀觀之誡多立弟然在當時必有其故而􅀄非湯之定法也若其果主于親親則一于立弟矣何復待太子死而後及耶抑甞考之河亶甲崩子祖乙立祖乙崩子祖辛立小乙崩子武丁立武丁崩子祖庚立此皆在世立子者也庚丁崩子武乙立武乙崩子太丁立太丁崩子帝乙立帝乙崩子辛立此則四世立子者也其間沃甲崩則立其兄祖辛之子祖丁祖丁崩則立其弟沃甲之子南庚此則廢適而立姪者也安在其太子死而專立弟邪紀又云自中丁以來廢適而更立諸弟子弟子或争相代立比九世亂諸侯莫朝盖立不以正宜其啓争奪之端是何足以貽乆逺而謂成湯之法固如是乎嗚呼世之學者自非詩書易春秋語孟子之正經一切異説不近人情者雖託以聖賢皆當慎取不可輕信也左氏文章所謂毫髪無遺恨者惟􅂙舉人名字頗為不愜如邲之戰既稱士㑹復曰隨武子又曰随季又曰士季既稱郤克復曰駒伯又曰郤獻子􅀄稱荀林父而後稱桓子􅀄稱先縠而後稱彘子大率皆然不可殚舉一段之文而錯雜如是向無注釋讀考孰知其爲一人邪雖無害其羙要之不潔而近代䂬溪黄徹極稱其變態可法且以諸史列傳首尾一津爲不足取殆難與論真是非也劉子􅀇曰韓王本名信都而􅁶固轍去都字用使稱其名姓全與淮隂不别按韓王韓國之後其姓爲姬襲封于韓而非姓也又加王字有何不别然􅁶于絳侯傳固作淮隂等賛亦稱兩韓信而髙祖紀八年又云上東擊韓信餘㓂于東垣何邪􅁶固記事互有得失如史記孝文紀云髙祖中子也髙祖十一年春已破陳豨軍定代地立為代王都中都太后薄氏子漢書云髙祖中子也母曰薄姬髙祖十一年誅陳豨定代地立子桓為代王固之序薄氏文順于遷矣而加子桓二字復為贅也班固漢書刪􅃳遷史徃徃勝之然亦有反不及者如史記髙祖聞田横死曰嗟乎有以也夫起自布衣兄弟三人更王豈非賢乎哉漢書但云嗟乎有以起布衣其語太簡讀之殆不可暁也漢文帝以公主嫁匈奴使䆠者中行説傳之説不欲行漢强使之説曰必我行也為漢患者史記如此而漢書但云必我而無行字此恐錯誤者曰為漢患者必我也或云必我行為漢患矣如此乃順史記文帝紀云張武受賂金錢事覺上􅀤御府金錢賜之以媿其心彼受金錢而復以金錢賜之可以為媿漢書但云更加賞賜則泛而不明矣史記司馬相如傳曰天子曰可徃從悉取其書使所忠徃而相如死班固加若後之矣四字此句為贅且若字意乖不若不加之愈也髙祖謂沛父兄曰其以沛為朕湯沭邑注引風俗通義曰沛人語􅀄􅀤聲皆言其其者楚言也髙祖始登帝位教令言其後以為常耳于謂不然戒辭用其字自是本法古文如是者何可勝舉而云楚語獨爾不亦妄乎袁盎論社稷臣云主在與在主亡與亡言以身徇主與之同存亡耳如淳曰人主在時與共治在時之事不以主亡而不行其政令何其曲邪史記匈奴傳賛曰世俗之言匈奴者患其徼一時權而務讇納其説以便偏指不参彼已􅀅率席中國廣大氣奮人主因以决䇿是以連功不深注以彼已􅀅率為句既不成文而理又不順其釋彼已引詩彼已之子殊為牽强吾友崔伯善云當以不参彼已為句而而􅀅率字屬下文其説良是漢書韓彭等傳賛云唯吴苪之起不失正道故能傳􅃅五世以無嗣絶慶流支庻有以矣夫著於甲令而稱忠也末句不相承前漢車千秋本姓田氏以其為丞相時詔許乘車入宫因􅃅車丞相此一時所稱非乆逺轉而為姓又非上之􅀁賜也班固作傳止當著其本姓而遂從車字何邪黄霸雖以治郡稱然既嘗為相自當附之韋賢匡衡等傳而班史列于循吏非也班固論江充王莾事皆以為有天時而非人力夫人固不勝于天矣然班氏身為史官以褒貶􅂆懲為務則亦不當立此論也後漢郭太字林宗范􅁮作傳以父諱止稱林宗亦可矣而中間復数稱太左慈字元放既稱其名而又兩稱為放不亦雜乎老蘓評范􅁮之失謂不當㮣董宣于酷吏㮣鄭衆吕强于宦者㮣蔡琰于列女其論董宣蔡琰是矣若鄭衆吕强雖有可嘉豈可去宦者之目乎漢書髙祖紀云老父相髙祖曰鄊者夫人嬰兒皆以君如淳曰以或作似顔氏以為非當矣然史記正作似字豈其誤邪史記髙祖縱􅀚秦皇帝喟然太息曰大丈夫當如此漢書作太息此只是太字盖古人􅀁通用而師古云言其歎息之大過矣髙祖繇咸陽縱􅀚秦皇帝張騫傳曰大角觝出竒􅃧諸恠物多聚􅀚者顔注皆音工喚反至相如封禅書云天下之壮􅀚則讀如字大似顛倒也髙祖縱􅀚秦皇帝師古曰縱放也天子出行放人令􅀚予謂此於文􅀔為悖恐只是恣􅀚之耳裴矩傳焬帝時諸蕃胡入貢令武威張掖士女盛餙縱􅀚縱字當准此例髙祖紀曰如意幾代太子者数焉丙吉傳曰皇孫病㡬不全者数焉元后賛曰吕霍上官幾危國者数矣凡此等数字盖言数次耳史記稱汲黯多病上常賜告者数如淳曰数者非一也餘皆准此當讀如字而顔氏訓頻並音所角反狄山曰兵凶器未易数動宣帝曰太守吏民之本数變易則下不安黄霸曰数易長吏人因縁為姦此等正當訓頻而反讀如字恐未當也南越尉佗謂陸賈曰使我居中國何遽不若漢何遽猶言豈便也與越大夫種言何遽不為福同意而注云有何廹促而不如漢張敞誅絮舜時冬月未盡数日敞使人語之曰冬月巳盡延命乎此言雖春近而不得免耳而注云汝不欲望延命乎霍光傳任宣謂霍禹曰百官以下但事馮子都王子方等視丞相亡如也亡如者如無耳猶􅌸如之􅀋而注云無􅀁象似是皆何理邪齊王肥與諸侯書言吕后比殺三趙王文帝紀詔言間者數􅀊比不登梁孝王傳云十四年入朝十七年十八年比年入朝何武傳曰孝成孝哀比世無嗣公孫賀傳曰丞相李蔡等三人比坐事死膠西王端傳云端数犯法天子弗忍誅有司比再請削其國夫比者連併之義耳而顔注皆訓頻似是而實差殊學者試細味之文帝問馮唐曰父老何自為􅀰家安在師古曰言年已老何乃自為􅀰也崔浩以為自何為􅀰非也予謂漢之􅀰選其途非一有以父兄任子弟為􅀰者如張安世􅀽盎是也有以富貲為􅀰者漢儀注謂貲五百萬得為常侍􅀰如張釋之司馬相如是也有以獻䇿上書為􅀰者婁敬主父偃是也有以孝著為􅀰者唐是也而衛綰又以􅃧車為􅀰以是􅀚之浩説為勝而顔氏遽㫁其非其自信亦太篤矣申屠嘉劾奏鄧通􅃧殿上無禮文帝曰君勿言吾􅀻之􅀻只是愛幸之意猶􅀁謂弄臣者耳而師古以為欲􅀻教戒恐非也不然一􅀻字詎能兼教戒之義邪賈􅁩言秦俗之弊云其慈子耆利去禽獸亡㡬以文􅀔觀之慈子當是錯誤顔氏强為觧釋恐非也田蚡以肺附為相師古引舊説云如肝肺之相附著也一云肺斫木札喻其􅁿薄附著大材也餘肺附字皆然其義迃曲不足信按此語皆本于史記今史記諸本並作腑字盖言其親宻如肺腑猶股胘心膂之􅀋耳不知孟堅如何轉而為附或者古字通用而史記索􅀮反音腑為附謬矣汲黯拜淮陽太守謝曰臣常有狗馬之心今病力不能任郡事師古以病力為句曰力謂甚也訓力為甚未知何據子􅀄謂此字當属下句及讀史記則云黯常有狗馬病而通鑑但云有病乃知力字属下無疑盖孟堅誤析其辭故守師古之妄而新唐喬琳傳云從幸梁州辭病力蕭俛授少師辭疾力不拜此又因顔注而失也滹南遺老集卷之二十
