front:
  text: 王若虚字從之慵夫其號槀城人承安二年經義進士歴管城門山二縣令用薦入爲國史院編修官遷應奉翰林文字爲著作佐郎􅁶平凉府判官召爲左司諌轉延州刺史入爲直學士入元遂隐居不出後東逰泰山至黄峴峯憇萃美亭談􅀏終焉所著文章號慵夫集又滹南遺老集傳扵世事見金史按中州集稱􅀂虚負重名精經學史學文章禮樂一代偉人北渡後隐居鄉里據此則滹南老人終于元未甞仕于元且其人已入金史文藝傳焦氏經籍志編入元人誤也此本山隂祁氏藏書康熈乙未春王歸繡谷亭􅀵藏因考史傳而附記于後錢唐吴焯書又按集内詩與中州集本句微有不同覺中州之為善想元遺山入選詩摘其微瑕不嫌改削耳然此固原作其後一卷係因中州集􅀘入便相同中州集所無者宫女圍棊一首和王子端此本多一首白髪嘆六韻即感秋十二韻之半亦元遺山増改後人失考據以編入續集耳焯再書滹南遺老集目録
