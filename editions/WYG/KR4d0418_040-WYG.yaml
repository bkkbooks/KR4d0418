body:
  text: 滹南集巻四十金王若虚撰詩話荆公有兩山排闥送青来之句雖用排闥字讀之不覺其詭異山谷云青州從事斬闗来又云殘暑已促装此與排闥等耳便令人駭愕山谷閔雨詩云東海得無寃死婦南陽應有卧雲龍得無猶言無乃耳猶欠有字之意卧雲龍真龍邪則豈必南陽指孔明耶則何闗雨事若曰遺賢所以致旱則迂濶甚矣清明詩云人乞祭餘驕妾婦士甘焚死不封侯士甘焚死用介推事也齊人乞祭餘豈寒食事哉若泛言所見則安知其必驕妾婦盖姑以取對而不知其踈也此類甚多食𤓰有感云田中誰問不納履坐上適来何處蝇是固皆𤓰事然其語意豈可相合也奕棋云湘東一目誠甘死天下中分尚可持以湘東目為碁眼不惬甚矣且此聫豈專指輸局耶不然安可通也接花云雍也本犁子仲由元鄙人升堂與入室只在一揮斤揮斤字無乃不安且取喻何其迂也士㑹自秦還晉繞朝贈之以䇿盖當時偶以此耳非送行者必須䇿也而山谷送人詩云願巻囊書當贈鞭又云折柳當馬䇿亦無謂矣秦繆公謂蹇叔曰中壽爾墓之木拱矣盖墓木也山谷云待而成人吾木拱此何木耶山谷牧牛圖詩自謂平生極至語是固佳矣然亦有何意味黄詩大率如此謂之竒峭而畏人說破元無一事弔邢淳夫云眼看白璧埋黄壤何况人間父子情既下何况字須有他人猶痛悼之意乃可猩毛筆云身後五車書按惠子多方其書五車非所讀之書即所著之書也遂借為作筆寫字此以自肯耳而吕居仁稱其善詠物而曲當其理不亦異乎只平生㡬量屐細味之亦踈而㧞毛濟世事尤牽强可笑以予觀之此乃俗子謎也何足為詩哉詩人之語詭譎寄意固無不可然至於太過亦其病也山谷題惠崇畫圖云欲放扁舟歸去主人云是丹青使主人不告當遂不知王子端叢臺絶句云猛拍䦨干問興廢野花啼鳥不譍人若譍人可是怪事竹荘詩話載法具一聫云半生客裏無窮恨告訴梅花說到明不知何得如此昨日酒間偶談及之客皆絶倒也山谷贈小鬟驀山溪詞世多稱賞以予觀之眉黛壓秋波儘湖南水明山秀儘字似工而實不惬又云婷婷嫋嫋恰近十三餘夫近則未及餘則已過無乃相窒乎春未透花枝瘦止謂其尚嫩如荳蔲梢頭二月初之意耳而云正是愁時候不知愁字屬誰以為彼愁邪則未應識愁以為己愁耶則何為而愁又云只恐逺歸来緑成隂青梅如豆按杜牧之詩但泛言花已結子而已今乃指為青梅限以如豆理皆不可通也古之詩人雖趣尚不同體制不一要皆出於自得至其辭逹理順皆足以名家何嘗有以句法䋲人者魯直開口論句法此便是不及古人處而門徒親黨以衣鉢相傳號稱法嗣豈詩之真理也哉魯直於詩或得一句而終無好對或得一聫而卒不能成篇或偶有得而未知可以贈誰何嘗見古之作者如是哉山谷自謂得法於少陵而不許於東坡以予觀之少陵典謨也東坡孟子之流山谷則揚雄法言而已魯直論詩有奪胎換骨㸃鐵成金之喻世以為名言以予觀之特剽竊之黠者耳魯直好勝而耻其出於前人故為此強辭而私立名字夫既已出於前人縱復加工要不足貴雖然物有同然之理人有同然之見語意之間豈容全不見犯哉盖昔之作者初不校此同者不以為嫌異者不以為夸隨其所自得而盡其所當然而已至其妙處不專在於是也故皆不害為名家而各傳後世何必如魯直之措意耶蜀馬良兄弟五人而良眉間有白毫時人為之語曰馬氏五常白眉最良盖良實白眉而良不在於白眉也而北齊陽休之贈馬子結兄弟詩云三馬俱白眉山谷送秦少㳺云秦氏多英俊少㳺眉最白豈不可笑哉王直方詩話云秦少㳺嘗以真字題邢淳夫扇云月團新碾瀹花磁飲罷呼兒課楚辭風定小軒無落葉青蟲相對吐秋絲山谷見之乃於扇背作小草云黄葉委庭觀九州小蟲催女獻公裘金錢滿地無人費百斛明珠薏苡秋少㳺後復見之云逼我太甚予謂黄詩語徒雕刻而殊無意味盖不及少㳺之作少㳺所謂相逼者非謂其詩也惡其好勝而不讓耳朱少章論江西詩律以為用崑體功夫而造老杜渾全之地予謂用崑體功夫必不能造老杜之渾全而至老杜之地者亦無事乎崑體功夫盖二者不能相兼耳茆璞評劉夷叔長短句謂以少㳺之肉傳東坡之骨亦猶是也且食莫踟蹰南風吹作竹此樂天食筍詩也朱喬年因之曰南風吹起籜龍兒戢戢滿山人未知急喚蒼頭斸烟雨明朝吹作碧參差年年乞與人間巧不道人間巧更多此楊朴七夕詩也劉夷叔因之曰只應将巧畀人間定却向人間乞取此江西之餘𣲖欲益反損正堪一笑而曾端伯以喬年為㸃化精巧茆荆産以夷叔為文婉而意尤長嗚呼世之末作方日趨於詭異而議者又從而簧鼓之其為弊何所不至哉王仲至召試館中詩有日斜奏罷長楊賦之句荆公改為奏賦長楊罷云如此語乃健是矣然意無乃復窒乎張文潛詩云不用為文送窮鬼直湏圖事祝錢神唐子西云脱使真能去窮鬼自量無以致錢神夫錢神所以不至者唯其有窮鬼在耳二子之語似可喜而實不中理也李師中送唐介詩雜壓寒刪二韻冷齋夜話謂其落韵而緗素雜記云此用鄭谷等進退格藝苑雌黄則疑而两存之予謂皆不然謂之落韵者固失之太拘而以為有格者亦私立名字而不足據古人何嘗有此哉意到即用初不必校古律皆然胡乃妄為云云也但律詩比古稍嚴必親隣之韻乃可耳冷齋夜話云前軰作花詩多用美女比其状如曰若教解語應傾國任是無情也動人塵俗哉山谷作酴釄詩曰露濕何郎試湯餅日烘荀令炷爐香乃用美丈夫比之特為出類而吾叔淵材詠海棠則曰雨過温泉浴妃子露濃湯餅試何郎意尤佳也慵夫曰花比婦人尚矣盖其於類為宜不獨在顔色之間山谷易以男子有以見其好異之僻淵材又雜而用之益不倫可笑此固甚紕繆者而惠洪乃莭莭歎賞以為愈竒不求當而求新吾恐他日復有以白晳武夫比之者矣此花無乃太麄鄙乎魏帝疑何郎傅粉止謂其白耳施於酴醿尚可比海棠則不類矣且夫雨過露濃同於言濕而已果何所異而别之為對邪楊軒牡丹詩云楊妃歌舞態西子巧讒䰟利劍斫不斷餘妖鍾此根東坡詠酴醿以吴宫紅粉命意而終之曰餘妍入此花山谷詠桃花以九疑萼緑華命意而終之曰猶記餘情開此花詠水仙以凌波仙子命意而終之曰種作寒花寄愁絶是皆以美人比花而不失其為花近世士大夫有以墨梅詩傳於時者其一云髙髻長眉滿漢宫君王圗畫按春風龍沙萬里王家女不着黄金買畫工其一云五換隣鍾三唱鷄雲昏月淡正低迷風簾不着欄干角瞥見傷春背面啼予嘗誦之於人而問其詠何物莫有得其彷彿者告以其題猶惑也尚不知為花况知其為梅又知其為畫哉自賦詩不必此詩之論興作者誤認而過求之其弊遂至於此豈獨二詩而已東坡眉石硯醉道士石等篇可謂横放而曠逺然亦未嘗去題也而論者猶戒其專力於是則秉筆者盍少貶乎予嘗病近世墨梅二詩以為過及觀宋詩選陳去非云粲粲江南萬玉妃别来幾度見春歸相逢京洛渾依舊祗有緇塵染素衣曹元象云憶昔神逰姑射山夢中栩栩片時還氷膚不許尋常見故隠輕雲薄霧間乃知此弊有自来矣張舜民謂樂天新樂府幾乎罵乃為孤憤吟五十篇以壓之然其詩不傳亦畧無稱道者而樂天之作自若也公詩雖涉淺易要是大才殆與元氣相侔而狂斐之徒僅能動筆類敢謗傷所謂爾曹身與名俱滅不廢江河萬古流也蕭閑云風頭夢雨吹無跡盖雨之至細若有若無者謂之夢田夫野婦皆道之而雷溪注以為夢中雲雨又曰雲夢澤之雨謬矣賀方囘有風頭夣雨吹成雪之句又云長廊碧瓦夢雨時飄洒豈亦如雷溪之說乎蕭閑憶恒陽家山云誰幻出故山丘壑謂予心目注以故山為江左非也只是指恒陽而已好在斜川三尺玉公宅前有池可三畆號小斜川三尺字以廣狭深淺言之俱不安注以為潄玉堂泉按此堂自在北潭中豈相干涉予官門山嘗得板本乃是畆字意其不然盖如言幾頃玻璃之類耳暮涼白鳥歸喬木乃宅前真景也而注云潔身而退如白鳥之歸林何其妄哉前人有紅塵三尺險中有是非波之句此以意言耳蕭閑詞云市朝氷炭裏湧波瀾又云千丈堆氷炭便露痕跡樂天望瞿塘詩云欲識愁多少髙於灔澦堆蕭閑送髙子文詞云歸興髙於灔澦堆雷溪漫注盖不知此出處耳然樂天因望瞿塘故即其所見而言泛用之則不切矣蕭閑樂善堂賞荷花詞云胭脂膚瘦薰沉水翡翠盤髙走夜光世多稱之此句誠佳然蓮體實肥不宜言瘦予友彭子升嘗易膩字此似差勝若乃走珠之状惟雨露中然後見之據辭意當時不應有雨也山黛月波之類盖緫述所見之景而雷溪注云言此花以山為眉波為眼雲為衣不亦異乎至一枝梅綠横氷萼淡雲新月炯踈星之句亦如此說彼無真見而妄意求之宜其謬之多也蕭閑使髙麗詞云酒病賴花醫却世皆以花為婦人非也此詞過處既有離索餘香収拾新愁之語豈復有婦人在乎以文勢觀之亦不應爾其所謂花盖真花也言其人已去賴以解酲者獨有此物而已必當時之實事李後主詩云酒惡時拈花蕋嗅公詠花詞亦喜用醒心香字盖取其清徹之氣以滌除惡味耳蕭閑自鎮陽還兵府贈離筵乞言者云待人間覔箇無情心緒着多情換此篇有恨别之意故以情為苦而還羨無情終章言之宜矣使髙麗詞亦云無物比情濃覔無情相博次第未應及此也謝安謂王羲之曰中年以来傷於哀樂羲之曰年在桑榆自然至此頃正賴絲竹陶寫恒恐兒輩覺減其歡樂之趣坡詩用其事云正賴絲與竹陶寫有餘歡夫陶寫云者排遣消釋之意也所謂歡樂之趣有餘歡者非陶寫其歡因陶寫而歡耳蕭閑屢使此字而直云陶寫歡情陶寫餘歡舊歡若為陶寫似背元意近嵗諸公以作詩自名者甚衆然徃徃持論大髙開口輒以三百篇十九首為凖六朝而下漸不滿意至宋人殆不齒矣此固知本之說然世間萬變皆與古不同何獨文章而可以一律限之乎就使後人所作可到三百篇亦不肯悉安於是矣何者滑稽自喜出竒巧以相誇人情固有不能已焉者宋人之詩雖大體衰於前古要亦有以自立不必盡居其後也遂鄙薄而不道不已甚乎少陵以文章為小技程氏以詩為閑言語然則凡辭逹理順無可瑕疵者皆在所取可也其餘優劣何足多較哉滹南集巻四十
