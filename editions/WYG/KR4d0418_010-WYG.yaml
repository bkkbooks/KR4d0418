body:
  text: 滹南集巻十金王若虛撰史記辨惑採摭之誤辨下左傳昭公二十年十月齊景公疥遂痁期而不瘳梁丘據與裔欵言於公曰吾事鬼神豐於先君有加矣今君疾病是祝史之罪也盍誅祝史晏子不可曰民人苦病婦人皆詛祝有益也詛亦有損雖其善祝豈能勝億兆人之詛十二月晏子侍公於遄䑓梁丘據馳而造焉飲酒樂公曰古而無死其樂若何晏子曰古而無死則古之樂也君何得焉昔爽鳩氏始居此地季萴因之有逢伯陵因之蒲姑氏因之而後太公因之古若無死則爽鳩氏之樂非君所願也二十六年冬齊有彗星齊侯使禳之晏子曰無益也祗取誣焉天道不謟不貳其命若之何禳之齊侯與晏子坐於路寝公歎曰美哉室其誰有此乎晏子曰敢問何謂也公曰吾以為在徳對曰如君之言其陳氏乎列子曰景公㳺於牛山臨其國城而流涕曰美哉國乎欝欝芊芊若何去此國而死乎使古無死者寡人将去斯而何之史孔梁丘據從而泣晏子獨笑於傍公曰寡人今日之逰悲孔與據皆從而泣子之獨笑何也對曰使賢者而常守之則太公桓公常守之矣使有勇者而常守之則荘公靈公常守之矣數君者常守之吾君方将被莎笠而立乎畎畝之中惟事之恤何暇念死乎則吾君又安得此位而立焉以其迭遽之迭去至於君也而獨為之流涕是不仁也見不仁之君見諂諛之臣臣所為獨竊笑也史記齊世家襍取二書之說云魯昭公三十二年彗星見景公坐柏寝嘆曰堂堂誰有此乎群臣皆泣晏子笑公怒晏子曰臣笑群臣諛甚景公曰出東北當齊分野寡人以為憂晏子曰君髙䑓深池賦歛如弗淂刑罰恐不勝茀星将出彗星何據乎公曰可禳否晏子曰使神可呪而来亦可禳而去也百姓苦怨以萬數而令一人禳之安能勝衆口乎嗚呼此一事也而差互不同如是其餘謬妄可勝道哉左傳介之推答母之言曰身将隐焉用文之是求顯也史記重下文之二字或言如此意乃足因疑左氏脱誤予謂不然古人語簡有如此者禮記云晋獻公将殺其世子申生公子重耳謂之曰盍言子之志於公乎世子曰不可君安驪姬是我傷公之心也孟子辨百里奚事曾不知以食牛干秦繆公之為汚也可謂智乎亦是類也且遷記漢文之語云吾獨不得亷頗李牧為吾将吾豈憂匈奴哉此復何異而獨疑推之言也雖然亦不可為法也周紀云晋文公召襄王襄王㑹之河陽踐土書諱曰天王狩于河陽按左傳仲尼言以臣召君不可以訓故書曰狩今直云書諱誰得而知也左傳稱晉靈公欲攻趙盾其右提彌明死之又謂初盾田於首山舍於翳桑見靈輙餓而食之後輙為公介禦公徒而免盾問其名居不告而亡夫言其職則明為右而輙為介言其所終則明死輙亡其為二人明矣而史記云桑下餓人即提彌明且又以為宰夫何耶左氏之說未必皆可信然遷之所記寔以是為據焉則其舛誤不得不辨也晉世家云趙盾嘗田首山食桑下餓人餓人舎其半曰宦三年未知母之存否願遺母夫存否且不知顧安所遺乎左傳有今近焉三字於理乃通遷鹵莾而失之耳晋趙盾弟穿弑君董狐書盾弑以示於朝盾不伏狐曰子為正卿亡不出境反不討賊非子而誰仲尼稱狐為良史左氏云爾晉世家既從之矣而趙世家復云君子譏盾為正卿亡不出境反不討賊故太史書之如此却是先出於士論太史因之而書也文既冗複而意又矛盾無乃不當乎左氏記鉏麑事云盾盛服将朝坐而假寐麑曰不忘恭敬民之主也賊民之主不忠棄君之命不信觸槐而死公羊以為見盾閨門無人且食魚餐嘉其易而儉故爾史記則云盾閨門開居處莭麑曰殺忠臣棄君命罪一也乃死吾不知閨門開居處莭何以為忠也郤克恥為齊母所笑誓曰所不此報無能涉河左傳云爾齊世家曰不是報不復涉河意既異矣至晉世家則又云不報齊者河伯視之記一事而差殊若是失之不精也左氏曰卻克聘于齊既登婦人笑於房卻克怒故有鞌之役杜注云跛而登階故笑之榖梁子曰季孫行父秃卻克眇衞孫良夫跛曹公子手僂同時聘於齊公羊曰卻克臧孫許聘於齊或眇或跛而史記復云卻克僂魯使蹇衛使眇然則果誰可信乎三傳之不同各記所聞固無足恠史記因傳而出者也不從此則彼乃又乖異如此何邪左傳曰白公勝在吴子西召而用之後以救鄭之故欲殺子西子西聞之曰勝如卵余翼而長之此盖恃其有恩也而史記云勝如卵耳何能為也則是忽其脆弱而已不亦異乎左氏曰吴王闔廬将伐齊越子率其衆以朝王及列士皆有餽賂吴人皆喜惟子胥懼曰是豢吴也史記改為棄吴此何意邪左氏曰吴王賜子胥死子胥将死曰樹吾墓檟檟可材也吴其亡乎此言時之不久耳史記則云樹吾墓上以梓令可以為器吾不知何意也吴世家云越王擊吴于檇李使死士挑戰三行造吴師呼自剄吴師觀之越因伐吴敗之越世家亦同賈逵曰死罪人也鄭衆曰欲以死報恩者其說皆不安按左氏云使死士再禽焉不動使罪人三行屬劍於頸而辭曰二君有治臣奸旗鼓不敏於君之行前無所逃刑敢歸死遂自頸盖死士者敢死勇士也與罪人之事自是两莭而遷混并之故義理不明而說者妄為云云耳左傳云勾踐與吴戰於檇李大敗吴師闔閭還卒於陘夫差使人立於庭苟出入必謂已曰夫差而忘越王之殺而父乎則對曰唯不敢忘盖闔閭既歿夫差使人問已耳而史記曰闔閭将死立子夫差謂曰爾忘勾踐殺汝父乎何其不同也秦穆公伐鄭之役考之左傳其諫而止之哭而送其子者獨蹇叔而已故晉原軫曰秦違蹇叔而以貪勤民穆公曰孤違蹇叔以辱二三子何嘗有百里奚預其間哉而司馬遷記此以為二老同辭不知其何據也左氏云公召孟明西乞術白乙丙使出師又云蹇叔之子與師蹇叔謂孟子曰孟子吾見師之出而不見其入也哭送其子曰吾収爾骨焉盖孟明軰自為将帥而蹇叔之子則士卒之屬也此亦不相涉而遷以孟明為百里奚子西乞白乙為蹇叔子又何邪或曰孔䟽引世族譜云或謂西乞術白乙丙為蹇叔子安知子長别無所據而必以左氏為質乎曰此或有之然是役也主其謀者孟明也再敗不沮卒以得逞使果為百里奚子何奚能苦諫其君而無一言以罪其子也以書觀之穆公自殽敗歸即作秦誓以自悔而遷以為取王官封殽尸之後不亦異乎又云君子聞之皆為垂涕曰嗟乎秦穆公之與人周也按左氏云君子是以知秦穆之為君也舉人之周也與人之一也至於孟明子桑皆有賛美之辭凡左氏所謂君子者盖假之以為褒貶之主而非指乎當時之士也安有所謂聞之垂涕者哉左氏華督遇孔父妻目逆而送之其言甚文史記乃云目而觀之不成語矣服䖍曰目者極視睛不轉也殆是妄說公羊傳宋南宫萬弑閔公大夫仇牧手劍叱之萬摋而殺之碎其首齒著乎門闔注謂側手曰摋盖摑碎其首故齒迸門闔耳而史記但云萬搏仇牧齒著門闔死恐先无意楚莊王圍宋城中無食華元夜見子反而告其情子反勉之曰我軍亦有七日之糧盡此不勝将去而歸王聞而責子反子反曰宋猶有不欺之臣可以楚而無乎荘王不得已乃引師去此公羊之說也史記乃謂荘王喜華元之誠自發此言而罷兵豈别有所據耶榖梁曰季孫行父禿晋卻克眇衛孫良夫跛曹公子手僂同時聘於齊使秃者御秃者眇者御眇者跛者御跛者僂者御僂者所以有鞌之戰公羊略同啖助以為似街談巷議故削之劉知幾論省字法云當作各以其類者逆之此亦可矣史記乃謂令人如之以導客則是偽效其狀而非真疾也吕氏春秋云管仲有疾桓公問之仲請逺易牙竪刁公子啟方公曰易牙烹其子以慊寡人尚可疑邪對曰人之情非不愛其子也其子之忍又将何有於君公曰竪刁自宫以近寡人尚可疑邪對曰人之情非不愛其身也其身之忍又将何有於君公又曰公子啟方事寡人十五年其父死而不敢歸哭尚可疑耶對曰人之情非不愛其父也其父之忍又将何有於君史記亦載之而但云殺子以適君非人情不可自宫以適君非人情難親倍親以適君非人情難近誰得而知其事邪滹南集巻十
