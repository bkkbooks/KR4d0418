body:
  text: 滹南集巻四十三金王若虛撰進士彭子升墓誌君諱恱字子升世為真定人父椿将仕郎大興安次主簿子升幼明悟過人倜儻有立志讀書為文悉得其妙處承安五年擢經義進士第調兾州録事判官仁政温温民到於今不忘秩滿注濵州塩管勾徙知鄧州穰縣事其政如其兾而風聲氣焰有加居無何忽得狂疾䘮心若物凴者言動可恠自謂㝠司有所拘竟赴井死盖年三十四矣嗚呼異哉子升金玉比徳心地坦夷和氣溢於眉睫見者無賢不肖皆恱而親君子謂其必獲善報言論慷慨儀度不凡剛大之氣困而不折及其得志果若固有之君子謂其且享大任如何不淑至斯極也初将仕君亦以吉人稱鄉里好學而貧甚辛苦憔悴人不堪其病晩登一第則到官未滿而亡僅予隨奪得不償喪君子謂天之於彭氏也已薄及子升復振而後釋然大慰以謂嗇乎彼者固将豐乎此也乃大不然則夫幽明之說禍福之徵其可以理詰與子升之在穰也予為鄭之管城嘗以官事㑹汴梁既畢且散予歸意甚急子升曰人生行止無常而吾徒㑹合為尤難顧不能更少從容乎予欣然為一日留痛飲極歡夜艾而罷翌日相别於馬上反顧戀戀彼此有可憐色初豈知其遂為永訣也抑予心又有所感焉追惟曩昔同居于里中與今恩州司判王君士衡淶水主簿周君晦之忘形莫逆為兄弟交年壮氣銳馳騁乎一時雖方以功名相勉而既嘗有暮年林下之期仍見於文字以傳諸好事者夫豈徒戯語而已哉實庶幾行其志而踐乎此也一旦飄零南北相望如晨星固已歎舊逰之莫繼而後約之無涯孰謂堂堂如子升者而遽云長逝乎世事違人不如意者十八九榮衰聚散未始有極則生者雖存又可保其所終耶故予於此不獨悼吾良友之不幸而撫事興懐無非可以太息而流涕也子升之歿以大安己巳八月之二十四日而其家用明年八月塟於西域之先塋俾予書而銘之子升娶武氏子一人曰興祖云銘曰既秀而枯有街不袪命也奈何已矣悲夫保義副尉趙公墓誌公諱彦姓趙氏世為真定藁城人祖某父某皆農隠不仕公少剛果敢為無畏惮天眷間朝廷以南伐徵兵公適出有司即取公兄公聞即走歸自陳彼才力不我若請自代遂行不一辭妻子人義而壮之㑹事平還天資純質治生尤勤儉細故躬親不懈服食器皿期於僅足自餘無毫毛非分用日夕蹙蹙恒若不足教諸子孫及所以語他人亦唯是見諸惰侈者咄嗟惡棄殆不能與言故卒大其家以名一邑承安二年以耆老受官保義副尉後二年冬十一月庚子終享年八十有八素康彊少疾至是猶能日自興起行步了無牀枕滯将終謂其子淵曰吾常歎人之子孫鮮克以義終祖宗積累之業一旦不難割散之骨肉相視一旦如道路人惡孰甚焉爾其帥下以嚴處之以均無怠無頗無速乖離以隳我家其孫曰元英者以進士擢第則又特戒曰惟爾所獲亦惟我祖宗實有虞爾無遂獨庇爾𦙍必及其餘以答我祖宗意其遺志如此初娶靳氏先公卒晩娶張氏子三人長曰汴以從軍官至敦武校尉次曰温皆早卒淵其季也女四人長適靳氏次傅氏次周氏王氏男孫八人幼者二餘悉克自立亦既或有後女孫九人幼及寡者三餘悉得所歸噫公之所享多矣富貴夀康子孫蕃昌人或一二之不獲公則兼之兹不多歟故其歿也君子無大恨其家歿後二十一日塟諸先塋祔以靳氏而責銘於若虚若虛於公為舊親既又為孫壻故辭而不得免銘曰萬事畢一生足斯而慊焉復何欲新宫孔固惟吉卜左右前後皆其族安其神樂其真以利其嗣人焚驢誌嵗巳未河朔大旱逺邇焦然無主賴鎮陽帥自言憂農督下祈雨甚急厭禳小數靡不為之竟無驗既久恠誣之說興適民家有産白驢者或指曰此旱之由也雲方興驢輒仰號之雲輒散不留是物不死旱胡得止一人臆倡衆萬以附帥聞以為然命亟取将焚之驢見夢於府之屬某曰寃哉焚也天禍流行民自罹之吾何預焉吾生不幸為異類又不幸墮乎畜獸乗負駕馭惟人所命驅叱鞭箠亦惟人所加勞辱以終吾分然也若乃水旱之事豈其所知而欲寘斯酷與孰誣我者而帥從之禍有存乎天有因乎人人者可以自求而天者可以委之也殷之旱也有桑林之禱言出而雨衛之旱也為伐邢之役師興而雨漢旱卜式請烹宏羊唐旱李中敏乞斬鄭注救旱之術多矣盍亦求諸是類乎求之不得無所歸咎則存乎天也委焉而已不求諸人不委諸天以無稽之言而謂我之愆嘻其不然暴巫投魃既已迂矣今兹無乃復甚殺我而有利於人吾何愛一死如其未也焉用為是以益惡濫殺不仁輕信不智不仁不智帥胡取焉吾子其屬也敢私以訴某謝而覺請諸帥而釋之人情初不懌也未幾而雨則彌月不解潦溢傷禾嵗卒以空人無復議驢哀鴈詞昔予居故人安仲和家将殺鴈食客見而不忍為作哀之之詞今三十餘年矣近讀趙公誡殺生文有動於心因追録之以附其後雖文采不足觀者取其意可也鳥之逺害宜莫如鴻浩浩長風寥寥逺空邈乎㝠濛去萬里而無窮顧乃不幸而網羅之中刀機是委饔飱是充吁嗟乎其恫爐且熾鼎且沸宰夫礪刃而欲前坐客垂涎而思噬而猶神意自若低囘睥睨不知禍期之行至可不哀邪捕者伊何貪於貨鬻用者伊何恱乎口腹我利我欲物罹其酷是以知人雖有生之至靈而亦其至毒也髙而林莽深而川淵逺而窮邊倮鱗介羽胎卵濕化皆有以致之而陳乎其前刲割臠膾蒸燔烹煎濯腥滌羶窮甘極鮮一邑之内一朝之間已有不可勝言者矣人亦嘗以已而推之乎一毛之去皆知惜寸膚之損皆知病所以自待如此其至也而獨於物不為之少憐雖吾之智力可役而君之而彼之蠢愚至死而不能訴然其賦形禀氣同得於天故亦未嘗不苦則惨而樂則舒惡夭閼而重生全奈何暴殄不恤以為當然孰雪其寃孰懲其愆豈天有厚薄固以彼而奉此乎抑初無所主而自生自殖自攘自擊勢彊者勝而專不然何其太偏也庖厨之逺君子以為仁巳既不忍則假手於他人夫其畏怖之情觳觫之態可以想而知也何必見之之素臨之之親聞之曰物我類也類無分别滋味之在我可賖性命之於彼極切至哉言乎即是佛說亦何必持守誡律推明罪業觀地獄之變相指兵刀之凶刼人惟為饞舌之所謾是以安為而不屑嗚呼戒之敢告来哲髙思誠詠白堂記有所慕於人者必有所恱乎其事也或取其性情徳行才能技藝之所長與夫衣服儀度之如何以想見其髣髴甚者至有易名變姓以自比而同之此其嗜好趨向自有合焉而不奪也吾友髙君思誠葺其所居之堂以為讀書之所擇樂天絶句之詩列之壁間而榜以詠白盖将日玩諸其目而諷誦諸其口也一日見告曰吾平生深慕樂天之為人而尤愛其詩故以是云何如予曰人物如樂天吾復何議子能於是而存心其嗜好趨向亦豈不佳然慕之者欲其學之而學之者欲其似之也慕焉而不學學焉而不似亦何取乎其人耶盖樂天之為人冲和静退達理而任命不為榮喜不為窮憂所謂無入而不自得者今子方遑遑於禄之計求進甚急而得䘮之念交戰於胷中是未可以樂天論也樂天之詩坦白平易直以寫自然之趣合乎天造厭乎人意而不為竒詭以駭末俗之耳目子則雕䥴粉飾未免有侈心而馳騁乎其外是又未可以樂天論也雖然其所慕在此者其所歸必在此子以少年豪邁如川之方增而未有涯涘則其勢固有不得不然者若其加之嵗年而博以學至於心平氣定盡天下之變而返乎自得之場則樂天之妙庶乎其可同矣姑俟他日復為子一觀而評之門山縣吏隠堂記門山之公署舊有三老堂盖正寝之西故㕔之東連甍而稍庳今以之舘賔者也予到半年葺而新之意所謂三老者必有主名然求其圖誌而無得訪諸父老而不知客或問焉毎患其無以對也既乃易之為吏隠吏隠之說始於誰乎首陽為拙柱下為工小山林而大朝市好竒之士徃徃舉為美談而尸位苟禄者遂因以藉口盖古今恬不之怪嗟乎出處進退君子之大致吏則吏隠則隠二者判然其不可亂吏而曰隠此何理也夫任人之事則憂人之憂抱闗擊柝之職必思自效而求其稱嵓穴之下畎畆之中毉卜釋道何所不可隠而顧隠於是乎此姦人欺世之言吾無取焉然則名堂之意安在曰非是之謂也謂其為吏而猶隠耳孤城斗大𦕈乎在窮山之巔煙火蕭然強名曰縣四際荒險惨目而傷心過客之所顧瞻而咨嗟仕子之所鄙薄而棄置非廹不得已者不至也始予得之親友失色弔而不賀予固戚然以憂至則事簡俗淳便於踈懶頗有以自慰乎其心及西陲多警羽檄交馳使者旁午於道路而縣以僻阻獨若不聞者隣邑疲於奔命曾不得一日休而吾常日髙而起申申自如冠帶鞍馬幾成長物由是處之益安惟恐其去也或時與客幽尋而曠望䕃長林藉豐草酒酣一笑身世两忘不知我之屬乎官也此其與隠者果何以異吾聞江西筠州以民無嚚訟任其刺史者號為守道院夫郡守之居而得以道院稱之則吾堂之榜雖曰隠焉其誰曰不可哉恒山堂記真定古名鎮形勢雄壮冠於河朔其府署規模適相稱副而恒山堂宏麗特出又為之甲焉堂廣七楹其髙九仞望之鬱鬱如翬斯飛俯瞰北潭備諸勝槩求其經始於何代與夫主名之為誰則圖誌無傳近世沈括言潭園初號海子未甚可觀逮王鎔治之遂若圖畫斯堂或者亦出於其時乎而吴中復詠行宫以為宋祖征劉承鈞常駐蹕於此故老或云堂即宫之南門而卒莫能詳也其在金國率王侯貴戚處之例事豪奢務加增飾故益以完美毎府僚宴集其上綺羅照野絲管沸天㳺人指㸃咨嗟邈在仙境誠一邦之偉觀也兵火之餘署舎盡廢獨堂在焉而嵗月既深寖至頺弊大元乙酉中萬戸史公實来公以妙齡貴顯而居具慶之下日思所以奉二親之歡謂可以備燕息而資觀覽者莫堂若也由是特為之作新易腐朽補罅漏支持欹傾凡當營理者靡不及之盖朞月而後畢則大饗賔客稱觴為壽以落其成而遣使致書屬予為記噫予去國三十年白首歸来時移事改田廬鄉井殆不可復識追惟曩昔渺如隔生豈知尚有恒山堂耶夫物之盛衰其極必反廢興成毁相尋於無窮盖理之常然而不足怪然皆有數存乎其間自喪亂以来繁華共盡崇樓傑觀莫不化為虚空如斯堂者絶無僅有固已幸矣而復為有力者新之宛然舊物閱世自如豈可謂偶然哉抑此不足論也予聞之有非常之功者必享非常之福公以上将之才膺方面之寄定亂措安澤被於生民甚厚功孰大焉宜其窮侈美極尊榮快意一時無不可者顧乃自安於儉陋而致美乎其親賢於衆人逺矣是則不可以不著且予平生欲一登堂臨眺而竟不果今既辱公知當得預賔席之末因之寓目以償夙心亦殘年之一適也於是乎書滹南集巻四十三
