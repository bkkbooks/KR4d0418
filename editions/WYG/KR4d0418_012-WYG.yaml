body:
  text: 滹南集巻十二金王若虚撰史記辨惑議論不當辨史氏之評因人事之善惡而正其是非以示勸戒而禆教化故可貴也遷之賛田完徒謂易術幽明非通人逹才莫能注意此固不必道者而又云田乞及常所以比犯二君專齊國之政非必事勢之漸然盖若遵厭兆祥則亂臣賊子皆得以天命自觧而無所懲也豈史氏之所宜言乎孔子世家賛云余讀孔氏書想見其為人夫聖人道徳光被萬世雖鄙夫孺子皆知之矣而遷因讀書始想見其為人之大概非所宜言仲尼弟子傳賛云學者多稱七十子之徒譽者或過其實毁者或損其真鈞之末覩厥容貌則論言弟子籍出孔氏古文近是余以弟子名姓文字悉取論語弟子問并次為篇疑者闕焉予謂論人者亦據其行事而已豈必容貌之覩以貌取人孔子或失之而遷顧以為凖乎且遷所引雜說鄙事有不足信矣又豈皆論語之所載也魏世家賛云說者皆曰魏以不用信陵君故國削弱至於亡余以天方令秦平海内其業未成魏雖得阿衡之佐曷益乎此大謬之說也魏之亡既廹於秦興而非人謀之所能救則秦之亡亦廹於漢興而無可為者也而遷於本紀乃取賈生之論以不任忠賢罪二世何哉夫無忌之徒固未足以益國然遷之失言不得為無罪也循吏傳賛云孫叔敖出一言郢市復子産病死鄭氏號哭公儀子見好布而家婦逐石奢縱父而死楚昭名立李離過殺而伏劒晋文以正國法無乃少評論縂結之語乎吕不韋賛曰孔子之所謂聞者其吕子乎按孔子所謂聞者似逹而非者也雖不取於君子然不韋亦不足當之也項羽傳賛云吾聞之周生舜目盖重瞳子聞項羽亦重瞳子羽豈其苖裔耶何興之暴也陋哉此論人之形貌容有偶相同者羽出舜後千有餘年而獨以此事遂疑其為苗裔不亦迂乎商均舜之親子遺體在焉然不聞其亦重瞳也而千餘年之逺裔乃必重瞳邪周生何人所據何書而上知古帝王之形貌正復有據亦非學者之所宜講也夫舜以𤣥徳升聞四岳薦之帝堯試之上當天心下允衆望然後踐天子之位其得之固有道矣豈專以異相之故而暴興者哉使舜果由此而興則羽之成功亦應畧等奚其不旋踵而𠞰滅也遷資輕信愛竒初不知道故其謬妄毎如此後世状人君之相者類以舜瞳為美談皆史遷之所啟而後梁朱友敬自恃重瞳當為天子因作亂伏誅亦本此誤之也悲夫司馬遷賛蕭何云與閎夭散宜生争烈賛韓信則云可以比周召太公之徒賛周勃則云伊尹周公何以加夫史氏擬人必於其倫不可不慎也以何信等軰而上方三代聖賢談何容易哉至論張耳陳餘則又譏其異於太公季子遷之品藻陋矣遷論壺遂云天子方倚以為相㑹遂卒不然壺遂之内亷行修斯鞠躬君子也夫鞠躬特折身耳而以為君子之盛徳何也且天子以輔相期之而充其所有纔止於是乎李廣傳云其射見敵急度不中不發發即應弦而倒用此其将兵數困辱其射虎亦多為所傷此在隂里容或有之然亦失之臆料非史氏所可必者也汲鄭賛無他褒貶獨嘆其有勢則賔客十倍無勢則否至并載翟公署門事此何足道而著之史評哉滑稽傳首云孔子曰六藝於治一也禮以節人樂以發和書以道事詩以道意易以神化春秋以道義太史公曰天道恢恢豈不大哉談言㣲中亦可以觧紛夫天道恢恢已不見發明滑稽之意而六藝之事又何所干涉也貨殖傳云無嵓處竒士之行而長貧賤好語仁義亦足羞也貧賤而羞固已甚謬而好語仁義者又可羞乎遷之罪不容誅矣外戚世家序云夫婦之際人之大倫也禮之用唯婚姻為兢兢夫樂調而四時和隂陽之變萬物之統也可不慎與人能𢎞道無如命何甚哉妃匹之愛父不能得之於子况卑下乎既驩合矣或不能成子姓能成子姓矣或不能要其終豈非命也哉孔子罕稱命盖難言之也非通幽明之變惡能識乎性命哉夫一婦人之遇否亦不足道矣且凡人事孰非命者而遷於此反覆致意何其費辭也人能𢎞道之語其意尤踈滹南集巻十二
