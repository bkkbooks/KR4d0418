body:
  text: 滹南集卷三十四金王若虚撰文辨相如上林賦設子虚使者烏有先生以相難答至亡是公而意終葢一賦耳而蕭綂别之為二綂不足怪也至遷固為傳亦曰上覽子虚賦而善之相如以為此乃諸侯之事故别賦上林何哉豈相如賦子虚自有首尾而其賦上林也復合之為一邪不然遷固亦失也張衡二京一賦也而文選析為二首左思三都一賦也而析為三首若以字數繁多一卷不能盡之則不當稱某京某都而各云一首也豈後人編集者之誤而不出于綂歟然世説載庾亮評庾闡南都賦謂可以三二京而四三都乂何也晉宋史載淵明歸去來辭云善萬物之得時感吾生之行休巳矣乎寓形宇内復幾時曷不委心任去留胡為皇皇欲何之已矣乎之語所以便章而為斷猶系曰亂曰之類則與上文不相屬矣故當以時字之字為韻其留字偶與前休字相協而己後之擬者自東坡而下皆雜和之然則果孰為韻邪近見陶集本作能復幾時此為可從葢八字自是兩句耳然陶集云胡為乎遑遑兮欲何之殆不可讀却宜從史所載也劉禹錫問大鈞賦云楚臣天問不酬今臣過幸一獻三授上二句脱兩字何卜賦云時乎時乎去不可邀來不可逃淹子孰捨操夫操所以對捨也上當脱三字又云董子毒豕苓雞首之賤毛亦有脱誤處禹錫集文粹所載皆然安得善本而考之東坡杞菊賦云或糠覈而瓠肥或粱肉而墨瘦諸本皆同近觀秘府所藏公手書此賦無瓠墨二字固當勝也東坡詩論其末云嗟夫天下之人欲觀于詩其必先知夫興之不可與比同則詩之意可以意曉而無勞而其中又有云嗟夫天下之人欲觀于詩其必先知比興此十六字葢重複也不惟語言為贅其於上下文理亦自間斷此灼然可見而諸本皆無去之者葢相承其誤而未嘗細考也左氏文章不復可議惟狀物論事辭或過繁此古今所知也如韓原之戰晉侯乘鄭駟慶鄭以其非土產而諫之言其進退不可周旋不能足矣至云亂氣狡憤隂血周作張脉僨興外彊中乾何必爾邪左氏書晉敗於邲軍士爭舟舟中之指可掬獻帝紀六帝渡河不得渡者皆爭攀船船上人以刃擽斷其指舟中之指可掬劉子元稱邱明之體文雖缺略理甚昭著不言攀舟以刃斷指而讀者自見其事予謂此亦太簡意終不完未若獻帝紀之為是也洪邁容齋隨筆云石駘仲卒有庻子六人卜所以為後者曰沐浴佩玉則兆五人者皆沐浴佩玊石祁子曰孰有執親之喪而沐浴佩玉者乎不沐浴佩玉此檀弓之文也今之為文者不然必曰沐浴佩玉則兆五人者如之祁子獨不可曰孰有執親之喪而若此者乎似亦足以盡其事然古意衰矣慵夫曰邁論固髙學者不可不知然古今互有短長亦當參取使繁省輕重得其中不必盡如此説也沐浴佩玉字實多兩處夫文章惟求真是而已須存古意何為哉邵氏云讀司馬子長之文茫然若與其事相背戾伯夷傳曰予登箕山其上有許由冢意果何在下用富貴如可求雖執鞭之士吾亦為之歲寒然後知松栢等語殊不類其事所以為宏深髙古歟視他人拘拘窘束一歩武不敢外者膽智甚薄也慵夫曰許由之事何關伯夷遷特以其讓國髙蹈風義略等而傳聞可疑因附見耳然亦不足為法也若夫富貴不可苟求歳寒知松柏等此正合其事矣安得為不類且為文者亦論其是非當否而已豈徒以膽智為貴哉遷文雖奇疎拙亦多不必皆可取也邵氏之言太髙而過正將誤後學予不得不辨洪邁云司馬遷記馮唐救魏尚事其始曰魏尚為雲中守與匈奴戰上功莫府一言不相應文吏以法繩之其賞不行而又申言之曰且雲中守魏尚坐上功首虜差六級陛下下之吏削其爵罰作之重言雲中守及姓名而文益遒健有力今人無此筆也予謂此唐本語自當實録何關史氏之功若以文法律之則首虜差級削爵罰作之語宜移于前而前語復換于後乃愜葢始言者其事而申言者其意次第當如此耳重言官職姓名其實冗複吾未見其益健也宋末諸儒喜為髙論而往往過正詎可信哉洪邁云文之繁者各有當史記衞青傳云校尉李朔校尉趙不虞校尉公孫戎奴各三從大将軍獲王以千三百户封朔為渉軹侯以千三百戸封不虞為隨成侯以千三百戸封戎奴為從平侯前漢書但云校尉李朔趙不虞公孫戎奴各三從大将軍封朔為渉軹侯封不虞為隨成侯封戎奴為從平侯减史記二十三字然不若史記樸贍可喜予謂此本不足論若欲較之則封戸之實當從史記而校尉之稱漢書為勝也司馬遷之法最踈開巻令人不樂然千古推尊莫有攻其短者惟東坡不甚好之而陳無已黄魯直怪歎以為異事嗚呼吾亦以千古雷同者為不可曉也安得如蘇公者與之語此哉晉張輔評遷固史云遷叙三千年事止五十萬言而固叙二百年事乃八十萬繁省不同優劣可知此兒童之見也遷之所叙雖號三千年其所列者幾人所載者幾事寂寥殘缺首尾不完往往不能成傳或止有其名氏至秦漢乃始稍詳此其獲疎略之譏者而反以為優乎且論文者求其當否而已繁省豈所計哉遷之勝固者獨其辭氣近古有戰國之風耳邵公濟嘗言遷史杜詩意不在似故佳此繆妄之論也使文章無形體邪則不必似若其有之不似則不是謂其不主故常不專蹈襲可矣而云不在似非夢中語乎唐子西云六經已後便有司馬遷三百篇已後便有杜子美故學文當學司馬遷學詩當學杜子美其論杜子美吾不敢知至謂六經巳後便有司馬遷談何容易哉自古文士過于遷者何限而獨及此人乎遷雖氣質近古以繩凖律之殆百孔千瘡而謂學者專當取法過矣馬子才子長游一篇馳騁放肆率皆長語耳自古文士過于遷者為不少矣豈必有觀覧之助始盡其妙而遷之變態亦何至于是哉使文章之理果如子才所説則世之作者其勞亦甚矣其言弔屈原之魂云不知魚腹之骨尚無恙者乎讀之令人失笑雖詩詞詭激亦不應爾况可施于文邪葢馬氏全集其浮誇多此類也洪邁謂漢書溝洫志載賈讓治河策云河從河内北至黎陽為石隄激使東抵東郡平岡又為石隄使西北抵黎陽觀下又為石隄使東北抵東郡津北又為石隄使西北抵魏郡昭陽又為石隄激使東北百餘里間河再西三東凡五用石隄字而不為冗複非後人筆墨畦逕所能到予謂此實冗複安得不覺然既欲詳見其事不如此當如何道葢班氏之美不必言是特邁過愛而妄為高論耳退之於前人自班固以下不論以予觀之他文則未敢知若史筆詎可輕孟堅也揚子雲解嘲云為可為于可為之時則從為不可為于不可為之時則凶此不成義理但云為于可為之時為于不可為之時或云可為而為之不可為而為之則可矣陳後山曰揚子雲之文好竒而卒不能竒故思苦而辭艱善為文者因事出竒江河之行順下而已至其觸山赴谷風摶物激然後盡天下之變子雲雖竒故不能竒也此論甚佳可以為後學之法退之送窮文以鬼為主名故可問答往復揚子雲逐貧賦但云呼貧與語貧曰云云恐未安也謝靈運嘗謂天下才有一石子建獨八斗我得一斗古今同得一斗茅璞辨其不然慵夫曰此自狂言又何足論然璞復云可當八斗者惟坡云亦恐不必道坡文固未易及要不可以限量定也凡為文有遥想而言之者有追憶而言之者各有定所不可亂也歸去來辭將歸而賦耳既歸之事當想而言之今自問途而下皆追録之語其於畦逕無乃窒乎巳矣乎云者所以總結而為斷也不宜更及耘耔嘯詠之事退之感二鳥亦然歸去來辭本是一篇自然真率文字後人模擬已自不宜况可次其韻乎次韻則牽合而不類矣庾信哀江南賦堆垜故實以寓時事雖記聞為富筆力亦壯而荒蕪不雅了無足觀如崩于鉅鹿之沙碎于長平之瓦此何等語至云申包胥之頓地碎之以首尤不成文也杜詩云庾信文章老更成凌雲健筆意縱横今人嗤㸃流傳賦未覺前賢畏後生嘗讀庾氏諸賦類不足觀而愁賦尤狂易可怪然子美推稱如此且譏誚嗤㸃者予恐少陵之語未公而嗤㸃者未為過也張融海賦不成文字其序云竒哉海之壯也壮哉海之竒也何等陋語滹南集卷三十四
