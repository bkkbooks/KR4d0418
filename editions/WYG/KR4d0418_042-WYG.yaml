body:
  text: 滹南集巻四十二金王若虚撰千户賈侯父墓銘保塞賈侯嘗識予於東垣丁酉夏六月不逺八舎致書見招至則館其家禮意甚厚已而言曰某也不天生六嵗而失怙恃今四十年矣而未有紀述而不朽之託負愧良深雖不及誌諸幽猶得以表其隧某既幼孤家譜世系不復能知而先君之事幸存其大略敢丐一言以傳信嗚呼墓有碑碑有文所從来尚矣且禮不忘其本而孝莫大於顯親親有善而揄揚之大書深刻以申其追慕尊崇之意此天道之自然人情之同欲而子職之所當盡者也不亦務乎吾觀近世自一介之㣲稍躋貴顯者爭先樹建以為華榮螭首龜趺亭亭相望宜我侯之不敢緩也既辱侯知能勿成其美按公諱􅀈字巨平祁之蒲隂人其先皆隠徳不仕公長身美風姿賦性淳篤事父兄以孝悌聞待交朋以忠信稱鄉黨宗族莫不服其吉徳而又重氣莭急患難有貸其錢者雖至百萬不問償期議者以為難初長兄儀次兄成憐公晚生父母屬念且公等幹蠱可嘉故曲極友愛儀子弗嗣屢請析居儀輒紿曰二親既有命書矣卒舉貲産付公州貳髙君亦謂其可妻也以女歸焉承安丁巳春三月以疾終於家享年五十九即以其月塟於里之先塋公凡四娶皆同郡巨室子而最後為李氏尤賢淑備婦徳男一人曰輔李所出即侯也一女適宋氏男孫三女孫二人當貞祐兵火之餘城邑幾廢遺黎無依侯以完復安輯之功為衆所推由本縣尉至為州刺史及歸聖朝勲績益著自招撫使累遷河北東西等路左副都元帥甲午中朝廷更定官稱選充行軍千户云侯儀度魁傑胷次灑落其才術噐識類皆不凡而愛民喜士為河朔稱首盖一代之偉人也嗚呼源流則深長本根固則枝葉茂物有常理君子毎以為積善獲福之喻視履考祥以人占天如影響之敏符契之不可無也昔有預髙閭門俾容軒盖手植庭槐期生三公者初若妄意已而果然㝠㝠之中昭昭者存焉是故即其所享可以推其始之所自来由其所為可以卜其終之所必至夫何疑哉侯以妙年遭遇驟至顯榮富貴功名無不如志諸子岐嶷稱其家兒此决非出於偶然者固足以知其世積之善矣而躬行之實不替益隆於先有光又可見其方来之報則賈氏之餘慶殊未艾也是宜書故書之而系以銘曰厥土惟腴厥木惟敷有崇其丘於城之隅閟之深封之固過者必恭賈公之墓太一三代度師蕭公墓表太一之教興於金朝天眷間衛郡蕭真人其始祖也靈異之跡上動至尊勅賜觀名曰太一萬壽世嗣其法一再傳而得師焉師諱志冲字用道博州堂邑人本姓王氏祖某父某並受真人法籙師幼頴悟誦書日千言而沉静寡言不好戯弄年十六父兄議婚師曰性喜出家不願娶也強之不可因而逃去隠於冠氏李守竒家遂與守竒詣衛州叅二代師為門弟子始事尊宿霍子華子華故有淹疾師侍奉惟謹前後十年無懈倦之色或衣不解帶者數月人以為難大定十六年朝廷普試僧道師初宻誦經文人人不知一旦中選儕類甚驚及當給據言於考官曰師兄蕭道宗累被黜落年過四十乞以據授道宗某方壮徐為後圖未晩也考官不許而多其讓十七年授度保充衞州管内威儀領教門事二代師将退席宻語道宗曰吾門徒數萬而試經具戒者完顔志寕及王某而已志寕資雖明敏而頗輕肆非主教之才不如王某純粹亷潔為可屬乃以為法嗣而改其姓凡法嗣皆從蕭氏盖祖師之訓也師素不為辭章及升堂諭衆隨意而言悉成文理勸戒深切聴者聳然内外相慶以為宗門得人矣居無何有司奏選四方髙徳之士補住中都天長觀師首應之既而河犯郡城居人徃徃他徙而本觀道衆亦旅寓於蘇門師聞而還聲望既隆求教者接跡而至歲所傳無慮數千人先是汲縣閻村有觀曰朝元荒廢已久而額籍且存師請於官遷於西門墳園之側以處其衆明年河復本觀殿宇頺毁且盡師次第繕完尋復一新而增創者幾倍所費不貲明昌間前尚書右丞劉公偉自大名移鎮河中道出淇上謁師甚恭州倅移刺者先以常流待師見劉公加禮心猶疑之其後數屏人獨徃而師常静坐無為因問先生於此有何受用師曰静中自有所得非語言可以形容若無得者雖片時不能安况終身乎其人乃服曰劉公誠有知矣師自重修觀舎深居簡出外人多不識其面承安改元日食正旦父老懼災請師作醮於神霄宫士庶畢集師少時白晳而癯至是色如紫玉目光炯然冠佩整肅若自天而下觀者嘆仰以為真人復生也少長貴賤悉歸禮之泰和初章廟春秋已髙皇嗣未立設普天大醮於亳之太清宫間嵗報謝師皆與焉五年河南道士籍少阮以再祈皇嗣被召過師問之師曰向来作醮例遣重臣所在供擬多傷物命其違天意甚矣自今宜罷之至於與醮官吏皆須禁止葷酒務行善事庶可達誠雖然再三則凟亦恐徒勞耳籍至闕以勿遣重臣為言上可之而令籍詣太清行事如初師與俱徃既又同赴中都太極宫誦經百日時户部侍郎胥鼎方提控寺觀恐師南還率朝士十餘候之曰今明主臨朝尊𤣥重道天長􅅻廢隨建此宫如師者人天眼目不容遽去也㑹宫衆亦堅挽之遂勉為留七年大蝗上遣中官問提㸃郭元長禳治法元長敕其徒閲道藏求之師從傍曰道藏如海豈易討尋就使有之亦未敢必其應吾祖真人嘗留經籙三百餘階内有祕章今可用也遂取以進上喜曰天垂此教以利生民即命師依科作醮比行禮大雨師呪信香一粒禱於真人其雨立止翼日有㫖問蝗絶之期對以三日據法有灑壇符而灑時當留一面使蝗有所歸師則留其西西乃大山也及期則羣飛入山而死詔加賞賚師固辭曰道人救物安用賞為上曰真道人也當别議旌表郭元長告免提㸃職詔師繼之仍賜號元通天師内人賈病逾年諸醫莫療上曰此非藥餌所能及前禳蝗王某殆是異人或能起之師奉命直抵宫闈治以符水而愈宫闈非閹寺不得到盖以道重師也衞紹即位特賜上清大洞法服一襲當時榮之師嘗謂人生貴適意顧名雖尊顯而身甚勞浩然有休息志乃因胥公舉汾西李大方以自代而歸實大安二年之春也一日集衆曰祖師立教代代相承如續燈然無有窮盡今弟子中蕭輔道者祖師再從孫吾當付之於是退處西堂髙拱淵黙不復以世務闗意貞祐二年四代師主亳之太清師亦從焉四年閏七月丙午忽謂門人曰速具湯沐吾将歸寂門人亟加冠履未畢而逝有鶴數十旋繞久之時天氣猶暑閲餘旬而體不變八月庚申權殯於宫之塋其日隂晦重甚衆方以時刻為疑俄樹杪雲開如席許得以不悮已而隂晦如故又聞香風四来送者幾萬人咸嘆異之初師之将誕也有桑生於宅中不半嵗成樹比十年其髙數尋状如層樓世所未見至是亦無故而枯相與始終尤可怪訝也師平生無喜愠恂恂似不能言至遇事而發雖衆所難决者三數語輒定老荘之外兼通諸史諸書而尤長於左氏春秋其智識有大過人者享年六十六戒臈四十自號元朴子云四代師字公弼既返河朔将復迎師骨以祔於真人而求所以表其墓者俾予文之公弼一世偉人所交皆天下之士而竊幸與之游昔已嘗為作真人傳矣而又有兹命是不以蕪陋見鄙也義不得辭則據其事状而具著焉清虚太師侯公墓碣師諱元仙字子真趙州人也大父澄以胥史起身至河北西路漕司掾才幹既優而行已無玷尤以孝友著稱議者謂不見用於時則必有得於道母歿慨然曰所以區區塵土間者為親故也今不侍養復何為哉聞淇上蕭真人立太一大教因徃叅為門弟子真人一見愛之授名道净傳太一三元法得以便宜行化乃即本州及真定之第各建太一堂奉持香火以符藥濟人大定二年凡釋道之居無名額者許進輸賜之公遂投牒以在州道院為太清觀而在府者為迎祥真人毎批經籙必先授公而後傳前後千品公曰天寶下降要當永刼流行一日去世誰其保之宻禱上真願於私屬生繼嗣其後男琳得子相貌殊常即師也生不茹葷始學語能辨三官之像少長嬉戯則教羣兒禮北斗澄大喜以為祈禱有徵而得所托矣㑹朝廷鬻祠牒由是度為道士年十四已克主大醮詞音清亮夐出一時儕輩翕然稱服明昌初以髙徳應詔入住中都天長觀自泰和改元國家事祈禳連設大醮羽流極天下之選而師皆與焉仍常居要職出諸人右功完賞賚甚渥賜紫衣徳號曰觀妙尋佩符馳傳降御香於岱嶽常白等山頃之以親老辭歸鄉里崇慶間召住太極宫用進補軍儲恩改授今號宣宗南廵被命入汴提控上清宫勅有司一依天長故事逾年而退未幾太清宫請為宗主三返益勤不得已應之時院門凌替殆莫能支加以嵗賦數百斛為病尤甚師下車未浹旬以状上聞悉獲蠲免衆賴其庇已而拂袖棲遲於洧川正大庚寅正月為喜士左崇等作醮於鈞臺法事勝絶舉壇忻幸以為未始遇也既畢将還忽示㣲疾衆欲召醫候之師不許曰世縁已盡自可長徃安用療為越三日日中命置髙座而處之顧至未刻則口占一頌舉首端坐頂中戞然有聲两手握子文而逝時年六十九矣逺近士庶炷香禮拜者累日神色宛如生人乙酉焚化於郭西從遺命也下火之際紫雲見其北蒼鶴十數翔舞空中移時乃散送者幾萬人莫不以手加額嗚呼異哉其超脱明白如此亦世所罕聞也丙戍塔於潁濵之崇真觀予素知師名而不及識毎以為恨然嘗與其門人正悟詮㳺悟詮業履清修而讀書好事亦落落不凡者以大元辛丑年正月二十日改塟師於平棘縣明信鄉之鄭村原屬予銘其墓渠意既堅而竊亦樂為之道也乃叙而銘之曰其生也為賢其殁也為仙人而如此足矣又何加焉著之琬琰以永其傳贈昭毅大将軍髙公墓碣慶源軍節度使髙侯因教授王君進士陳生来見曰不肖不天生四年而先君捐館舎訓誨不得聞奉養不及致其為不幸可知也逮其成長事與心違曷勝風樹之悲顧瞻松楸未嘗不流涕太息今将刻石墓隧以垂之無窮事實始末雖不能詳而故老所傳猶能見其為人之大畧兹敢以託予謝非其才而請益堅重以王陳雅故義不可辭則勉為之叙次曰公諱顯髙邑人其先皆農隠弗耀公敦朴簡静而辭色温温接物極愷悌輕財務施喜周困窮其事親處兄弟孝友尤篤至教人亦必先此里閭宗戚無貴賤疎近交口稱為吉人無間言者明昌七年五月壬午以疾終於家享年四十即塟其鄉之先塋夫人韓氏婦徳無缺亦著賢譽後公十九年卒子三人長曰慶終本縣丞次曰進不仕次曰添禄即莭度也男孫四人女三人正大中以莭度恩特贈昭毅大将軍夫人封號如例初莭度當再罹兵火之後冦盜並興道路蓁蕪城邑頺廢而能紏集義旅撫安遺黎内守外攘以鳩完復之功闔境晏然遂成樂土有司嘉其能擢栢鄉令累遷令職治聲甚美公望甚重其福禄方隆而未艾異時所至詎有量者嗚呼積善之家必有餘慶不及其身則在其後物有定理聖賢有成言古今有同然之效昭乎其不可誣也今患不能為善為之未始無徵髙氏世居畎畝沒沒於常流殆與草木共腐而一旦子孫蕃昌門地烜赫以為邦人之榮推原其自豈偶然也哉是誠可書故揭之以勸來者而系以銘曰身雖不顯而後也昌壽雖不永而所存者長褒䘏有命紀述有章以播其芳以揚其光是之謂不亡滹南集巻四十二
