body:
  text: 滹南集巻四十四金王若虚撰鄜州龍興寺明極軒記鄜為州在深山窮谷間荒凉鄙陋其風土固然無池䑓苑囿之觀可以娱人者官閑無事散步而盤桓不過道流釋子之居耳而龍興寺明極軒最為佳處由三門廵廊而西其偶為雄師院而院之東南則明極在焉其始為隙地故莭度郝公見而愛之謂其爽塏便安可以為待賔之所顧而命雄此軒户所以構也深静而明夏凉而冬燠髙纔丈許而平揖前山俯瞰闤闠視縁山諸刹勢欲與之爭衡也始予以狂放不覊為上官所捃宴㳺戯劇悉禁絶之雖所親愛非公故不得相徃来逄於道路斂避辭謝莫敢立談者出門倀然其無歸也深居髙卧讀書以自遣而久復無聊因思所謂道流釋子之居而時一訪之宴坐清談焚香煑茗猶得差樂而無罪盖大像之致爽開元之冷筠皆所素愛而嘗㳺者然以其登涉之艱固不若明極之為数雄亦開朗好客樂與予言而不厭由是有興輒至至輒為留竟日公退飯餘呼馬而出僕夫或不請所之知其必適是也比及其門呵喝有聲主人者趍迎而笑知其必為吾也予嘗以雄見待之厚許為作記以報之而未果其後官事日繁而私禁稍寛非役於簿書期㑹之勤則奪於聲色紛華之樂而予之蹟至明極者有數矣與雄相見未嘗不笑且歎焉今将東歸雄以前言為請嗚呼吾負此軒乆矣是猶可得而辭乎乃書其地形畀之大槩與夫平昔游行之熟者以授之若其命名之意則出於西方之書非予之所學也略而不及以待夫知其說者茆先生道院記嵩山之陽有承天谷谷有道院焉隠君子茆公之所建也公開封人名從易字縉甫始以進士干有司數竒不偶乃棄家為方外㳺隨意去留初無定居既至承天則欣然曰吾可以休於是矣闢地築室為終焉計日葺月補蓋累年而後有成軒曰雙清以景名也庵曰虚静以道命也竹木蕭然都無塵土氣由是為嵩陽之一觀夫嵩少海内名山其間勝跡殆不可殚紀蕞爾茒公之廬宜若無足道者而人嘗以不到為恨到必盤桓而不忍去則亦以其主人之賢故也公以髙蹈聞四方賢愚少長莫不仰其風觀其擺落世紛棲心於冲漠之境始終四十年處之甚安壽考康寕翛然而徃非胷中真有所得疇能爾耶時羣盗縱掠而公夷然視之神色自若且能化暴為馴使之逡廵退却而不敢犯非獨自免而又有以庇人其道徳所服至於如此豈老氏所謂虎無所措其爪兵無所容其刃者歟予世之散人也才能無取於人而功名不切於已雖寄跡市朝而丘壑之念未嘗一日忘慕公而願見者久矣俗累拘牽竟莫之遂盖毎為之歎息嗚呼公則已矣而其姪守明與予為忘形交出公所繪院圗及所以自叙者請記其事予披玩再三恍如即其地而見其人忽焉自失益覺官味如嚼䗶守明亦自可人由刀筆中一朝有所省年踰四十而屏酒肉却聲色日與名流達士㳺學貫三家略窺其妙其剛果超詣庶幾能嗣公者予雖不及識公而有斯人在㑹當同徃杖屨相從訪公之故居而躡其遺蹤卧公白雲䕃公青松逍遥倘徉以卒嵗乎其中公之精爽故應不昧或者其亦一笑而見容也乃為書之既以發茆公之光且為吾他日踐言之盟云趙州齊叅謀新修悟真庵記趙州道院曰悟真庵者叅謀齊君大年之所建也君鄜畤人也開朗倜儻久行善事壬辰中從軍河南既還留寓於趙因而家焉自以荐經喪亂而卒獲安存生理益優身名俱遂無不足於心者盖神明之所相也思有以荅謝殊貺亦其天資本静道念素深故買城隅特建此庵以待全真之士且為他年歸宿之所云肇基於甲午之春凡再期而訖役聖位雲堂齋厨方丈總為屋十餘楹像設供具隨事一新繚以崇垣抱以隙地藥畦蔬圃井井可觀雖宏麗未極而體則具矣喧囂既逺境界清凉灑然有絶塵之趣居人瞻仰莫不懽喜讃嘆自是一方逺近以至過客皆知有齊氏之庵大師李公曰圓明子者故與君逰乃延致而奉之其徒無慮三十人君色色資給無外求者稍暇無事婆娑其間顧而樂之自謂有所得也予數以事至趙始也聞其經營再則覩其次第三則及其成就焉一日造之盤桓周覽殆欲忘還君因以記文為請予與大年三十年之舊有命自不當辭况其用心之果為力之勤寔可喜而足稱耶抑予衰矣險阻備嘗煩勞久厭閱興亡之大變悟榮辱之真空殘喘僅存百念灰冷方當脫屣俗累優㳺蕭灑以畢其餘生雖不足與聞𤣥理厠迹羽流而杖屨徃来陪君為方外之友庶無愧焉至其㑹意忘形不知孰主孰客則君之庵猶我有也能勿成其志乎乙未年終十二月晦日滹南遺老記荅張仲傑書某啟仲傑縣令方深渴想辱惠好音曷勝慰喜氊根之賜甚惬老饕正恐踏破菜園為藏神所怪耳所論道學自是儒者本分事抑老夫衰謬日負初心不足進也吾子年壮氣鋭乃能屏去豪華之習而專力於此好之樂之自謂有得他時所至殆未可量老夫将受教之不暇而反能為之發藥哉州郡之職古稱人况此多虞必道頗聞吾子一以和緩處之所望正如此民之憔悴久矣縦弗能救又忍加暴乎君子有徳政而無異政史不傳能吏而傳循吏若夫趍上而虐下借衆命以易一身流血刻骨而求幹濟之譽今之所謂能吏古之所謂民賊也誠不願吾子效之吾儕讀孔孟仁義之書其用心自當有間寕獲罪於人無獲罪於天昔宋討元昊闗右困於征斂杜祁公在永興謂其民曰吾非能免汝也而能使之不勞於是量所有無寛其期限民得以次而輸之而費省十六七及王氏法行官吏不堪其廹邵康莭門人之從仕者皆欲投檄以歸康莭止之曰此正賢者用力時新法甚嚴能寛一分則民受一分之賜嗚呼古人逺矣如此䓁事尚可行之造次顛沛無忘是念始可謂不忘所學矣老人家益貧而宦益拙鮎魚上竿可笑可閔雖然逺依餘庇大小幸安不必過煩念慮也遽中奉報草草不宣道學發源後序韓愈原道曰孟軻之死不得其傳其論斬然君子不以為過夫聖人之道亘萬世而常存者也軻死而遂無傳焉何耶愚者昧之邪者蠧之駮而不純者汨之而真儒莫繼則雖存而幾乎息矣秦漢以来日就㣲滅治經者局於章句訓詁之末而立行者陷於功名利欲之私至其語道則又例為荒忽之空談而不及於世用髣髴疑似而失其真支離汗漫而無所統其弊可勝言哉故士有讀書萬巻辨如懸河而不免為陋儒負絶人之竒莭髙世之美名而毫釐之差反入於惡者唯其不合於大公至正之道故也韓愈故知言矣然其所得亦未至於深㣲之地則信其果無傳已自宋儒發揚秘奥使千古之絶學一朝復續開其致知格物之端而力明乎天理人欲之辨始於至粗極於至精皆前人之所未見然後天下釋然知所適從如權衡指南之可信其有功於吾道豈淺淺哉國家承平既久特以經術取人使得叅稽衆論之所長以求夫義理之真而不專於傳䟽其所以開廓之者至矣而鳴道之說亦未甚行三數年来其傳乃始浸廣好事者徃徃聞風而悅之今省庭諸君尤為致力慨然以興起斯文為己任且将與未知者共之此發源之書所以汲汲於鋟木也學者嘗試觀之其必有所見矣心術既明趣向既正由是而之焉雖至於聖域無難猶發源不已則汪洋東注放諸海而後止嗚呼其可量哉亦任之而已矣僕嘉諸君樂善之切為人之周而喜為天下道也故畧書其末云東垣王某序揚子法言㣲㫖序法言之行於世尚矣始注釋者四家而已踈畧粗淺無甚可觀其後益而為十二互有所長視其舊殊勝而猶未盡也今禮部尚書趙公素嗜此書得其機要因復為之訓解参取衆說析之以已見號曰分章㣲㫖論髙而意新盖竒作也予嘗竊怪子雲之自叙以為法言論語之體耳隨問更端錯雜無次而獨取篇首二字以為名而冠之無乃失其宜耶及觀公解則終始貫穿通為一義燦有條理而不亂乃知子雲之意初非苟然但學者未之深考也昔人以杜預顔師古為丘明孟堅忠臣今公於子雲之書辨明是正厥功多矣至於進退隠見之際尤為反覆而致意使千載之疑可以盡釋而無遺恨兹不亦忠之大者歟古澤陳氏者将購工板行以廣其傳友人張君茂進實賛成之而屬予為序嗚呼公一代巨儒徳業文章皆可師法自少年名滿四海間平生著述殆不可勝紀而晚年益勤心醉乎義理之學六經百子莫不討論迄今孜孜筆不停輟其所以發揮徃典而啟廸来者非特一書而止也如鄙不肖曷足為公重輕而斯書之傳豈待予言而後信雖然陳氏細民而能好事如此其用心固已可喜且不肖於公門下士也辱知為深是區區者而敢辭乎乃書而授之元光元年九月望日中議大夫守平凉府判王某序送王士衡赴舉序潦浄途平風髙氣清馬駿車輕送君此行顧非掩泣於湓浦悲歌於渭城者何必愴怏而含情雖然有以規子也親老弟弱室廬蕭然燠寒華枯将於子乎屬之所責重矣尚其朂哉决科猶戰也請以戰喻肩摩踵曳鱗集毛萃盱衡厲吻扼腕揚袂賈餘勇而嘗素技者皆吾敵也攘而却之吾子亦勞矣寕執非敵武王所以誓衆臨事而懼仲尼所以語門人賁育之不戒童子扼之魯雞之不期蜀雞踣之勍敵在前若之何勿畏吾子講學甚力涵養且久則兵既厲而馬既秣矣然而猶有病焉氣揚而無降志色驕而無俯容或者其将振而矜之歟懼猶不足又振而矜之恐乘隙擣虚瑕者畢堅而勝負之勢未可料也鞌之役不介馬而馳之齊師敗績伐羅之舉趾髙而心不固莫敖以亡厥監不逺吾子其圖之吾子辱與不肖㳺又辱賜之誠是行也竊将鼓譟以從其後不幸而北其曷忍諸㨗音一報凱歌言還兹豈惟君子之所獲抑不肖實與光焉敢不盡言聞之曰仁者送人以言仁者之名豈賤子所堪抑朋友之道将善也故以告送吕鵬舉赴試序始予得管城而将行也故人王士衡實送之且見屬曰或稱鄭下有一佳少年而不詳其姓名苐聞筆勢翩翩可以與之進也子以經學嗣名師之傳而為後生之倡者有年矣則誘翼成就豈得辭其責乎予謝而識之既至而求之得吾鵬舉焉聴其議論窺其文辭知其必士衡所謂也輒不自量欲遂薄有所云以補萬一而官事如毛無頃刻暇盖未嘗不為之嘆息今鵬舉方将求售於春官余若復黙黙無乃負士衡之所教乎夫經義雖科舉之文然不盡其心不足以造其妙辭欲其精意欲其明勢欲其若傾故必探語孟之淵源擷歐蘇之菁英削以斤斧約諸凖䋲斂而莭之無乏作者之氣象肆而馳之無失有司之度程勿怪勿僻勿猥而并若是者所向如志敵功無勍可以髙視而横行矣沽美玉者不憂無善價騂犢且角山川其舎諸鵬舉勉矣京邑英豪所聚而士衡在焉予既因士衡以得子子其因予而求識士衡復因士衡徧求吾師友門人之凢未識者磨礱浸灌以益其髙而極其逺至於大有成焉而副吾徒之望可也送彭子升之任兾州序成王戒卿士以謂推賢讓能則庶官和不和政且亂而秦穆之誓亦曰人必能容而後可以保民古之君子有道相為徒而其徒相為用故能有濟也有虞之時衆賢和於其朝而無乖争之患垂讓於殳斨伯夷讓於䕫龍臯陶之不知者以問諸禹禹所不知者以質諸益賢於已而不妬不賢於已而不侮師於人而不恥告於人而不吝志同氣合不知物我之為二盖其量識宏而其徳誠厚此其能共成代之極治者歟予嘗悲夫昔人之難見而病後世士風之薄也忌嫉之心勝而推讓之道絶自待者重待人者輕相誇以其所長而相鄙以其所短鰓鰓然惟恐人之愈乎我也凡得一職必先審問其同僚者何如人聞其不能而不已若也則幸而喜如其能焉徃徃不樂曰是何以彰我故其至也莫不角其智力而争其權至於不相容以敗事處公家之事而敗之以其私罪孰大焉吾子始踐仕途而得李君者為長官彼其才幹有餘而能聲既著盖吾子之幸也而吾子性明志強臨事有决亦自為過人者誠能相與戮力而無求勝之心一司之治何憂而不舉哉子行矣幸不至如吾之所病且併謝李君其亦以是而待子焉可也滹南集巻四十四
