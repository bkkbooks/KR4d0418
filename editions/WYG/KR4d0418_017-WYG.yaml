body:
  text: 滹南集巻十七金王若虚撰史記辨惑疑誤辨酈生說髙祖復立六國後張良發八難古今稱頌以為美談竊嘗有所疑焉彼其言曰湯伐桀而封其後於祝者度能制桀之死命也今陛下能制項籍之死命乎武王伐紂而封其後於宋者度能得紂頭也今陛下能得項籍之頭乎此論甚疎夫桀紂已滅然後湯武封其後而良云度能制桀死命得紂之頭豈封於未滅之前邪且湯武所以封之者重絶人之世耳非以計其利害也奈何其以項籍之命為比哉酈生所以說帝者特欲係衆人之心庶㡬叛楚而附漢耳非使封諸項氏也柰何其以湯武之事勢相較哉湯武雖殊時事理何異制死命與得其頭亦何以分而列為兩節表商容之閭釋箕子之拘封比干之墓此夲三事而良并之者以其一體也至於倒置干戈歸馬放牛獨非一體乎而復析之為三何哉班氏頗見其非而乃并湯武事為一而但云度能制其死命豈以死命字不屬桀紂而屬其後歟然終與項籍事不類也既以湯武為一事故又分楚惟無强以下為第八節盖二書已自参差矣近世胡寅謂是時髙祖未稱尊而子房呼陛下作史者之過也然則八難之目安知其無誤邪漢書老父相吕后及二子皆貴及見髙祖曰鄉者夫人兒子皆以君如淳曰以或作似顔氏破其說當矣然史記正作似豈誤歟酈生既自有傳而朱建傳後又叙生初見沛公及下陳留事大同小異而詞頗浮誇此必禇先生輩附入之猶田仁之類也漢文以公主嫁匈奴使宦者中行說傅之說不欲行漢强之曰必我行也為漢患者漢書但云必我而無行字此恐錯誤若曰為漢患者必我也或云必我行為漢患矣如此乃順司馬相如傳賛云相如雖多虛辭濫說然其歸引之於節儉此亦詩之諷諌何異揚雄以為靡麗之賦勸百而諷一猶馳騁鄭衛之聲曲終而奏雅不亦戱乎前漢書全引此語予嘗疑之按遷傳雖不著其死之嵗月然去遷既死後其書稍出宣帝時遷外孫楊惲祖述其書遂宣布焉則其死不過在昭宣之間耳而雄以成帝元延之初始自蜀逰京師年七十一卒於王莽天鳳五年逆而推之宣帝之二十年雄乃始生遷著書時安得雄之言乎是必孟堅所續而後人誤附於史記耳公孫𢎞主父偃賛云公孫𢎞行義雖脩然亦遇時漢興八十餘年矣上方嚮文學招進又以廣儒墨𢎞為舉首主父偃當路諸公稱譽之及名敗身誅士争言其惡悲夫舉首字下意似不足豈有闕文乎滹南集巻十七
