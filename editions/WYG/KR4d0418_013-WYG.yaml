body:
  text: 滹南集巻十三金王若虚撰史記辨惑文勢不相承接辨吕不韋使華陽夫人姊說夫人曰以色事人者色衰而愛弛今夫人事太子甚愛而無子不以此時早自結於諸子中賢孝者舉以為嫡而子之夫在則重尊夫百嵗之後所子者為王終不失勢此所謂一言而萬世之利也中間文勢蹉跌不相承接范雎至秦秦王使舎食草具待命嵗餘當是時昭王已立十六年嵗餘下接不得當是時字樂毅使於燕昭王以為亞卿久之當是時齊湣王彊陳平長可娶妻富人莫肯與貧者平亦耻之久之户牖里富人有張負女孫五嫁而夫輙死平欲得之李廣嘗有罪當斬贖為庶人頃之家居數嵗皆同病也范増勸項梁立楚後梁乃求楚懐王孫心民間為人牧羊立以為楚懐王文不相接不若云時懐王孫心民間為人牧羊梁求得之為順也留侯世家末云子房始所見下邳圯上老父與太公書者後十三年從髙祖過濟北果見榖城山下黄石取而葆祠之文勢不接不若云始下邳老父所言黄石後十三年從髙祖過濟北果見於榖城山下蕭相國世家客說相國曰君胡不多買田地賤貰貸以自汚上心乃安不相承接韓信傳云其勢非置之死地使人人自為戰今予之生地皆走寕尚得而用之乎不相承接甚矣汲黯傳云匈奴昆邪王来降至京師賈人與市坐當死者五百餘人黯曰夫匈奴攻當路塞絶和親中國興兵誅之死傷不可勝計而費以巨萬百數臣愚以為陛下得胡人皆以為奴婢以賜從軍死事者家所鹵獲因以予之以謝天下之苦塞百姓之心今縱不能昆邪率百萬之衆来降虚府庫賞賜發良民侍飬譬若奉驕子愚民安知市買長安中物而文吏䋲以為闌出財物於邉闗乎陛下縱不能得匈奴之資以謝天下又以㣲文殺無知者五百餘人是所謂庇其葉而傷其枝者也剰今縱不能一句不唯語意重叠而其畛畦亦不通也滹南集巻十三
