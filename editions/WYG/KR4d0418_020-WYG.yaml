body:
  text: 滹南集巻二十金王若虛撰諸史辨惑五帝之名史記以黄帝為首書序以少昊為首其說不同要之少昊黄帝之子顓頊黄帝之孫帝嚳黄帝之曽孫而堯帝嚳之子也初皆傳之子孫至於堯舜其子不肖不足以付大器乃始有禪讓之事斯盖不得已之變而或者遂云五帝官天下三王家天下何其妄也皇降而帝帝降而王名號之異耳堯舜揖讓湯武征誅世變之殊耳若夫其道則未嘗不一而商鞅說秦孝公乃謂初以帝道再以王道魏徴亦云行帝道而帝行王道而王鄭厚又云王道備而帝徳消皆淺陋之見也父死子繼天理人情之常也自天子至庶人自王至霸自古至今未有能易者其或及於旁支付諸他姓則必其勢所當然而出於不得巳可謂之變而不可以為常也而漢人之說曰殷道親親立弟周道尊尊立子殷道質質者法天親其所親故立弟周道文文者法地敬其本始故立長子周道太子死立適孫殷道太子死立其弟此何所稽也天下無二道聖人無兩心故曰前聖後聖其揆一也典章制度時或損益不同至於名教人倫豈容殊致尊親之道孰可偏廢而云殷獨親親周獨尊尊非謬妄乎盖秦漢以來言三代者每每如此以殷紀觀之誠多立弟然在當時必有其故而初非湯之定法也若其果主於親親則一於立弟矣何復待太子死而後及邪抑嘗考之河亶甲崩子祖乙立祖乙崩子祖辛立小乙崩子武丁立武丁崩子祖庚立此皆在世立子者也庚丁崩子武乙立武乙崩子太丁立太丁崩子帝乙立帝乙崩子辛立此則四世立子者也其間沃甲崩則立其兄祖辛之子祖丁祖丁崩則立其弟沃甲之子南庚此則廢適而立姪者也安在其太子死而専立弟耶紀又云自中丁以來廢適而更立諸弟子弟子或爭相代立此九世亂諸侯莫朝盖立不以正宜其啓爭奪之端是何足以貽久逺而謂成湯之法固如是乎嗚呼世之學者自非詩書易春秋語孟之正經一切異說不近於人情者雖託以聖賢皆當慎取不可輕言也左氏文章所謂毫髪無遺恨者惟參舉人名字頗為不愜如邲之戰既稱士㑹復曰隨武子又曰隨季又曰士季既稱郤克復曰駒伯又曰郤獻子初稱荀林父而後稱桓子初稱先縠而後稱彘子大率皆然不可殫舉一叚之文而錯雜如是向無注釋讀者孰知其為一人邪雖無害其美要之不潔而近代碧溪黄徹極稱其變態可法且以諸史列傳首尾一律為不足取殆難與論真是也劉子元曰韓王本名信都而遷固輒去都字用使稱其名姓全與淮隂不别按韓王韓國之後其姓為姬襲封於韓而非姓也又加王字有何不别然遷於絳侯傳固作淮隂等賛亦稱兩韓信而髙祖紀八年又云上擊韓信餘冦東垣何邪遷固記事元有得失如史記孝文紀云髙祖中子也髙祖十一年春已破陳豨軍定代地立為代王都中都太后薄氏子漢書云髙祖中子也母曰薄姬髙祖十一年誅陳豨定代地立子桓為代王固之序薄氏文順於遷矣而加子桓二字復為贅也班固漢書删潤遷史徃徃勝之然亦有反不及者如史記髙祖聞田横死曰嗟乎有以也夫起自布衣兄弟三人更王豈非賢乎哉漢書但云嗟乎有以起布衣其語太簡讀之殆不可曉也漢文帝以公主嫁匈奴使宦者中行說傅之說不欲行漢強使之說曰必我行也為漢患者史記如此而漢書但云必我而無行字此恐錯誤若曰為漢患者必我也或云必我行為漢患矣如此乃順史記文帝紀云張武受賂金錢事覺上發御府金錢賜之以愧其心彼受金錢而復以金錢賜之可以為媿漢書但云更加賞賜則泛而不明矣史記司馬相如傳曰天子曰可徃從悉取其書使所忠徃而相如死班固加若後之矣四字此句為贅且若字意乖不若不加之愈也髙祖謂沛父兄曰其以沛為朕湯沐邑注引風俗通義曰沛人語初發聲皆言其其者楚言也髙祖始登帝位教令言其後以為常耳予謂不然戒辭用其字自是本法古文如是者何可勝舉而云楚語獨爾不亦妄乎袁盎論社稷臣云主在與在主亡與亡言以身徇主與之同存亡耳如淳曰人主在時與共治在時之事不以主亡而不行其政令何其曲邪史記匃奴傳賛曰世俗之言匃奴者患其徼一時權而務讇納其說以便偏指不參彼已将率席中國廣大氣奮人主因以决䇿是以建功不深注以彼已将率為句既不成文而理又不順其釋彼已引詩彼已之子殊為牽强吾犮崔伯善云當以不參彼已為句而将率字屬下文其說良是漢書韓彭等傳賛云唯呉芮之起不失正道故能傳號五世以無嗣絶慶流支庶有以矣失著於甲令而備忠也末句不相承前漢車千秋本姓田氏以其為丞相時詔許乗車入宫因號車丞相此一時所稱非乆逺轉而為姓又非上之所賜也班固作傳止當著其本姓而遂從車字何邪黄霸雖以治郡稱然既嘗為相自當附之韋賢匡衡等傳而班史列於循吏非也班固論江充王莽事皆以為有天時而非人力夫人固不勝於天矣然班氏身為史官以褒貶勸懲為務則亦不當立此論也後漢郭太字林宗范曄作傳以父諱止稱林宗亦可矣而中間復數稱太左慈字元放既稱其名而又兩稱為放不亦雜乎老蘓評范曄之失謂不當槩董宣於酷吏槩鄭衆吕强於宦者槩蔡琰於列女其論董宣蔡琰是矣若鄭衆吕强雖有可嘉豈可改宦者之目乎漢書髙祖紀云老父相髙祖曰向者夫人嬰兒皆以君以或作似顔氏以為非當矣然史記正作似字豈其誤邪史記髙祖縱觀秦皇帝喟然太息曰大丈夫當如此漢書作大息此只是太字盖古人所通用而師古云言其歎息之大過矣髙祖繇咸陽縱觀秦皇帝張騫傳曰大角觝出竒戯諸怪物多聚觀者顔注皆音工喚反至相如封禪書云天下之壮觀則讀如字大似顛倒也髙祖縱觀秦皇帝師古曰縱放也天子出行放人令觀予謂此於文勢為悖恐只是恣觀之耳裴矩傳煬帝時諸蕃胡入貢令武威張掖士女盛飾縱觀縱字當准此例髙祖紀曰如意㡬代太子者數焉丙吉傳曰皇孫病㡬不全者數焉元后賛曰吕霍上官㡬危國者數矣凡此等數字盖言數次耳史記稱汲黯多病上常賜告者數如淳曰數者非一也餘皆准此當讀如字而顔氏訓頻並音所角反狄山曰兵凶器未易數動宣帝曰太守吏民之本數變易則下不安黄霸曰數易長吏人因縁為姦此等正當訓頻而反讀如字恐未當也南越尉佗謂陸賈曰使我居中國何遽不若漢何遽猶言豈便也與越大夫種言何遽不為福同意而注云有何迫促而不如漢張敞誅絮舜時冬月未盡數日敞使人語之曰冬月巳盡延命乎此言雖春近而不得免耳而注云汝不欲望延命乎霍光傳任宣謂霍禹曰百官以下但事馮子都王子方等視丞相亾如也亡如者如無耳猶蔑如之類而注云無所象似是皆何理邪齊王肥與諸侯書言吕后比殺三趙王文紀詔言間者數嵗比不登梁孝王傳云十四年入朝十七年十八年比年入朝何武傳曰孝成孝哀比世無嗣公孫賀傳曰丞相李蔡等三人比坐事死膠西王端傳云端數犯法天子弗忍誅有司比再請削其國夫比者連併之義耳顔注皆訓頻似是而實差殊學者試細味之文帝問馮唐曰父老何自為郎家安在師古曰言年己老何乃自為郎也崔浩以為自何為郎非也予謂漢之郎選其塗非一有以父兄任子弟為郎者如張安世袁盎是也有以富貲為郎者漢儀注謂貲五百萬得為常侍郎如張釋之司馬相如是也有以獻䇿上書為郎者婁敬主父偃是也有以孝著為郎者唐是也而衛綰又以戱車為郎以是觀之浩說為勝而顔氏遽斷其非其自信亦太篤矣申屠嘉劾奏鄧通戯殿上無禮文帝曰君勿言吾私之私只是愛幸之意猶所謂弄臣者耳而師古以為欲私數戒恐非也不然一私字詎能兼教戒之義邪賈誼言秦俗之弊云其慈子嗜利去禽獸亡㡬以文勢觀之慈子當是錯誤顔氏强為解釋恐非也田蚡以肺附為相師古舊說云如肝肺之相附着也一云肺斫木札喻其輕薄附著大材也餘肺附字皆然其義迂曲不足信按此語皆本於史記今史記諸本並作腑字盖言其親宻如肺腑猶股肱心膂之類耳不知孟堅如何轉而為附或者古字通用而史記索隠反音腑為附謬矣汲黯拜淮陽太守謝曰臣常有狗馬之心今病力不能任郡事師古以病力為句曰力謂甚也訓力為甚未知何據予初謂此字當屬下句及讀史記則云黯常有狗馬病而通鑑但云有病乃知力字屬下無疑盖孟堅誤析其辭故守師古之妄而新唐喬琳傳云從幸梁州辭病力蕭俛授少師辭疾力不拜此又因顔注而失也滹南集巻二十
