body:
  text: 滹南集巻十五金王若虚撰史記辨惑字語冗複辨舜本紀云瞽叟更娶妻而生象象傲瞽叟愛後妻子常欲殺舜舜逃避及有小過則受罪順事父及後母與弟日以篤謹匪有懈後又云舜父瞽叟頑母嚚弟傲欲殺舜舜順適不失子道兄弟孝慈欲殺不可得即求常在側字語冗複而兄弟孝慈一句亦不成義理周本紀齊世家稱武王觀兵諸侯不期而㑹盟津者八百諸侯諸侯皆曰紂可伐矣無乃剰諸侯諸侯字冗衞世家云宣公以子伋為太子令右公子傅之右公子為太子娶齊女未入室而宣公見所欲為太子婦者好悦而自取之何不但云宣公見其美而煩重如是乎又云齊女子朔讒惡太子伋宣公乃使伋於齊而令盗遮界上殺之與太子白旄而告界盗見持白旄者殺之何若但云使伋於齊與之白旄而令盗於界上視持旄者殺之乎又云朔之兄壽知朔之惡太子而君欲殺之也乃謂太子曰界盗見太子白旄即殺太子太子可毋行何若但云知之以告太子使毋行乎又云太子朔是為惠公左右公子不平朔之立也惠公四年左右公子怨惠公之讒殺前太子伋而代立乃作亂語意重複但存不平朔之立一句足矣又云翟殺懿公也衞人憐之思復立宣公前死太子伋之後伋子又死而代伋死者子壽又無子此但云思復立太子伋之後而伋子亦死壽又無子可也安用許多字邪趙世家云趙朔友程嬰謂公孫杵臼朔之婦有遺腹若幸而男吾奉之居無何而朔婦免身生男多朔婦免身字子貢傳云子貢一出存魯亂齊破吴强晋而覇越子貢一使使勢相破五國之中各有變文意重複矣越世家云荘生謂陶朱公長男曰若自入室取金長男即自入室取金但云男即取之可也曹沬為魯将與齊戰三敗北魯荘公懼乃獻遂邑之地以和柯之盟沬刦齊桓公乃許盡歸魯之侵地既而桓公欲背其約管仲曰不可於是桓公乃遂割魯侵地曹沬三戰所亡地盡以予魯但云桓公乃從可矣何必重叠如此孔子世家云其先宋人也孔防叔至叔梁紇禱於尼丘得孔子生而首上圩頂故因名曰丘云字仲尼姓孔氏既云孔防叔又言孔子生何必更注姓氏乎鄭世家云孔子嘗過鄭與子産如兄弟云及聞子産死孔子為泣曰古之遺愛也兄事子産予謂言孔子為泣則聞字亦着不得或只云及聞其死泣曰更為簡省也夫既如兄弟而子産年長則何必復言兄事哉兼已死之後及此其次第亦不應爾春申君言所幸李園女弟於楚王楚王召入幸之遂生子男立為太子以李園女弟為王后楚王貴李園園用事李園既入其女弟為王后子為太子恐春申語泄而益驕隂飬死士欲殺春申君以滅口自園用事以下冗複重濁殆不可讀以精當律之當云園用事益驕恐春申語泄隂飬死士欲殺之以滅口楚考烈王卒李園盡滅春申君之家而李園女弟初幸春申君有身而入之王所生子者遂立是為楚幽王予謂遷先記李園女弟事既已詳悉備見則於此但云園女弟所生子立直云太子立足矣何必費辭如是趙簡子疾五日不知人既寤語大夫曰我之帝所有一熊欲來援我帝命我射之中熊熊死又有一羆來我又射之中羆羆死予謂中熊字不湏要中羆事但云我又射殺之可也趙襄子滅智伯豫讓曰智伯知我我必為報仇而死以報智伯則我魂魄不愧矣多以報智伯字石奢為楚相行縣道有殺人者追之乃其父也縱其父而還自繫焉但云縱之可也趙奢傳云亷頗之免長平歸也失勢之時故客盡去免歸即失勢時也何必再下此句魯仲連傳云仲連逰於趙趙成王時秦兵圍邯鄲魏安釐王使客将軍間入邯鄲因平原君謂趙王曰趙誠發使尊秦王為帝秦必喜罷兵去平原君猶豫未有所决時魯仲連適逰趙會秦圍趙聞魏将欲令趙尊秦為帝乃見平原君曰云云此文理重複但云仲連聞之乃見平原君可也仲連謂新垣衍曰吾将使秦王烹醢梁王新垣衍曰噫嘻亦太甚矣先生之言也多先生言字必欲存之當在太甚字上聶政欲為嚴仲子刺韓相侠累仲子請益車騎壮士為輔翼政言不可遂謝車騎人徒聶政乃辭獨行仗劒至韓多聶政乃辭四字又云刺殺侠累因自皮面决眼自屠出腸遂以死何必遂字又云韓取聶政屍暴於市購問莫知誰子於是韓購縣之有能言殺相侠累者予千金久之莫知也政姊嫈聞人有刺殺韓相者賊不得國不知其名姓暴屍而縣之千金乃於邑曰云云但言政姊嫈聞之於邑豈不簡快乎又曰市行者諸衆人皆曰此人暴虐吾相國多諸衆人字李斯出獄與其中子俱執顧謂其中子曰多下其中子三字張儀傳云趙襄令工人作為金斗長其尾令可以擊人與代王飲隂告厨人曰即酒酣樂進熱啜反斗以擊代王殺之但云厨人如其言擊殺之范雎傳云須賈謂范雎曰非大車駟馬吾固不出范雎曰願為君借大車駟馬於主人翁范雎歸取大車駟馬此當云願為君借於主人翁即歸取車馬項羽紀諸侯無不人人惴恐無不人人字意重項羽紀云漢王與韓信彭越期㑹擊楚軍至固陵而信越之兵不㑹張子房曰君王能自陳以東傅海盡與韓信睢陽以北至榖城以與彭越使各自為戰則楚易敗也漢王乃發使者告韓信彭越曰并力擊楚楚破自陳以東傅海與齊王睢陽以北至榖城與相國此當云發使者告之也留侯世家云良與客狙擊秦皇帝秦皇帝大怒大索天下求賊甚急為張良故不須言為良意韓信傳云漢王欲拜信為大将諸将皆喜人人各自以為得大将多各自字至拜大将乃韓信也一軍皆驚此但當云至拜一軍皆驚曹参世家云卿大夫以下吏及賔客見参不事事来者皆欲有言至者参輙飲以醇酒来者至者重複又云相舍後園近吏舍吏舎日飲歌呼從吏惡之無如之何乃請参逰園中聞吏醉歌呼從吏幸相國召按之曷若但云乃請参逰園中幸其聞而召按也叔孫通以惠帝作複道勸之立原廟上乃詔有司立之則立廟之由已自見矣而復云原廟起以複道故此句安用哉前漢削之當矣陳丞相世家云始陳平曰我多隂謀是道家之所忌吾世即廢亦已矣終不能復起以我多隂祻故也然其後曾孫陳掌以衛氏親貴戚願得續封陳氏然終不得多两然字多隂祻一句亦不湏也賈生傳云懐王墮馬而死無後賈生自傷為傅無状哭泣嵗餘亦死賈生之死時年三十三矣不必再言賈生之死馮唐言李牧之事云當是之時趙幾覇其後趙王遷立其母倡也王遷立乃用郭開讒卒誅李牧再言王遷立何也張釋之傳文帝問上林尉諸禽獸簿尉左右視盡不能對虎圏嗇夫從傍代尉對上所問禽獸簿甚悉止云從傍代對甚悉豈不善乎張釋之傳人有盗髙廟坐前玉器捕得文帝怒下廷尉廷尉治釋之案律盗宗廟器者為奏不須廷尉治三字又曰有如萬分之一假令愚民有盗長陵一抔土但云有如或云萬一或云假令足矣煩重如此殆不可讀申屠嘉傳云是時大中大夫鄧通方隆愛幸文帝常宴飲通家其寵如是是時丞相入朝而通居上傍有怠慢之禮再下是時字不唯文勢重叠意亦不惬也其寵如是一句亦不必道嘉困辱通上使使者召通既至為文帝泣多為文帝字鄧通傳云文帝崩景帝立劉子𤣥謂不必言帝崩固當矣然遷史類此者甚多夫文景相繼猶或可也至賈生傳云孝文崩孝武皇帝立即隔景帝而亦書之豈不愈無謂也袁盎稱文帝西嚮讓天子位者再南嚮讓天子位者三何必重言天子位太倉公傳云詔召問所為治病死生驗者幾何人主名為誰詔問故太倉長臣意方伎所長及所能治病者有其書無有皆安受學受學幾何嵗嘗有騐何縣里人也何病醫藥已其病之状皆何如具悉以對文勢重叠如此是必前者遷所叙而後乃當是時詔語倉公引之耳不必并而為一云詔召問曰意對曰則簡而明矣吴王濞傳云景帝與吴太子博争道引博局提殺之吴王由此稍失藩臣之禮稱病不朝京師知其以子故不朝稱病但當云知其故也寗成遷濟南都尉而郅都為守如前數都尉皆步入府因吏謁守如縣令其畏郅都如此及成徃直陵都出其上剰其畏郅都如此一句王温舒為河南太守捕郡中豪猾郡中豪猾連坐千餘家不須再道郡中豪猾司馬相如病甚天子曰可徃從悉取其書使所忠徃而相如已死家無書問其妻對曰長卿固未嘗有書也時時著書人又取去即空居長卿未死時為一巻書曰有使者来求書奏之無他書其遺札書言封禅事奏所忠奏其書天子異之其書曰凡用十書字何其煩也若云相如已死其妻曰長卿固未嘗有書時有所著人又取去且死獨遺一巻曰有使者来即奏之其書乃言封禪事也既奏天子異焉其辭云云不亦可乎李廣見草中石以為虎而射之中石沒鏃視之石也因復更射終不能復入石矣凡多三石字當云以為虎而射之沒鏃既知其石因復更射終不能入或云嘗見草中有虎射之沒鏃視之石也亦可又云其射見敵急非在數十步之内度不中不發度不中三字重叠若此句存則上句宜去也又言廣自頸軍士大夫一軍皆哭但云一軍足矣或去此二字亦可汲黯傳云東越相攻使黯徃視之不至至吴而還多不至字鄭當時傳云存諸故人請謝賔客夜以繼日至其明旦常恐不徧剰其明旦字申公傳云天子問治亂之事申公時巳八十餘老對曰云云伏生傳云年九十餘老不能行老字贅矣竇太后使轅固入圏刺豕正中其心一刺豕應手而倒多一刺豕字張湯傳云湯嘗病天子至自視病當作視之或云臨視也又云三長史皆害湯欲陥之據下文不須用此語觀者可見又云或告湯姦事下减宣宣嘗與湯有隙及得此事窮竟其事當云窮竟之也郭觧傳既稱為人短小精悍不飲酒而後又云為人短小不飲酒何邪雒陽人有相仇者觧夜見仇家仇家曲聼觧觧夜去不使人知曰且無庸待我待我去令雒陽豪居其間乃聼之疑重用待我字貨殖傳云魯人曹邴氏以鐵冶起富至巨萬鄒魯以其故去文學而趍利者以曹邴氏也既言以其故則不必更云以曹邴氏也匈奴傳云單于頭曼欲廢太子冒頓作為鳴鏑習勒其騎射令曰鳴鏑所射而不悉射者斬之行獵禽獸有不射鳴鏑所射者輙斬之前後凡用八鳴鏑字據文勢相蒙其餘可盡去也晋張輔論遷固史云遷記二千年事而五十萬言固記二百年乃八十萬言繁簡不同優劣可知此說大謬劉子𤣥既辨其大莭矣抑予嘗考之遷記踈略而剰語甚多固記事詳偹而刪削精當然則遷似簡而實繁固似繁而實簡也安得以是為優劣哉滹南集巻十五
