body:
  text: 滹南集巻二十三金王若虛撰新唐書辨東漢時㑹稽父老送劉寵曰自明府下車以來狗不夜吠民不見史盖愛譽甚之之辭耳新史云李栖筠為常州刺史捕斬賊黨皆盡里無吠狗田仁㑹為勝州督捕格夙賊夷之城門夜開道無冦跡實録之事不當爾也或謂史記王温舒傳亦稱無犬吠之盜何如曰史記之謬亦多矣渠皆可法乎楊收初以兄假未仕不肯應舉既假釋褐乃擢進士第其後同臺為監察御史世榮其友大以兄未仕而不應舉者友也兄弟同臺者榮也二事不相須而云世榮其友此何理邪劉子元傳云撰劉氏家史及譜按據明甚議者髙其博髙字亦非為文字語雖貴簡而有不得簡者韋𢎞景傳云楊虞卿造其門𢎞景厲聲言曰有詔按公尚私謁耶惶恐去不少虞卿字否此類非一觀者可見孫伏伽言三字但云其一其二其三而無曰字文理無乃不屬乎言讀書之勤者例曰手不釋巻而子京撰蒋義傳獨巻不釋於前此何謂也前人文字言騷動騷然者矣安禄山傳云百姓愈騷裴冕傳云大衆一騷馬燧傳云天下方騷無乃太簡乎李靖論蕭銑士卒云藉以拒師本非情杜如晦傳云僚属共才之莫見所涯李勉朝京師詔還所鎮三所字下不得藉以拒師亦不成語王義方彈李義府髙宗怒其毁辱大臣言詞不遜故貶之新史云帝恨義方以孤生觸宰相朱泚遣韓旻迎徳宗秀實以為宗社之危期於頃刻乃倒用司農印追之新史云秀實以為宗社之危不容喘豈不過哉薛萬均死太宗嘗賜羣臣膜皮及萬徹而誤呼萬均愴然曰萬均朕之舊勲不覺呼名豈其䰟靈欲朕之賜新史則云忽口其名纔下口字便是從已作用之意豈所謂不覺者乎况此等字史家自不宜使肅宗欲以李輔國為常侍苗晉卿奏曰常侍近宻非賢不可居豈宜任等輩罷之等輩上當加此字不然何等輩也邢文偉傳云武后問天帝異事文偉不得對房琯論第五琦言利事肅宗詰之琯不得對王叔文傳云俱文珍詰折叔文不得對得字為悖止當云不能耳杜正論傳云為世歆羨戴至徳傳云世詫其榮蕭復傳云士艶其榮敬晦傳云世寵其家寵字尤不安若只作時人榮之大小本分王義方譽振一時呉湊美譽四騰皆非史家之體也李義府傳云自其斥天下憂且復用比至内外乃安嚴震傳云徳宗使馬勛計日取張用誠赴行在踰半日期帝頗憂比至大喜比字不安若及既等字可也溫庭筠數舉進士不第思神速多為人作文大中末試有司亷視尤謹庭筠不樂上書千餘言然私占授者已八人作文云者本謂代進士科舉之作耳今乃似泛為文字者此亦失之不明也温彦博傳云進止詳華人皆拭目觀進止之間何至拭目而觀之哉子京之夸侈類如此髙適工詩毎一篇已好事者已傳布巳字道不得韓思復為滁州刺史有黄芝生州署民為刻頌其詳刻頌其詳不成語也新史稱盧齊卿飲酒踰斗不亂崔恭禮至斗不亂前史載人洪飲者率至一石以上然後為異踰斗之量世亦多矣何足著之乎舊史李綱謂髙祖曰臣言如水投石此舊語也新史則云如持水内石可煞不自然李翺傳云始調校書郎累遷元和初為國子博士史館修撰累遷字下豈有闕文乎不然豈可通也崔郾傳云室處庳陋無歩廡此言其儉足矣而又云至霖雨則客盖而屐以就外位亦不必道也張元素起身令史太宗嘗對衆詰問元素大恥褚遂良上疏論之而新史乃云遂良見帝而言非也遂良云元素出閤殆不能移歩新史改移為徙只此一字亦覺失重輕之宜朱泚敗出奔失道問野人答曰天網恢恢走将安所此殊不成語也李安期傳髙宗屢責以不能進賢安期曰邑十室且有忠信天下至廣不為無賢比見公卿有所薦進皆劾為朋黨滯淹者未獲伸主薦者已訾所以人人争噤然以避囂謗若陛下忘其親讐曠然受之惟才是用塞䜛毁路其誰敢不竭忠以聞子京鐫改舊文詭異僻澁殆不可讀甚不滿人意也李晟賛云身佩安危而氣不少衰佩字過矣武后謂狄仁傑曰安得一竒士用之仁傑曰陛下求文章資㦄今宰相李嶠蘓味道足矣豈文士齷齪不用與成天下務哉哉字下不得作邪乎歟等字則安矣子京於此等猶不甚解何足言文也王毛仲旬嵗至大将軍古人言旬月者自十日以及月也言旬時者自十日以及三月也今言旬嵗未見其例也蕭嵩傳云在公慎宻人莫見其涯際慎宻上不當論際以言胷懐宇量則可矣張知謇傳云天后竒其貌詔工圗之稱其兄弟容而才謂之兩絶容字不安張鎬傳云視經史猶漁獵然夫前人已有渉獵成言便是此意何須復爾解析也席豫出鄭州刺史李傑出衢州刺史于邵出杭州刺史李朝隠出通州都督沈傳師出江西觀察使此等甚多得毋欠為字乎盖出入字不同遷擢貶降例也開元中吐蕃金城公主求文籍四種於休烈欲勿與裴光庭駮之此當入光庭傳而載於休烈傳非也徳宗時宫市事既詳見於張建封傳而李錡賛又列之重複矣舊史李后傳云延英議事中貴必引訓注以折文臣石嘗謂之曰京師之亂始自訓注而訓注之起始自何人仇士良等不能對其勢稍抑搢紳賴之新史云賴以為强便過去了裴度與穆宗論劉承偕事云臣知承偕怙寵悟不能堪嘗以訴臣是時中人趙宏亮在行營状欲持悟書以奏陛下亦知之邪邪字當作乎帝曰顧悟誠惡之胡不自聞何哉胡即何也當去一字宇文士及嘗非時被召其妻問曰向召何所事何所事不成語曷若但云問何故耶陽城傳常以木枕布衾質錢人重其賢爭售之售字為悖又云賦稅不時時字意不足盖欠辦集等語也廵逺傳㫿陽雍丘賜徭賦三年賜字便當得蠲免之意否許孟容傳云公主有求補崇文者孟容固謂不可帝嘉其守蕭瑀傳云詔嘗下中書未即行帝讓其稽韋顗節儉自居天下推其尚曹憲主廣雅學者推其該韋表微以學者薄師道著九經師授譜詆其違守尚稽違該等字皆道不過必兩字然後成文王義方傳云魏徴欲妻以夫人之姪辭不取俄而徴薨乃娶或問其然曰初不附宰相今感知己故也楊慎矜傳云婢因史敬忠得至宫中見帝帝素聞史敬忠挾術間質其然然字下不得通鑑載賈至論王去榮不當免死事李絳論不徇同年事蔣義論張茂宗奪服尚主事王式破裘甫事讀之亹亹可愛入新史中便覺索然無意味甚可惡也舊唐隠太子與秦王有隙元齡謂王曰國家患難今古何殊自非睿聖欽明不能安輯新史云國患世有惟聖人克之克字何足盡其意髙銖為太常卿嘗罰禮生博士李慤折其非銖歎曰吾老不能退乃為小兒所辱卒卒字如何定得薛元賞傳云都市多使少年以黛墨鑱膚夸詭力剽奪坊市夫鑱膚者針也黛墨所以為色耳而云以黛墨鑱則不可舍文身不道而艱詭若此其亦勞甚矣乎李夷簡元和中為相李師道方叛裴度當國帝倚以平賊夷簡自謂才不能有以過度乃求外遷言不能過或無以過則可不能有以則不成語矣康子元傳明皇時議封禪事趙冬曦駮之子元議挺不徙蘓珦傳亦云嘗按訊韓魯諸王天后詰之挺議無所撓使他人書之不過曰固執不移或云堅守前議而已豈必如此詭異鄠縣令崔發繫獄遇赦不原張仲方訟之曰徳音逺布於四海而不行御前霈澤徧被於昆蟲而獨遺崔發新史併為一句云恩被天下流昆蟲而不行御前乎田令孜専權恣横孟昭圗論之曰天下者髙祖太宗之天下非北司之天下天子者四海九州之天子非北司之天子新史改其下句云陛下固九州天子武后怪有司多失出人罪徐有功對曰失出人臣之小過好生聖人之大徳新史則云失出有司過好生陛下大徳子京意以舊文類駢不古故變亂以就已作而不知其反謬也馬周嘗寓新豐逆旅逆旅者客邸也科舉子遂謂周為新豐逆旅以對洛陽年少予嘗笑之而新唐稱劉從諌命甄戈殺定州戍将戈因為逆旅上謁斬其首何耶李晟與張延賞有隙謂人曰文士難犯雖修睦於外而蓄怨於内新史改為儒者儒者與文士自别止當從舊蒋儼為蒲州刺史發隠禁姦號良二千石案二千石漢之職名豈可通為長史之稱王孝傑為吐蕃所執賛普見之曰貌類吾父故不死歸之死字下不得吕元膺傳云居官始終無訾缺予謂訾者人所譏也缺者已所少也二字併用不得史傳稱人讀書敏速云五行俱下者盖甚言之耳實無此理也而唐史謂歐陽詢每讀輒數行同盡尤不可也太宗稱薛仁貴曰朕不喜得遼東喜得卿也此乃夲分語而子京改云喜得虓将可惡之甚褚遂良與太宗論舜造漆器事以為諍臣必諌其漸及其滿盈無所復諌此真語也新史則云必救其源既以漸為源因並易其下文曰及至横流無復事矣義理雖同然當時豈有横流之語張柬之初與楊元琰共乘艫江中私語革命事柬之執政引為羽林将軍謂曰江上之言君叵㤀之蕭復言於徳宗曰自艱難以來始用宦者監軍此曹止可委宫掖事兵要政機叵使参領古人言叵信叵測叵量之類叵字固訓不可然施於戒辭則不順矣安禄山反詔切責許自歸禄山答書慢甚叵可忍葉法善以術髙卒叵之測此止作不字用則益不安至蘓頲傳云司馬皇甫詢使蜀檄取庫錢市不急物頲不肯予或謂曰公在逺叵得忤上意吕才卜宅篇云世有五姓謂宫商角徴羽也按黄帝時獨姬姜數姓耳後世賜族者寖多至因官命氏因邑賜族本同末異叵為配宫商哉此又作豈字用尤乖戾也盖子京初不詳其義故毎至謬誤焉武后問狄仁傑曰朕要一好漢任使有乎仁傑乃薦張東之通鑑改好漢為佳士新史復作竒士好漢字誠為渉俗然佳士不足以當之矧曰竒乎寜存本語可也李光弼傳云史思明攻太原使卒於城下仰而侮罵光弼令穿地道擒之新史改為隧地固簡而文然隧字作得暗地道否且本傳先有云穴地頺土山者後又令郝廷玉地道入懐州何獨為此異也滹南集巻二十三
