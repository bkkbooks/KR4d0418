body:
  text: 滹南集卷三十二金王若虚撰雜辨舊說孔子問禮於老耼而耼所著書專薄禮學論者疑别有老子予謂耼雖不喜禮學然以大賢而嘗仕于周其於典故豈無所聞亦猶萇𢎞之於樂郯子之於官名孔子問之亦何足怪但不知果嘗問與否耳葢自莊周寓言設老耼訓誨孔子事以自尊而漢儒記禮有聞諸老耼之語世遂信之夫司馬遷最喜老子者然其為傳尚不能詳其主名及生於何代安知果與孔子同時哉莊周詆訾孔子之徒葢其學本於黄老加以天資刻薄猖狂恣睢而無忌憚則其輕蔑吾儒無足怪者東坡乃謂實予而文不予陽擠而隂助之譬楚公微服出亡其僕操箠而罵以為倒行而逆施者此出于愛周而強為解釋也彼公子之僕權以濟事不得已焉耳周之于孔子其有不得已者乎舜命羣臣自伯禹而下二十二人姓名職掌見于虞書班班可考也而左傳載季文子八凱八元之説何所本哉杜氏以八凱為垂益禹臯陶之倫八元為稷契朱虎熊羆之屬葢妄相配合耳且書言禹作司空宅百揆契為司徒敷五教而文子則云使八凱主后土以揆百事使八元敷五教於四方是八凱同任禹之職而八元並預契之政也無乃戾乎其言四凶亦與書不合此殆誣謬而杜氏強為解釋無足憑焉學者盍亦言乎經而已季文子言元凱世濟其美而堯不能舉四族世濟其凶而堯不能去舜能舉而去之故天下同心歸戴夫堯舜百王之冠冕皆聖人也使堯誠不舉善而去惡尚足為聖乎此固無稽而劉道原以為堯知舜于側微而天下未服故遺之大功二十闕亦妄意之説也文王遇吕尚於渭濱曰自吾先君太公曰當有聖人適周周以興子真是邪吾太公望子乆矣故號之曰太公望此以三字為義而世遂單稱太公如周召之類或又以望子為名皆非也至范雎傳載秦昭王語云周文王得吕尚以為太公齊桓公得管仲以為仲父今范君亦寡人之叔父此又直謂以先君呼之矣豈不愈繆哉經傳稱秦伯為穆公或亦作繆是二字通用也而䝉恬對胡亥云秦穆公殺三良而死罪百里奚而非其罪故立號曰繆然則二字義殊繆當音靡幼反矣不知恬何據而云且二字既殊豈得並舉邪唐高定年七歲讀湯誓問父郢曰奈何以臣伐君郢曰應天順人何云伐邪對曰用命賞于祖不用命戮于社是順人乎郢異之按湯誓云爾尚輔予一人致天之罰予其大賚汝爾不從誓言予則孥戮汝而已定之所舉乃甘誓之辭也臯陶謨曰知人則哲能官人安民則惠黎民懷之文理甚明而唐劉乃云虞書稱知人則哲能官人則惠鹵莽如此豈其有所脱遺邪屈原離騷有漁父篇賓主問答其辭華麗而雜以韻語此葢假設以見意與卜居一體耳司馬遷乃取以為傳劉子元既知其非矣而班固古今人表遂列漁父之名使誠有斯人者觀其所言不過委順從俗以求自全者耳何遽至九等中第二哉退之雜説曰馬之能千里者一食常盡粟一石食不飽力不足則才美不外見而不可求其能千里又以食之不盡為不識馬嗚呼千里之材固有異于常馬者然亦非徒以善食而後能也退之平生以貧而號于人嘆一飽之不足者屢矣豈其有激而云邪劉原父自號公是先生貢父號公非先生貢父云是其所是為易非其所非為難或評王介甫明于知君子暗于知小人予謂此皆過論也非者是之對也小人者君子之反也能是其是則能非其非能知君子則能知小人矣世豈有能識白而不能識黑能辨東而不能辨西者乎魯直與其弟幼安書曰老夫之書本無法也但觀世間萬縁如蚊蚋聚散未嘗一事横于胸中不擇筆墨遇紙則書紙盡則已亦不計較工拙與人之品藻譏彈譬如木偶舞中節拍人歎其工舞罷則又蕭然矣此論甚髙然彼於文章翰墨實刻意而好名者殆未能充其言也葢嘗自跋其書云學書四十年今夜所謂鰲山悟道書又曰星家言予六十不死當至八十苟如其言當以善書名天下是可喜也觀此二説其得謂無心者乎工欲善其事必先利其器山谷嘗以三錢雞毛筆書葢不得巳耳誠使佳者固當有間而云在手不在筆此一時誇辭非中理之論也滹南集卷三十二
