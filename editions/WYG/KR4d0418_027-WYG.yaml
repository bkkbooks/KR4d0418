body:
  text: 滹南集巻二十七金王若虛撰臣事實辨楊子以子胥鞭尸藉館為非東坡曰父不受誅子復讐禮也生則斬首死則鞭尸發其至痛無所擇也是以昔之君子皆哀而恕之雄獨非人子乎子由論之則不然曰士不幸至此不足以言功名矣而至鞭舊君以逞逆天而傷義卒以盡忠而䘮其軀豈非天哉慵夫曰子由之論是矣君父之尊一也而君復統其父知有父而不知有君亦何以立天下員雖不仕然身居楚國而父為楚官則員亦楚之臣也臣無讐君之義楚子之滛刑固有罪矣而員之報之無乃已甚乎為員之計不過無食其祿而已夫君非至明誅殺之間不能無濫使為臣子者皆得推刄而報之則國家豈復有法而逆亂之事何時而已也若員者勇而無禮敢為而不顧者也至其說呉王僚伐楚而王未即從因之進専諸於公子光而使弑之盖求以逞其怨毒則凡可以得志者靡所不為既自賊其君而又賊人之君員真小人也哉揚子譏之未為過論而東坡以為非人子然則蘓氏獨非人臣乎張南軒嘗與人議員立廟事云在呉則可在楚則不可員而有靈必不享於楚地盖謂忠於呉而不忠於楚耳予謂員之於闔廬則忠於僚則賊其享於呉亦恐未安也退之論范蠡招文種事畧曰為人謀而不忠有匡君之智而無事君之義若以長頸之狀難以同樂則舉呉之後還越之日泛輕舟遊五湖者豈唯范子乎其移文種之書猶㧞句踐之劍也句踐何過哉其文辭不甚佳此必少年所作故黜於外集而世亦無稱道者獨宋孫漢公謂其意出千古予以為然蠡雖功成然句踐之眷方隆而所期望者未艾也盍亦為之勉留而徐以禮請則終始之義庶㡬兩全而决意不回若棄仇讐者王以誅賞動之則曰君行令臣行義卒潜遁去揆以人情王既不能堪矣乃又移書同志誦王之短而示己之見㡬種也不智亦因謝病不朝王未嘗負二子而二子負王安得不發怒而殺之乎以史傳考之句踐無不道之事惟種受誅而實其自取則長頸之相盖亦無騐也嗚呼蠡春秋之豪才畧有餘而仁義不足者也以今日待其君如此其薄則向來所以黽勉從事者特假之以為功名之資耳夫豈誠意哉然而千古髙之以為美談其視貪榮嗜利死而不悔者固為賢矣以君子忠愛之道律之殆未滿人意也蕭何治未央宫事論者不一或以為非是或以為當然或又疑其為有深意何其紛紛也彼以刀筆吏監土木功不能無過制者其對上之言姑以自解云爾此固不足深責然亦何可妄舉哉大抵漢初君臣類無學術暗於義理其舉措之際亦多疎矣而後世每以聖賢事業期之宜其為說之多曲也程晏論曹參譬之飲牛於汚泥而不即清淵吕祖謙論陸賈叔孫通譬之避雨於荒城而不求大厦皆恨其不以三代之隆輔漢也嗚呼三代之事豈漢祖之所可望而數子之才亦豈王者之佐乎彼自量其分而行其力之所及是矣而世儒毎過期之此書生不通之論也昔人之論盖有語病而意實不然者張釋之與文帝爭犯蹕事曰方其時上使誅之則已近世儒者徃徃譏之以為開人主殺人之端固似有理然一時之意姑為守分而言何暇慮及此乎王肅諌魏明帝亦嘗引此曰廷尉天子之吏也猶不可以失平而天子之身反可以惑謬乎重於為已而輕於為君不忠之甚也其貶尤深盖帝性嚴急時督修宫室稽限者輒親召問言猶在口身首已分故肅言近於過者所以力戒帝之専殺耳不然釋之之罪詎至是哉張釋之與文帝争論犯蹕罪名事云方其時上使誅之則已議者紛然以為開人主殺人之端而隋源師謂髙祖曰陛下初使殺之自可不闗文墨唐馬懐素謂武后曰陛下操生殺柄欲加之自當處决聖心皆襲釋之之意者也其言之病豈不益甚哉尹賞病革戒其子曰為吏正坐殘賊免猶勝軟弱不勝任仇士良致仕語諸送者以為無使人主知書近賢臣則權常在我嗚呼凶人為不善惟日不足賞之酷士良之姦居之不疑亦已極矣乃復将死而貽諸其子既去而傳諸其徒不仁者可與言哉漢元帝欲御樓船薛廣徳諌曰臣當自刎以血汚車輪帝不恱及聞張猛之言然後喜曰曉人不當如是邪陳瑩中曰事有緩急言有輕重御船非過舉之大諌而不從何遽至於自刎哉使果不從廣徳之死又何名乎劉子翬曰廣徳誠大過然非先發此言以激上心則猛之言未必見聽也有犯無隠廣徳以之予謂推帝所以見聽之由則子翬之論得矣而廣徳之過又豈可不戒哉君子於其言無所苟而已矣漢許武以二弟晏普未顯欲令成名乃共割財産武自取肥田廣宅奴婢強者二弟所得並劣少鄉人皆稱弟克讓而鄙武貪婪晏等以此並得選舉武乃㑹親戚泣曰吾為兄不肖盜聲位二弟年長未䝉榮祿所以求得分財自取大譏今理産所増三倍於前悉以推二弟一無所留於是逺近稱之君子曰武也欲成弟名自當委曲教之正使無成亦何愧於心而為此詭譎之事吾不知武之本意果如所說邪抑實出於貪鄙初不自克而卒不自安邪使比及至是而其産破􅄆或身先亡則何以辭於世乎所謂巧詐不如拙誠也姜肱與二弟友愛常共臥起及各娶妻相戀不能别寢以係嗣當立乃逓徃就室三人之友愛則誠篤矣抑何不知禮之甚邪讀之令人發笑漢黨錮諸公既無申屠蟠之髙識而自貽伊戚可以逃則當如夏馥不能脫則當如范滂若張儉者望門投止使他人殄滅宗親而身獨幸免雖以夀終亦何顔於世哉而史臣稱美其賢陋矣劉翊豐財而好施獻帝西遷拜陳留太守散所握珍玩惟餘車馬自載東歸見士大夫病亡道次翊以馬易棺歛之又逢知故困餒不忍委去因殺所駕牛以救其乏衆人止之翊曰視沒不救非志士也遂俱餓死東漢之士詭激好名而不量輕重如此悲夫或問荀彧荀攸於王通通曰皆賢者也生以救時死以明道荀氏有二仁焉賈瓊曰虐哉漢武未嘗從諌通曰漢武其生知乎雖不從諌未嘗不恱而容之噫漢武昏惑不道㡬至亂亡晩節末路僅能少悔而通以為生知荀彧之徒黨附曹賊以取天下皆漢室之罪人而通以為仁者其謬論不待辨也董昭為曹操謀九錫之事荀彧以為君子愛人以徳不宜如此操不恱彧飲藥而死蘇子由曰文若始從曹公於東郡致其筭畧以摧滅羣雄固以帝王之業許之矣豈其晩節復疑而不與哉當是時中原畧定中外之望屬於曹公雖無九錫天下不歸曹氏而将焉徃刼而取之不若徐而俟之要之必得而免爭奪之累此文若之本心也吕伯恭曰彧阻撓昭議者其本情特不恱計非已出而已荅昭之詞盖闕忠順云予謂二說皆通彧必居一於此要之不可謂忠於漢也而或者曲為文飾猥加褒譽温公則曰功先管仲東坡則曰道似伯夷讀之殊可怪笑夫管仲合諸侯以奨王室曷嘗助賊臣而簒國乎伯夷不與惡人言不立惡人之朝而肯為曹氏之腹心乎彧之飲藥不得已焉耳以操隂謀多忌彧之智力乃出其右一旦隙生豈有免理至饋之食而發視乃空器其意可知彧不自裁亦終被害将有慘於是者此陳夀所謂以憂薨也烏在其為死節耶嗚呼人臣至於荀彧馮道其邪正逆順不待辨矣而議者之蔽時或如此天下之事豈易曉哉諸葛誕為司馬昭所誅麾下數百人坐不降見斬皆曰為諸葛公死不恨魏志所記止於如此而注引干寳晉記云數百人拱手為列每斬一人輒降之竟不變至盡時人比之田横此㡬大過也當時既知其不可屈則槩殺之矣何至一一遍問而數百人者雖信感恩亦不應盡能如此然而通鑑取之豈多愛不忍雖温公未免歟劉子翬不信田横客俱死事以為溢美之言予於此亦云管寜華歆共鋤園菜見地有金寜揮鋤與瓦石不異歆捉而擲之世皆優寜而劣歆予謂以心術觀之固如世之所論至其不近人情不盡物理則相去亦無㡬矣畢竟金玉與瓦石豈無别者哉此莊列之徒自以為達而好名之士聞風而恱之者也若夫君子之正論則不然貴賤輕重未嘗不與人同特取舍之際有義存焉耳陳夀評孫晧以為肆行殘暴虐用其民宜腰首分離以謝百姓既䝉不死之詔復加歸命之寵豈非過厚之恩曠蕩之澤意若微譏晉武而孫安國亦謂晧罪為逋冦虐過辛癸梟首素旗不足謝寃魂而優以顯命仍加寵錫非代罪弔民之義二子之言是矣然湯武之師本以救天下是故誅其君弔其民而議者亦曰為匹夫匹婦復讎也後世伐人者例皆志於奪國則既得而止矣詎有誠意為民者盖不獨晉武為然也初羊祐陳伐呉之䇿曰晧暴虐已甚於今可不戰而克若晧不幸而沒呉人更立令主雖有百萬之衆長江未可窺也嗚呼果使呉人更立令主民得樂業於一方釋而存之以為外懼豈非好事今乃幸其無道而易取惟恐失之此其心曷嘗在民邪武帝不足責也若羊公者世所謂仁人君子而為謀亦爾則是舉也尚可以湯武之事繩之哉東坡詩云景山沉迷阮籍傲畢卓盜竊劉伶顛貪狂嗜怪無足取世俗喜異稱其賢雖詩人一時之言其實公論也然志林復云籍本有志於世遭魏晉多故乃一寓於酒何邪晉人放蕩本其習俗而好事者每為解說子由所謂借通達以濟滛欲者誠中其病古之君子避世全身固自有道其不幸而不免則命也何必穢汚昏醉為名教之罪人邪盖籍嘗戒其子矣曰仲容己預吾此流汝不得復爾則亦心知其非而不能自克而已滹南集卷二十七
