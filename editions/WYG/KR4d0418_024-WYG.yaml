body:
  text: 滹南集巻二十四金王若虚撰新唐書辨張籍傳載韓愈答籍論佛老書甚無謂特以無事可録姑填塞云爾吴元濟傳後全載平淮西碑文亦不必也磨碑事舊載於韓愈傳而新史附於元濟傳不若舊史為當魚朝恩嘗講易覆餗之義以譏元載時盖釋奠於國子監也新史但云㑹釋菜朝恩又嘗邀郭子儀同㳺章敬寺而新書但云約修具裴度傳云初徳宗多猜忌朝士有相過從者金吾輒伺察以聞而新書但云時京師尚苛伺無乃太簡乎太宗怒宇文士及曰魏徴嘗勸我逺佞人意疑是汝今果然通鑑所記如此新史無意疑是汝字則義不完矣邢君牙傳云其屈已好士類此虞承慶云其能著人善類此古人或言皆此類或言類如此今云類此則意不足矣呉湊言宫市事曰宜料中官年髙謹信者平賈和售以息衆讙宫市大抵强買民間物平售字殊不安只作市字可也古人文字中時有渉俗語者正以文之則失真是以寜存而不去而宋子京直要句句變常此其所以多戾也明皇雜録記李林甫驕二相事以為抑揚自得而已子京改為軒驁無少讓此固無害而益以喜津津出眉宇間之語舊史稱裴度狀貌但云不逾中人而子京又加以退然兩字此復何從而得哉盖亦想像而言之耳舊史云孔戣嘗論李渉交結狀倖臣側目人為危之戣髙歩公卿間以方嚴見憚新史云戣自以適志軒軒甚得楊暹傳云以公清勤約自将亹亹為之凡状貌之辭非親見者不可道子京史官追記傳聞之事而每喜此等或云談王伯衮衮不厭或云其議論纚纚可聽或云介介自脩稜稜有風望侃侃不干虛譽介介不至顯官皆過也舊史云郭宏霸死時洛陽橋壊行李弊之至是功畢則天嘗問羣臣曰比在外有何好事舍人張元一對曰百姓喜洛陽橋成幸郭宏霸死此即好事新史改云外有佳事邪此一邪字便别却本意盖本是無故而問今却似疑而審之也通鑑云劉悟與客觀角觝之戱自揺肩攘臂以助其勢新書改為盱衡攘臂助其决舊史云楊思朂得俘囚多生剥其面或􅋇髪際掣去頭皮新史改剥面􅋇腦禠髪皮以示人便不分明人皆言利病而子京毎云病利人皆言可否而子京或云否可雖義理無異而讀之不明矣此等猶求異於人不已甚乎蕭鈞為諌議大夫盧文操盜庫財髙宗以職主幹當自盜罪死鈞曰囚罪誠死恐天下聞謂陛下重貨輕法甚喜怒殺人詔原死予謂罪死罪誠死俱道不過須加當字乃可耳栁仲郢有父風矩牛僧孺歎曰非積習名教安及此邪安字下不得劉元濟曰史臣善惡必書使驕主賊臣懼此權顧輕哉顧字下不得徳宗謂李自良曰卿於進退寜不有禮蕭俛賛曰俛議消兵寜不野哉寜字下不得蕭復以擅發京畿觀察儲粟削階停職或弔之復曰苟利於人胡責之辭胡字下不得李栖筠傳云闗中舊仰鄭白二渠溉田而豪戚壅上㳺取磑利奪農用十七栖筠請皆毁徹成得租二百萬民賴其入白樂天為杭州刺史浚李泌六井民賴其汲曷若只云賴其利也蘓弁傳曰平賊緩役略煩苛人賴其寛寛字尤贅陸贄傳云始帝倉卒變故毎自克責贄曰陛下引咎尭舜意也然致冦者羣臣罪意指盧杞等帝䕶杞因曰卿不忍歸過朕有是言哉當作乎始帝倉卒變故亦不成語也令狐徳棻傳髙宗嘗召宰相及𢎞文學士問何修而王何為而霸二者孰先徳棻對曰如欲用之王道為要而行之為難髙宗曰今之所行何政為要此本分語也新史云何修而王何為而霸又當孰先若用之王為先而莫難帝曰今何為而要語意不足矣太宗戒尉遲敬徳曰國家大事惟賞與罰非分之恩不可數行勉自修飾無貽後悔此本分語也新史云悔可及邪語意皆非是蕭復常言事徳宗曰陛下踐祚之初聖徳光被自用楊炎盧杞黷亂朝政以致今日此本分語也新史云陛下厥初清明自楊炎盧杞放命穢盛徳播越及兹殆不可讀袁髙為給事中徳宗将起盧杞為饒州刺史髙當草詔見宰相盧翰劉從曰杞當國矯誣隂賊斥忠誼倣明徳反易天常使宗社失守天下疣痏才示貶黜今還授大郡官天下其謂何古人言天下傷殘或曰瘡痍或曰瘡痏皆可今言疣痏乃聱耳豈可與瘡類哉又奏曰杞罪萬誅陛下止貶新州俄又内移今復拜刺史誠失天下望帝曰杞不逮是朕之過答曰杞天資詭險非不逮彼固所餘古人但言當萬死萬誅字未見其例恐是子京所改不逮所餘何等昏昧語也王琚傳云自傭於揚州富商家識非庸人以女妻之識字上當有其家其主等字又云太子在潞州銅鞮令張暐性豪殖喜賔客馳獵事厚奉太子數集其家亦當重言太子或去厚奉字可也豪殖二字亦一處不得又云琚性豪侈其處方面去故就新受餽遺至數百萬去故就新之意昏不可曉豈謂車服器皿之類邪中間云侍衛何止許将安便公主謀益甚語皆不成視日薄乃得出賜賚接足義皆不安也林蘊傳云蘊辨給嘗有姓崔者矜氏族藴折之曰崔杼弑齊君林放問禮之本優劣何如邪其人俯首不能對前史中固有載口辨嘲謔者至如此語亦何足録哉李密等賛云煬帝失徳天醜其為吉温傳云李林甫才其為朱桃推傳云人莫測其為温庭筠傳云執政鄙其為馮河清傳云衆議其為崔逺傳云世慕其為此類甚多古人言所為有為則有之矣單為字未嘗道也子京言人物相比倫之意輒用輩字或曰時無輩者或曰未有輩者或曰古未有輩或曰殆无其輩至魏徴諌太宗亦云陛下欲逺輩唐舜此若非好語而子京毎喜用之何其僻也韓充傳云乘機决䇿無餘悔世推善将餘悔善将字皆道不過何易于為益昌令刺史嘗乘春與賔属泛舟出益昌索民攙繂易于身引舟曰方春百姓耕且蠶惟令不事可任其身攙繂耕且蠶皆非史體不事亦不成語也崔日用嘗謂人曰吾平生所事皆適時制變不専始謀所事字道不得李勣姊病勣親為煮粥火燎其鬚其姊止之勣曰姊老勣亦老雖欲久為姊煑粥其可得乎新史改之曰雖欲久進粥尚㡬何殊不如舊史只一進字亦别却本意天后時宰相盧欽望請停京官九品以上月俸助軍興王求禮奏天子富有四海何待九品俸使宰相奪之以濟軍國用乎后曰止此句道不過鄭權傳云識詣魁然以魁字状識詣固已過矣而盧景亮傳云志義萃然又有稱造詣嶄逺者豈不益甚哉周智光傳云代宗命趙縱書帛内蜜丸召郭子儀姜公輔傳云朱滔以蜜裹書邀朱泚劉季述傳云割帶内蜜丸告孫徳昭此本䗶書耳蜜字何義也張薦救顔真卿疏云去正月中云云權徳輿貞元十九年陳闕政曰去十四年云云按古今言去年去嵗者前一年耳子京此語未見其例也李百藥傳云轉側冦難中數被偽署危得不死張元素傳云切諌太子承乾承乾遣户奴狙擊危脫死安禄山傳云賊将類慓勇無逺謀日縱酒嗜聲色財利車駕危得之蜀無進躡之患按前史有曰危得之危殺之者危猶參差㡬及之意俗言則險也子京殊不悟此乃顛倒用之何其悖也張元素諌太宗修洛陽宫魏徴名勁挺聞之歎曰張公論事有回天之力予謂魏徵之直世所共聞不必云名勁挺也劉仁軌為陳倉尉有折衝都尉魯寜坐事繫獄将髙班慢罵仁軌仁軌杖殺之太宗怒追至詰責仁軌曰寜對百姓辱臣如此臣實忿而殺之上恱擢為櫟陽丞此通鑑所載新史但言寜豪縱狠法縣莫敢屈仁軌約不再犯寜暴横自如而無慢罵事若止於豪暴何足為辱乎又以櫟陽為咸陽不知是否裴子餘舉明經累補鄠縣尉時同列李朝隠程行諶皆以文法著稱子餘獨以詞學知名或問陳崇業曰子餘朝隠行諶優劣崇業曰譬諸春蘭秋菊俱不可廢也新史改云蘭菊異芬胡可廢者不如舊語多矣且異芬字何從得之哉成汭攻䕫州軍人韓楚言嘗誶辱汭汭恥之曰有如禽賊當支解以逞及䕫州不守楚言妻李語夫曰君嘗辱軍且支解不如前死楚言不决李礪刀席下方共食復語之夫曰未可知李取刀斷其首并殺三子乃自剄二夫字止當作楚言則天傳云操奩具坐重幃而國命移何必操奩具字后妃傳賛曰或稱武韋亂唐同一轍武持久韋亟滅何哉議者謂否否字不安張九齡傳云徳宗賢其風烈賢字不安劉子元傳云年十二父授古文尚書業不進父怒楚督之及聞為諸兄講春秋左氏冐徃聽之退輒辨析所疑歎曰書如是兒何怠予始讀之不能曉及見史通自叙則云㓜奉庭訓早㳺文學年在紈綺便愛古文尚書毎苦其辭艱𤨏難為諷誦雖屢逢箠撻而其業不成嘗聞家君為諸兄講春秋左氏傳毎廢書而聽逮講畢即為諸兄說之因歎曰若使書皆如此吾不復怠然後了然無疑而覺子京疎略之病為可患也韋述傳云入元行冲室觀書不知寝食言㤀則可不知則過矣王忠嗣傳上與論兵應對蠭起應對下不宜言蠭起二字張說傳云多引天下名士以佐佑王化粉澤典章成一王法此譽之太過兼不是史氏叙事語張說首倡封禪議此諂䛕之事非正人所宜為而傳賛褒稱以為文物之盛豈良史之體哉李泌傳云常持黄老鬼神之說為時人所譏切譏切固有成言矣而其賛復云議者切而不與一切字兼得譏字否褚遂良一代正人其譛劉洎事初不甚明但洎字訴之云爾胡致堂疑李義甫所教理或然也新史遂謂二人不相中故遂良誣奏洎引馬周為左而遂良執不已帝惑之乃賜死洎之賛曰為冐忌所乘卒陷罪誅而其賛遂良亦以此為疵病至崔仁師傳又云被遇尤渥褚遂良忌之何待褚公之淺也李光弼傳云其師勁悍常為諸軍鋒鋒字不安渾瑊射賊将李立節貫其左肩死之凡事死節則曰死之古今成言也致人死而曰死之無此例也盧奕懐慎少子也拜御史中丞自懐慎奐及奕三居其官清節似之似之道不得盧杞傳云父奕見忠義傳杞不恥惡衣菲食人未悟其不情咸謂有祖風節祖懐慎也傳首但言其父而不見其祖讀者何以知之陳少㳺傳云或欲對衆切問以屈之少㳺據引淹該問窮而對有餘夫對者隨問而應者也無問則無對今曰問窮而對有餘何邪韋景駿為貴鄉令有母子相訟者景駿曰令少不天常自痛爾幸有母而㤀孝邪按左傳鄭伯曰孤不天欒盈曰我實不天凡言不天者不為天所祐耳非専指喪親也後人徃徃誤用劉季述幽昭宗於少陽院鎻其門鎔鐵錮之此甚明白而子京乃云掖金以丸鐍若無舊文何可曉邪且錮者取其牢耳豈謂闕而完之乎詭異如此宜其有札闥洪休之戯也魏氏春秋好用左傳語以易舊文裴松之譏彈甚當凡人文體固不必拘至於記録他人之言豈可過加潤色而失其本真子京唐書雖詔勅章疏類皆變亂以從己意至於詩句諺語古今成言亦或芟改不已甚乎滹南集巻二十四
