body:
  text: 滹南集巻十六金王若虚撰史記辨惑重叠載事辨楚荘王圍鄭鄭伯迎降之辭既載於楚世家又載於鄭世家荘王縣陳申叔時為牽牛蹊田之喻既載於楚世家又載於陳世家荘王圍宋華元告以析骨食子之急既載於楚世家又載於宋世家陳恒殺闞止事既詳見於齊世家而又見於田完世家陳乞立陽生事亦然子路死難事既詳見於衛世家而又見於本傳陳厲公齊懿仲卜田完事止宜載於完世家而又全載於陳世家專諸刺吴王僚事止宜載於本傳而又載於吴世家楚平王執伍奢召二子事止宜詳見於子胥傳而又全見於楚世家子胥諫吴王之言吴王賜死之事子胥将死之語亦止宜見於子胥傳而楚越世家又皆載之闔廬将死屬太子報越事載於吴世家是矣而又見於子胥傳春秋書天王狩河陽事載於孔子世家矣而又見於晉世家又見於周本紀項羽遷義帝事既載於羽本紀而又見於髙帝紀陳平間楚君臣事既載於項羽紀而又見於本傳張良難酈生事既載於髙帝紀而又見於本傳酈生責髙祖倨見事止宜載於本傳而又見於帝紀緹縈上書救父事止宜載於孝文紀而又見於倉公傳近来孔毅夫襍說論晋史王隐諌祖約奕棋事两傳俱出謂之繁文而嚴有翼著藝苑雌黄亦摭新唐重複事以為病獨未見遷書之失邪吴世家云季札聘于魯觀周樂其言云云使於齊說晏子曰子速納邑與政乃免於難齊國之政将有所歸未得所歸難未息也使於鄭見子産如舊交謂子産曰鄭之執政侈難将至矣政必及子子為國慎以禮不然鄭國将敗適衛說蘧瑗史狗史鰌公子荆公叔發公子朝曰衛多君子未有患也適晋說趙文子韓宣子魏獻子曰晋國其萃於三家乎將去謂叔向曰君偪而多良大夫皆富政將在三家吾子直必思自免於難凡此皆以見季子之明識著之可矣至魯世家襄公二十九年云吴延陵季子使魯聞周樂盡知其意鄭世家簡公二十二年云吴使延陵季子於鄭見子産如舊交謂曰鄭之執政侈難將至政必及子子為政必以禮不然鄭將敗衛世家獻公後三年云吴延陵季子使過衛見蘧伯玉史鰌曰衛多君子其國無故晋世家平公十四年云吴延陵季子來使與趙文子韓宣子魏獻子語曰晋國之政卒歸於韓魏趙矣是何必哉管蔡世家既備言武王崩成王少管蔡疑周公之為不利故挟武庚作亂周公以王命誅之矣而衛世家又詳出之何若但云周公既誅管蔡乎趙世家論云吾聞馮王孫曰趙王遷其母倡也嬖於悼襄王悼襄王廢嫡子嘉而立遷遷素無行信讒故誅其良将用郭開豈不謬哉至馮唐傳稱李牧之功曰是時趙幾覇後㑹趙王遷立其母倡也用郭開讒而誅李牧予謂趙王遷所以奪嫡而立則由其母見嬖之故若乃信讒而誅李牧倡何與焉此句為贅而班書亦存之過矣竇嬰傳云梁孝王者孝景弟也其母竇太后愛之梁孝王朝因昆弟燕飲是時上未立太子從容言曰千秋之後傳梁王嬰引巵進諫按帝言傳位孝王事世家自具何不但輕道過滹南集巻十六
