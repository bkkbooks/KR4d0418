  hash: sha256:de07b5383874b2a32bd141d2655a9e8b01ea1b8fc2bed8195e27fc6848864163
body:
  text: 金王若虚撰文辨杜牧之阿房宫賦云長橋卧波未雲何龍複道行空不霽何虹或以雩為雲字之誤其説幾是然亦於理未愜豈望橋時常晴而觀複道必隂晦耶鼎鐺玉石金瑰硃礫曾子固以為瑰當作塊言視金珠如土塊瓦礫耳然則鼎鐺玉石亦謂視鼎如鐺視玉如石矣無乃太艱詭而不成語乎棄擲迤邐恐是迤邐棄擲滅六國者六國也非秦也族秦者秦也非天下也嗟乎使六國各愛其人足以拒秦秦復愛六國之人逓三世可至萬世而為君多嗟乎字當在滅六國上尾句云亦使後人而復哀後人此亦語病也有使字則哀字下不當復云後人言哀後人則使當云讀者詳之王義方彈李義府章云貪冶容之美原有罪之淳于恐漏泄其謀殞亡辜之正義雖挾山超海之力望此猶輕回天轉日之威方斯更劣金風届節玉露啓塗霜簡與秋典共清忠臣將鷹鸇並擊請除君側少答鴻私其辭蕪陋讀之可笑而林少穎觀瀾集顧選取之何其濫也封敖為李徳裕制辭云謀皆予同言不他惑斯亦無甚可嘉而徳裕大喜且以金帶贈之蓋徳裕得君謀從計合方自以知遇為幸而敖適中其心故爾又武宗使作詔書慰邊將傷夷者云傷居爾體痛在朕躬帝善其如意賜以宫錦予謂居字亦不愜也楚詞自是文章一絶後人固難追攀然得其近似可矣如皮日休擬九歌有云王孫何處兮碧草極目公子不來兮清霜滿樓汀邊月色兮曉将曉浦上蘆花兮秋復秋此何等語耶李翺與王載言書論文云義雖深理雖當辭不工不能成文陸機曰怵他人之我先退之曰惟陳言之務去假令述笑哂之狀曰莞爾則論語言之矣曰啞啞則易言之矣曰粲然則榖梁子言之矣曰逌爾則班固言之矣曰囅然則左思言之矣吾復言之與前文何以異予謂文貴不襲陳言亦其大體耳何至字字求異如翺之説且天下安得許新語耶甚矣唐人之好竒而尚辭也歐陽晝錦堂記大體固佳然辭困而氣短頗有爭張粧餙之態且名堂之意不能出脱幾于罵題或曰記言魏公之詩以矜名譽為薄而以昔人所誇為戒意者魏公自述甚詳故記不復及但推廣而言之耳惜未見魏公之詩也曰是或然矣然記自記詩自詩後世安能常並見而參考哉東坡作周茂叔濓溪詩云先生本全徳亷退乃一隅因抛彭澤米偶似西山夫姑即世所知以為溪之呼如此則無病矣桑榆雜録云或言醉翁亭用也字太多荆公曰以某觀之尚欠一也字坐有范司戸者曰禽鳥知山林之樂而不知人之樂必此處欠之荆公大喜予謂不然若如所説不惟意斷文亦不健矣恐荆公無此言誠使有之亦戲云爾醉翁亭記言太守宴曰釀泉為酒泉香而酒冽似是泉造也宋人多譏病醉翁亭記此蓋以文滑稽曰何害為佳但不可為法耳荆公謂王元之竹樓記勝歐陽醉翁記魯直亦以為然曰荆公論文常先體製而後辭之工拙予謂醉翁亭記雖渉玩易然條達迅快如肺肝中流出自是好文章竹樓記雖復得體豈足置歐文之上哉歐公秋聲賦云如赴敵之兵不聞號令惟聞人馬之行聲多却聲字又云豐草緑縟而爭茂佳木葱蘢而可悦草拂之而色變木遭之而葉脱多却上二句或云草正茂而色變木方榮而葉脱亦可也憎蒼蠅賦非無好處乃若蒼頭丫髻巨扇揮颺至頭垂而腕脱或亦寐而顛僵殆不滿人意至于孔子何由夢周公于髣髴莊周何由與蝴蝶而飛揚已為勉強而又云王衍何暇于清談賈誼堪為之太息可以一笑也議者謂永叔不能賦豈此等語耶宋人詩話言薛奎尹京下畏其嚴號薛出油奎聞之後在蜀乃作春游詩十首因自呼薛春游蓋欲換前稱也歐公誌奎墓云公在開封以嚴為治京師之民至私以俚語目公且相戒曰是不可犯也囹圄為之數空而至今人猶或目之歐公所謂俚語必詩話所載者也然後世讀之安能知其意耶刪之可也歐公贊唐太宗始稱其長次論其短而終之曰然春秋之法常責備于賢者此一然字甚不順公意本謂太宗賢者故責備耳若下然字却是不足責也必以蓋字乃安世人讀之皆不覺會當有以辨之者又云自古功徳兼隆由漢以來未之有既曰由漢以來則自古字亦重複歐公多錯下其字如唐書藝文志云六經之道簡嚴易直而天人備故其愈乆而益明徳宗賛云恥見屈于正論而忘受欺于姦諛故其疑蕭復之輕已謂姜公輔為賣直而不能容薛奎墓誌云遭時之士功烈顯于朝廷名譽光于竹帛故其常視文章為末事蘇子美誌云時發憤悶于歌詩又喜行草皆可愛故其雖短章醉墨落筆爭為人所傳尹師魯誌云所以見稱于世者亦所以取嫉于人故其卒窮以死此等其字皆當去之五代史蜀世家論云龍之為物以不見為神今不上于天而下見于水中是失職也然其一何多歟然其二字尤乖戾也歐公誌蘇子美墓云短章醉墨往往爭為人所傳爭字不安張九成云歐公五代史論多感歎又多設疑蓋感嘆則動人設疑則意廣此作文之法也慵夫曰歐公之論則信然矣而作文之法不必再是也歐公散文自為一代之祖而所不足者精潔峻健耳五代史論曲折大過往往支離蹉跌或至渙散而不収助詞虚字亦多不愜如吳越世家論尤甚也湘山野録云謝希深尹師魯歐永叔各為錢思公作河南驛記希深僅七百字歐公五百字師魯止三百八十餘字歐公不伏在師魯之下别撰一記更减十二字尤完粹有法師魯曰歐九真一日千里也予謂此特少年豪俊一時爭勝而然耳若以文章正理論之亦惟適其宜而已豈專以是為貴哉蓋簡而不已其弊將至于儉陋而不足觀矣歐公謝校勘啟云脱絢組之三十簡編多前後之乖并盤庚于一篇文章有合離之異以仲尼之博學猶存郭公以示疑非元凱之勤經孰知門王之為閏其舉訛舛之類初止于是蓋亦足矣而播芳載董逌謝正字啓窮極搜抉幾二千言此徒以該贍誇人耳豈為文之體哉邵公濟云歐公之文和氣多英氣少東坡之文英氣多和氣少其論歐公似矣若東坡豈少和氣者哉文至東坡無復遺恨矣趙周臣云黨世傑嘗言文當以歐陽子為正東坡雖出竒非文之正定是謬語歐文信妙詎可及坡坡冠絶古今吾未見其過正也冷齋夜話載東坡經藏記事荆公愛之至稱為人中龍苕溪辨之以為坡平時譏切介甫極多彼不能無芥蔕于懐則未必深喜其文疑冷齋之妄予觀坡在黄州答李悰書曰聞荆公見稱經藏文是未離妄語也便䝉印可何哉然則此事或有之二公之趣固不同至于公論豈能遂廢而苕溪輒以私意量之耶李定鞠子瞻獄必欲置諸死地疾之深矣然而出而告人以為天下之竒才蓋嘆息者乆之而何疑于荆公之言乎荆公謂東坡醉白堂記為韓白優劣論蓋以擬倫之語差多故戲云爾而後人遂為口實夫文豈有定法哉意所至則為之題意適然殊無害也東坡超然臺記云美惡之辨戰乎中去取之擇交乎前不若云美惡之辨戰乎中去取之擇戰乎中也子由聞而賦之且名其臺曰超然不須其臺字但作名之可也東坡韓文公廟碑云其不眷戀于潮也審矣審字當作必蓋必者料度之詞審者證驗之語差之毫釐而實若白黑也或疑前赤壁賦所用客字不明予曰始與泛舟及舉酒屬之者衆客也其後吹洞簫而酬答者一人耳此固易見復何疑哉赤壁後賦自夢一道士至道士顧笑皆覺後追記之辭也而所謂疇昔之夜飛鳴過我者却是夢中問答語蓋嗚呼噫嘻上少勾喚字黠䑕賦云吾聞有生莫智于人擾龍伐蛟登龜狩麟役萬物而君之卒見使于一䑕墮此蟲之計中驚脱兎于處女夫役萬物者通言人之靈也見使于䑕者一已之事也似難承接東坡祭歐公文云奄一去而莫予追予字不安去之可東坡用矣字有不安者超然臺記云辭福求禍豈人之情也哉物有以蔽之矣大悲閣記云髪皆吾頭而不能為頭之用手足皆吾身而不能具身之智則物有以亂之矣韓文公廟碑云必有不依形而立不恃力而行不待生而存不隨没而亡者矣此三矣字皆不安明者自見蓋難以言説也東坡自言其文如萬斛泉源不擇地而出滔滔汨汨一日千里無難及其與山石曲折隨物賦形而不自知所之者常行于所當行而止于不可不止論者或譏其大誇予謂惟坡可以當之夫以一日千里之勢隨物賦形之能而理盡輒止未嘗以馳騁自喜此其横放超邁而不失為精純也耶東坡之文具萬變而一以貫之者也為四六而無俳諧偶儷之弊為小詞而無脂粉纎艷之失楚辭則略依倣其歩驟而不以奪機杼為工禪語則姑為談笑之資而不以窮葛藤為勝此其所以獨兼衆作莫可端倪而世或謂四六不精于汪藻小詞不工于少游禪語楚辭不深于魯直豈知東坡也哉滹南集卷三十六
