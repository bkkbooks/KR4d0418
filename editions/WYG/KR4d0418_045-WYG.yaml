body:
  text: 滹南集巻四十五金王若虚撰祖唐臣愚庵序鶴臺祖君唐臣命其居室曰愚庵因以自號既經喪亂流寓河朔非復庵中主人矣猶為題榜以求詩文於士大夫嗚呼凡物有其實而後得其名實無有焉名烏從生實固不可誣而名固欲其正也今先生才敏而識明行髙而業精盖世所謂賢且智者而顧加此稱是視薫以蕕指渭為涇也無乃乖戻而不合乎人情邪且先生安静寡欲不求聞達與物無競而物亦莫之攖不必嫉邪憤世如栁宗元逺害全身如甯武子果何取乎此也意者直出於至謙故歟古之君子其徳甚盛則其心愈謙其責己也重其取名也亷雖有軼羣絶俗之資而自視欿然常若不足此其尊而光卑而不可踰者善而無伐所以為顔氏聖而不居所以為孔子其與浮躁衒露急於人知虚而為盈處之不疑者豈可同日而語哉先生於是乎過人逺矣丙申春二月滹南遺老王某序復之純交說并序之純嘗為交說以見譏今贅談中以若虚名篇者是也其初本自為一首盖辭氣意㫖出於荘列可謂竒作使其處身果能如此雖古之達者無以過也而何其取怒之多歟予讀而悲之乃復以是說云狂生既以交說規慵夫已尋以忤物獲罪杜門索居将無意於世慵夫因人而寄聲曰子之病果革矣已實行行謂人之亢憫我将顛而子則先是何其言之近似而踐迹之乖歟子之病果革矣怨之不可媒也禍之不可賈也雖㣲子言吾寕不知逐逐而羣疇非吾隣形交跡接何者可絶鍊修調適之善而吾病始兆悟而藥之治養以方寛中温外茹柔吐剛駐其明而内視凝其聰而反聴行之朞月乃復其常心平氣和百邪不攻乃愈而康子獨日臻以逹膏肓毉望而走無施其良嗟夫殆哉無以招之彼孰汝尤無以結之彼孰汝仇待物大狭謀身未周睢盱彷徉蔑睨九州群讙以咻凶乗禍鳩勢窮力竭而投諸囚以伏於幽闃氏之與居稿伯之為㳺悒悒兮而私自憐孑孑乎其遺世而無求也吾絶物耶抑子絶也山淵之峻子将趍而過今胡其摧汝車而沉汝舟豺虎之毒子将不之攖今胡其齕汝趾而嚙汝喉出於外者亦既然矣伏於中者竟如何哉顧嘗憂我今為子憂盖将持吾之所以自治者而復以治子豈能從我而兾其少瘳乎狂生聞之不覺汗下移刺仲澤虚舟堂銘泛而㳺載沉載浮隨其流聼其所止而休此非所謂虚舟者歟萬物相刃乎無窮要不可容吾意智者困勇者殘而至人免於無所累先生既以是而身託矣雖放心委形以行於斯世可也四醉圖賛泰和辛酉冬予赴調京師清河垣之振之劉君景元俱以待舉客太學一日同飲市中既暮皆醉三子者就宿予邸枕籍而卧初不記也未旦而覺呼童張燈則餘樽在焉即命重酌復成小醉擁衾散髪相對怡然顧樂之以為他日或不能復得矣振之将圖其形而名以四醉因命序而賛之以記一時之美事云漠乎其如忘其聲茫乎其如忘其形神融氣泰無欲而無營渺乎其如物莫之攖也不為劉伶唯以酒為名不為屈平衆皆醉而獨醒盖不放不拘不晦不明不濁不清隨其所適而寓其情者也林下四友賛東垣彭子升恱王士衡權周晦之嗣明皆予心契也晦之於予為親故其相知最早後㳺京師始識士衡於稠人間言論慷慨遂如平生當是時泛見子升而未熟也已而復定交於觴次予年為長子升次之士衡又次之而晦之最少吾四人者臭味相似而義氣相投也故不結而合既合而歡至於益深而莫之間其好惡取舎互有短長而要歸其中辨争譏刺間若不能相容而終於無憾方其俱在里中行必偕宴必共詩雖不多而嘲戯贈答時出數語以相娱酒雖不廣而花時月夕一杯一杓亦自不廢也嘗約他年為林下之游且各為别號以自寄焉盖予以慵夫而子升以澹子士衡為狂生而晦之則放翁也曰澹曰慵曰狂曰放世以為怪而自謂其真施於仕途固非所宜而在隠居則無害也是故安之而不疑為是約已遂想像而賛之云盤礴兮嵓阿容與兮煙蘿藉風草兮偃卧愬長風兮浩歌塵海邈其如隔渺髙軒兮不我過險而風波宻而綱羅突而干戈如四人者何士衡真賛身雖寒而道則富貌若鄙而心甚妍庸夫孺子皆得易而侮王公大人莫不知其賢豈俯仰從容滑稽玩世而胷中自有卓然者也䟦寶墨堂記趙翰林以文章字畫名天下片辭寸紙人争求之嘗為故参政蒲散公作寶墨堂記仍親繕寫尤為竒特自經䘮亂散落不存而近入田君信之之手方且什襲深藏以為珍玩既而聞公子祐在因復歸之噫渠家獲所士不失舊物固幸甚矣而田君能捐己之愛以此美事亦灑落可嘉也䟦王進之墨本孝經孝悌百行之冠冕孝經六藝之喉衿聖人大訓不待賛揚而後知也學者自童稚讀書必始於此而考其行身能踐履者鮮矣李君追慕其親以不得竭力為恨而淪於非道為憂故常玩意於斯文而名卿珍翰以昭於不朽觀其自述亹亹不絶愛敬之誠藹然而見非深於履踐能如是乎吾友王進之得其墨本而寶蓄之仍圗函丈之像以冠其首而益以翰林公誌語且将併刻焉即其所好亦可以知其為人也上周監察夫人生朝門庭爽朗瑞氣氤氲夫人之誕辰也煌煌綺羅洋洋絲竹家人之拜祝也渺惟愚甥實與此榮固無以薦誠惟天為髙惟地為厚惟川瀆不竭惟山嶽不朽敢焚香酌酒拜首啟手以為夫人壽詩貧士嘆甑生塵瓶乏粟北風蕭蕭吹破屋入門兩眼何悲凉稚子低眉老妻哭世無魯子敬蔡明逺之真丈夫故應餓死填溝谷蒼天生我亦何意盖世功名實不足試将短刺謁朱門甲第紛紛厭粱肉白髪嘆清晨梳短髪已見數莖白妻孥驚且吁謂我應速摘我時笑而答區區亦何必此身終委形毁棄無足惜况爾毛髪間乃欲強修飾畢竟滿頭時復将安所擇題淵明歸去来圖靖莭迷途尚爾賖若将覺悟向人誇此心若識真歸處豈必田園始是家孤雲出岫暮鴻飛去住悠然两不疑我自欲歸歸便了何須更說世相遺抛却㣲官百自由應無一事挂心頭銷憂更借琴書力借問先生有底憂得時草木竟欣榮頗為行休惜此生乘此樂天知浪語看君於世未忘情名利醉心濃佀酒貪夫衮衮死紅塵折腰不樂飜廻去此老猶為千載人趙内翰求城南訪道圖詩辭不獲已乃作絶句以戯復為解之云得道由来不必勞癡兒捨父謾逋逃閑閑老子還多事時向伽藍打一遭竹木蕭森䕃緑苔幽襟自愛北軒開主人無說吾何問乘興而来興盡廻答鄭州辨禪師見戯代髙防禦酒肆滛房即道塲一時作戯亦何妨吾師自墮泥犁獄更笑春風栁絮狂再至故園述懐五絶日日天涯恨不歸歸来老淚更沾衣傷心何啻遼東鶴不獨人非物亦非荒陂依約認田園松菊存亡不必論我自無心更懐士不妨猶有未招魂山杏谿桃化棘蓁舞臺歌館墮灰塵春来底事堪行處門外流鶯枉喚人囘思夣裏繁華事幸及當年樂此身閑立斜陽看兒戯憐渠虚作太平人艱危嘗盡鬢成絲轉覺懽華不可期幾度哀歌仰天問何如還我未生時山谷於詩毎與東坡相抗門人親黨遂謂過之而今之作者亦多以為然予嘗戯作四絶云駿步由来不可追汗流餘子費奔馳誰言直待南遷後始是江西不幸時信手拈来世已驚三江衮衮筆頭傾莫将險語誇勍敵公自無勞與若争戯論誰知是至公蝤蛑信美恐生風奪胎換骨何多様都在先生一笑中文章自得方為貴衣鉢相傳豈是真已覺祖師低一着紛紛法嗣復何人王子端云近来陡覺無佳思縱有詩成似樂天其小樂天甚矣予亦嘗和為四絶功夫費盡謾窮年病入膏肓不可䥴寄語雪溪王處士恐君猶是管窺天東塗西抹鬭新妍時世梳粧亦可憐人物世衰如䑕尾後生未可議前賢妙理宜人入肺肝麻姑搔痒豈勝便世間筆墨成何事此老胷中具一天百斛明珠一一圎絲毫無恨徹中邊從渠屢受群兒謗不害三光萬古懸宫女圍碁圖盡日羊車不見過春来雨露向誰多爭機决勝元無事永日消磨不奈何滹南集巻四十五
