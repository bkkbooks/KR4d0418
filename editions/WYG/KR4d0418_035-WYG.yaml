body:
  text: 滹南集卷三十五金王若虚撰文辨退之盤谷序云友人李愿居之稱友人則便知為己之友其後但當云予聞而壮之何必用昌黎韓愈字柳子厚凌凖墓誌既稱孤某以其先人善予以誌為請而終云河東柳宗元哭以為誌山谷劉明仲墨竹賦既稱顧以歸我而斷以黄庭堅曰其病亦同葢予我者自述而姓名則從旁言之耳酒徳頌始稱大人先生而後稱吾黠䑕賦始稱蘇子而後稱予思子臺賦始稱客而後稱吾皆是類也前輩多不計此以理觀之其實害事謹于為文者嘗試思焉崔伯善嘗言退之送李愿序粉白黛緑一節當刪去以為非大丈夫得志之急務其論似髙然此自富貴者之常存之何害但病在太多且過于浮艷耳餘事皆畧言而此獨説出如許情状何邪葢不惟為雅正之累而其於文勢亦滯矣其於為人賢不肖何如也多却於字退之行難篇云先生矜語其客曰某胥也某商也其生也某任之其死也某誄之予謂上二某字胥商之名也下二字先生自稱也一而用之何以别乎又曰某與某何人也任與誄也非罪斂皆曰然然者是其言之辭也今先生問胥商之為人何如己之任誄當否其意未安取決于衆而皆以為然何所是而然之哉又云其得任與誄也有由乎抑有罪不足任而誄之邪先生曰否吾惡其初爾又云先生之所謂賢者大賢歟抑賢于人之賢歟齊與晉也且有二與七十焉而可謂今之天下無其人邪又云先生之與者盡于此乎其皆賢乎抑猶有舉其多而没其少者乎先生曰固然吾敢求其全其問答之間所下字語皆支離不相應觀者試詳味之退之行難篇言取士不當求備葢言常理無甚髙論而自以為孟子不知其矜持亦甚矣退之原道云寒然後為之衣饑然後為之食木處而顛土處而病也然後為之宫室三然後字慢却本意又云責冬衣裘者曰曷不為葛之之易責饑之食者曰曷不為飲之之易葛之飲之多却之字凡作序而併言作之之故者此乃序之序而非本序也若記若詩若誌銘皆然人少能免此病者退之原道等篇末云作原道原性原毁歐公本論云作本論猶贅也退之送温造處士序云洛之南涯曰石生洛之北涯曰温生全篇皆從傍記録之辭而其末云生既至其為吾以前所稱為天下賀以後所稱為吾致私怨于盡取此乃方與他人言而遽與本人語亦有方與本人語而却與他人言者自古詩文如此者何可勝數哉送溫造赴河陽軍序云伯樂一過冀北之野而馬羣遂空夫冀北馬多天下伯樂雖善知馬安能遂空其羣邪解之者曰吾所謂空非無馬也無良馬也此一吾字害事夫言羣空及解之者自是兩人而云吾所謂却是言之者自解也若作彼字其字或云所謂空者吾謂空者皆可矣又云生既至拜公于軍門其為吾以前所稱為天下賀以後所稱為吾致私怨于盡取也二為吾字當去其一退之評伯夷止是議論散文而以頌名之非其體也退之送石洪處士序云河陽軍節度御史大夫烏公為節度之三月重却節度字但作至鎮到官莅事之類可也又云先生仁且勇若以義請而彊委重焉其何説之辭之字不安又云先生起拜祝辭曰敢不敬蚤夜以求從祝規當去祝辭字退之論時尚之弊云每為文得意人必怪之至應事俗作下筆自慙者人反以為好王元之嘗謂祭裴少卿文當是蓋得之矣然顔子不貳過論亦此類耳而置集中何也退之祭柳子厚文云嗟嗟子厚而至然耶自古莫不然我又何嗟而其下復用嗟字似不可也石鼎聨句序云斯須曙鼔動鼕鼕何必用鼕鼕兩字當削去之李千墓誌云豚魚雞三者古以養老反曰是皆殺人不可食一筵之饌禁忌十常不食二三多却不食二字師説云萇𢎞師襄老耼郯子之徒其賢不及孔子孔子曰三人行必有我師此兩節文理不相承王承福傳云又曰粟稼而生者也又字不安蓋前無承福語也貓相乳說云客曰王功徳如是祥祉如是其善持之也可知己既巳因叙之為猫相乳説云爾既已字不安爾字亦贅仲長綂贊云自謂髙幹有雄志而無雄才自字不安言嘗可也樊紹述墓誌紹述於斯術其可謂至于斯極者矣斯極字殊不愜古人或云何至斯極者言若是之甚耳非極至之極也退之論許逺之事云城壞而其徒俱死獨䝉媿恥求活雖至愚者不忍為嗚呼而謂逺之賢而為之邪而字上着不得嗚呼字猫相乳説云猫有生子同日者其一母死焉有二子飲于死母母且死其鳴咿咿母且死一句贅而害理且之訓將也薛公達墓誌云鳳翔軍帥設的命射君三發連三中中輒一軍大呼以笑連三大呼笑下五字似不須用史記云陳平從攻陳豨黥布凡六出竒計輒益邑凡六益封亦此類邵氏聞見録云嘗得退之薛助教誌石與印本不同挾一矢作指一矢甚妙又得李元賓墓銘亦與印本不同印本云文髙乎當世行過乎古人竟何為哉石本乃意何為哉益歎石本之語妙予謂指字太做造不若挾之自然意字尤無義理亦只當作竟邵氏之評殊未當也茅荆産云碑本蓋初作時遂刻之中間或有未安他日自加㸃定未可知也若初本不同當擇其善者取之不必專以石刻為正此説盡矣陳後山云退之之記記其事耳今之記乃論也予謂不然唐人本短于議論故每如此議論雖多何害為記蓋文之大體固有不同而其理則一殆後山妄為分别正猶評東坡以詩為詞也且宋文視漢唐百體皆異其開廓横放自一代之變而後山獨怪其一二何邪後山詩話云黄詩韓文有意故有工左杜則無工矣然學者必先黄韓不由黄韓而為左杜則失之拙易此顛倒語也左杜冠絶古今可謂天下之至工而無以加之矣黄韓信美曾何可及而反憂學者有拙易之失乎且黄韓與二家亦殊不相似初不必由此而為彼也陳氏喜為髙論而不中理每每如此丹陽洪氏注韓文有云字字有法法左氏司馬遷也予謂左氏之文固字字有法矣司馬遷何足以當之文法之疎莫遷若也柳子厚謂退之平淮西碑猶有帽子頭使己為之便説用兵伐叛此爭名忌前妄加詬病耳其實豈必如是論而今世人往往主其説凡有以議論入者輒援此駁之亦巳過矣劉禹錫評段文昌平淮西碑云碑頭便曰韓𢎞為綂公武為将用左氏欒書將中軍欒黶佐之之勢也又是效班固燕然碑様别是一家之美嗚呼劉柳當時譏病退之出于好勝而爭名其論不公未足深怪至于文昌之作識者皆知其陋矣而禹錫以不情之語妄加推奨蓋在傾退之故因而為之借助耳彼真小人也哉東坡嘗欲效退之送李愿序作一文每執筆輒罷因笑曰不若且讓退之獨歩此誠有所讓邪抑其實不能耶蓋亦一時之戲語耳古之作者各自名家其所長不可強而獨其優劣不可比擬而定也自今觀之坡文及此者豈少哉然使其必模倣而成亦未必可貴也邵氏云韓文自經中來柳文自史中來定是妄説恰恨韓文皆出于經柳文皆出于史或謂東坡學史記戰國策山谷專法蘭亭序者亦不足信也世稱李杜而李不如杜稱韓柳而柳不如韓稱蘇黄而黄不如蘇不必辨而後知歐陽公以為李勝杜晏元獻以為柳勝韓江西諸子以為黄勝蘇人之好惡固有不同者而古今之通論不可易也晏殊以為柳勝韓李淑又謂劉勝柳所謂一蠏不如一蠏柳子厚放逐既乆憔悴無聊不勝憤激故觸物遇事輒弄翰以自託然不滿人意者甚多若辨伏神憎王孫罵尸蟲斬曲几哀溺招海賈之類苦無義理徒費雕鐫不作焉可也黔驢等説亦不足觀罵尸蟲文意本責尸蟲而終之以祝天帝首尾相背矣捕蛇者説云呌號乎東西隳突乎南北殊為不美退之無此等也子厚才識不減退之然而令人不愛者惡語多而和氣少耳滹南集巻三十五欽定四庫全書滹南集卷三十
