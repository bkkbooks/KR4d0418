body:
  text: 滹南集卷三十九金王若虚撰詩話唐子西語録云古之作者初無意于造語所謂因事陳辭老杜北征一篇直紀行役耳忽云或紅如丹砂或黑如㸃漆雨露之所濡甘苦齊結實此類是也文章即如人作家書乃是慵夫曰子西談何容易工部之詩工巧精深者何可勝數而摘其一二遂以為訓哉正如冷齋言樂天詩必使老嫗盡解也夫三百篇中亦有如家書及老嫗能解者而可謂其盡然乎且子西又嘗有所論曰詩在與人商論深求其疵而去之等閑一字放過則不可殆近法家難以言恕故謂之詩律立意之初必有難易二塗學者不能強所劣往往舍難而趨易文章不工每坐此也又曰吾作詩甚苦悲吟累日僅能成篇初未見可羞處明日取讀疵病百出輒復悲吟累日反覆改正稍稍有加數日再讀疵病復出如此數四方敢示人然終不能竒也觀此二説又何其立法之嚴而用心之勞邪蓋喜為髙論而不本于中者未有不自相矛盾也退之曰文無難易惟其是耳豈復有病哉歐公寄常秩詩云笑殺汝隂常處士十年騎馬聽朝雞伊川云夙興趨朝非可笑事永叔不必道夫詩人之言豈可如是論哉程子之誠敬亦巳甚矣荆公詠雪云試問火城将策試何如雲屋聽牕知苑極之不愛其上句山谷云管城子無食肉相孔方兄有絶交書極之不愛其下句此與人意暗同羅可雪詩有斜侵潘岳髩横上馬良眉之句陳正敏以為信然却是假雪耳盧延讓有栗爆燒氊破猫跳觸鼎翻之句楊文公深愛而或者疑之予謂此語固無甚佳然讀之可以想見明忩溫爐間閑坐之適楊公所愛蓋其境趣也邪東坡詩云文章豈在多一頌了伯倫朱少章云唐藝文志有劉伶文集三卷則非無他文章也坡豈偶忘于落筆之時乎抑别有所聞也予謂不然按晉史云伶未嘗厝意文翰惟著酒徳頌一篇坡亦據此而巳且公意本謂只此一篇足以道盡平生傳名後世則他文有無亦不必論也東坡章質夫惠酒不至詩有白衣送酒舞淵明之句䂬溪詩話云或疑舞字大過及觀庾信答王褒餉酒云未能扶畢卓猶足舞王戎乃知有所本予謂疑者但謂淵明身上不宜用耳何論其所本哉東坡題陽關圖云龍眠獨識殷勤處畫出陽關意外聲予謂可言聲外意不可言意外聲也東坡酷愛歸去來辭既次其韻又衍為長短句又裂為集字詩破碎甚矣陶文信美亦何必爾是亦未免近俗也東坡和陶詩或謂其終不近或以為實過之是皆非所當論也渠亦因彼之意以見吾意云爾曷嘗心競而較其勝劣邪故但觀其眼目㫖趣之何如則可矣東坡云論畫以形似見與兒童鄰賦詩必此詩定非知詩人夫所貴于畫者為其似耳畫而不似則如勿畫命題賦詩不必此詩果為何語然則坡之論非歟曰論妙于形似之外而非遺其形似不窘于題而要不失其題如是而已耳世之人不本其實無得于心而借此論以為髙畫山水者未能正作一木一石而託雲烟杳靄謂之氣象賦詩者茫昧僻逺按題而索之不知所謂乃曰格律貴爾一有不然則必相嗤㸃以為淺易而尋常不求是而求竒真偽未知而先論髙下亦自欺而已矣豈坡公之本意也哉鄭厚云魏晉已來作詩唱和以文寓意近世唱和皆次其韻不復有真詩矣詩之有韻如風中之竹石間之泉柳上之鶯墻下之蛩風行鐸鳴自成音響豈容擬議夫笑而呵呵歎而唧唧皆天籟也豈有擇呵呵聲而笑擇唧唧聲而歎者也慵夫曰鄭厚此論似乎太髙然次韻實作者之大病也詩道至宋人巳自衰弊而又專以此相尚才識如東坡亦不免波蕩而從之集中次韻者幾三之一雖窮極技巧傾動一時而害于天全多矣使蘇公而無此其去古人何逺哉東坡薄薄酒二篇皆安分知足之語而山谷稱其憤世嫉邪過矣或言山谷所擬勝東坡此皮膚之見也彼雖力加竒險要出第二何足多貴哉且東坡後篇自破前説此乃眼目而山谷兩篇只是東坡前篇意吾未見其勝之也東坡鴈詞云揀盡寒枝不肯棲以其下棲木故云爾蓋激詭之致詞人正貴其如此而或者以為語病是尚可與言哉近日張吉甫復以鴻漸于木為辨而怪昔人之寡聞此益可笑易象之言不當援引為證也其實鴈何嘗棲木哉東坡送王緘詞云坐上别愁君未見歸來欲斷無腸此未别時語也而言歸來則不順矣欲斷無腸亦恐難道贈陳公宻侍兒云夜來倚席親曾見此本即席所賦而下夜來字却是隔一日王直方詩話稱晁以道見東坡梅詞云便知道此老須過海只為古今人不曾道到此須罰教去苕溪漁隱曰此言鄙俚近于忌人之長幸人之禍直方無識載之詩話寧不畏人之譏誚乎慵夫曰此詞意屬朝雲也以道之言特戲云爾蓋世俗所謂放不過者豈有他意哉苕溪譏直方之無識而不知已之不通也陳後山云子瞻以詩為詞雖工非本色今代詞手惟秦七黄九耳予謂後山以子瞻詞如詩似巳而以山谷為得體復不可曉晁無咎云東坡詞小不諧律吕蓋横放傑出曲子中縛不住者其評山谷則曰詞固髙妙然不是當行家語乃着腔子唱如詩耳此言得之晁無咎云眉山公之詞短于情蓋不更此境耳陳後山曰宋玉不識巫山神女而能賦之豈待更而後知是直以公為不及于情也嗚呼風韻如東坡而謂不及于情可乎彼髙人逸才正當如是其溢為小詞而間及于脂粉之間所謂滑稽玩戲聊復爾爾者也若乃纎艷淫媟入人骨髓如田中行柳耆卿輩豈公之雅趣也哉陳後山謂子瞻以詩為詞大是妄論而世皆信之獨茅荆産辨其不然謂公詞為古今第一今翰林趙公亦云此與人意暗同蓋詩詞只是一理不容異觀自世之末作習為纎艷柔脆以投流俗之好髙人勝士亦或以是相勝而日趨于委靡遂謂其體當然而不知流弊之至此也文伯起曰先生慮其不幸而溺于彼故援而止之特立新意寓以詩人句法是亦不然公雄文大手樂府乃其游戲顧豈與流俗爭勝哉蓋其天資不凡辭氣邁往故落筆皆絶塵耳東坡江行唱和詩序云昔人之文非能為之為工乃不能不為之為工也山川之有雲草木之有花實充滿勃鬱而見于外雖欲無之其可得乎故予為文至多而未嘗敢有作之之意時公年始冠耳而所有如此其肯與江西諸子終身爭句律哉東坡文中龍也理妙萬物氣吞九州縱横奔放若游戲然莫可測其端倪魯直區區持斤斧凖繩之説隨其後而與之爭至謂未知句法東坡而未知句法世豈復有詩文而渠所謂法者果安出哉老蘇論揚雄以為使有孟軻之書必不作太𤣥魯直欲為東坡之邁往而不能於是髙談句律旁出様度務以自立而相抗然不免居其下也彼其勞亦甚哉向使無坡壓之其措意未必至是世以坡之過海為魯直不幸由明者觀之其不幸也舊矣吳虎臣漫録云歐陽季黙嘗問東坡魯直詩何處是好坡不答但極稱道季黙復問如雪詩卧聽踈踈還宻宻起看整整復斜斜豈亦佳邪坡云正是佳處慵夫曰予於詩固無甚解至于此句猶知其不足賞也當是所傳妄耳徐師川亦嘗詠雪云積得重重那許重飛時片片又何輕曾端伯以為警策且言師川作此罷因誦山谷疎疎宻宻之句云我則不敢容易道意謂魯直草率而已語為工也噫予之惑滋甚矣王直方云東坡言魯直詩髙出古人數等獨歩天下予謂坡公決無是論縱使有之亦非誠意也蓋公嘗䟦魯直詩云每見魯直詩未嘗不絶倒然此卷語妙甚能絶倒者巳是可人又云讀魯直詩如見魯仲連李太白不敢復論鄙事雖若不適用然不為無補又云如蝤蛑江瑶柱格韻髙絶盤餐盡廢然多食則動風發氣其許可果何如哉山谷之詩有竒而無妙有斬絶而無横放鋪張學問以為富㸃化陳腐以為新而渾然天成如肺肝中流出者不足也此所以力追東坡而不及歟或謂論文者尊東坡言詩者右山谷此門生親黨之偏説而至今詞人多以為口實同者襲其迹而不知返異者畏其名而不敢非善乎吾舅周君之論也曰宋之文章至魯直已是偏昃處陳後山而後不勝其弊矣人能中道而立以巨眼觀之是非真偽望而可見也若虚雖不解詩頗以為然近讀東都事畧山谷傳云庭堅長于詩與秦觀張耒晁補之游蘇軾之門號四學士獨江西君子以庭堅配軾謂之蘇黄蓋自當時已不以是為公論矣山谷題陽關圖云渭城柳色關何事自是行人作許悲夫人有意而物無情固是矣然早發分寧云我自只如常日醉滿川風月替人愁此復何理也山谷詩云語言少味無阿堵冰雪相看有此君夫阿堵者謂阿底耳顧愷之云傳神寫照正在阿堵中殷浩見佛經云理應阿堵上謝安指桓温衞士云明公何須壁間阿堵輩是也今去物字猶此君去君字乃歇後之語安知其為錢乎山谷題嚴溪釣灘詩云能令漢家九鼎重桐江波上一絲風説者謂東漢多名節之士賴以乆存跡其本原正在子陵釣竿上來予謂論則髙矣而風何與焉嘗質之吾舅周君君笑曰想渠下此字時其心亦必不能安也或云詩人語不當如是論曰固也然亦須不害于理乃可如東坡眉石硯詩指胡馬于眉間與此是一箇規模也而豈有意病哉蘇黄各因元真子漁父詞增為長短句而互相譏評山谷又取船子和尚詩為訴衷情而冷齋亦載之予謂此皆為蛇足耳不可作也山谷詞云新婦磯邊眉黛愁女兒浦口眼波秋自謂以山色水光替却玉肌花貌真得漁父家風東坡謂其大瀾浪可謂善謔蓋漁父身上自不宜及此事也山谷最不愛集句目為百家衣且曰正堪一笑予謂詞人滑稽未足深誚也山谷知惡此等則藥名之作建除之體八音列宿之類獨不可一笑耶山谷雨絲詩云烟雲杳靄合中稀霧雨空濛落更微園客蠒絲抽萬緒蛛蝥網面罩群飛風光錯綜天經緯草木文章帝杼機願染朝霞成五色為君王補坐朝衣夫雨絲云者但謂其狀如絲而已今直説出如許用度予所不曉也山谷詞云盃行到手莫留殘不道月明人散嘗疑莫字不安昨見王徳卿所取東坡書此詞墨跡乃是更字也滹南集卷三十九
