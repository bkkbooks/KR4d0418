body:
  text: 滹南集巻二十六金王若虚撰君事實辨光武封功臣鄧禹呉漢皆食四縣丁恭議曰古者封侯不過百里强幹弱枝所以為治也今封四縣不合法制帝曰古之亡國皆以無道未嘗聞功臣地多而滅亡者也近世議者以光武為非予謂恭固逺慮然光武知本之言其可廢哉治天下者無道徳仁義以相維持而欲恃區區之法制以沮姦雄而弭禍亂盖亦難矣東坡嘗言三國志注中好事甚多而惜其遺漏自今觀之信然如曹操征烏桓還自謂幸勝而偏賞先諌者可以為千古法也操一生所行類皆不道之事獨此一節有光青史而陳夀略之豈非闕典之甚哉先主以私憾殺張裕孔明表請其罪報曰芳蘭生門不得不鋤嗚呼先主天資仁厚有古賢君之風至於此舉乃與曹操無異惜哉晉史山濤傳云鬲令袁毅賂公卿以求虚譽遺濤絲百斤濤不欲為異於時受而藏於閣上後毅事露濤取絲付史積年塵埃印封如初王戎亦嘗受人布司𨽻糾之武帝謂朝臣曰戎豈懐私苟得者正當不欲為異耳嗚呼古人所謂不為異者不為崖異絶俗之事而已臨財之際雖一芥必有義存豈容自汚而猥以尚同為貴哉戎本貪夫盖無足責濤既受其物矣印封雖在何以自明且濤又嘗以盜官稻田為李憙所劾則非真能清潔者也而史臣亦以此恕之何邪武帝身為人主宜以莭儉厲俗始自貴近而王愷與石崇爭侈乃以己物助之戎也犯贜則為之䕶諱而貸其罪天下安得不亂哉宋文帝嘗故令諸子晚食曰欲其識有饑苦以節儉御物唐明皇帥太子以下芟麦於宫中曰欲其知稼穡之艱難嗚呼人主之教子當使親師傅通古今義理既明百行自正曽謂此等可以制其心乎宋孔熈先博學文史兼通數術有縱横才志文帝時為􅄆騎侍郎不為時知憤憤不得志乃與范曄謀亂事覺窮治望風吐欵辭氣不撓上竒其才遣人慰勉曰以卿之才而滯於集書省理應有異志此乃我負卿也又謂執政曰孔熈先年四十而猶為􅄆郎安得不作賊君子謂帝於是失言矣人臣至於叛逆復何才之足惜且士之進退自有命存縱其淹抑終身亦當委順奈何以小不如意遂圗不軌乎由帝之言是使狂躁之徒得以藉口而無忌憚豈所以為訓哉嗚呼彭城王同氣之親雖犯嫌隙本無他腸尚可聽其自新以全友愛之義重以㑹稽之哀祈扶令育之死諌而帝卒殺之不疑顧乃眷眷於熈先小子何其心術之悖也隋文帝每謂趙緯曰朕於卿無所愛惜但卿骨相不當貴耳此非人主之言而亦非其本心也特緯之抗直帝不能堪故耳唐太宗嘗云奴告主反此弊事也謀反不能獨成必與人共成之何患不發而使奴告邪自今有告者勿受仍斬之君子曰太宗之立法是矣惜其猶以利害言也夫以奴告主理所不容自當禁之縱使無由得發亦豈可許乎乃不學之過也唐太宗録囚有劉恭者頸有勝文自云當勝天下坐是擊獄帝曰天将興之非朕所能除若無天命勝文何為乃釋之齊人叚志充請帝致政於太子大臣乞誅之詔曰朕之有罪是其直也若其無罪是其狂也亦釋之此可謂寛明矣然於李君羨則以䜟記之文而殺劉洎則以廢立之語而殺或怪其不能以斯心加諸彼是不然恭志充輩凡人皆知其不足道故無所動其心君羨與洎則觸其真諱惡之機故不能自克耳武后能容蘓安恒而不容魏元同劉椲之亦是類也唐明皇酺宴命三百里内刺史縣令各率所部音樂集於樓下以較勝負懷州刺史以車載樂工數百皆衣文綉服箱之牛皆虎豹犀象之狀魯山令元徳秀惟遣樂工數人連􅃑而歌於蒍上曰懐之人其塗炭乎立以刺史為􅄆官君子曰城中好髙髻四方髙一尺明皇耽於滛樂天下方且風靡而傚之而又親詔守令責其角勝則彼惟知求勝以取悦盖亦不足怪也乃因徳秀之諷而罰懐州刺史信有過矣而導之者獨無罪乎即不自克至於冦亂交興中原受禍而不可解塗炭者豈止懐州之人哉憲宗朝李絳李吉甫數争論於上前禮部尚書同平章事權徳輿居中無所可否上鄙之徳輿罷守本官范氏唐鑑稱其明慵夫曰憲宗黜徳輿誠是然吉甫諂邪屢為絳所屈帝常直絳而謂吉甫専為恱媚則其可鄙盖甚於徳輿矣顧乃存之而不去其後絳亦罷免而吉甫獨寵任終身至以議諡貶張仲方而特賜曰忠何其眷之深歟然則帝之明未足多也憲宗元和三年䇿試賢良方正舉人牛僧孺李宗閔皇甫湜深陳時政之失皆獲髙第上亦嘉之詔中書優與處置宰臣李吉甫惡其言直泣訴於上且誣考官不公上乃貶諸考官而僧孺等久之不調慵夫曰三子以直言應詔其心非有他也帝既嘉之即當擢用而施行以示至公其誰敢議顧乃狥吉甫之私情而為之報怨牛李之隙有自來矣帝毎以朋黨疑臣下而不知己之為朋黨之根也唐武后時徐元慶父為縣尉趙師韞所殺元慶復手殺師韞后欲赦死陳子昻議以為枕戈讐敵人子之義誅罪禁亂王政之綱非義不可訓人亂綱不可明法且元慶所以能義動天下者以其忘生而趨其徳也若釋之以利其生是奪其徳虧其義非謂殺身成仁全死忘生之節宜正國之典寘之以刑然後旌閭墓可也時韙其言後栁子厚駮之曰旌與誅不得並誅其可旌則黷刑旌其可誅則壊禮若師韞以私怨虐非辜州牧不知罪刑官不知問而元慶能報之是守禮而行義也執事者宜有慚色将謝之不暇而又何誅其或父不免於罪而師韞之誅不愆於法是死於法而非死於吏讎天子之法而戕奉法之吏是悖驁而陵上也執而誅之所以正邦典而又何旌當取公羊受誅不受誅之義以斷之元和中梁恱報父讐殺秦杲報有司曰據禮經則義不同天徴法令則殺人者死禮法二事皆王教之大端宜令詳議韓退之曰聖人丁寜其義於經而深沒其文於律将使法吏一斷於法而經術之士得引經而議也宜定其制凡復讐者事發具申尚書省集議奏聞酌其宜而處之勅杖恱一百流循州明皇時張瑝張琇亦以父讐殺楊汪議者多言宜加矜宥張九齡欲活之而裴耀卿李林甫以為亂國法帝然之謂九齡曰孝子之情義不顧死殺人而赦此塗不可啟也乃下勅曰國家設法期於止殺各伸為子之志誰非狥孝之人展轉相讐何有限極臯陶作士法在必行曽參殺人亦不可恕付河南府杖殺之考比三事惟明皇所處為不可易子昻等議似髙要非正法盖禮記周官及公羊氏復讎之說皆亂世事不足信也楚靈王聞羣公子被殺自投於車下曰人之愛其子亦如余乎侍者曰甚焉王曰予殺人子多矣能無及此乎唐文宗惑楊賢妃之譛㡬廢太子永已而永暴薨後帝因觀樂見童子縁橦而其父來徃走其下泫然流涕曰朕為天子不能全一子乃誅教坊宫人嘗構害太子者十數人嗟夫惻隠之心人皆有之父子之道出於天性靈王因己子之死而始悟殺人子之為非文宗見他人之愛子而後知己子不全之可恨者昏蔽如此宜其懵於天下之理也温公極稱周世宗之美而曰大功未成中道而夭盖太平之業天将啟聖人而授之非人謀之所及予謂温公歸之天數是矣以為将啟聖人則媚主之辭也世宗天資豈宋祖之所敢望而如宋祖者其足謂之聖人乎使世宗而在太平之期可以立待何必宋祖哉宋主征煜煜遣徐鉉朝京師言其師出無名且曰煜以小事大如子事父未有過失奈何見伐宋主曰爾謂父子為兩家可乎鉉無以對而退歐公載其事於五代史而論之曰嗚呼大哉何其言之簡也王者之興天下必歸於一統可來者來之不可者伐之期於掃蕩一平而後已周世宗征淮南詔捃摭前事務較曲直以為辭何其小哉慵夫曰歐公之言過矣自古出師未嘗無名而加人之罪者必有辭而後可曲直之理正所當較也宋主此舉果何名而何辭哉偶鉉及父子之喻因得以是而折之夫父子固不當為兩家矣而宋之與唐何遽有父子之分哉天下非一人之所獨有也此疆彼界容得分據而並立小事大大保小亦各盡其道而已有罪則伐無罪則已自三代以來莫不然豈有必皆掃蕩使歸於一統者哉世宗既服江南清源節度使劉從效請置進奏院於京師直𨽻中朝詔報曰江南近服方務綏懐卿若置邸上都與彼抗衡受而有之罪在於朕勉事舊君且宜如故如此則於卿篤始終之義於朕盡柔逺之宜鍾謨入貢帝問曰江南亦治兵修守備乎對以不敢帝曰向時則為仇敵今日則為一家大義已定保無他虞然人生難期至於後日事不可知歸語汝主可及吾時完城郭繕甲兵據守要害為子孫計世宗徳度如此其視宋主何啻天壤而反以較曲直為小乎宋主之初出師撫曹彬背曰㑹取㑹取彼本無罪只是自家着他不得此則情實之語也歐公一代正人而曲媚本朝妄飾主闕在臣子之義雖未為過而史書垂世之言安可不出於大公至正邪不載可也唐将劉巨容討黄巢㡬擒而復縱之曰國家喜負人不若留賊以為富貴之資議者議其以鷹犬自期其言誠是然如巨容􅒰何足責哉宋主太祖命曹彬平江南許以使相及回惟賜錢五十萬曰更為朕取太原然後與卿此非以鷹犬使人耶而宋儒毎稱其吝惜名器夫人君之於臣遇之以禮而示之以誠故人樂為之用果惜名器則如勿許然宋祖素多權詐本不為名器計也嗚呼使彬而君子何必以此待之如其小人則亦不復肯盡力矣嘗以彬之行事考之盖所謂君子者則宋祖惟失所以使人而又見其不能知人也滹南集巻二十六
