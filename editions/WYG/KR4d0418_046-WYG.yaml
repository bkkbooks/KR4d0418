body:
  text: 滹南集巻四十六金王若虚撰續編詩攄憤非存驕蹇心非徼正直譽浩然方寸間自有太髙處平生少諧合舉足逢怨怒禮義初不愆謗訕亦奚顧孔子自知明桓魋非所懼孟軻本不逢豈為臧氏沮天命有窮達人情私好惡以此常泰然不作身外慮贈王士衡王生非狂者乃以善哭稱毎至欲悲時不問醉與醒音調初惻愴涕泗隨縱横問之無所言坐客笑且驚王生不暇䘏若出諸其誠嗟我與生友此意猶未明絲染動墨悲麟亡傷孔情韓哀峻領陟阮感窮途行涕流賈太傅音抗唐衢生古來哭者多其哭非無名生其偶然歟何苦摧神形如其果有為為爾同發聲感秋西風撼庭柯疎葉鳴策策天地一蕭條覊懐亦岑寂青春怳如昨轉盼年半百自從長大来轉覺日月廹功名非所慕老大不足恤怛然感時心自亦不能釋清晨梳短髪已見數莖白刀鑷雖可施殆似兒子劇此身委蛻耳毁棄無足惜况於毛髪間而乃强修飾青青如陸展星星行復出畢竟白滿頭復將何所摘生日自祝嚢空無一錢羸軀兼百疾况味何蕭條生意渾欲失清晨聞喧呼親舊作生日我初未免俗隨分畧脩飾舉觴聊自祝醉語盡情實神仙恐無從富貴安可必脩短卒同歸何足喜與戚一祈粗康彊二願早閑適衣食無大望但要了晨夕萬事不我攖一心常自得優㳺終吾身志願從此畢失子姸姸掌中兒捨我一何遽其来誰使之而復奄然去平生三舉子隨滅如朝露顧我能無悲其如天有數自從學道來衆苦頗易度有後固所期誠無亦何懼人生得清安政以累輕故婚娶眼前勞託遺身後慮百年曾㡬何為此雛穉誤顧語長號妻此理亦應喻憶之純三首幼嵗求真契中年得偉人傾懷當一面投分許終身燈火談𤣥夜鸎花逐勝春何時重一笑胷次欲生塵其二面目三年隔音書萬里遥宦途俱蹭蹬日事各蕭條志大謀常拙身孤道易消本無當世用隱處㑹相招其三儁氣輕天下髙情到古人銜杯曼卿放下筆老坡神時論誰優劣人材自屈伸窮愁須理遣不必涙沾巾復寄二首志大言髙與世違拂衣真作竹林歸黄塵道口風波惡未必先生自處非其二自笑趨塵自強顔食謀未免敢言閑紫芝果可充飢腹從子玉屏巖石間病中二首學道今何得謀生久不成藍衫㡬棄物絳帳亦虚名事拙應天意交疎即世情煩憂時自解感觸又還生其二鬱鬱窮愁意營營乆病身詩情渾欲减藥物但相親未得驅窮鬼終須問大鈞三時勞慰撫甚愧故人真感懷枉却全家仰此身書生那是治生人百憂耿耿填胷臆強作歡顔慰老親自笑酒得數盃還自足詩髙兩韻不能神何須豪逸攀時傑我自世間隨分人别家到了身安是本圖何須身外覔浮虚誰能置我無饑地却把㣲官乞與渠慵夫自號身世飄然一瞬間更將辛苦送朱顔時人莫笑慵夫拙差比時人得少間西城賞蓮呈晦之晦之自號放翁舊賞囘頭巳隔年髙花又見出新姸偶成濁酒狂歌㑹恰及斜風細雨天樂事適来偏有興閑身常得分無縁作詩莫怪多誇語差比放翁先着鞭滹南集巻四十六
