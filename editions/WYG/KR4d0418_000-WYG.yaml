body:
  text: 滹南集目録别集類四金巻一五經辨惑上巻二五經辨惑下巻三論語辨惑序總論巻四論語辨惑一巻五論語辨惑二巻六論語辨惑三巻七論語辨惑四巻八孟子辨惑巻九史記辨惑一巻十史記辨惑二巻十一史記辨惑三巻十二史記辨惑四巻十三史記辨惑五巻十四史記辨惑六巻十五史記辨惑七巻十六史記辨惑八巻十七史記辨惑九巻十八史記辨惑十巻十九史記辨惑十一巻二十諸史辨惑上巻二十一諸史辨惑下巻二十二新唐書辨上巻二十三新唐書辨中巻二十四新唐書辨下巻二十五君事實辨上巻二十六君事實辨下巻二十七臣事實辨上巻二十八臣事實辨中巻二十九臣事實辨下巻三十議論辨惑巻三十一著述辨惑巻三十二雜辨巻三十三謬誤雜辨巻三十四文辨一巻三十五文辨二巻三十六文辨三巻三十七文辨四巻三十八詩話上巻三十九詩話中巻四十詩話下巻四十一雜文詩附揖翠軒賦并序瑞竹賦并序寧晉縣令吴君遺愛碑真定縣令國公徳政碑王氏先塋之碑李仲和墓碣銘故朝列大夫劉公墓碣銘巻四十二千戸賈侯父墓銘大一三代度師蕭公墓表清虛大師侯公墓碣贈昭毅大将軍髙公墓碣巻四十三進士彭子升墓誌保義副尉趙公墓誌焚驢志哀鴈辭髙思誠詠白堂記門山縣吏隐堂記恒山堂記巻四十四鄜州龍興寺明極軒記茅先生道院記趙州齊叅謀新修悟真庵記答張仲傑書道學發源序揚子法言㣲㫖序送王士衡赴舉序送吕鵬舉赴試序送彭子升之任兾州序巻四十五祖唐臣愚庵序復之純交說移刺仲澤虚舟堂銘四醉圖賛林下四友賛王士衡真賛䟦寶墨堂記䟦王進之墨本孝經上周監察夫人生朝貧士嘆白髪嘆題淵明歸去来圖題趙内翰城南訪道圗答鄭州辨禪師見戲代高防禦再到故園述懷評東坡山谷四絶題宫人圍棊圖巻四十六續編詩攄憤贈王士衡感秋生日自祝失子憶之純三首復寄二首病中二首感懷自笑别家慵夫自號西城賞蓮呈晦之臣等謹案滹南遺老集四十五巻續編一巻金王若虗撰若虗宇從之自號慵夫藁城人金承安二年經義進士歴官左司諫轉延州刺史入為翰林直學士金亡後㣲服歸里自稱滹南遺老越十年與劉祁東游卒於泰山事迹具金史文藝傳史稱若虛有慵夫集滹南遺老集均曰若干巻不詳其數千頃堂書目載滹南遺老集四十五巻與王鶚序合慵夫集雖著於錄而巻數亦缺考大德三年王復翁序稱以中州集所載詩二十首附巻則慵夫集元時已佚惟此集存耳此本凡五經辨惑二巻論語辨惑五巻孟子辨惑一巻史記辨惑十一巻諸史辨惑二巻新唐書辨三巻君事實辨二巻臣事實辨三巻議論辨惑一巻著述辨惑一巻雜辨一巻謬誤雜辨一巻文辨四巻詩話三巻雜文及詩五巻與四十五巻之數合然第三巻惟論語辨惑序一篇總論一篇僅三頁有奇與他巻多寡懸殊疑傳寫佚此一巻後人割第四巻首三頁改其標題以足原數而續編一巻則又後人所附益也蘇天爵作安熙行狀云國初有傳朱子四書集註至北方者滹南王公雅以辨博自負為説非之今考論語孟子辨惑乃雜引先儒異同之説斷以己意其間疑朱子者有之而從朱子者亦不少實非專為辨駁朱子而作天爵所云不知何據觀其稱陳天祥宗若虗之説撰四書辨疑因熙斥之遂焚其稿今天祥之書具存無焚稿事則天爵是説特欲虛張其師表章朱子之功耳均非實錄也其五經辨惑頗詰難鄭學於周禮禮記及春秋三傳亦時有所疑然所攻者皆漢儒附會之詞亦頗樹偉義觀其自稱不深於易即於易不置一詞所論實止四經則亦非强所不知者矣史記辨惑諸史辨惑新唐書辨皆考証史文掊擊司馬遷宋祁似未免過甚且或毛舉細故失之煩瑣然所摘遷之自相牴牾與祁之過於彫斵中其病者亦十之七八君事實辨臣事實辨皆所作史評史事議論辨惑著述辨惑皆品題先儒之是非其間多持平之論頗足破宋人之拘攣雜辨二巻於訓詁亦多訂正文辨尊蘇軾而於韓愈間有指摘詩話尊杜甫而於黄庭堅多所訾議葢若虗詩文不尚劖削鍜鍊之格故其論如是也統觀全集偏駮在所不免然金元之間學有根柢實無能出若虗右者吳澄稱其博學卓識見之所到不苟同於衆亦可謂不虗美矣乾隆四十一年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書滹南集引黄鳥止於丘阿流丸止於甌㬰羣言止於公是夫言生於人心心既不同言亦各異其在彼也一是非其在此也一是非左右佩劒其誰能正之必有大人者出獨立當世吐辭立論掃流俗之所狥取古今天下之所共與者與諸人有以塞其口而厭其心而後呶呶之說息矣自秦火以來漢武帝表章六經不謂無功於聖人然諸儒曲學徃徃反為所汨陵遲至於唐宋人自為說雖其推明隐奥為多其間踳駁淆混詿誤後生盖亦不少顧六經且如是况百家乎子長實録也劉子𤣥㸃其煩孟堅鉅筆也劉貢父刋其誤子京俊才也劉器之病其畧顧史氏且如是况雜述乎然則有人於此品藻其是非覼縷其得失使惑者有所釋鬰者有所伸學者有所適從則其澤天下也不既厚矣乎今百餘年鴻生碩儒前後踵相接考其撰著訇􅐀彪炳今文古文無或無之惟於議論之學殆為闕如豈其時物文理相與為汙隆邪其磊落之才逺大之器深識英眄為世標表者不常有邪抑亦有其人遭世多故不幸而無以振發之也滹南先生學博而要才大而雅識明而逺所謂雖無文王猶興者也以為傳注六經之蠧也以之作六經辨論孟聖賢之志也以之作論孟辨史所以信萬世文所以飭治具詩所以道情性皆不可後也各以之為辨而又辨厯代君臣之事迹條分區别美惡著見如粉墨然非夫獨立當世取古今天下之所共與者與諸人能然乎哉烏虖道之不明也乆矣凡以群言揜之也故卑者以陥而髙者以行恠拙者以惛而巧者以狥欲傳者如是受之者又如是尖纎之逞而浮誕之夸吾将見天下之人一趣於壊而已耳如先生之學誠處之王公之貴頼以範世鎮俗其庶乎道復明於今日也先生今已矣後百年千年得一人焉食先生之餘廣先生之心能使斯文之不墜則雖百年千年吾知其為一日也欒城李冶引予以剽竊之學由白衣入翰林當代鉅公如趙閑閑楊禮部滹南先生皆士林儀表人莫得見之而一旦得侍几硯渾源雷睎顔良鄉王武升河中李欽升亦稱天下之選而十年得與從逰故予嘗自謂叨取科第未足為幸而忝厠英㳺之末兹所以為幸也歟玉堂東觀側耳髙論日夕獲益實多然愛予最深誨予最切愈久愈親者滹南先生一人而已先生性聰敏蚤嵗力學以明經中乙科自應奉文字至為直學士主文盟幾三十年出入經傳手未嘗釋巻為文不事雕篆唯求當理尤不喜四六其主名節區别是非古人不貸也壬寅之春先生歸自范陽道順天為予作數日留以手書四帙見示曰吾平生頗好議論向所雜著徃徃為人竊去今記憶止此子其為我去取之予再拜謝不敏明年春先生亡矣越四年其子恕見予於燕京予盡以其書付之又二年藁城令董君彦明益以所藏釐為四十五巻與其丞趙君壽卿倡義募工将鏤其板以夀其傳囑為引子謂先生之學之大本諸天理質諸人情不為孤僻崖異之論如三老三宥五誅七出之說前賢不敢訾議而先生斷之不疑學者當於孔孟而下求之不然殆為不知先生也先生諱若虚慵夫其自號云嵗屠維作噩閏月初吉日後進東明王鶚歛袵書古之君子學博矣猶以為有弗辨辨之弗明弗措也惟然故博而非雜乃其善學經若史群書論議記釋具存而世有博雅之士潛心焉者又詳說将考覈而求其是是殆前乎諸老先生所望乎来者之盛心而余於滹南遺老集讀而知之者以此所尊者經而於傳記百氏弗盡信見到處擺脱窠臼而不依隨以為是非以是談經與史則詩文以下可知也非其學之博而蘄乎辨之明疇克爾嗚呼中原文獻之邦諸老而後百餘年未知隔宇宙有可慨者滹南生乎其間必其遺風餘澤之沾丐者未冺故所學論說源委則然方将抄其㑹余意者随所讀書附記同異切磋究之值風雪凍指欲墜握筆復已里興賢書院行且鏤梓喜而為之識於帙之初閼逢涒灘冬至日前荆䑓冷官彭應龍翼夫序滹南辨惑一書初江左未之聞也至元二十年古滄王公時舉来丞是邦出於行箧始得見之興賢書院謄録刋行迨今十年其板為復翁所得以字多差舛恐誤讀者欲得元本證之而王公去此陞行䑓監察御史尋柄文廣東官輙無定雖欲求之末由也已既幸任廻道過廬陵吾州士夫以棠隂之舊候迎公来就乞校正出脱漏差錯字四百餘公因得改的付局刋換公又以元遺山中州集所載滹南古律詩僅二十篇俾續巻末収書君子幸加詳焉大徳三年二月中和莭雙桂書院王復翁謹書
