body:
  text: 滹南集卷三十三金王若虚撰謬誤雜辨公羊曰君親無將將而誅焉葢接上文將弑君之辭也唐明皇廢王后詔云見無将之心劉從諫理王涯等寃云有如大臣挾有無将之謀自宜執付有司蕭遘斥時􅄎之姦云卑侮王室有無將之萌如何道來後人用此字往往不安也王戎問阮瞻荘老與聖人其㫖同異瞻以將無同答之戎咨嗟良乆乃辟為掾時稱三語掾瞻意葢言同耳晉人例重𤣥學故戎深喜而世多疑之夫将無云者猶無乃得無之類庾亮令褚裒認孟嘉于衆中裒指嘉曰此君小異将無是乎苟晞從子母求為將晞拒之曰吾不以王法貸人将無後悔邪劉裕受禪徐廣攀晉帝車泣涕謝晦謂曰徐君将無小過皆是類也世説載褚裒語正作得無通鑑載謝晦語亦然以此可知其為同世説記三語事則又有衞玠嘲之之辭云一言可辟何假于三葢欲直言其同而不必更加疑耳今通鑑所載既依本文而温公自節本乃改為無同異豈温公于此亦未詳歟而林氏又為之説曰二則有同有同然後有異一則無同無同然後無異求其同且不可得尚可以求異乎何謬妄之甚也後漢陳煒謂孔融幼而聰慧大未必竒融曰觀君所言将不早慧乎將不亦猶將無也葢以煒言融雖早慧而大未必竒故融復言煒既大而不竒則疑于早慧也或謂實言其不早慧誤矣世説云殷仲堪之荆州王東亭曰德以居全為稱仁以不害為名今宰牧華夏處殺戮之任與本操将不乖乎殷曰臯陶造刑辟之制不為不賢孔丘居司冦之任未為不仁南史荀萬秋對策父昶以示釋道琳道琳答曰此不須看若非先見而答貧道不能為若先見而答貧道奴皆能之昶曰此將不傷道德邪答曰大德所以不徳竟不看焉推此類則其義可見矣學者多疑寧馨之義或以為美或以為鄙皆非也山濤目王衍曰何物老嫗生寧馨兒然誤天下蒼生者未必非此人此美之之辭也南史宋王太后怒廢帝曰将刀來破我腹生寧馨兒此鄙之之辭也夫寧馨猶言如此然也今世方言往往有近之者但聲之轉耳故張謂詩以對阿堵劉夢得送日本僧云為問中華學道者幾人雄猛得寧馨平仄雖殊其意一也宋書於太后語加如此字葢誤而不足憑焉魏書作如馨是則大同而小異耳東坡和王居卿平山堂詩云六朝興廢餘丘壠空使姦雄笑寧馨殊無義理特迫于趂韻姑以為王衍之名而已近觀吳曾漫録亦論此字併載王衍廢帝事云晉宋間人以寧馨為不佳故山濤王太后皆以此為詆叱之語豈非以兒為非馨香者邪張劉二詩葢乖其義此大謬也山濤之言分明是歎美安得併謂之詆叱哉又以寧馨為非馨香其鄙陋可笑甚矣洪邁容齋隨筆云劉真長謂殷淵源曰田舍兒強學人作爾馨語又謂桓温曰使君如馨地寧可戰鬬求勝王恬撥王胡之手曰冷如鬼手馨強來捉人臂王導與何充語曰正自爾馨至今吳中人語言多用寧馨字為問猶言若何也予謂邁引晉人語為證是矣若何則義不然惟城陽居士桑榆雜録曰寧猶如此馨語助也此得其當城陽居士桑榆雜録云王衍呼錢為阿堵物東坡和陶詩以阿堵為墻或指佛書云理應阿堵上阿堵如俗言阿底也不應為墻若顧愷之所謂傳神冩照正在阿睹中則阿睹乃眸子耳此字從目按東坡和陶詩云阿堵不解飲誰歟此頽然此亦指墻而言阿底與王衍之呼錢無異豈遂以為墻之名哉愷之語從目者葢一時書冩之偶然或俗子以意改之其實訓義皆一不妨通用然則東坡未嘗以堵為墻而城陽妄認睹為眸子也世説陳元方子羣季方子孝光各論其父功德爭之不決諮於太丘太丘曰元方難為兄季方難為弟葢言其賢相等不能相勝也晉王珣弟珉名出珣右時人為之語曰法䕶非不佳僧彌難為兄法䕶珣小字僧彌珉小字也北齊邢子良愛王晞之清悟與晞兩兄書曰恐足下方難為兄不暇慮其不進此言弟過于兄也後魏杜正元贊云難兄難弟信為美哉此言在昆季中最優也今人作書簡往往呼朋友為難弟難兄其義未安豈别有據乎賀知章曰見紫芝眉宇令人名利之心都盡紫芝元德秀字也今人書簡遂有紫宇之稱不成語矣司馬相如傳曰相如奏大人賦上覧之大悦飄飄有凌雲之志似游天地間意葢武帝好仙而相如所陳皆飛騰超世之語適當其心故自有凌雲之志而學者多以為文辭可以凌雲何也李白詩云相如去蜀謁武帝赤車駟馬生輝光一朝再覧大人作萬乗忽欲凌雲翔此得之矣彼有云髙義薄雲天凌雲徤筆意縱横者非本乎此自不妨左氏言病在膏肓膏盲者胷鬲之間猶心膂肺腹之類耳或遂以膏肓對錮疾是豈病之目邪新唐書李靖傳至謂靖為蕭銑輔公祐之膏肓其謬益甚矣王言如絲其出如綸王言如綸其出如綍此特喻其所出寖大而已世遂以制語為絲綸而職翰苑者謂之掌絲綸又有綸闈綸閣之稱古今相襲恬不以為怪不亦過乎主父偃傳附嚴安上書事索隱曰嚴本姓莊明帝諱後並改為嚴然則遷史本皆莊字而東漢人改書如此也然張湯傳先稱嚴助而復云莊助東越傳又云荘助誥田蚡張倉傳又書荘青翟相如傳首書莊忌夫子至漢書申屠嘉田蚡傳皆作莊青翟而公孫宏傳始作嚴子雜亂不齊葢校定者失之不精耳左傳齊景公更晏子之宅晏子毁之而為里室皆如其舊則使宅人反之且諺曰非宅是卜惟鄰是卜二三子先卜鄰矣吾敢違諸乎予謂自諺以下皆晏子之語也而與傳者語尤無别可乎必有脱字書稱乃心乃祖乃父乃之訓汝也周瑜上孫權疏云是瑜乃心日夜所憂郤正教劉禪語云乃心西悲無日不思揚子雲逐貧賦云昔我乃祖宣其明德沮渠䝉遜謂其衆云吾之乃祖翼奬竇融保寧河右無乃悖乎史記言四皓定太子事云留侯本招此四人之力當作本留侯石慶數馬事云猶然如此當作然猶通鑑稱苻堅喜王猛誅諸豪強云吾始今知天下之有法當作今始郭從謹言于唐明皇云草野之臣必知有今日當作知必徳宗聞李泌補戍卒之説云如此天下復無事矣當作無復權徳輿論光武封子宻事云反乃爵以通侯當作乃反南史齊東昏游獵至蔣山定林寺一沙門病不能去應時殺之左右韓暉光曰老道人可念帝曰汝見獐鹿亦不射邪仍百箭俱發宋蕭琛預御筵醉㐲上以棗投琛琛仍取栗擲上曰陛下投臣以赤心臣敢不戰栗劉瑱妹為鄱陽王妃王死妃追傷成疾瑱令人畫王與平生寵姬共照鏡狀如欲偶寢者宻使媼妳示妃妃視竟仍唾之因罵云故宜其蚤死詳此三仍字皆當作乃南北史中此類甚多豈傳冩之誤耶古人言文集行于世者世間也或有云行于代者代字雖亦訓世義自差殊武三思言我不知代間何者謂之善人何者謂之惡人此本只是世字葢當記録者避太宗之諱故易之而後之作史者遂相仍而不删其實不成語也古人言底事底物底處有底作底底之訓何也今人或認為此字之義誤矣史記平凖書云天下大氐無慮皆鑄金錢漢書食貨志亦同師古曰大氐猶言大凡無慮亦謂大率然則語意重複矣史記稱莊周之書大抵率寓言率亦大抵也退之復志賦云伊時勢而則然子厚夢愈膏肓疾賦云中毉攻有兆之者而則之者而語病也科舉子或時犯之葢不足怪孰謂二公而有是乎孔子言十五志于學至七十而從心所欲不踰矩葢自述其平生次第如此非世之所共也而後人文字中便以知命耳順從心為歲數之稱既巳非是而南齊書文惠太子傳云年始過立劉子元自序云年巳過立豈不愈謬哉曲禮所記自幼學至于期頥皆漢儒強名本無義理而世之俗學亦或以為年齡之目蘇易簡之死未及四十然巳經執政矣或記其事云竟不登彊仕而卒可以一笑班伯與王許子弟為羣在綺襦紈絝之間而非其好紈綺貴戚子弟之服耳劉子元自述其兒童時事云年在紈綺此何謂哉潘岳嘗言予年三十有二始見二毛人之衰白早晩固自不同而庾信哀江南賦序云信始二毛即逢喪亂亦非也楊大年嘗言禮稱四十彊仕七十致事凡仕于公者古制不過三十年大年十一嵗解褐甫四十以疾辭位葢以此予謂曲禮之説出于漢儒所撰以意強名而謂之古制殆不然也夫年及七十不論古制自當退休必曰四十而後仕仕不過三十年則有何義理而考之古人亦曷嘗拘此哉退之叙張巡事云許逺與巡同年生日月後于巡呼之為兄是巡年為長也而新唐書逺傳云遠與巡同年生而長故巡呼為兄未知孰是更當考之文字中有曰同年而語一日之長者予竟不曉同年一日之義當與知者商訂書言百姓凛凛若崩厥角釋者謂既崩其角無所容頭文理甚明而孟子引之曰非敵百姓也若崩厥角稽首已為乖異意者或有闕誤而班固論王莽乃云漢諸侯王厥角稽首舊唐論太宗又云皇威所被黎顙厥角復何謂邪孟子注昏不可曉未敢憑也論語稱有朋自遠方來而後周蕭大圜云有朋自逺揚㩁古今豈成語哉然歐公集古録載後漢一碑已有此語則其繆乆矣南齊巴陵隱王寶義為太尉詔曰不言之化形于自逺尤不可也論語云夫子之言性與天道不可得而聞其文甚明非難辨也而唐太宗旌賞孫伏伽詔曰朕惟寡徳不能性與天道長孫無忌對太宗之問曰陛下性與天道非臣等愚所及令狐徳棻周書贊曰闕里性與天道修六經以維其末何其繆耶論語稱夫子言唯謹爾唯語辭也史記石奮傳遂用唯謹字而後世史傳凡言人性行謹者往往以此為成言豈非習遷之誤耶自東漢以來史傳文集中往往以貽厥為子孫之名友于為兄弟之名至有謂隆於友于傳諸貽厥者公然相襲恬不知怪近世或辨其繆矣然不特此也書稱知人則哲而范曄云則哲之鑒惟帝所難宋文帝云吾無則哲之明沈約云有以見武皇之則哲詩稱王赫斯怒而薛綜上孫權疏云抑雷霆之威忍赫斯之怒又有言發赫斯之命者論語稱色斯舉矣左雄上疏有云或因罪而引髙或色斯以求名者范文正秋香亭賦云資土爰之正味劉平等傳引云鐘鼔非樂云之本孔子曰盍各言爾志又曰君子於其所不知葢闕如也梁簡文論古今文體不同則有俱為盍各之辭司馬貞譏史記不傳季禮則有何為葢闕之語嗚呼學者於義訓幽深隱奥者容有差誤至于此類如辨白黑矣而鹵莽若是其與矇瞽何異哉東坡詩云聖善方當而立歲乃翁巳及古希年此則滑稽以為嬉笑者耳而藝苑雌黄與友于貽厥同譏過矣詩云潸焉出涕語云夫子喟然而嘆潸者涕之貌喟者嘆之聲耳詞人便有涕淚潸拭餘潸坐喟喟也等語殆不可也榖梁曰三軍之士粲然皆笑粲只是笑貌耳宋子京筆記曰粲明也萬衆皆啓齒齒既白故以粲義包之其謬論不必辨也柳文言世塗昏險云擬歩如漆却是地黑也歐詩言夜色晦冥云舉手向空如抹漆却是皮膚黑也今韻略定上下字有可疑者其訓上字也在上聲則曰方将欲上去聲則曰元在物上及訓下字乃反之何邪柳下惠言伐國者不問仁人此葢拒魯侯之辭耳慕容徳勸燕主暐伐秦遂曰願獨斷聖慮無訪仁人豈所謂以意逆志者哉彼夷虜之人葢不足責然世之書生類此者亦多矣蒯通曰天下匈匈争欲為陛下所為顧力不能霍去病顧方畧何如耳不至學古兵法師古訓顧為念揚雄解嘲云顧嘿而作太𤣥五千文師古曰顧反也二義皆非葢此等字不能形容但可意會耳茅璞三餘録云孟嘉墓誌桓温問聽妓絲不如竹竹不如肉之意答以漸近自然晉史更之曰漸近使之然殊失其㫖葢肉聲者歌也不假于物故曰自然嘉之意謂絲聲之假合不如竹聲之漸近竹聲之漸近又不如肉聲之自然也然古人以歌謳名者如王豹綿駒秦青之流皆男子也而此專言聽妓則知俚語所謂詞出佳人口者其來巳乆以古意推之歌舞管絃不必專言聽妓予謂璞表出墓誌之語以證晉史之失殊快人意至其分别漸近自然之義及辨論妓字皆非也葢漸近自然總言三節只是一意而云假合不如漸近漸近不如自然何邪聽妓即聽音樂也本作伎教坊記謂太常樂人為聲伎兒舊唐李勣臨終與家人别堂上奏女妓通鑑賀蘭敏之居䘮釋縗經奏妓葢妓伎二字本通用也魏志鍾繇議田疇讓封爵事曰子路拒牛仲尼謂之止善雖可激清勵濁猶不足多裴松之曰按吕氏春秋子路拯溺者其人拜之以牛子路受之孔子曰魯人必拯溺矣與繇所引不同未審繇誤或别有所出予謂此皆小説寓言縱有所出亦何足信哉魏略曰華歆與邴原管寧相善時號三人為一龍歆為頭原為腹寧為尾裴松之謂原之徽猷懿望無媿華公寧含徳髙蹈恐難為尾魏略之言未可以定其先後所評固善然劉義慶世説亦載此事葢云寧為頭歆為尾乃與松之意合不知所傳果孰為真也謝安初不就徴辟夫人劉氏見家門富貴而安獨靜退謂曰丈夫不如此也安掩鼻曰但恐不免耳說者皆以為恐不免富貴而吳曾漫録云恐不免禍難此於不免字固亦可通然以掩鼻之意觀之似不爾也類説張尚書故實云梁武帝令殷鐵石於大王書中搨一千字不重者每字片紙雜碎無序召周興嗣曰卿有才思為我韻之興嗣一日編綴進上鬚髪皆白殆謬説也此文雖不足觀然皆偶儷韻語要是人之所撰豈有漫取不重之字而適能相就乎或言本晉武時鍾繇撰進年代乆逺又因兵火壞亂不能成章上乃令興嗣韻之是則有理矣江鄰幾雜志云歐陽永叔知舉太學生劉幾試卷鑿紕俄有間歲詔幾懼改名煇既試永叔在詳定所升作狀元劉原父曰永叔有甚憑據予謂不然公本疾其怪僻故特黜落以厲風俗及變其體則從而取之此乃有憑據也正使知其為幾亦必喜之矣且公以斯文為百姓師豈幾輩可得而眩亂哉原父素與公爭名故多譏戯之語而鄰幾猥録之予不得不辨滹南集卷三十三
