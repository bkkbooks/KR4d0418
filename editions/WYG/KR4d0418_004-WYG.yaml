body:
  text: 滹南集巻四金王若虛撰論語辨惑曾子曰吾日三省吾身疏義以為三次而晦庵所謂稱三事殊不同昔有人自言一日三㸃檢程氏聞之曰可哀也哉其餘時句當甚事盖傚三省之說錯了意謂君子之學造次不忘則不待旋加省也舊說順於本文而新說有功於學者姑兩存之子曰弟子入則孝出則弟至行有餘力則以學文南軒曰非謂行此數事而後學文也以是為本而以餘力學文耳說甚佳子夏曰賢賢易色至吾必謂之學矣舊疏云此章論生知美行雖學亦不是過吴氏曰子夏之意善矣然其弊将至於廢學南軒曰非謂不待夫學也欲使務其本耳不曰不學而曰未學意有涵蓄矣其說皆非盖此本言巳學非未學也亦曰觀其行足以卜其學而已韓退之嘗云苟行事適其宜出言得其要雖不吾面吾将信其富於文學也意與此同劉正叟曰其人既能此等之事而自言未學吾必謂之學盖此等非學不能也是為得之晦庵曰人之為學大要不過欲為是四者而已故如是之人雖或以為未嘗學我必謂之已學意亦無異然云不過四者則失之狭盖四者行之大也舉四者則餘可知矣學則不固舊說以固為蔽而新說曰固堅也不能敦重則學亦不能堅以語法律之舊說為長毋友不如己者東坡曰世之陋者樂以不已若者為友則自足而日損故以此戒之是謂不以辭害意如必勝己而後友則勝己者亦不與吾友矣其說甚佳林少頴乃通上句為義曰忠信不與己同者不與為友此正疑其害意而為之遷就也子曰三年無改於父之道可謂孝矣夫可改者不待三年不可改者雖終身不可改學者數能辨之然其為說過正者何多也東坡曰君子之䘮親常若見之雖欲變之而其道無由是之謂無改父之道葉少藴曰古者凡言三年之䘮素冠刺不能三年是也當以三年無改為句終三年之間而不變其在䘮之意則於事父之道可謂之孝胡寅曰於之為言依近慕思之意也執三年之䘮而依近慕思不必變焉可謂孝矣非指父道而言三說之曲不辨可知鄭厚則疑其有為言之而弟子不善記歐公直謂出於妄傳而非夫子之云此亦過也㳺定夫曰三年無改者言在所當改而可以未改者耳南軒曰此言其常也若非道之甚不待三年斯盡之矣盖聖人固有决定之論亦有姑言大體而不盡其變者非止此事也學者一槩用之而不能以意逆志故常蔽而不通者昔牟融鮑昱援引此義以遂漢明之非幾累孝章之初政而近代小人復有持繼述之說以誤天下者豈不誣經詭聖人之甚哉子曰詩三百一言以蔽之曰思無邪東坡曰易稱無思無為寂然不動感而遂通天下之故凡有思者皆邪也而無思則土木也何能使有思而無邪無思而非土木乎此孔子之所盡心也作詩者未必有意於是孔子取其有㑹於吾心者耳孔子之於詩有斷章之取也如必以是說施之於詩則彼所謂無斁無疆者當何以說之此近時學者之蔽也予謂蘇子此論流於釋氏恐非聖人之本㫖楊龜山曰書曰思曰睿作聖孔子曰君子有九思思可以作聖而君子於貌言視聼必有思焉而謂有思皆邪可乎詩三百出於國史未能不思而得然皆止乎禮義則所謂無邪也其說當矣且孔子論詩而以其本語蔽之則所取者固詩人之意也彼之意未必然而吾以為然果孔子之心乎抑蘇氏之鑿也已自為鑿而反病時學之不通亦過矣孟武伯問孝子曰父母惟其疾之憂舊說以為疾病之外不可妄為非法貽憂於父母或曰父母愛子之心惟恐其有疾人子體此而以父母之心為心則凡所以守其身者無不謹亦可以為孝予謂從新說則文順從舊說則意完然皆有益於教當並存之子曰視其所以觀其所由察其所安人焉廋哉夫曰視曰觀曰察文之變耳晦庵曰觀詳於視察又詳於觀此幾王氏之鑿矣雖若有理然聖人之意恐不在是子貢問君子子曰先行其言而後從之晦庵載周氏之說曰行之於末言之前言之於既行之後觧者雖多無近於此子曰知之為知之不知為不知是知也䟽云此是真知當矣又曰若其知之反隐曰不知及不知而言我知皆非也上句何必如此觧伊川曰以為不知而求之則當知之故云是知也推而演之亦似有理然聖人語下本不及此則未免為曲說晦庵曰雖或不能盡知而無自欺之蔽亦不害其為知意巳定矣而復曰由此而問有必知之理則又流於程氏之曲而不覺也謝顯道曰當知者不可不知如死生之說鬼神之情状是也不可知者不必知如千嵗之逺六合之外是也倘能識别於此則可謂知所存心矣亦可謂能充是非之心矣故云是知誕妄之甚不足論也子張學干禄孔子告之以慎言行東坡曰子張學干禄将以自售也孔子言禄在其中教之以不求而自至者也其說甚佳舉直錯諸枉則民服舊說以為任正人廢邪枉而程氏之徒多作事之枉直此亦可通然夫子答樊遲知人之說曰舉直錯諸枉能使枉者直而子夏證之以舜湯伊臯不仁者逺則舊說是矣殷因於夏禮所損益可知也孔子言三代相因損益可知者此專指禮而云爾馬融以所因為三綱五常所損益為文質三統殆是妄說而朱氏取之盖未當也孔子謂季氏八佾舞於庭是可忍也孰不可忍也晦庵曰季氏以大夫而僣用天子之樂此事尚忍為之則何事不可忍為或曰忍容忍也盖深疾之之辭予謂前說為優子曰人而不仁如禮何人而不仁如樂何晦庵曰記者序於八佾雍徹之後疑其為僣禮樂者發此殊有理勝於泛論者矣子入太廟每事問釋者曰籩豆之事有司存焉時王之制或損或益聖人容有不知故不得不問雖知亦問敬慎之至也予謂此說皆通然亦止是初入一次耳若毎如此則偽而不情矣宰我對哀公問社孔子聞之曰成事不說遂事不諫既徃不咎觧者莫能通張九成以為㣲言隐語可以意㑹而不可以訓詁唯當時哀公宰我孔子知之此却本分儀封人曰天将以夫子為木鐸逹巷黨人曰大哉孔子博學而無所成名二子可謂深知聖人者矣而記者不著其姓名殆為闕典也子謂韶盡善而武不然古今論者皆曰堯舜揖讓湯武征誅所以優劣不同世之淺丈夫遂敢以湯武為非至有詆毁而幾乎罵者甚矣其無知也予嘗論之堯舜湯武皆古聖人而其所行皆天理初無優劣之殊質之五經論孟亦未嘗有不足於湯武之意直後人所見者小耳以常道觀之以臣伐君與夫授國他人而廢其子均為不順自不得已之變而論之則堯舜之傳賢湯武之除害無非公天下之大義也故夫論湯武之事者亦决其果是與非而已是則為義非則為賊豈特優劣之分哉然則湯何為而慙武何為而未盡善曰湯之慙憂後世也亂臣賊子無湯之志而襲其跡者得以為口實是則湯之所病也何嘗以桀為不可伐哉武未盡善此謂傳其樂者耳伊川曰說者以征誅不及揖讓跡固不及然其聲音莭奏亦有未善者樂記曰有司失其傳也若非有司失其傳則武王之志荒矣孔子自衛反魯然後樂正乃知未正之前不能無錯亂者此說是矣而復以其跡為不及盖亦未脱於流俗之見邪子曰富與貴是人之所欲也不以其道得之不處也貧與賤是人之所惡也不以其道得之不去也說者雖多皆莫能通予謂貧與賤當云以其道得之不字非衍則誤也若夷齊求仁雖至餓死而不辭非以道得貧賤而不去乎夫生而富貴不必言不處生而貧賤亦安得去此所云者盖儻来而可以避就者耳故有以道不以道之辨焉若謂聖人之經不當變易以就己意則寕闕之而勿講要不可隨文而強說也子曰朝聞道夕死可矣注䟽以為不聞世之有道其說甚繆程氏曰人不可以不知道夕死可者是不虚生也斯為得之東坡云未聞道者得䘮之際未嘗不失其本心而况死生乎子由亦云一日聞道雖死可以不亂所謂過於深者也子曰放於利而行多怨南軒曰不得其欲則怨謂怨出於己也伊川曰利於己必害於人所以多怨謂怨出於人也二者皆通但未知聖人之㫖果安在耳至王補之乃云不獨己多怨乎人人亦多怨乎己是則過矣夫子以一貫之道語曾子曾子然之而不疑門人問焉則曰忠恕而已說者遂以忠恕為貫道之實嗚呼忠恕固脩身之要要之只是两端何足貫夫子之道乎東坡曰一以貫之者難言也雖孔子莫能名之故曾子唯而不問知其不容言也雖然論其近似使門人庶幾知之不亦可乎曰非門人之所及也非其所及而告之則眩而失其真矣然則盍亦告之以非其可及乎曰不可門人将自鄙其所得而勞心於其所不及思而不學去道益逺故告之以忠恕此曾子之妙也子由進䇿曰盡天下萬物之理而制其所當處是之謂一然則一者所以主宰衆善使之不過者耳夫子又嘗語子貢矣曰予非多學一以貫之何晏曰善有元事有㑹天下殊塗而同歸百慮而一致知其元則衆善舉可謂近之矣及至此章乃置而不論盖亦惑於忠恕之語故與或者又言彼是論學此是論道是亦不然其寔一理耳近觀論語集義楊龜山周氏㳺氏皆以忠恕為姑應門人之語則疑此者不獨東坡也予故從之或謂曾子所見寔在於此猶仁者謂之仁智者謂之智而已以中庸所載違道不逺之言凖之亦似有理然而决非夫子之一也尹彦明曰孔子於曾子不待其問而告之曾子亦深喻曰唯至於子貢不足以知之故先發多學之問果以為然又復疑其不然而請焉雖聞夫子之言猶不能如曾子之唯也子貢之學不及曾子如此范純夫亦云先攻子貢之失而後告以至要洪邁破其說曰二子皆孔門髙弟也其聞言而唯與夫聞而不復問皆以黙悟於言意之表矣先儒所以卑子貢者為其先然夫子多學之㫖耳是殆不然方聞聖言如是遽應曰否非弟子所以敬師之道故對曰然而繼之以非與之請豈為不能知乎予謂洪氏之論深盡人情故表而出之程明道曰忠者天道恕者人道忠者體恕者用伊川曰維天之命於穆不已忠也乾道變化各正性命恕也謝氏曰忠譬則川流不息恕譬則萬物散殊夫聖人之道誠髙逺而洪深至於忠恕之義人亦易辨矣而諸公張大之如是盖其意必欲極一貫之妙故耳恐未必然子謂南容邦有道不廢邦無道免於刑戮以其兄之子妻之又曰南容三復白圭孔子以其兄之子妻之孔子果因何事而妻容也曰凡為女擇配取其相當非止一端恐未可以此等斷聖人之意也弟子徒謂聖人之妻人必不苟然故於諸處認之而附會耳宋儒釋三復白圭之義曰有意慎言所以邦有道不廢邦無道免禍盖遷就其事云孔子以子妻公冶長而兄子妻南容或謂南容之賢差愈於公冶長聖人所以避嫌程氏破其說甚當林少頴云其所以相接而成文者盖弟子見其事相類故從而録之本無異義使聖人於此而有公私之辨是則漢之第五倫矣其論尤佳滹南集巻四
