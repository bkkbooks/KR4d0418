body:
  text: 滹南集巻八金王若虚撰孟子辨惑孟子謂說詩者不當以文害辭辭害意以意逆志是為得之趙氏曰欲使後人深求其意以觧其文不但施於說詩也此最知言盖孟子之書隨機立教不主故常凡引人於善地而已故雖委巷野人之所傳苟可駕説以明道皆所不擇其辭勁其氣厲其變縱横而不測盖急於救世而然以孔子㣲言律之若参差而不合所以生學者之疑誠能以意逆志而求之如合符契矣趙氐雖及知此而不能善為發明是以無大功於孟子司馬君實著所疑十餘篇盖淺近不足道也蘇氏觧論語與孟子辨者八其論差勝自以去聖人不逺及細味之亦皆失其本㫖張九成最號深知者而復不能盡如論行仁政而王王者之不作曲為䕶諱而不敢正言而猥曰王者王道也此猶是鄭厚輦所見至於對齊宣湯武之問辨任人食色之惑皆置而不能措口嗚呼孟子之意難明如此乎伊川觧取傷亷曰如朋友之饋是可取也然已能自足則不可取取之便傷亷子以為孟子之意止謂於義何如耳豈論已之有無哉義所當取也已雖有餘取之何害果不當取雖其不足亦不可也其說與傷惠則曰可以無與而與之則却於合者無以與之如博施濟衆固聖人所欲也然五十者方衣帛而七十者方食肉如使四十者衣帛五十者食肉豈不更好然力或不足則當衣帛食肉者反不足矣所以傷惠此又迂濶之甚也孟子亦曰與之不當則将以為惠而適害之耳何勞曲說嗚呼明經如程氏亦可謂難得矣然時有此等故未能盡厭乎人心仲尼不為己甚者盖毎事適中皆無大過耳或者見論語疾不仁之言及孟子論泄栁叚干木事亦有已甚字遂專以此意觧之失之拘矣然已甚之事在他人或有之非所以論仲尼也聖人於本分之外無毫末之過豈至於已甚而後不為乎南軒觧久假而不歸曰假之則非真有矣而謂烏知其非有此闡幽以示人之意盖五霸暫假而遽歸者也使其假而能久久而不歸則必有非苟然者孰曰非已有乎盖有之者不係於假而假於不歸耳孟子斯言與人為善而開其自新之道所以待天下後世者可謂𢎞裕矣其説甚好晦庵曰假之終身而不知其非真有又云假之雖久終非已物陋哉斯言也天下之人不能皆上性君子多方教人要以趨於善而已故利而行之勉強而行之皆在所取以為成功則一也若如朱氏之言自非堯舜舉皆徒勞而無益誰復可進哉方渠未成書時嘗有此義質於南軒南軒答之如今所說而卒從已意甚矣好髙而不通也東坡曰假之與性亦異矣使孔子觀之不終日而决何不知之有嗚呼孟子豈誠不能辨此乎蘇氏幾於不觧事孟子曰男女授受不親禮也嫂溺援之以手者權也東坡曰嫂溺援之亦禮也與李泰伯之說同夫孟子云此固正禮然有時而從權耳豈謂權即非禮乎二子可謂以辭害志矣子産以乘輿濟人於溱洧孟子曰惠而不知為政夫橋梁之政野人皆知之曾謂子産而不及知乎此必有司之不職或偶圮􅇄而子産適見因以救一時之急豈專以此為惠而孟子亦豈誠譏子産哉盖世有不知本末如移民移粟遺衣遺食之徒故借其事以為戒耳東坡遂以孟子為失張子韶既知其出於一時而復求子産之病以實孟子之言是皆非也東坡以孔子去食存信之義破孟子禮輕食色重之論以為使從其說則禮之亡無日矣張九成亦疑其非而置之不說予謂不然子貢以去取為决故孔子以去取决之任人以輕重相明故孟子以輕重明之其勢然爾使任人之問如子貢之問則孟子之所答亦将如孔子之所答矣孟子之言未可瑕疵南軒頗見其㫖但辭不能逹耳孟子語人毎言性善此止謂人之資禀皆可使為君子盖誘掖之教而蘇氏曰孟子有見於性而離於善善非性也使性而可以謂之善則亦可以謂之惡其說近於釋氏之無善惡辨則辨矣而非孟子之意也吕東莱曰以君子之言借小人之口發之則天下見其邪而不見其正以小人之言借君子之口發之則天下見其正而不見其邪是故大誥之篇入於王莾之筆則為姦説陽虎之語編於孟子之書則為格言非變其言也氣變則言隨之變也慵夫曰此論似髙而實非也言之邪正顧人何如豈氣所能變哉莾之文姦固不待辨而陽虎之語人皆疑焉夫陽虎志於為富而不在仁故以仁之害富者言之孟子志於為仁而不在富故以富之害仁者言之陽虎若曰為仁則不得致富故為富者不暇顧仁孟子若曰為富則必致賊仁故為仁者不當務富此其所以異耳先儒曰言有可採不以人廢誤矣虎之口豈有善言哉至於仁富不能兩立則理勢之固然者故孟子舉之以為滕文厚歛之戒自反而不縮雖褐寛博吾不惴焉不字為衍不然則誤耳此甚明白而釋者依違不辨何也孟子必有事焉而勿忘之說或以心字屬上句或以屬下句予以文勢觀之語皆不安中間或有脱誤未可為斷然之說也章子出妻屏子終身不養此止是畜飬之飬若所謂女子小人為難飬者而注䟽晦庵皆云不使養已即是奉養之意當作去聲讀非也吕東莱䇿問進士孟子論孔子集大成之說云譬之金玉則智始而聖終譬之巧力則聖至而智中以智為尚則害前説以聖為尚則害後說此雖一時科舉之文實有可疑學者不得不辨也以予觀之當云智譬則力聖譬則巧後說字誤耳孟子對齊宣聞誅一夫紂未聞弑君也而說者疑焉予以為警時君之語耳滹南集巻八
