body:
  text: 滹南集卷三十一金王若虚撰著述辨惑詩書以序冠篇首葢一篇總是一意故可也論孟一章是一意不相附屬故記者但取其中三兩字以為名如學而為政梁惠王公孫丑之類非作者之意也揚子法言隨問而答論孟之體耳而各取首章之意以為序曰譔某篇無乃失其宜歟昔人以杜預顔師古為丘明孟堅忠臣近世趙堯卿文伯起之于東坡亦以此自任予謂臣之事主美則歸之過則正之所以為忠觀四子之所發明補益信有功矣然至其失處亦往往䕶諱而曲為之説恐未免妾婦之忠也外紀通鑑之贅也道原初勸温公始于上古或自堯舜公曰平王以來事包春秋孔子之經不可損益又勸其始於獲麟之歲則曰經不可續也道原既稱其可法而卒為此書葢好名而不自禁因之託附以傳世耳觀其序可以見矣然勉強牽合至取戰國諸子謬妄之說以實其事固不若不作之愈也司馬貞史記索隱其所發明不為無補然所失亦多至述贊諸篇殊不足觀葢為蛇畫足欲益而反弊者顧乃髙自矜誇譏子長之未周豈不可笑哉語孟之書本無篇次而陋者或強論之已不足取司馬貞述史記以為十二本紀象歲星之一周八書法天時之八節十表放剛柔十日三十世家比月有三旬七十列傳取懸車之暮齒百三十篇象閏餘而成歲妄意穿鑿乃敢如此不已甚乎史記評騶衍云或言伊尹負鼎而勉湯以王百里奚飯牛車下而繆公用霸作先合然後引之大道騶衍其言雖不軌儻亦有牛鼎之意乎所謂牛鼎即上飯牛負鼎之事耳而貞解為函牛之鼎云衍之術迂大若大用之有牛鼎之意何其曲也東坡之解經眼目儘髙往往過人遠甚而所不足者消息玩味之功優柔渾厚之意氣豪而言易過于出奇所以不及二程派中人王安石書解其所自見而勝先儒者纔十餘章耳餘皆委曲穿鑿出於私意悖理害教者甚多想其於詩於周禮皆然矣謬戾如此而使天下學者盡廢舊説以從已何其好勝而無忌憚也宋人解書者惟林少頴眼目最高既不若先儒之窒又不為近代之鑿當為古今第一而邇來學者但知有夏僎葢未見林氏本故耳夏解妙處大抵皆出于少頴其以新意勝之者有數也張九成談聖人之道如豪估市物鋪張誇大惟恐其不售也天下自有公是公非言破即足何必呶呶如是哉論孟解非無好處至其穿鑿迂曲不近人情亦不勝其弊矣吕東萊自謂左氏博議乃少年場屋所作淺狹偏暗皆不中理力戒後學誦習而終身刻意者讀詩大事記二書而已以予觀之博議雖多浮辭而其所發明往往出人意表實有補于世教讀詩記乃反平常無甚髙論大事記非不簡古然不作亦可也東萊謂學者所當朝夕從事者程氏易傳范氏唐鑑謝氏論語胡氏春秋予素不明易程氏傳未敢知若謝氏胡氏之書嘗略觀之大抵喜為鑿説過正者多惟唐鑑實為純粹耳滹南集卷三十一
