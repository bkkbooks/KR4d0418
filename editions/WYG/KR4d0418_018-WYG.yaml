body:
  text: 滹南集巻十八金王若虛撰史記辨惑史記用而字多不安今畧舉甚者齊世家云郤克使於齊使夫人帷中而觀之晉世家云襄公之六年而趙衰卒景公時而趙盾卒平公十二年而趙武為正卿苟卿傳云齊襄公時而荀卿最為老師魯仲連傳云趙孝成王時而秦王使白起破長平之軍伍子胥傳云呉國内空而公子光乃令專諸襲刺呉王僚又云呉與越平其後五年而吴王聞齊景公死而大臣争寵新君弱多上一而字聶政傳云嚴仲子奉黄金百鎰前為聶政母夀固進而聶政謝曰云云又云夫賢者以感忿睚眦之意而親信窮僻之人而政安得嘿然而已乎多中間一而字呂不韋傳云不韋以五百金與子楚為進用結賔客而復以五百金買竒物玩好而西逰秦多上一而字趙堯問髙帝曰陛下所為不樂非為趙王年少而戚夫人有隙也陛下萬嵗之後而趙王不能自全乎多下一而字也字亦剩韓信傳云趙軍戰不勝欲還歸壁皆漢赤幟而大驚賈生傳生以為漢興至孝文二十餘年天下和洽而固當改正朔易服色韓生傳云自是之後而燕趙間言詩者由韓生此等而字皆當去之直不疑為郎同舍有告歸者悞持同舍郎金去金主意不疑不疑買金償而告歸者来而亾金者大慙多兩而字李廣與望氣王朔燕語曰自漢擊匈奴而廣未嘗不在其中而諸部校尉以下才能不及中人然以擊胡軍功取侯者數十人而廣不為後人無尺寸之功以得封邑者何也三而字皆剩上一然字却作而字則惬當矣司馬遷用於是乃遂等字冗而不當者十有七八今畧舉之如殷武丁夢傅說事云於是乃使百工營求之野既有乃字何須更云於是鄭文公妾夢天與之蘭曰以是為而子以告文公文公幸之而與之草蘭為符遂生子名曰蘭遂字殊不安若云既而生子遂名曰蘭則可晉世家云武王與叔虞母㑹時夢天謂己曰余命生女子名虞及生子有文在其手曰虞故遂因命之曰虞故遂因三字豈可連用鄭世家亦舉此事則云遂以命之何巧於彼而拙於此也曹沬刦齊桓公求所侵地許之既而欲倍約管仲以為不可於是乃遂割魯侵地其病猶晉世家言叔虞事也趙世家記程嬰杵臼事云乃二人謀取他人嬰兒負之乃字却當作於是或云二人乃謀則順矣范雎說秦王云臣聞善治國者乃内固其威而外重其權多却乃字蒙毅對胡亥云臣乃何言之敢諫何慮之敢謀乃字為悖語意亦乖髙帝斬白蛇有老嫗哭之人問何哭嫗曰云云人乃以嫗為不誠欲笞之乃字當去田横二客自頸髙帝聞之乃大驚多却乃字叔孫通傳云上見留侯所招客入見云上乃遂無易太子志乃遂二字當去其一惠帝即位乃謂叔孫生曰云云惠帝出逰離宫叔孫生勸上取櫻桃獻宗廟上乃許之二乃字皆贅曹參謂惠帝云陛下自察聖武孰與髙帝上曰朕乃安敢望髙帝其病如蒙毅語袁盎謂絳侯非社稷臣絳侯望盎盎遂不謝多却遂字㶚陵尉呵止李廣廣騎曰故李将軍尉云今将軍當不得夜行何乃故也乃字不安伏生傳孝文時欲求能治尚書者天下無有乃聞伏生能治之石建為郎中令事有可言屏人恣言極切至廷見如不能言者是以上乃親尊禮之周仁傳云武帝立以為先帝臣重之仁乃病免三乃字皆不安滹南集巻十八
