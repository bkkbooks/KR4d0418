body:
  text: 滹南集巻十四金王若虚撰史記辨惑姓名冗複辨夏本紀云禹之父曰鯀鯀之父曰帝顓頊顓頊之父曰昌意昌意之父曰黄帝禹者黄帝之𤣥孫而顓頊之孫也禹之曾大父昌意及父鯀皆不得在帝位為人臣劉子𤣥史通㸃煩云顓頊紀中具言黄帝是顓頊祖矣此篇云禹是顓頊孫則其上不得更言黄帝之𤣥孫既云昌意及鯀不得在帝位則下文不當復云為人臣也遂除五十七字誠大中其病然遷書率皆此類可勝道哉今略舉之如此紀既明叙啟為禹之子矣及即位又曰帝啟禹之子衛世家既明叙蒯聵為出公之父矣又蒯聵立又曰是為荘公荘公者出公之父也晋世家既明叙公子重耳為獻公之子矣及重耳立又曰是為文公晋文公重耳晉獻公之子也其後又曰重耳即位為晋君是為文公晋厲公八年閏十二月欒書中行偃囚厲公迎公子周而立之是為悼公悼公元年正月書等弑厲公知罃迎公子周来至絳刑雞與大夫盟而立之是為悼公魯世家云宣公卒子成公黒肱立是為成公管蔡世家云武王同母兄弟十人長曰伯邑考次曰武王發次曰管叔鮮次曰周公旦次曰蔡叔度次曰曹叔振鐸次曰成叔武次曰霍叔處次曰康叔封次曰冉季載冉季載最少同母兄弟十人唯發旦賢左右輔文王故文王舎伯邑考而以發為太子是為武王夫冉季載次第在末自可知其最少何必更言前已言同母兄弟十人亦何必重舉前既稱武王發何必又云是為武王武王賢而立止宜入本紀耳康叔封冉季載既見於此矣而衛世家復云康叔名封武王同母少弟其次尚有冉季載季載最少蔡平侯卒靈侯盤之孫東國攻平侯子而自立是為悼侯悼侯父曰隐太子友者靈侯之太子平侯立而殺隠太子故平侯卒而隐太子之子東國攻平侯子而代立是為悼侯田完世家云田乞卒子常代立是為田成子及常卒又云常謚為成子吴王濞傳既云髙帝兄劉仲之子也而又云劉仲子沛侯濞年二十有氣力義縱傳既云縱有姊姁以醫幸王太后而又云拜義姁弟縱為中郎若是之類皆當為史通之所㸃也史記稱人姓名冗複為甚正是不及諸史處殷紀云武丁以雉雊而懼祖已曰王勿憂先修正事祖巳乃訓王曰此止當云乃訓之曰世家云勾踐棲㑹稽欲殺妻子燔寶器觸戰以死大夫種止勾踐曰止當云止之陳世家云孔寕儀行父請殺洩冶公弗禁遂殺洩冶止當云遂殺之吴世家云季札使於鄭見子産如舊交謂子産曰鄭之執政侈難将至矣止當云謂之趙世家云自叔帯以下五世而生趙夙晋獻之十六年伐霍魏耿而趙夙為將伐霍中間多趙夙字又云趙盾卒子朔嗣趙朔景公之三年朔為晋将下軍救鄭中間多趙朔字丁公為項羽逐窘髙祖彭城西短兵接髙祖急顧丁公曰两賢豈相厄哉於是丁公引兵而還漢王遂觧去及項羽滅丁公謁見髙祖髙祖以丁公徇軍中曰丁公為項王臣不忠使項王失天下者丁公也遂斬丁公曰使後世為人臣者無效丁公安用許多丁公字邪蕭相國世家論云蕭相國何於秦時為刀筆吏録録未有竒莭及漢興依日月之末光何謹守管鑰因民之疾奉法順流與之更始謹守管鑰上多却何字周昌嘗燕時入奏事髙帝方擁戚姬昌還走帝逐得騎周昌項止當云騎其項髙后使使召周昌周昌至謁髙后髙后怒而罵周昌止當云既至后怒而罵郅都為中尉丞相條侯至貴倨也而都揖丞相止當云常揖之臨江王徴詣中尉府對簿臨江王欲得刀筆為書謝上而都禁吏不與魏其侯使人以間予臨江王多两臨江王字止當云欲得刀筆以間予之竇太后中都漢法於是遂斬郅都止當云于是斬之主父偃傳云是時徐樂嚴安俱上書言世務各一事徐樂曰云云嚴安上書曰云云重却上書二字天子召見三人乃拜主父偃徐樂嚴安為郎中止當云俱拜為郎中偃以齊王自殺下吏上欲勿誅公孫𢎞曰主父偃本首惡陛下不誅主父偃無以謝天下乃遂族主父偃止當云不誅無以謝天下遂族之張湯傳云上疑湯有姦問湯湯不謝湯又佯驚多一湯字董仲舒傳云弟子以次相受業或莫見其面盖三年董仲舒不窺於園何必更言姓名郭觧得罪公孫𢎞議當大逆無道遂族郭觧翁伯翁伯觧之字傳首既著之此尤為贅劉子𤣥駁遷書曰宋世家初云襄公即位而仍謂宋襄公吴世家云闔閭越世家云勾踐皆於其號上加吴王越王字勾踐未嘗捨之其論甚當然此乃遷全體之病也凡稱某王類加國號凡舉人名毎連姓氏冗複蕪穢最是不滿人意處班范而下乃始浄盡焉滹南集巻十四
