body:
  text: 滹南集巻十一金王若虚撰史記辨惑取舎不當辨遷史之例惟世家最無謂顔師古曰世家者子孫為大官不絶也諸侯有國稱君降天子一等耳雖不可同乎帝紀亦豈可謂之世家且既以諸侯為世家則孔子陳涉将相宗室外戚等復何預也抑又有大不安者曰紀曰傳曰表書皆篇籍之目也世家特門第之稱猶彊族大姓云爾烏得與紀傳字為類也然古今未有知其非者亦可怪矣然則列國宜何稱曰國志國語之類何所不可在識者定之而已史記諸世家徃徃隨年附見他國大事至於列傳亦或有之徒亂其文無闗義理夫左氏編年本紀諸國之事或先經以始事或後經以終義互相發明故可也如遷史者各有傳記足以自見何必爾邪近代蘇子容嘗自言其強記之法云吾毎以一嵗中大事為目欲記當年事則不忘矣如某年改元其年有某事某年命相其年有某事則記事之一法也太史公書恐亦此意嗚呼史書法言也豈徒備強記而已哉蘓氏之說不足信魯世家有云徃年冬晉殺其君厲公孔子世家有云明嵗子路死於衛子路傳有云是時子貢為魯使於齊魏世家有云其後十四嵗而孔子相魯夫當年事且不宜附而又及徃年明嵗同時十數年之後者何邪禹之平水土箕子之作洪範史但言其事目足矣而全載二書甚無謂盖聖經自傳不待表出徒增冗滯耳劉子𤣥唯知孟堅地理志全冩禹貢之非而不譏遷史之謬何邪遷採摭異聞小說習陋傳疑無所不有許由之事既知其非矣而又惑於箕山之塜殆是胸中全無一物也史記老子傳訓誨孔子如門弟子而孔子嘆其猶龍者盖出於荘周寓言是何足信而遂以為實録乎至於成王剪桐以封唐叔周公吐握以待士孔子不假盖於子夏曾子以蒸梨而出妻皆委巷之談戰國諸子之所記非聖賢之事而一切信之子由為古史遷之妄謬去之殆盡矣而猶有此等盖可恨云伯夷傳云余悲伯夷之意暏軼詩可異焉傳曰云云傳曰二字吾所不曉索隐云謂吕氏春秋韓詩外傳也信如是說則遷記古人事孰非摭諸前書者而此獨稱傳乎新城三老董公遮說漢王以為兵出無名故不成明其為賊敵乃可服者此殊切於義理故孟堅全載其說而遷但云說以義帝死故大簡而不備矣且止於義帝死故則謂之告可也何必云說哉吕后之名既列於本紀而其事跡始末亦隨處具見而外戚世家又云吕娥姁為髙祖正后男為太子及戚姬等事恐不須也若唐武氏事跡猥多紀中所不可悉故再入后妃傳其例自别吕后紀末云代王立為天子二十三年崩謚為孝文皇帝按此言代王為天子但以終誅吕之事耳其崩與謚則本紀自具何必及之邪吕后紀先云封吕嬃為臨光侯不言嬃之為誰而後乃云太后女弟吕嬃失其次矣豈前所稱者别為一人邪漢文諸詔班固皆書詔而遷稱上曰按其文意當以詔字為是竇嬰傳云景帝欲用嬰嬰固辭上曰天下方有急王孫寕可讓耶王孫嬰之字也班氏著之傳首是矣今遷不著讀者何以知之始既不著則當云字謂耳然嬰貴戚大臣非他附見者亦不宜用此法也義縱傳云寗成家居上欲以為郡守御史大夫𢎞曰臣居山東為小吏時寗成為濟南都尉其治如狼牧羊成不可使治民上乃拜為闗都尉嵗餘闗東吏𨽻郡國號曰寕見乳虎無值寗成之怒此正當入本傳而書於縱傳何耶雖下有破碎其家事亦不須也張湯傳云趙禹為人亷倨為吏以来舎無食客公卿相造請禹禹終不報謝務在絶知交賔客之請孤立行一意已見文法輙取亦不覆案求官屬隂罪此叚與湯事非必相須亦止當併於禹傳至亷頗趙奢張蒼周昌魏其武安等傳皆是類也律書之首以為律為萬事根本而其於兵械尤重武王伐紂吹律聼聲推孟春以至於季冬殺氣相并而音尚宫同聲相從乃物之自然此固可矣乃復備論帝王以来用兵之事而終於漢文厭兵百姓樂業幾七百言何闗於律意哉斯實無謂之甚而邵氏極稱之以為此其髙古雄深非他人拘窘所能到者嗚呼文章必有規矩凖䋲雖六經不能廢顧乃以踈闊為髙深緻宻為拘窘何等繆論也又有謂此本為兵書者若果兵書復安用許多律吕事大都皆出於畏遷而不敢議其非故妄云云耳史之立傳自忠義孝友循吏烈女儒學文苑與夫酷吏佞倖隐逸方術之類或以善惡示勸戒或以技能備見聞皆可也至於滑稽㳺侠刺客之屬既已幾於無謂矣乃若貨殖之事特市井鄙人所為是何足以汚編録而遷特記之乎班固徒譏遷之稱述崇勢利而羞賤貧然亦不知其傳之不必立也是故襲而存之范曄而下皆無此目得其體矣史記索隐謂司馬相如傳不宜在西南夷下大宛傳不宜在酷吏㳺侠之間此論固當然凡諸夷狄當以類相附則匈奴亦豈得在李廣衛青之間乎循吏儒林而下一莭之人皆居列傳之末盖得體矣及至刺客乃獨第之李斯之上循吏則第之汲鄭之上復何意哉滹南集巻十一
