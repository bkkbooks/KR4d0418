front:
  text: 滹南遺老集卷之三十二
  hash: sha256:ba23a5fbd09cf2fdda5eeab7a91e1ae6001912b794ba91a7f8b83e6015900eea
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0418_SBCK_032-1a}
body:
  text: 滹南王若虛從之雜辨舊說孔子問禮於老𥅆而𥅆所著書専薄禮學論者疑别有老子豫謂𥅆雖不喜禮學然以大賢而嘗仕於周其於典故豈無所聞亦猶萇宏之於樂郯子之於官名孔子問之亦何足怪但不知果嘗問與否耳蓋自莊周寓言設老𥅆訓孔子事以自尊而漢儒記禮有聞諸老𥅆之語世遂信之夫司馬遷最喜老子者然其為傳尚不能詳其主名及生於何代安知果與孔子同時哉莊周詆訾孔子之徒蓋其學本於黃老加以天資刻薄猖狂恣睢而無忌憚則其輕蔑吾儒無足怪者東坡乃謂實豫而文不豫陽擠而隂助之譬楚公子微服出亡其僕操箠而罵以為倒行而逆施者此出於愛周而强為解釋也彼公子之僕權以濟事不得已焉耳周之於孔子其有不得已者乎舜命群臣自伯禹而下二十二人姓名職掌見於虞書班班可考也而左傳載李文子八愷八元之說何所本哉杜預以八愷為垂益禹臯陶之倫八元為稷契朱虎熊羆之屬蓋妄相配合耳且書言禹作司空宅百揆契為司徒敷五教而文子則云使八愷主后土以揆百事使八元布五教于四方是八愷同任禹之􅕄而八元並預契之政也無乃戾乎其言四凶亦與書不合此殆誣謬而杜氏强為解䆁無足憑焉學者盍亦言乎經而已季文子言元愷世濟其美而堯不能舉四族世濟其凶而堯不能去舜能舉而去之故天下同心歸戴夫堯舜百王之冠冕皆聖人也使堯誠不舉善而去惡尚足為聖乎此固無稽而劉道原以為堯知舜於側微而天下未服故遺之大功二十丨亦妄意之說也文王遇吕尚於渭濱曰自吾先君太公曰當有聖人適周周以興子真是邪吾太公望子久矣故號之曰太公望此以三字為義而世遂單稱太公如周召之類或又以望子為名皆非也至范睢傳載秦昭王語云周文王得吕尚以為太公齊桓公得管仲以為仲父今范君亦寡人之叔父此又直謂以先君呼之矣豈不愈謬哉經傳稱秦伯為穆公或亦作繆是二字通用也而䝉恬對胡亥云秦穆公殺三良而死罪百里奚而非其罪故立號曰繆然則二字義殊繆當音靡幼反矣不知恬何據而云且二字既殊豈得並舉邪唐髙定年七歲讀湯誓問父郢曰奈何以臣伐君郢曰應天順人何云伐邪對曰用命賞於祖不用命戮於社是順人乎郢異之按湯誓云爾尚輔豫一人致天之罰豫其大賚汝爾不從誓言豫則孥戮汝而已定之所舉乃甘誓之詞也臯陶謨曰知人則哲能官人安民則惠黎民懷之文理甚明而唐劉乃云虞書稱知人則哲能官人則惠鹵莽如此豈其有所脫遺邪屈原離騷有漁父篇賓主問答其辭華麗而雜以韻語此蓋假設以見意與小居一體耳司馬遷乃取以為傳劉子元既知其非矣而班固古今人表遂列漁父之名使誠有斯人者觀其所言不過委順從俗以求自全者耳何遽至九等中第二哉退之雜說曰馬之能千里者一食常盡粟一石食不飽力不足則才美不外見而不可求其能千里又以食之不盡為不知馬嗚呼千里之材固有異於常馬者然亦非徒善食而後能也退之平生以貧而號於人歎一飽之不足者屢矣豈其有激而云耶劉原父自號公是先生貢父號公非先生貢父云是其所是為易非其所非為難或評王介甫明於知君子暗於知小人豫謂此皆過論也非者是之對也小人者君子之反也能是其是則能非其非能知君子則能知小人矣世豈有能識白而不能識黑能辨東而不能辨西者乎魯直與其弟幼安書曰老夫之書本無法也但觀世閒萬緣如蚊蚋聚散未嘗一事橫於胸中不擇筆墨遇𥿄則書𥿄盡則已亦不計較工拙與人之品藻譏彈譬如木偶舞中節拍人歎其工舞罷則又蕭然矣此論甚高然彼於文章翰墨實刻意而好名者殆未能充其言也蓋嘗自跋其書云學書四十年今夜所謂鰲山悟道書又曰星家言子六十不死當至八十茍如其言當以善書名天下是可喜也觀此二說其得謂無心者乎工欲善其事必先利其器山谷嘗以三錢雞毛筆書蓋不得已耳誠使佳者固當有閒而云在手不在筆此一時誇辭非中理之論也滹南遺老集卷三十二
