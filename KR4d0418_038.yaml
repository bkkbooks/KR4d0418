front:
  text: 滹南遺老集卷之三十八
  hash: sha256:46e90a150be0675952aac1b1b094c23260f02e7ec097b868026661c20de50fa5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0418_SBCK_038-1a}
body:
  text: 滹南王若虚從之詩話世所傳千註杜詩其間有曰新添者四十餘篇吾舅周君徳卿嘗辨之云唯瞿塘懐古呀鶻行送劉㒒射惜别行為杜無疑自餘皆非本真盖後人依仿而作欲竊盗以欺世者或又妄撰其所從淂誣引名士以為助皆不足信也東坡甞謂太白集中徃往雜入他人詩盖其䧺放不擇故得容偽于少陵則决不能豈意小人無忌惮如此其詩大抵鄙俗狂瞽殊不可訓盖學歩邯郸失其故態求居中下且不得而欲以為少陵真可憫笑王直方詩話既有所取而鮑文虎杜時可間為註說徐居仁復加編次甚矣世之識真者少也其中一二雖稍平易亦不免蹉跌至于逃難觧憂送崔都水聞惠子過東溪巴西觀漲及呈竇使君等尤為無状洎餘篇大似出于一乎其不可亂真也如糞丸之在隋珠不待選擇而後知然猶不能辨焉世間似是而相奪者又何可勝数哉予所以發憤而極論者不獨為此詩也吾舅自幼為詩便祖工部其教人亦必先此嘗與予語及新添之詩則頻蹙曰人才之不同如其靣焉耳目鼻口相去亦無幾矣然諦視之未有不差殊者詩至少陵他人豈得而亂之哉公之持論如此其中必有所深得者頋我軰未之見耳表而出之以俟明眼君子云吾舅嘗論詩云文章以意為之主字語為之役主强而役弱則無使不從世人往往驕其所役至䟦扈難制甚者反役其主可謂深中其病矣又曰以巧為巧其巧不足巧拙相濟則使人不厭唯甚巧者乃能就拙為巧所謂逰戲者一文一質道之中也雕琢太甚則傷其全經營過深則失其本又曰頸聨頷聨𥘉無此說特後人私立名字而巳大抵首二句論事次二句猶須論事首二句状景次二句猶須状景不能遽止自然之勢詩之大略不外此也其論篤實之論哉史舜元作吾舅詩集序以為有老杜句法盖得之矣而復云由山谷以入則恐不然吾舅児時便學工部而終身不喜山谷也若虚嘗乘間問之則曰魯直䧺豪竒險善為新様固有過人者然于少陵𥘉無関涉前軰以為得法者皆未能深見耳舜元之論豈亦襲舊聞而發歟抑其誠有所見也更當與知者訂之謝靈運夢見惠連而得池塘生春草之句以為神助石林詩話云世多不觧此語為工盖欲以竒求之耳此語之工正在無所用意猝然與景相遇借以成章故非常情之所能到冷齋云古人意有所至則見于情詩句盖寓也謝公平生喜見惠連而夢中得之此當論意不當泥句張九成云靈運平日好雕鎸此句得之自然故以為竒田承君云盖是病起忽然見此為可喜而能道之所以為貴予謂天生好語不待主張苟為不然雖百說何益李元膺以為反覆求之終不見此句之佳正與鄙意暗同盖謝氏之誇誕猶存兩晉之遺風後世惑于其言而不敢非則宜其委曲之至是也梅聖俞爱嚴維栁塘春水漫花塢夕陽遲之句以為天容時態融和駘蕩如在目前或者病之曰夕陽遲繋花而春水漫不繋栁苕溪又曰不繋花而繋塢予謂不然夕陽遅固不在花然亦何関乎塢哉詩言春日遲遲舒長之貌耳老杜云遅日江山麗此復何所繋耶彼自詠自然之景如棃花院落溶溶月栁絮池塘淡淡風𥘉無他意而論者妄為云云何也裴光約詩云行人折栁和輕絮飛燕䘖泥帶落花或曰栁常有絮泥或無花苕溪以為得其膏肓此亦過也㩀一時所見則泥之有花不害于理若必以常有責之則絮亦豈所常有哉栁公權殿閣生㣲涼之句東坡罪其有羙而無箴乃為續成之其意固佳然責人亦已甚矣吕希哲曰公權之詩巳含規諷盖謂文宗居廣厦之下而不知路有暍死也洪駒父嚴有翼皆以爲然或又謂五絃之薰所以觧愠阜財則是陳善閉邪責難之意此亦强勉而無謂以是爲諷其誰能悟予謂其實無之而亦不必有也規諷雖臣之羙事然燕閒無事從容談笑之暫容得順適于一時何必盡以此而繩之哉且事君之法有所寛乃能有所禁畧其細故于平素乃能辨其大利害于一朝若夫煩碎廹切毫髪不恕使聞之者厭苦而不能堪彼将以正人為仇矣亦豈得為善諌耶杜詩稱李白云天子呼來不上船呉虎臣漫録以為范傳正太白墓碑云明皇泛白蓮池召公作引時公巳𬒳酒于翰苑中乃命髙将軍扶以登舟杜詩盖用此事而夏彦剛謂蜀人以襟領為船不知何所據苕溪叢話亦兩存之予謂襟領之說定是謬妄正使有據亦豈詞人通用之語此特以船字生疑故爾委曲然范氏所記白𬒳酒于翰苑而少陵之稱乃市上酒家則又不同矣大抵一時之事不盡可考不知太白凡幾醉明皇凡幾召而千載之後必于傳記求其證邪且此等不知亦何害也老杜北征詩云見耶背靣啼吾舅周君謂耶當為即字之誤其說甚當前人詩中亦或用耶娘字而此詩之體不應爾也近代詩話云杜詩云皁鵰寒始急白氏歌云千呼萬唤始出來人皆以為語病其實非也事之終始則音上聲有所宿留則音去聲予謂不然古人淳致𥘉無俗忌之嫌盖亦不必辨也荆公云李白歌詩豪放飄逸人同莫及然其格止于此而已不知變也至于杜甫則發歛抑揚疾徐縱横無施不可盖其緒宻而思深非淺近者所能窺斯其所以光掩前人而後來無繼也而歐公云甫之于白得其一節而精强過之是何其相反歟然則荆公之論天下之公言也退之雪詩有云随車翻縞帶逐馬散銀杯世皆以為工予謂雪者其先所有縞帯銀杯因車馬而見耳随逐工二宇甚不妥歐永叔江隣幾以㘭中𥘉盖底垤䖏遂成堆之句當勝此聨而或者曰未知退之真得意否以予觀之二公之評論寔當不必問退之意也退之謁衡嶽詩云手持盃珓導我擲云此最吉餘難同吉字不安但言靈應之意可也退之詩云豈不旦夕念為爾惜居諸居諸語辭耳遂以為日月之名旣已無謂而樂天復云廢興相催逼日月互居諸恩光未報荅日月空居諸老杜又有童卯聨居諸之句何也退之詩云泥盆淺小詎成池夜半青蛙聖得知言𥘉不成池而蛙已知之速如聖耳山谷詩云羅幃翠幕深調䕶巳𬒳㳺蜂聖得知此知字何所屬耶若以属蜂則𬒳字不可用矣孔毅父雜說譏退之笑長安富兒不觧文字飲而晚年有聲伎罪李干軰諸人服金石而自餌流黄陳後山亦有此論甚矣其妄議人也紅裙之謂亦曰惟知彼而不知此盖詞人一時之戲言非遂以近婦人為諱也且詩詞豈當如是論而遽以為口實邪其罪李于軰特斥其燒煉丹砂而祈長生耳病而服藥豈所禁哉樂天固云退之服硫黄一病訖不全則公亦因病而出于不得巳𥘉不如于軰有所冀幸以致斃也抑前詩復有盤饌羅羶軰之句以二子䋲之則又當不敢食肉矣崔䕶詩云去年今日此門中又云人靣祗今何䖏去沈存中曰唐人工詩大率如此雖兩今字不恤也劉禹錫詩云雪裏髙山頭白早又云于公必有髙門慶自注云髙山本髙于門使之髙二義殊三山老人曰唐人忌重叠用字如此二說何其相反歟予謂此皆不足論也宋之問詩有云年年歲歲花相似歲歲年年人不同或曰此之問甥劉希夷句也之問酷爱知其未之傳人懇乞之不與之問怒乃以土袋壓殺之此殆妄耳之問固小人然亦不應有是年年歲歲歲嵗年年何等陋語而以至殺其所親乎大抵詩話所載不足盡信池塘生春草有何可嘉而品題者百端不巳荆公金牛洞六言詩𥘉亦常語而晁無咎附之楚辝以為二十四字而有六籍羣言之遺味書生之口何所不有哉樂天詩云楚王疑忠臣江南放屈平晉朝輕髙士林下棄劉伶一人常獨醉一人常獨醒醒者多苦志醉者多歡情歡情信獨善苦志竟何成夫屈子所謂獨醒者特以爲孤潔不同俗之喻耳非真言飲酒也詞人往往作寔事用豈不誤哉樂天之詩情致曲盡入人肝脾随物賦形所在充满殆與元氣相侔至長韻大篇動数百千言而順適愜當句句如一無爭張牽强之態此豈撚断吟鬚悲鳴口吻者之所能至哉而世或以淺易輕之盖不足與言矣郊寒白俗詩人類鄙薄之然鄭厚評詩荆公蘇黄軰曽不比数而云樂天如栁隂春鶯東野如草根秋蟲皆造化中一妙何哉哀樂之真發乎情性此詩之正理也皮日休詠房杜詩云黄閣三十年清風一萬古此言十古萬古春者皆是無窮之意今下一字便有所止矣滹南遺老集卷三十八
