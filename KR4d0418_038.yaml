front:
  text: 滹南遺老集卷之三十八
  hash: sha256:46e90a150be0675952aac1b1b094c23260f02e7ec097b868026661c20de50fa5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0418_SBCK_038-1a}
body:
  text: 滹南王若虛從之詩話世所傳千注杜詩其間有曰新添者四十餘篇吾舅周君德卿嘗辨之云唯瞿塘懷古呀鶻行送劉㒒射惜别行為杜無疑自餘皆非本真蓋後人依仿而作欲竊盜以欺世者或又妄撰其所從淂誣引名士以為助皆不足信也東坡嘗謂太白集中往往雜入他人詩蓋其雄放不擇故得容偽于少陵則決不能豈意小人無忌憚如此其詩大抵鄙俗狂瞽殊不可訓蓋學步邯鄲失其故態求居中下且不得而欲以為少陵真可憫笑王直方詩話既有所取而鮑文虎杜時可間為注説徐居仁復加編次甚矣世之識真者少也其中一二雖稍平易亦不免蹉跌至于逃難解憂送崔都水聞惠子過東溪巴西觀漲及呈竇使君等尤為無狀洎餘篇大似出于一乎其不可亂真也如糞丸之在隋珠不待選擇而後知然猶不能辨焉世間似是而相奪者又何可勝數哉豫所以發憤而極論者不獨為此詩也吾舅自幼為詩便祖工部其教人亦必先此嘗與豫語及新添之詩則頻蹙曰人才之不同如其靣焉耳目鼻口相去亦無幾矣然諦視之未有不差殊者詩至少陵他人豈得而亂之哉公之持論如此其中必有所深得者顧我輩未之見耳表而出之以俟明眼君子云吾舅嘗論詩云文章以意為之主字語為之役主強而役弱則無使不從世人往往驕其所役至跋扈難制甚者反役其主可謂深中其病矣又曰以巧為巧其巧不足巧拙相濟則使人不厭唯甚巧者乃能就拙為巧所謂逰戲者一文一質道之中也雕琢太甚則傷其全經營過深則失其本又曰頸聨頷聨𥘉無此説特後人私立名字而巳大抵首二句論事次二句猶須論事首二句狀景次二句猶須狀景不能遽止自然之勢詩之大略不外此也其論篤實之論哉史舜元作吾舅詩集序以為有老杜句法蓋得之矣而復云由山谷以入則恐不然吾舅兒時便學工部而終身不喜山谷也若虛嘗乘間問之則曰魯直雄豪竒險善為新樣固有過人者然于少陵𥘉無關涉前輩以為得法者皆未能深見耳舜元之論豈亦襲舊聞而發歟抑其誠有所見也更當與知者訂之謝靈運夢見惠連而得池塘生春草之句以為神助石林詩話云世多不解此語為工蓋欲以竒求之耳此語之工正在無所用意猝然與景相遇借以成章故非常情之所能到冷齋云古人意有所至則見于情詩句蓋寓也謝公平生喜見惠連而夢中得之此當論意不當泥句張九成云靈運平日好雕鎸此句得之自然故以為竒田承君云蓋是病起忽然見此為可喜而能道之所以為貴豫謂天生好語不待主張苟為不然雖百説何益李元膺以為反覆求之終不見此句之佳正與鄙意暗同蓋謝氏之誇誕猶存兩晉之遺風後世惑于其言而不敢非則宜其委曲之至是也梅聖俞愛嚴維栁塘春水漫花塢夕陽遲之句以為天容時態融和駘蕩如在目前或者病之曰夕陽遲繫花而春水漫不繫栁苕溪又曰不繫花而繫塢豫謂不然夕陽遲固不在花然亦何關乎塢哉詩言春日遲遲舒長之貌耳老杜云遲日江山麗此復何所繫耶彼自詠自然之景如梨花院落溶溶月栁絮池塘淡淡風𥘉無他意而論者妄為云云何也裴光約詩云行人折栁和輕絮飛燕䘖泥帶落花或曰栁常有絮泥或無花苕溪以為得其膏肓此亦過也據一時所見則泥之有花不害于理若必以常有責之則絮亦豈所常有哉栁公權殿閣生微涼之句東坡罪其有美而無針乃為續成之其意固佳然責人亦已甚矣吕希哲曰公權之詩巳含規諷蓋謂文宗居廣厦之下而不知路有暍死也洪駒父嚴有翼皆以為然或又謂五絃之薰所以解愠阜財則是陳善閉邪責難之意此亦強勉而無謂以是為諷其誰能悟豫謂其實無之而亦不必有也規諷雖臣之美事然燕間無事從容談笑之暫容得順適于一時何必盡以此而繩之哉且事君之法有所寬乃能有所禁略其細故于平素乃能辨其大利害于一朝若夫煩碎迫切毫髮不恕使聞之者厭苦而不能堪彼將以正人為仇矣亦豈得為善諌耶杜詩稱李白云天子呼來不上船吳虎臣漫録以為范傳正太白墓碑云明皇泛白蓮池召公作引時公巳𬒳酒于翰苑中乃命髙將軍扶以登舟杜詩蓋用此事而夏彥剛謂蜀人以襟領為船不知何所據苕溪叢話亦兩存之豫謂襟領之説定是謬妄正使有據亦豈詞人通用之語此特以船字生疑故爾委曲然范氏所記白𬒳酒于翰苑而少陵之稱乃市上酒家則又不同矣大抵一時之事不盡可考不知太白凡幾醉明皇凡幾召而千載之後必于傳記求其證邪且此等不知亦何害也老杜北征詩云見耶背靣啼吾舅周君謂耶當為即字之誤其説甚當前人詩中亦或用耶娘字而此詩之體不應爾也近代詩話云杜詩云皂雕寒始急白氏歌云千呼萬唤始出來人皆以為語病其實非也事之終始則音上聲有所宿留則音去聲豫謂不然古人淳致𥘉無俗忌之嫌蓋亦不必辨也荆公云李白歌詩豪放飄逸人同莫及然其格止于此而已不知變也至于杜甫則發斂抑揚疾徐縱橫無施不可蓋其緒密而思深非淺近者所能窺斯其所以光掩前人而後來無繼也而歐公云甫之于白得其一節而精強過之是何其相反歟然則荆公之論天下之公言也退之雪詩有云隨車翻縞帶逐馬散銀杯世皆以為工豫謂雪者其先所有縞帶銀杯因車馬而見耳隨逐工二宇甚不妥歐永叔江鄰幾以坳中𥘉蓋底垤處遂成堆之句當勝此聨而或者曰未知退之真得意否以豫觀之二公之評論實當不必問退之意也退之謁衡嶽詩云手持杯珓導我擲云此最吉餘難同吉字不安但言靈應之意可也退之詩云豈不旦夕念為爾惜居諸居諸語辭耳遂以為日月之名既已無謂而樂天復云廢興相催逼日月互居諸恩光未報答日月空居諸老杜又有童卯聨居諸之句何也退之詩云泥盆淺小詎成池夜半青蛙聖得知言𥘉不成池而蛙已知之速如聖耳山谷詩云羅幃翠幕深調護巳𬒳遊蜂聖得知此知字何所屬耶若以屬蜂則𬒳字不可用矣孔毅父雜説譏退之笑長安富兒不解文字飲而晚年有聲伎罪李干輩諸人服金石而自餌流黃陳後山亦有此論甚矣其妄議人也紅裙之謂亦曰惟知彼而不知此蓋詞人一時之戲言非遂以近婦人為諱也且詩詞豈當如是論而遽以為口實邪其罪李于輩特斥其燒煉丹砂而祈長生耳病而服藥豈所禁哉樂天固云退之服硫黃一病訖不全則公亦因病而出于不得巳𥘉不如于輩有所冀幸以致斃也抑前詩復有盤饌羅羶輩之句以二子繩之則又當不敢食肉矣崔護詩云去年今日此門中又云人靣祗今何處去沈存中曰唐人工詩大率如此雖兩今字不恤也劉禹錫詩云雪裏髙山頭白早又云于公必有髙門慶自注云髙山本髙于門使之髙二義殊三山老人曰唐人忌重疊用字如此二説何其相反歟豫謂此皆不足論也宋之問詩有云年年歲歲花相似歲歲年年人不同或曰此之問甥劉希夷句也之問酷愛知其未之傳人懇乞之不與之問怒乃以土袋壓殺之此殆妄耳之問固小人然亦不應有是年年歲歲歲嵗年年何等陋語而以至殺其所親乎大抵詩話所載不足盡信池塘生春草有何可嘉而品題者百端不巳荆公金牛洞六言詩𥘉亦常語而朝無咎附之楚辝以為二十四字而有六籍羣言之遺味書生之口何所不有哉樂天詩云楚王疑忠臣江南放屈平晉朝輕髙士林下棄劉伶一人常獨醉一人常獨醒醒者多苦志醉者多歡情歡情信獨善苦志竟何成夫屈子所謂獨醒者特以為孤潔不同俗之喻耳非真言飲酒也詞人往往作實事用豈不誤哉樂天之詩情致曲盡入人肝脾隨物賦形所在充滿殆與元氣相侔至長韻大篇動數百千言而順適愜當句句如一無爭張牽強之態此豈撚斷吟鬚悲鳴口吻者之所能至哉而世或以淺易輕之蓋不足與言矣郊寒白俗詩人類鄙薄之然鄭厚評詩荆公蘇黃輩曽不比數而云樂天如栁隂春鶯東野如草根秋蟲皆造化中一妙何哉哀樂之真發乎情性此詩之正理也皮日休詠房杜詩云黃閣三十年清風一萬古此言十古萬古春者皆是無窮之意今下一字便有所止矣滹南遺老集卷三十八
