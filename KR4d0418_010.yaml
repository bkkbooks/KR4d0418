front:
  text: 滹南遺老集卷之十
  hash: sha256:60e58b1078bdfe28e48daec0aa00f617335ed9b4f30922dd22a13c3f62080634
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0418_SBCK_010-1a}
body:
  text: 滹南王若虛從之史記辨惑二採托之誤辨下左傳昭公二十年十月齊景公疥遂痁期而不瘳梁邱據與裔欵言于公曰吾事鬼神豐于先君有加矣今君疾病是祝史之罪也盍誅祝史晏子不可曰民人若病夫婦皆詛祝有益也詛亦有損雖其善祝豈能勝億兆人之詛十二月晏子侍公于遄臺梁邱據馳而造焉飲酒樂公曰古而無死其樂若何晏子曰古而無死則古之樂也君何得焉昔爽鳩氏始居此地季前因之有逄伯陵因之蒲姑氏因之而後太公因之古若無死爽鳩氏之樂非君所願也二十六年冬齊有彗星齊侯使禳之晏子曰無益也祇取誣焉天道不諂不二其命若之何禳之齊侯與晏子坐于路寢公嘆曰美哉室其誰有此乎晏子曰敢問何謂也公曰吾以為在德對曰如君之言其陳氏乎列子曰景公遊于牛山臨其國城而流涕曰美哉國乎鬱鬱芉芉若何去此國而死乎使古無死者寡人將去斯而之何史孔梁邱據從而泣晏子獨笑于旁公曰寡人今日之逰悲孔與據皆從而泣子之獨笑何也對曰使賢者而常守之則太公桓公常守之矣使有勇者而常守之則莊公靈公常守之矣數君者將守之吾君方將被蓑笠而立乎畎𤱔之中惟事之恤何暇念死乎則吾君又安得此位而立焉以其迭處之迭去之至于君也而獨為之流涕是不仁也見不仁之君見諂諛之臣臣所為獨竊笑也史記齊世家雜取二書之說云魯昭公三十二年彗星見景公坐柏寢嘆曰堂堂誰有此乎群臣皆注晏子笑公怒晏子曰臣笑群臣諛甚景公曰彗星出東北當齊分野寡人以為憂晏子曰君髙臺深池賦斂如弗得刑罰恐不勝茀星將出彗星何懼乎公曰可禳否晏子曰使神可祝而來亦可禳而去也百姓苦怨以萬數而君令一人禳之安能勝衆口乎嗚呼此一事也而差互不同如是其餘􅍝妄可勝道哉左傳介之推答母之言曰身將隱焉用文之是求顯也史記重下文之二字或言如此意乃足因疑左氏脫誤豫謂不然古人語簡有如此者禮記云晋獻公將殺世子申生公子重耳謂之曰盍言子之志于公乎世子曰不可君安麗姬是我傷公之心也孟子辨百里奚事曾不知以食牛干秦繆公之為汚也可謂智乎亦是類也且遷記漢文之語云吾獨不得亷頗李牧為吾將吾豈憂胸奴哉此復何異而獨疑推之言也雖然亦不可為法也周紀云晉文公召襄王襄王㑹之河陽踐土書諱曰天王狩于河陽按左傳仲尼言以臣召君不可以訓故書曰狩今直云書諱誰得而知也左傳稱晉靈公欲攻趙盾其右提彌明死之又謂𥘉盾田于首山舍于翳桑見靈輒餓而食之後輒為公介禦公徒而免盾問其名居不告而亡夫言其職則明為右而輒為介言其所終則明死輒亡其為二人明矣而史記云桑下餓人即提彌明且又以為宰夫何耶左氏之說未必皆可信然遷之所記實以是為據焉則其舛誤不得不辨也晉世家云趙盾嘗田首山食桑下餓人餓人舍其半日宦三年未知母之存否願遺母夫存否且不知願安所遺乎左傳有今近焉三字于理乃通遷鹵莽而失之耳晉趙盾弟穿弒君董狐書盾弒以示于朝盾不伏狐曰子為正卿亡不越竟反不討賊非子而誰仲尼稱狐為良史左氏云爾晉世家既從之矣而趙世家復云君子譏盾為正卿亡不出境反不討賊故太史書之如此却是先出于士論太史因之而書也文既冗復而意又矛盾無乃不當乎左氏記鉏麑事云盾盛服將朝坐而假寐麑曰不忘恭敬民之主也賊民之主不忠弃君之命不信觸槐而死公羊以為見盾閨門無人且食魚飱嘉其易而儉故爾史記則云盾閨門開居處節麑曰殺忠臣弃君命罪一也乃死吾不知閨門開居處節何以為忠也郤充恥為齊母所笑誓曰所不此報無能涉河左傳云爾齊世家曰不是報不復涉河意既異矣至晋世家則又云不報齊者河伯視之記一事而差殊若是失之不精也左氏曰郤克聘于齊既登婦人笑于房郤克怒故有鞍之役杜注云跛而登階故笑之穀梁子曰季孫行父秃卻克眇衛孫良夫跛曹公子手僂同時聘于齊公羊曰卻克臧孫許聘于齊或眇或跛而史記復云卻克僂魯使蹇衛使眇然則果誰可信乎三傳之不同各記所聞固無足怪史記因傳而出者也不從此則從彼乃又乖異如此何也左傳曰白公勝在吳子西召而用之後以救鄭之故欲殺子西子西聞之曰勝如卵余翼而長之此蓋恃其有思也而史記云勝如卵耳何能為也則是忽其脆弱而已不亦異乎左氏曰吳王闔廬將伐齊越子率其衆以朝王及列士皆有餽賂吳人皆喜惟子胥曰是豢吳也史記改為棄吳此何意邪左氏曰吳王賜子胥死子胥將死曰樹吾墓檟檟可材也吳其亡乎此言時之不久耳史記則云樹吾墓上以􅎚令可為器吾不知何意也吳世家云越王擊吳于檇李使死士挑戰三行造吳師呼自剄吳師觀之越因伐吳敗之越世家亦同賈逵曰死罪人也鄭衆曰欲以死報恩者其說皆不安按左氏云使死士再禽焉不動使罪人三行屬劍于頸而辭曰二君有治臣奸旗鼓不敏于君之行前無所逃刑敢歸死遂自剄蓋死士者敢死勇士也與罪人之事自是兩節而遷混并之故義理不明而說者妄為云云耳左傳云句踐與吳戰于檇李大敗吳師闔閭還卒于陘夫差使人立于庭茍出入必謂已曰夫差而忘越王之殺而父乎則對曰唯不敢忘蓋闔閭既歿夫差使人問已耳而史記曰闔閭將死立子夫差謂曰爾忘句踐殺爾父乎何其不同也秦穆公伐鄭之役考之左傳其諫而止之哭而送其子者獨蹇叔而巳故晉原軫曰秦違蹇叔而以貪勤民穆公曰孤違蹇叔以辱二三子何嘗有百里奚預其間哉而司馬遷記此以為二老同辭不知其何據也左氏云父召孟明西乞術白乙丙使出師又云蹇叔之子與師蹇叔謂孟子曰孟子見吾師之出而不見其入也哭送其子曰吾收爾骨焉蓋孟明輩自為將帥而蹇叔之子則士卒之屬也此亦不相涉而遷以孟明為百里奚子西乞白乙為蹇叔子又何邪或曰孔疏引世族譜云或謂西乞術白乙丙為蹇叔子安知子長别無所據而必以左氏為質乎曰此或有之然是役也主其謀者孟明也再敗不沮卒以得逞使果為百里奚子何奚能苦諌其君而無一言以罪其子也以書觀之穆公自殽敗歸即作秦誓以自悔而遷以為取王官封殽尸之後不亦異乎又云君子聞之皆為垂涕曰嗟乎秦穆之與人周也按左氏云君子是以知秦穆之為君也舉人之周也與人之一也至于孟明子桑皆有贊美之辭凡左氏所謂君子者蓋假之以為褒貶之主而非指乎當時之士也安有所謂聞之垂涕者哉左氏華督遇孔父妻目逆而送之其言甚文史記乃曰目而觀之不成語矣服䖍曰目者極視睛不轉也殆是妄說公羊傳宋南宫萬弒閔公大夫仇牧手劍叱之萬榝不殺之碎其首齒著乎門闔注謂側手曰榝蓋槶碎其首故齒迸門闔耳而史記但云萬搏仇牧齒著門闔死恐先無意楚莊王圍宋城中無食華元夜見子反而告其情子反勉之曰我軍亦有七日之糧盡此將去而歸王聞而責子反子反曰宋猶有不欺之臣可以楚而無乎莊王不得已乃引師去此公羊之說也史記乃謂莊王喜華元之誠自發此言而罷兵豈别有所據耶穀梁曰季孫行父秃晉郤克眇衛孫良夫跛曹公子手僂同時聘于齊齊使秃者御秃者眇者御眇者跛者御跛者僂者御僂者所以有鞍之戰公羊略同啖助以為似街談巷議故削之劉知幾論省字法云當作各以其類者逆之此亦可矣史記乃謂令人如之以導客則是僞效其狀而非真疾也吕氏春秋云管仲有疾桓公問之仲請逺易牙豎刁公子啓方公曰易牙烹其子以慊寡人尚可疑邪對曰人之情非不愛其子也其子之忍又將何有于君公曰豎刁自宫以近寡人尚可疑耶對曰人之情非不愛其身也其身之忍又將何有于君公又曰公子啓方事寡人十五年其父死不敢歸哭尚可疑耶對曰人之情非不愛其父也其父之忍又將何有于君史記亦載之而但云殺子以適君非人情不可自宫以適君非人情難親倍親以適君非人情難近誰得而知其事邪滹南遺老集卷十
