front:
  text: 滹南遺老集卷之十八
  hash: sha256:2fa9c83a0c26137482cf000dca3a9f90c4c1a7f5dc53c13811e0ba88c334ddd6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0418_SBCK_018-1a}
body:
  text: 滹南王若虛從之史記辨惑十史記用而字多不安今略舉甚者齊世家云郤克使于齊齊使夫人帷中而觀之晉世家云襄公之六年而趙衰卒景公時而趙盾卒平公十二年而趙武為正卿荀卿傳云齊襄王時而荀卿最為老師魯仲連傳云趙孝成王時而秦王使白起破長平之軍伍子胥傳云吳國內空而公子光乃令專諸襲刺吳王僚又云吳與越平其後五年而吳王聞齊景公死而大臣爭寵新君弱多上一而字聶政傳云嚴仲子奉黃金百鎰前為聶政母壽固進而聶政謝曰云云又云夫賢者以感憤睚眥之意而親信窮僻之人而政安得默然而巳乎多中間一而字吕不韋傳云不韋以五百金與子椘為進用結賓客而復以五百金買竒物玩好而西遊秦多上一而字趙堯問髙帝曰陛下所為不樂非為趙王年少而戚夫人與吕氏有隙也監本史紀作耶陛下監本作備萬歲之後而趙王不能自全乎多下一而字也字亦剩韓信傳云趙軍戰不勝欲還歸壁皆漢赤幟而大驚賈生傳生以為漢興至孝文二十餘年天下和洽而固當改正朔易服色韓生傳云自是之後而燕趙問言詩者由韓生此等而字皆當去之直不疑為郎同舍有告歸者誤持同舍郎金去金主意不疑不疑買金償而告歸者來而亡金者大慙多兩而字李廣與望氣王朔燕語曰自漢擊丐奴而廣未嘗不在其中而諸部校尉以下才能不及中人然以擊胡軍功取侯者數十人而廣不為後人然無尺寸之功以得封邑者何也三而字皆剩上一然字却作而字則愜當矣司馬遷用於是乃遂等字冗而不當者十有七八今略舉之如殷武丁夢傳説事云于是乃使百工營求之野既有乃字何須更云于是鄭文公之妾燕姞夢天與之蘭曰以是為而子以告文公文公幸之而豫之草蘭為符遂生子名曰蘭遂字殊不安若云既而生子遂名曰蘭則可晉世家云武王與叔虞母會時夢天謂巳曰余命女生子名虞及生子有文在其手曰虞故遂因命之曰虞故遂因三字豈可連用鄭世家亦舉此事則云遂以命之何巧于彼而拙于此也曹沫劫齊桓公求所侵地許之既而欲倍約管仲以為不可于是乃遂割魯侵地其病猶晉世家言叔虞事也趙世家記程嬰杵臼事云乃二人謀取他人嬰兒負之乃字却當作于是或云二人乃謀則順矣范睢説秦王云臣聞善治國者乃內固其威而外重其權多却乃字蒙毅對胡亥云臣乃何言之敢諌何慮之敢謀乃字為悖語意亦乖髙帝斬白蛇有老嫗夜哭人問何哭嫗曰云云人乃以嫗為不誠欲笞之乃字當去田橫二客自剄髙帝聞之乃大驚多却乃字叔孫通傳云上見留侯所招客入見上乃遂無易太子志乃遂二字當去其一惠帝即位乃謂叔孫生曰云云惠帝出逰離宫叔孫生勸上取櫻桃獻宗廟上乃許之二乃字皆贅曹參謂惠帝云陛下自察聖武孰與髙帝上曰朕乃安敢望髙帝其病如蒙毅語袁盎謂綘侯非社稷臣絳侯望盎盎遂不謝多却遂字灞陵尉呵止李廣廣騎曰故李將軍尉曰今將軍尚不得夜行何乃故也乃字不安伏生傳孝文時欲求能治尚書者天下無有乃聞伏生能治之石建為郎中令事有可言屏人恣言極切至廷見如不能言者是以上乃親尊禮之周仁傳云武帝立以為先帝臣重之仁乃病免三乃字皆不妥滹南遺老集卷之十八
