front:
  text: 滹南遺老集卷之二十一
  hash: sha256:1ffe3da30ce88d68b6540d6589cd0600231d5058c9b14189ce4a4ff8cd51f506
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0418_SBCK_021-1a}
body:
  text: 滹南王若虗從之諸史辨惑趙禹傳云公卿相造請禹終不行報謝務在絶知友賔客之請孤立行一意而已此當以不行報謝為句而師古以報謝属下文予固疑之及讀三劉漢書既已刋正矣霍禹怨宣帝曰大将軍墳墓未乾盡外我家反任許史令人不省死師古以為不省有過非也正謂不暁其故猶俚語云沒理㑹殺耳元后傳王莾使安陽侯舜求璽于太后怒罵責之舜仰謂曰臣等已無可言者師古曰言不可諫止此説非也其意盖云不足道而已漢書載楊雄觧嘲其末云司馬長卿竊訾于卓氏東方朔割名于細君顔注謂割損其名而訾字不觧及見華嶠論所引乃作竊貲割炙當以此為正也外戚傳云景帝召程姬姬有所避不願進而飾侍者唐兒使夜進師古以所避為月事子謂所避事不止一端安知必以此乎盖自不湏注也史記平凖書云京師之錢累巨萬韋昭云巨萬今萬萬也范蠡傳徐廣注亦同漢書食貨志言累百巨萬師古注云数百萬萬也梁孝王金銀且百巨萬師古云巨萬百萬也有百萬者言凡百也汲黯傳云中國誅匈奴費以巨萬百数師古云即数百巨萬也此不唯與韋徐不同而其自爲說亦復參差相戾何耶禰衡謂荀或可借面弔䘮注引典畧以爲但有貎耳夫弔䘮主哀安用貎爲意者以其嚴冷而多戚容故也晉書稱苻朗至晋謝安設讌請之朝士盈坐並杌褥壺席朗毎事欲誇之唾則令小兒跪而張口既唾而含出頃復如之坐客以爲不及之逺朗不道如此非人所爲見者皆爲切齒而謂朝士歆羡以爲不及甚㦲史氏之妄且陋也晉史慕容徳時妖賊王始稱帝號其父為太上皇兄為征東将軍弟為征西将軍臨刑或問其父及兄弟所在荅曰太上皇蒙塵于外征東征西亂兵所害惟朕一身獨無聊賴其妻怒曰正坐此口以至于此奈何復爾始曰皇后自古豈有不破之家不亾之國耶行刑者以刀環築之仰視曰崩即崩矣終不改帝號此事當皆必有之然臨刑之語不應一一如是殆滑稽談諧者所餙耳通鑑差略之為是梁武誅齊之諸王鄱陽王寳寅奔魏数冦梁復讎後以謀亂見誅而蕭子顯南齊書乃云中興二年以謀叛與賢攸等同死其誤甚矣北史梁鄱陽王寳寅終于魏南北史一書也既立寳寅于魏朝矣而南史中又略書其事恐止當併于北史又南史作寅而北史作夤二字義殊亦宜從一後漢陳容謂袁紹曰寕與臧洪同日死不與将軍同日生此指當時一日耳而魏書載荘帝之語曰寕與髙貴鄉公同日死不與長道郷公同日生此史亦然此似不可豈秉筆者潤色之過欤通鑑刪之云寕為髙貴鄉公死不為長道鄉公生是矣彭樂髙齊之名将且有大功北史通鑑皆載而李百藥正史乃不為立傳何耶北史楊愔傳常山長廣二王謀廢濟南王愔及朱可渾天和宋欽道皆𬒳拳杖毆擊頭面血流各十餘人持之太皇太后間楊郎何在賀拔仁曰一目已出太皇太后愴然曰楊郎何所能留使不好耶及愔誅太皇太后臨䘮以御金為之一眼親内之曰以表我意盖𥙷其損目也李百藥北齊書但云已出而無一目字豈其脱誤欤隋史髙熲平陳晉王廣欲納張麗華熲曰武王滅殷戮妲已今平陳國不宜取麗華遂斬之王甚不悦通鑑所載其語尤詳而陳書南史乃謂晉王命斬之此必當時秉筆者曲飾主闕而姚思亷李延夀猥承其誤耳跡焬帝所為當以隋史為正舊唐徐有功傳竇孝諶妻龎氏為奴誣告當斬有功明其無罪得減死今上踐阼孝諶子希瑊等請以身之官爵譲有功子惀以報舊㤙按此乃明皇時事言今上者盖唐臣寔錄之詞劉昫偶忘改定耳舊唐王求禮既載于列傳而忠義傳又載之雖繁簡不同要之不當重立求禮剛直敢言固有可嘉而遂㮣之忠義亦非其例也舊唐員半千傳云其先本劉氏十世祖凝之事宋奔元魏以忠烈自比伍員固改姓員按左傳釋文員本作云而半千姓乃讀如運何耶元魯山于蒍于歌學者往往不觧其義予憶昔嘗一見而今亦忘之矣史臣記此自當畧著其詞而唐書通鑑皆不及之殆爲闕典也韓退之驅鰐魚文苦非佳作史臣但書其事目足矣而全録其詞亦何必也史傳有改名者既以今名冠之則亦當全稱今名而未改之前却稱舊名如唐李忠臣成汭之類亦非也五代史梁紀曰太祖神武元聖孝皇帝姓朱氏宋州碭山午溝里人也其父曰誠生三子曰全昱存温云云中和四年九月為檢校司徒同中書門下平章事封沛郡侯光啟二年進爵王十二月徙封吴興郡王秦宗權稱帝遣其将秦賢等攻汴王顧兵少不敢出云云開平元年夏四月甲子皇帝即位他紀皆仿此徐無黨注云始自稱名既而稱爵既而稱帝漸也爵至王而後稱著其逼者子謂帝王本紀既追書尊號以冠其首則一篇皆以尊號為主𥘉書其名曰諱某自後凡見其名雖未即位例皆稱帝或稱上此古今不易之體而歐公乃以新意變之既稱其父曰某而復云生子曰某始而稱名次而稱爵至即位乃書皇帝即位而稱帝此則賔主不分體統不一不足為法也或曰遷固作髙祖紀皆先稱沛公漢王然則亦非也曰庸得爲是乎盖劉子元史通已嘗辨之矣或問苐五倫曰公有私乎對曰昔人有與吾千里馬者吾雖不受毎三公有所選舉心不能忘而亦終不用也吾兄子嘗病一夜十往退而安寝吾子有疾雖不省視而竟夕不寐若是者豈可謂無私乎世皆以爲美談而通鑑獨載遺馬事此既一時之語當俱録之温公自節通鑑以爲更加精擇削其繁蕪斯固可矣然亦時有太過處如漢書郭林宗傳云茅容耕于野與等軰避雨樹下衆皆夷踞相對容獨危坐愈恭林宗見而竒之遽與共言因請寓宿旦日容殺雞為饌林宗謂為已設既而以供其母自以草蔬與客同飯林宗起拜因勸令學通鑑載之畧同而節本直云茅容耕者危坐愈恭殺雞為饌㤗謂為已設容分半食母甚踈已甚不盡事情矣通鑑記或人擬劉祥道破李義府露布事而獨載其一聨云混奴婢而亂放各識家而兢入謂義府多畧人奴婢故也事既瑣細而語尤鄙陋恐不必存唐僖宗責黄巢姬妾軰從賊之罪有對者曰國家以百萬之衆失守宗祧播遷巴蜀今乃以不能拒賊責一女子置公卿将帥于何地通鑑所載如此夫史氏文辭湏量輕重之宜彼婦人率爾之語豈有所謂失守宗祧播遷巴蜀者乎然史傳如此者何可勝数
