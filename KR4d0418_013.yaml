front:
  text: 滹南遺老集卷之十三
  hash: sha256:1ee857f656582690914f015812ae2f29f18e821992ace7327e1b30792fca8a23
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0418_SBCK_013-1a}
body:
  text: 滹南王若虚從之史記辨惑五文勢不相承接辨吕不韋使華陽夫人姊說夫人曰以色事人者色衰而爱弛今夫人事太子甚爱而無子不以此時早自結于諸子中賢孝者舉立以爲嫡子子之夫在則重尊夫百歲之後所子者爲王終不失勢此所謂一言而而萬世之利也中間文勢蹉跌不相承接范睢至秦秦王使舍食草具待命歲餘當是時昭王巳立十六年歲餘下接不得當是時字樂毅使于燕昭王以為亞卿久之當是時齊涽王彊陳平長可娶妻富人莫肯與者貧者平亦恥之久之户牗富人有張負女孫五嫁而夫輙死平欲得之李廣嘗有罪常斬贖為庶人頃之家居数歲皆同病也范増勸項梁立楚後梁乃求楚懐王孫心民間為人牧羊立以為楚懐王文不相接不若云時懐王孫心民間為人牧羊梁求得之為順也留侯世家末云子房始所見下邳圯上老父與太公書者後十三年從髙帝過濟北果見榖城山下黄石取而葆祠之文勢不接不若云始下邳老父所言黄石後十三年從髙帝過濟北果見于榖城山下蕭相國世家客説相國曰君胡不多買田地賤貫貸以自汚上心乃安不相承接淮隂侯傳云其勢非置之死地使人人自為戰今予之生地皆走寕尚可得而用之乎不相承接甚矣汲黯傳云匃奴渾邪王来降至京師賈人與市者坐當死者五百餘人黯曰夫匃奴攻當路塞絶和親中國興兵誅之死傷者不可勝計而費以巨萬百数臣愚以為陛下得胡人皆以為奴婢以賜從軍死事者家所鹵獲因予之以謝天下之苦塞百姓之心今縦不能渾邪率數萬之衆來降虚府庫賞賜發良民侍養譬若奉驕子愚民安知市買長安中物而文吏繩以為䦨出財物于邉関乎陛下縱不能得匃奴之資以謝天下又以㣲文殺無知者五百餘人是所謂庇其葉而傷其枝者也剰今縱不䏻一句不唯語意重叠而其畛畦亦不通也滹南遺老集卷十三
