front:
  text: 滹南遺老集卷之四十三
  hash: sha256:b60af854a011e39a4e806518ff5667a7b1ae10f7373f32a9e50c3f9f4e0016fe
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0418_SBCK_043-1a}
body:
  text: 滹南王若虛從之進士彭子升墓志君諱悅字子升世為真定人父椿將仕郎大興安次主簿子升幼明悟過人倜儻有立志讀書為文悉得其妙處承安五年擢經義進士第調冀州録事判官仁政溫溫民到于今不忘秩滿注濵州鹽管勾徙知鄧州穰縣事其政如其冀而風聲氣熖有加居無何忽得狂疾喪心若物慿者言動可怪自謂冥司有所拘竟赴井死蓋年三十四矣嗚呼異哉子升金玉比德心地坦夷和氣溢于眉睫見者無賢不肖皆悅而親君子謂其必獲善報言論慷慨儀度不凡剛大之氣困而不折及其得志果若固有之君子謂其宜享大任如何不淑至斯極也初將仕君亦以吉人稱鄉里好學而貧甚辛苦憔悴人不堪其病晚登一第則到官未滿而亡僅豫隨奪得不償喪君子謂天之于彭氏也已薄及子升復振而後釋然大慰以謂嗇乎彼者固將豐乎此也乃大不然則夫幽明之說禍福之徴其可以理詰歟子升之在穰也豫為鄭之管城嘗以官事㑹汴梁既畢且散豫歸意甚急子升曰人生行止無常而吾徒㑹合為尤難顧不能更少從容乎豫欣然為一日留痛飲極歡夜艾而罷翌日相别于馬上反顧戀戀彼此有可憐色初豈知其遂為永訣也抑豫心又有所感焉追惟曩昔同居于里中與今恩州司判王君士衡浹水主簿周君晦之忘形莫逆為兄弟交年壯氣鋭馳騁于一時雖方以功名相勉而既嘗有暮年林下之期仍見于文字以傳諸好事者夫豈徒戲語而已哉實庶幾行其志而踐乎此也一旦飄零南北相望如晨星固已歎舊遊之莫繼而後約之無涯孰謂堂堂如子升者而遽云長逝乎世事違人不如意者十八九榮衰聚散未始有極則生者雖存又可保其所終耶故豫于此不獨悼吾良友之不幸而撫事興懷無非可以太息而流涕也子升之殁以大安已已八月之二十四日而其家用明年八月葬于西城之先塋俾豫書而銘之子升娶武氏子一人曰興祖云銘曰既秀而枯有不祛命也奈何已矣悲夫保義副尉趙公墓志公諱彥姓趙氏世為真定藁城人祖某父某皆農隱不仕公少剛果敢為無畏憚天眷間朝廷以南伐徵兵公適出有司即取公兄公聞即走歸自陳彼才力不我若請自代遂行不一辭妻子人義而壯之㑹事平還天資純質治生尤勤儉細故躬親不懈服食器皿期于僅足自餘無毫毛非分用日夕蹙蹙恆若不足教諸子孫及所以語他人亦唯是見諸情侈者咄嗟惡弃殆不能與言故卒大其家以名一邑承安二年以耆老受官保義副尉後二年冬十一月庚子終享年八十八素康彊少疾至是猶能日自興起行步了無床枕滯將終謂其子淵曰吾常歎人之子孫鮮克以義終祖宗積纍之業一旦不難割散之骨肉相視一旦如道路人惡孰甚焉爾其帥下以嚴處之以均無息無頗無速乖離以墮我家其孫曰元英者以進士擢第則又特戒曰惟爾所獲亦惟我祖宗實有慶爾無遂獨庇爾胤必及其餘以答我祖宗意其遺志如此初娶靳氏先公卒晚娶張氏子三人長曰汴以從軍官至敦武校尉次曰溫皆早卒淵其季也女四人長適靳氏次傅氏次周氏王氏男孫八人幼者二餘悉克自立亦或有後女孫九人幼及寡者三餘悉得所歸噫公之所享多矣富貴壽康子孫蕃昌人或一二人之不獲公則兼之兹不多歟故其殁也君子無大恨其家殁後二十一日葬諸先塋祔以靳氏而貴銘于若虛若虛于公為舊親既又為孫壻故辭而不得免銘曰萬事畢一生足斯而慊焉復何欲新宫孔固惟吉卜左右前後皆其族安其神樂其真以利其嗣人焚驢志歲已未河朔大旱逺邇焦然無主賴鎮陽帥自言憂農督下祈雨甚急厭禳小數靡不為之竟無驗既久怪誣之說興適民家有産白驢者或指曰此旱之由也雲方興驢輒仰號之雲輒散不留是物不死旱胡得止一人臆倡衆萬以附帥聞以為然命亟取將焚之驢見夢于府之屬其曰冤哉焚也天禍流行民自罹之吾何預焉吾生不幸為異類又不幸墮于畜獸乘負駕馭惟人所命驅叱鞭箠亦惟所加勞辱以終吾分然也若乃水旱之事豈其所知而欲置斯酷歟孰誣我者而帥從之禍有存乎天有因乎人人者可以自求而天者可以委之也殷之旱也有桑林之禱言出而雨衛之旱也為伐刑之役師興而雨漢旱卜式靖烹弘羊唐旱李中敏乞斬鄭注救旱之術多矣盍亦求諸是類乎求之不得無所歸咎則存乎天也委焉而已不求諸人不委諸天以無稽之言而謂我之愆嘻其不然暴巫投魃既已迂矣今兹無乃復甚殺我而有利于人吾何愛一死如其未也焉用為是以益惡濫殺不仁輕信不智不仁不智帥胡取焉吾子其屬也敢私以欣某謝而覺請諸帥而釋之人情𥘉不懌也未幾而雨則彌月不解潦溢傷禾歲卒以空人無復議驢哀鴈詞并序昔豫居故人安仲和家將殺鴈食客見而不忍為作哀之之詞今三十餘年矣近讀趙公誡殺生文有動于心因追録之以附其後雖文采不足觀者取其意可也烏之逺害宜莫如鴻浩浩長風寥寥逺空邈乎冥𪷟去萬里而無窮顧乃不幸而網羅之中刀機是委饔飱是充吁嗟乎其恫爐且熾鼎且沸宰夫礪刃而欲前坐客垂涎而思噬而猶神意自若低回睥睨不知禍期之行至可不哀邪捕者伊何貪于貨鬻用者伊何悅乎口腹我利我欲物罹其酷是以知人雖有生之至靈而亦其至毒也髙而林莽深而川淵逺而窮邉倮鱗介羽胎卵濕化皆有以致之而陳乎其前封割臠膾蒸燔烹煎濯腥滌翔窮甘極鮮一邑之內一朝之間已有不可勝言者矣人亦嘗以己而推之乎一毛之去皆知惜寸膚之損皆知病所以自待如此其至也而獨于物不為之少憐雖吾之智力可役而君之而彼之蠢愚至死而不能訴然其賦形禀氣同得于天故亦未嘗不苦則慘而樂則舒惡夭閼而重生全奈何暴殄不恤以為當然孰雪其冤孰懲其愆豈天有厚薄固以彼而奉此乎抑𥘉無所主而自生自殖自攘自擊勢强者勝而専不然何其太偏也庖厨之逺君子以為仁已既不忍則假手于他人夫其畏怖之情觳觫之態可以想而知也何必見之之素臨之之親聞之曰物我類也類無分别滋味之在我可賖性命之于彼極切至哉言乎即是佛說亦何必持乎誡律推明罪業觀地獄之變相指刀兵之凶劫人惟為舌之所謾是以安為而不屑嗚呼戒之敢告來哲髙思誠咏白堂記有所慕于人者必有所悅乎其事也或取其性情德行才能技藝之所長與夫衣服儀度之如何以想見其倣佛甚者至有易名變姓以自比而目之此其嗜好趨向自有合焉而不奪也吾友髙君思誠葺其所居之堂以為讀書之所擇樂天絶句之詩列之壁間而榜以詠白蓋將日玩諸其目而諷誦諸其口也一日見告曰吾平生深慕樂天之為人而尤愛其詩故以是云何如豫曰人物如樂天吾復何議子能于是而存心其嗜好趨向亦豈不佳然慕之者欲其學之而學之者欲其似之也慕焉而不學學焉而不似亦何取乎其人耶蓋樂天之為人冲和靜退逹理而任命不為榮喜不為窮憂所謂無入而不自得者今子方皇皇干祿之計求進甚急而得喪之念交戰于胸中是未可以樂天論也樂天之詩坦白平易直以寫自然之趣合乎天造厭乎人意而不為竒詭以駭末俗之耳目子則雕鎸粉飾未免有侈心而馳騁乎其外是又未可以樂天論也雖然其所慕在此者其所歸必在此子以少年豪邁如川之方增而未有涯涘則其勢固有不得不然者若其加之歲年而博以學至于心平氣定盡天下之變而返乎自得之埸則樂天之妙庶乎其可同矣姑俟他日復為子一觀而評之門山縣吏隱堂記門山之公署舊有三老堂蓋正寢之西故廳之東連甍而稍庳今以之館賔者也豫到半年葺而新之意所謂三老者必有主名然求其圖志而無得訪諸父老而不知客或問焉每患其無以對也既乃易之為吏隱吏隱之說始于誰乎首陽為拙柱下為工小山林而大朝市好竒之士往往舉為美談而尸位苟祿者遂因以藉口蓋古今恬不之怪嗟乎出處進退君子之大致吏則吏隱則隱二者判然其不可亂吏而曰隱此何理也夫任人之事則憂人之憂抱關擊柝之職必思自效而求其稱岩穴之下畎畝之中醫卜釋道何所不可隱而顧隱于是乎此姦人欺世之言吾無取焉然則名堂之意安在曰非是之謂也謂其為吏而猶隱耳孤城斗大眇乎在窮山之巔煙火蕭然强名曰縣四際荒險慘目而傷心過客之所顧瞻而咨嗟仕子之所鄙薄而弃置非迫于不得已者不至也始豫得之親友失色弔而不賀豫固戚然以憂至則事簡俗淳便于踈懶頗有以自慰乎其心及西陲多驚羽檄交馳使者旁午于道路而縣以僻阻獨若不問者憐邑疲于奔命曽不得一日休而吾常日髙而起申申自如冠帶鞍馬幾成長物由是處之益安惟恐其去也或時與客幽尋而曠望䕃長林藉豐草酒酣一笑身世兩忘不知我之屬乎官也此其與隱者果何以異吾聞江西筠州以民無嚚訟任其刺史者號為守道院夫郡守之居而得以道院稱之則吾堂之榜雖曰隱焉其誰曰不可哉恆山堂記真定古名鎮形勢雄壯冠于河朔其府署規模適相稱副而恆山堂宏麗特出又為之甲焉堂廣七楹其髙九仭望之欎欎如翬斯飛俯瞰北潭偹諸勝概求其經始于何代與夫主名之為誰則圖志無傳近世沈括言潭園𥘉號海子未可觀逮王鎔治之遂可圖畫斯堂或者亦出于其時乎而吳中復咏行宫以為宋祖征劉承鈞常駐蹕于此故老或云堂即宫之南門而卒莫能詳也其在金國率王侯貴戚處之例事豪奢務加增飾故益以完美每府僚宴集其上綺羅照野絲管沸天遊人指點咨嗟邈在仙境誠一邦之偉觀也兵火之餘署舍盡廢獨堂在焉而歲月既深寢至頺弊大元乙酉中萬户史公實來公以妙齡貴顯而居具慶之下日思所以奉二親之歡謂可以偹燕息而資觀覽者莫若堂也由是特為之作新易腐朽𥙷罅漏支持欹傾凡當營理者靡不及之蓋期月而後畢則大饗賓客稱觴為夀以落其成而遣使致書屬豫為記噫豫去國三十年白首歸來時移事改田廬鄉井殆不可復識追惟曩昔渺如隔生豈知尚有恆山堂耶夫物之盛衰其極必反廢興成毁相尋于無窮蓋理之常然而不足怪然皆有數存乎其間自喪亂以來繁華共盡崇樓傑觀莫不化為虛空如斯堂者絶無僅有固已幸矣而復為有力者新之宛然舊物閲世自如豈可謂偶然哉抑此不足論也豫聞之有非常之功者必享非常之福公上將之才膺方靣之寄定亂措安澤𬒳于生民甚厚功孰大焉宜其窮侈美極尊榮快意一時無不可者顧乃自安于儉陋而致美乎其親賢于衆人遠矣是則不可以不著且豫平生欲一登堂臨眺而竟不果今既辱公知當得預賔席之末因之寓目以償夙心亦殘年之一適也于是乎書滹南遺老集卷四十三
