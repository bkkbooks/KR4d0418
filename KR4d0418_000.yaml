body:
  text: 一卷五經辨惑上二卷五經辨惑下三卷論語辨惑序總論四卷論語辨惑一五卷論語辨惑二六卷論語辨惑三七卷論語辨惑四八卷史記辨惑四議論不當十三卷史記辨惑五文勢不相承接十四卷史記辨惑六姓名冗複十五卷史記辨惑七字語冗複十六卷史記辨惑八重叠載事十七卷史記辨惑九疑誤十八卷史記辨惑十用虚字多不安十九卷史記辨惑十一雜辨二十卷諸史辨惑上二十一卷諸史辨惑下二十二卷新唐書辨上二十三卷新唐書辨中二十四卷新唐盡辨下二十五卷君事實辨上二十六卷君事實辨下二十七卷臣事實辨上二十八卷臣事實辨中二十九卷臣事實辨下三十卷議論辨惑三十一卷著述辨惑三十二卷雜辨三十三卷謬誤雜辨三十四卷文辨一序附三十五卷文辨三十六卷文辨三三十七卷文辨四三十八卷詩話上三十九卷詩話中四十卷詩話下四十一卷雑文詩附揖翠軒賦并序瑞竹賦并序寕晋縣令吳君遺愛碑真定縣令國公徳政碑王氏先塋之碑李仲和墓碣銘故朝列大夫劉公墓碣銘四十二卷千户賈侯父墓銘太一三代度師蕭公墓表清虚大師侯公墓碣贈昭毅大将軍髙公墓碣四十三卷進士彭子升墓誌保義副尉趙公墓誌焚驢誌哀鴈詞髙思誠詠白堂記門山縣吏隱堂記恒山堂記四十四卷鄜州龍興寺明極軒記茅先生道院記趙州齊參謀新修悟真庵記答張仲傑書道學發原序揚子法言微㫖序送王士衡赴舉序送吕鵬舉赴試序送彭子升之任冀州序四十五卷祖唐臣愚庵序復之純交説移刺仲澤虚舟堂銘四醉圖賛林下四友贊王士衡真贊跋寳墨堂記跋王進之墨本孝經上周監察夫人生朝貧士嘆白髪嘆題淵明歸去來圖題趙内翰城南訪道圖答鄭州辨禅師見戯代髙防禦再到故園述懐評東坡山谷四絶評王子端四絶題宫人圍碁圖續附一卷滹南遗老集引黄鳥止于邱阿流丸止于甌臾羣言止于公是夫言生于人心心既不同言亦各異其在彼也一是非其在此也一是非左右佩劍其誰能正之必有大人者出獨立當世吐辭立論掃流俗之所徇取古今天下之所共與者與諸人有以塞其口而厭其心而後呶呶之說息矣自秦火以來漢武帝表章六經不謂無功于聖人然諸儒曲學往往反為所汨陵遲至于唐宋人自為說雖其推明隱奥為多其間踳駁淆混詿誤後生盖亦不少顧六經且如是况百家乎子長實録也劉子元黜其煩孟堅鉅筆也劉貢父刋其誤子京俊才也劉器之病其略頋史氏且如是况雑述乎然則有人于此品藻其是非覼縷其得失使惑者有所釋鬰者有所伸學者有所適從則其澤天下也不既厚矣乎今百餘年鴻生碩儒前後踵相接考其撰著訇礚彪炳今文古文無代無之惟于議論之學殆為闕如豈其時物文理相與為汙隆耶其磊落之才閎大之器深識英眄為世檦表者不常有耶抑亦有其人遭世多故不幸而無以振發之也滹南先生學博而要才大而雅識明而逺所謂雖無文王猶興者也以為傳注六經之蠧也以之作六絰辨論孟聖賢之志也以之作論孟辨史所以信萬世文所以飭治具詩所以道情性皆不可後也各以之為辨而又辨歴代君臣之事迹條分區别羙惡著見如粉墨然非夫獨立當世取古今天下之所共與者與諸人能然乎哉嗚呼道之不明也久矣凡以羣言揜之也故卑者以陷而髙者以行怪拙者以惛而巧者以徇欲傳者如是受之者又如是尖纎之逞而浮誕之夸吾将見天下之人一趨于壊而巳耳如先生之學誠處之王公之貴賴以範世填俗其庶乎道復明于今日也先生今已矣後百年千年得一人焉食先生之餘廣先生之心能使斯文之不墜則雖百年千年吾知其為一日也欒城李治引滹南遺老集引予以剽竊之學由白衣入翰林當代鉅公如趙閑閑楊禮部滹南先生皆士林儀表人莫得見之而一旦得侍几硯渾源雷晞顔良鄉王武升河中李欽叔亦稱天下之選而十年得遇從游故予嘗自謂叨取科第未足為幸而沗厠英游之末兹所以為幸也歟玉堂東觀側耳髙論日夕獲益實多然爱予最深誨予㝡切愈乆愈親者滹南先生一人而已先生性聰敏蚤歲力學以明經中乙科自應奉文字至為直學士主文盟㡬三十年出入經傳手未嘗釋卷為文不事雕篆唯求當理尤不善四六其主名節區别是非古人不貸也壬寅之春先生歸自范陽道順天為予作數日留以手書四帙見示曰吾平生頗好議論嘗所雑著往往為人竊去今記憶止此子其為我去取之予再拜謝不敏明年春先生亡矣越四年其子恕見予于燕京予盡以其書付之又二年稾城令董君彦明益以所蔵釐為四十五卷與其丞趙君壽卿倡議募工将􅍢諸板以壽其傳嘱爲引予爲先生之學之大本諸天理質諸人情不爲孤僻崖異之論如三老三宥五誅七出之說前賢不敢訾議而先生㫁之不疑學者當于孔孟而下求之不然殆爲不知先生也先生諱若虚慵夫其自號云歲屠維作噩閏月初吉日後進東明王鶚斂袵書古之君子學博矣猶以為有弗辨辨之弗明弗措也惟然故博而非雜乃其善學經若史羣書論議記釋具存而世有博雅之士潜心焉者又詳説将考覈而求其是是殆前乎諸老先生所望乎來者之盛心而余于滹南遺老集讀而知之者以此所尊者經而于傳記百氏弗盡信見到處擺脱窠臼而不依隨以為是非以是談經與史則詩文以下可知也非其學之博而蘄乎辨之明疇克爾嗚呼中原文獻之邦諸老而後百餘年未知隔宇宙有可慨者滹南生乎其間必有遺風餘澤之沾丐者未冺故所學論說源委則然方将抄其㑹余意者随可讀書附記同異切磋究之值風雪凍指欲墜握筆復已里興賢書院行且􅍢梓喜而為之識於帙之初閼逢涒灘冬至日前荆臺冷官彭應龍翼夫序滹南辨惑一書初江左未之聞也至元二十年古滄王公時舉來丞是邦出于行篋始得見之興賢書院謄録刋行迨今十年其极為復翁所得以字多差舛恐誤讀者欲得元本證之而王公去此陞行䑓監察御史㝷柄文廣東宦轍無定雖欲求之末由也已既幸任廻道過廬陵吾州士夫以棠隂之舊候迎公來就乞校正出脱漏差錯字四百餘公因得改的付局刋换公又以元遺山中州集所載滹南古律詩僅二十萹俾續卷末收書君子幸加詳焉大徳三年二月中和莭雙桂書院王復翁謹書
