front:
  text: 滹南遺老集卷之二十四
  hash: sha256:3223399cb03e3b52dbf92dadc7c8869e374ce0fd2eb9400876d83293217024ee
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0418_SBCK_024-1a}
body:
  text: 滹南王若虗從之新唐書辨下張籍傳載韓愈答籍論佛老書甚無謂特以無事可録姑填塞云耳吳元濟傳後全載平淮西碑文亦不必也磨碑事舊史載于韓愈傳而新史附于元濟傳不若舊史為當魚朝恩嘗講易覆餗之義以譏元載時蓋釋奠于國子監也新史但云會釋菜朝恩又嘗邀郭子儀同遊章敬寺而新書但云約修具裴度傳云𥘉德宗多猜忌朝士有相過從者金吾輒伺察以聞而新書但云尚苛伺無乃太簡乎太宗恕宇文士及曰魏徴常勸我逺佞人意疑是汝今果然通鑑記如此新史無意疑是汝字則義不完矣邢君才傳云其屈巳好士類此盧承慶云其能著人善類此古人或言皆此類或言類如此今云類此則義不足矣吳湊言宫市事曰宜料中官髙年謹信者平賈和售以息衆歡宫市大抵強買民間物平售字殊不安只作平市字可也古人文字中時有涉俗語者正以文之則失真是以寧存而不去而宋子京直要句句變常此其所以多戾也明皇雜録記李林甫驕二相事以為抑揚自得而巳子京改為軒驁無少讓此固無害而益以喜津津出眉宇間之語舊史稱裴度狀貌但云不逾中人而子京又加以退然兩字此復何從而得哉蓋亦想像而言之耳舊史云孔戣嘗論李涉交結狀幸臣側目人為危之戣髙步公卿間以方嚴見憚新史云戣自以適所志軒軒甚得杜暹傳云能以公清勤約自將亹亹為之凡狀貌之辭非親見者不可道子京史官追記傳聞之事而每喜此等或云談王伯衮衮不厭或云其議論纚纚可聼或云介介自修稜稜有風岸謂李石載仇士良傳侃侃不干虗譽介介不至顯官皆過也舊史云郭宏霸死舊唐書作郭霸時洛陽槗壞行李弊之至是功畢則天嘗問羣臣曰比在外有何好事舍人張元一對曰百姓喜洛陽橋成幸郭宏霸死此即好事新史改云外有佳事耶此一耶字便别却本意蓋本是無故而問今却是疑而審之也通鑑云劉悟與客觀角抵之戲自搖肩攘臂以助其勢新書改為盱衡攘臂助其決舊史云楊思朂得俘囚多生剝其靣或𠢐髮際掣去頭皮新史改為剝靣𠢐腦裭髮皮以示人便不分明人皆言利病而子京每云病利人皆言可否而子京或云否可雖義理無異而讀之不明矣此等猶求異于人不已甚乎肅鈞為諌議大夫盧文操盜庫財髙宗以其職主幹當自盜罪死鈞曰囚罪誠死然恐天下聞謂陛下重貨輕法任喜恕殺人詔原死豫謂罪死罪誠殞俱道不過須加當字乃可耳栁仲郢有父風矩牛僧孺歎曰非積習名教安及此耶安字下不得劉允濟曰史官善惡必書使驕王賊臣懼此權顧輕哉顧字下不得德宗謂李自良曰卿于進退寧不有禮蕭俯贊曰俯議銷兵寧不野哉寧字下不得蕭復以擅發京畿觀察使儲粟削階停職或弔之復曰苟利于人胡責之辭胡字下不得李栖筠傳云關中舊仰鄭白二渠溉田而豪戚壅上遊取磑利奪農用十七栖筠諸皆撤毁歲得租二百萬民賴其入白居易為杭州刺史浚李泌六井民賴其汲曷若只云賴其利也蘇辨傳曰平賦緩役略煩苛人賴其寬寬字尤贅陸贄傳云始帝倉卒變故每自尅責贄曰陛下引咎堯舜意也然致寇者乃羣臣罪意指盧𣏌等帝護𣏌因曰卿不忍歸過朕有是言哉哉字當作乎始帝倉卒變故亦不成語也令狐德棻傳髙宗常召宰相及宏文館學士問何修而王何為而霸二者孰先德棻對曰如欲用之王道為最而行之為難髙宗曰令之所行何政為要此本分語也新史云帝問曰何修而王若而霸又當孰先對曰若用之王為先而莫難帝曰今兹何為而要語意不足矣太宗戒尉遲敬德曰國家大事惟賞與罰非分之恩不可數行勉自修飾無貽後悔此本分語也新史云悔可及乎語意皆非是蕭復嘗言事德宗曰陛下臨御之𥘉聖德光被自用楊炎盧𣏌惛瀆皇猷以致今日此本分語也新史云陛下厥𥘉清明自楊炎盧𣏌放命穢盛德播越及兹殆不可讀袁髙為給事中德宗將起盧𣏌為饒州刺史髙當草詔見宰相盧翰劉從曰𣏌當國矯誣隂賊斥忠誼傲明德反易天常使宗祏失守天下疣痏才示貶黜今還授大州天下其謂何古人言天下傷殘或曰瘡痍或曰瘡痏皆可今言疣痏乃聱耳豈可與瘡類哉又奏曰杞罪萬誅陛下止貶新州俄又內移今復拜刺史誠失天下望帝曰𣏌不逮是朕之過答曰𣏌天資詭險非不逮彼固所餘古人但言當萬死萬誅字未見其例恐是子京所改不逮所餘何等昏昧語也王琚傳云自傭于楊州富商家識非庸人以女嫁之識字上當有其家其主等字又云太子在潞州銅鞮令張暐性豪殖喜賓客弋獵事厚奉太子數集其家亦當重言太子或去厚奉字可也豪殖二字亦一處不得又云琚性豪侈其處方靣去故就新受饋遺至數百萬去故就新之意昏不可曉豈謂車服器皿之類耶中間云侍衛呵止計將安便公主謀益甚語皆不成視日薄乃得出賜賚接足義皆不安也林藴傳云藴辨給嘗有姓崔者矜氏族藴折之曰崔抒弒齊君林放問禮之本優劣何如耶其人俯首不能對前史中固有載口辨嘲謔者至如此語亦何足録哉李密等贊云煬帝失德天醜其為吉溫傳云李林甫才其為朱桃推傳云人莫測其為溫庭筠傳云執政鄙其為馮河清傳云衆義其為崔逺傳云世慕其為此類甚多古人言所為有為則有之矣單為字未嘗道也子京言人物相比倫之意輒用輩字或曰時無輩者或曰未有輩者或曰古未有輩或曰殆無其輩至魏徴諌太宗亦云陛下欲逺輩唐舜此若非好語而子京每喜用之何其僻也韓充傳云乘機決䇿無餘悔世推善將餘悔善將字皆道不過何易于為益昌令刺史常乘春與賓屬泛舟出益昌索民挽繂易于身引舟曰方春百姓耕且蠶惟令不事可任其勞挽繂耕且蠶皆非史體不事亦不成語也崔日用嘗謂人曰吾平生所事皆適時制變不専始謀所事字道不得李績姊病績親為煮粥火燎其鬚其姊止之績曰姊老績亦老雖欲久為姊煮粥其可得乎新史改之曰雖欲數進粥尚幾可殊不如舊史只一進字亦别却本意天后時宰相豆盧欽望請停京官九品以上兩月俸助軍興王求禮奏曰天子富有四海何待九品俸使宰相奪之以濟軍國用乎后曰止此句道不過鄭權傳云識詣魁然以魁字狀識詣固巳過矣而盧景亮傳云志義崒然又有稱造詣嶄逺者豈不益甚哉周智光傳云代宗命趙縱書帛內蜜丸召郭子儀薑公輔傳云朱滔以密褁書邀朱泚劉季述傳云割帶內蜜丸告孫德昭此本蠟書耳蜜字何義也張薦救顔真卿疏云去正月中云云權德輿貞元十九年上陳闕政曰去十四年云云按古今言去年去歲者前一年耳子京此語未見其例也李百藥傳云轉側寇亂中數𬒳偽署危得不死張元素傳云切諌太子承乾承乾夜遣户奴伹繫危脫死安祿山傳云賊將類慓勇無逺謀日縱酒嗜聲色財利車駕危得入蜀終無進躡之患按前史有曰危得之危殺之危猶參差幾及之意俗言則險也子京殊不悟此乃顛倒用之何其悖也張元素諫太宗修洛陽宫魏徴名徑挺今監本作梗挺聞之歎曰張公論事有回天之力豫謂魏徴之直世所共聞不必云名徑挺也劉仁軌為陳倉尉有折衝都尉魯寧坐事繫獄自恃髙班慢罵仁軌仁軌杖殺之太宗怒命追至長安靣詰之仁軌曰寧對百姓辱臣如此臣實忿而殺之上悅擢為櫟陽丞此通鑑所載新史但言寧豪縱犯法縣莫敢屈仁軌約不再犯寧暴橫自如而無慢罵事若止于蒙暴何足為辱乎又以櫟陽為咸陽不知是否裴子餘舉明經纍輔鄂縣尉時同列李朝隱程行諶皆以文法著稱子餘獨以詞學知名或問陳崇業曰子餘與朝隱行諶優劣崇業曰譬如春蘭秋菊俱不可廢也新史改云蘭菊異芬胡可廢者不如舊語多矣且異芬字何從得之哉成汭攻夔州軍人韓楚言嘗誶辱汭汭耻之曰有如禽賊當支解以逞及夔州不守楚言妻李語夫曰君嘗辱軍且支解不如前死楚言不決李礪刀席下方共食復語之夫曰未可知李取刀斷其首并殺三子乃自剄二夫字止當作楚言則天傳云操奩具坐重幃而國命移何必操奩具字后妃傳贊云或稱武韋亂唐同一轍武持久韋亟減何哉議者謂否否字不安張九齡傳云德宗賢其風烈賢字不安劉子元傳云年十二父授古文尚書業不退父怒楚督之及聞為諸凡講春秋左氏冒往聽之退輒辨析所疑歎曰書如是兒何怠豫始讀之不能曉及見史通自敘則云幼奉庭訓早遊文學年在紈綺便愛古文尚書每苦其辭艱瑣難為諷讀雖屢逄捶撻而其業不成嘗聞家君為諸兄講春秋左氏傳每廢書而聼逮講畢即為諸兄説之因歎曰若使書皆如此吾不復怠然後了然無疑而覺子京踈略之病為惡也韋述傳云入元行沖室觀書不知寢食言忘則可不知則過矣王忠嗣傳上與論兵應對蜂起應對下不宜言蜂起二字張説傳云多引天下知名士以佐佑王化粉澤典章成一王法此譽之太過兼不是史氏敘事語張説首倡封禪議此諂諛之事非正人所宜為而傳贊褒稱以為文物之盛豈良史體哉李泌傳云常持黃老鬼神之説為時人所譏切譏切固有成言矣而其贊復云議者切而不與一切字兼得譏字否禇遂良一代正人其譖劉洎事𥘉不甚明但洎嘗訴之云爾胡致堂疑李義府所教理或然也新史遂謂二人不相中故遂良誣奏洎引馬周為左而遂良執不已帝感之遂賜死洎之贊曰為􅎱忌所乘卒陷罪誅而其贊遂良示以此為疵病至霍仁師傳又云𬒳遇尤渥禇遂良忌之何行禇公之淺也李光顔傳云其師徑悍常為諸軍鋒鋒字不安渾城射賊將李立節貫其左眉死之凡事死節則曰死之古今成言也致人死而曰死之無此例也盧奕懷慎少子也拜御史中丞自懷慎奐及奕三居其官清節似之似之道不得盧𣏌傳云父奕見忠義傳𣏌不耻惡衣菲食人未悟其不情咸謂有祖風節祖懷慎也傳首但言其父而不見其祖讀者何以知之陳少遊傳云或欲對衆切問以屈之少遊據引淹該問窮而對有餘夫對者隨問而應者也無問則無對今曰問窮而對有餘何耶韋景駿為貴鄉令有母子相訟者景駿曰令少不天常自痛爾幸有親而忘孝耶按左傳鄭伯曰孤不天欒盈曰我實不天凡言不天者不為天所祐耳非專指喪親也後人往往誤用劉季述幽昭宗于少陽院鎖其門鎔鐵錮之此甚明白而子京乃云液金以完鐍若無舊文何可曉耶且錮者取其牢耳豈謂闕而完之乎詭異如此宜其有札闥洪休之戲也魏氏春秋好用左傳語以易舊文裴松之譏彈甚當凡人文體固不必拘至于記録他人之言豈可過加潤色而失其本真子京唐書雖詔敕章疏類皆變亂以從已意至于詩句諺語古今成言亦或芟改不已甚乎滹南遺老集卷之二十四
