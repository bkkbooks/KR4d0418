front:
  text: 滹南遺老集卷之二十三
  hash: sha256:45a410706548ed74b0c3735b77b6f8781329652ac67700fedc7a46d122c0a169
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0418_SBCK_023-1a}
body:
  text: 滹南王若虗從之新唐書辨中東漢時㑹稽父老送劉寵曰自明府下車以來狗不夜吠民不見吏盖愛譽甚之之辭耳新史云李栖筠爲常州刺史捕斬賊黨皆盡里無吠狗田仁㑹爲勝州都督捕格夙賊夷之城門夜開道無㓂跡實録之事不當爾也或謂史記王温舒傳亦稱無犬吠之盗何如曰史記之謬亦多矣渠皆可法乎楊收初以兄假未仕不肯應舉既假釋褐乃擢進士第其後同䑓為監察御史世榮其友夫以兄未仕而不應舉者友也兄弟同臺者榮也二事不相類而云世榮其友此何理耶劉子玄傳云撰劉氏家史及譜按㨿明審議者髙其傳髙字亦非為文字語雖貴簡而有不得簡者韋宏景傳云楊虞卿私造其門宏景厲言曰有詔按公尚私謁耶惶恐去不少虞卿字否此類非一觀者可見孫伏伽言三事但云其一其二其三而無曰字文理無乃不屬乎言讀書之勤者例曰手不釋卷而子京撰蔣又傳曰卷不釋於前此何謂也前人文字言騷動騷然者有矣安禄山傳云百姓愈騷裴冕傳云大衆一騷馬燧傳云天下方騷無乃太簡乎李靖論蕭銑士卒云藉以拒師本非所情杜如晦傳云僚屬共才之莫見所涯李勉朝京邸詔還所鎮三所字下不得藉以拒師亦不成語王義方弹李義府髙宗怒其毁辱大臣言詞不遜故貶之新史云帝恨義方以孤生觸宰相朱泚遣韓旻追徳宗叚秀實以為宗社之危期於頃刻乃倒用司農印追之新史云秀實以為宗社之危不容喘豈不過哉薛萬均死太宗甞賜羣臣膜皮及萬徹而誤呼萬均愴然曰萬均朕之舊勲不覺呼名豈其魂靈欲朕之賜也新史則云怱口其名纔下口字便是從已作用之意豈所謂不覺者乎况此等字史家自不宜使肅宗欲以李輔國為常侍苗晋卿奏曰常侍近宻非賢不可居豈冝任等軰罷之等輩上當加此字不然何等軰也邪文偉傳云武后問天與帝異稱云何文偉不得對房琯論第五琦言財利事肅宗詰之琯不得對王叔文傳云俱文珍隨語詰折叔文不得對不得字為悖正當云不能耳杜正倫傳云為世歆羙戴至徳傳云世詑其榮蕭復傳云士艶其榮今監本無此句敬晦傳云世寵其家寵字尤不安若只作時人榮之大小本分王義方譽振一時呉湊美譽四騰皆非史家之體也李義府傳云自其斥天下憂且復用比死内外乃安嚴震傳云徳宗使馬勛計日取張用誠赴行在踰半日期帝頗憂比至大喜比字不安若及既等字可也温庭筠数舉進士不第思神速多為人作文大中末試有司亷視尤謹庭筠不樂上書千餘言然私占授者已八人作文云者本謂代進士科舉之作耳今乃似泛為文字者此亦失之不明也温彦博傳云進止詳華人皆拭目觀進止之間何至拭目而觀之哉子京之夸侈類如此髙適工詩毎一篇巳好事者輙傳布已字道不得韓思復為滁州刺史有黄芝生州署民為刻頌其祥刻頌其祥不成語也新史稱盧齊卿飲酒踰斗不亂崔恭禮至斗不亂前史載人洪飲者率至一石以上然後為異踰斗之量世亦多矣何足著之乎舊史李綱謂髙祖曰臣言如水投石此舊語也新史則云如持水内石可然不自然李翺傳云始調校書郎累遷元和𥘉為國子博士史舘修撰累遷字下豈有闕文乎不然豈可通也崔郾傳云室處􅋻漏無歩廡此言其儉足矣而又云至霖淖則客盖而屐以就外位亦不必道也張元素起身令史太宗嘗對衆詰問元素大耻禇遂良上䟽論之而新史乃云遂良見帝而言非也遂良云元素出閤門殆不䏻移歩新史改移為徒只此一字亦覺失重輕之宜朱泚敗出奔失道問野人荅曰天網恢恢走将安所此殊不成語也李安期傳髙宗屡責以不䏻進賢安期曰邑十室且有忠信天下至廣不爲無賢比見公卿有所薦進皆劾爲朋黨滯抑者未申而主薦者已訾所以人人爭噤黙以避囂謗若陛下忘其親讐曠然受之惟才是用塞䜛毁路其誰敢不竭忠以聞上乎子京鐫改舊文詭異僻澁殆不可讀甚不滿人意也李晟賛云身佩安危而氣不少衰佩字過矣張柬之傳云武后謂狄仁滐曰安得一竒士用之仁傑曰陛下求文章資歴今宰相李嶠蘇味道足矣豈文士齷齪不足與成天下務哉哉字下不得作耶乎歟等字則安矣子京于此等猶不甚解何足言文也王毛仲旬歲至大将軍古人言旬月者自十日以及月也言旬時者自十日以及三月也今言旬歲未見其例也蕭嵩傳云在公慎宻人莫見其涯際今監本無涯字慎宻上不當論涯際以言胷懐宇量則可矣張知謇傳云天后竒其貎詔工圗之稱其兄弟容而才謂之兩絶容字不安張鎬傳云視經史猶漁獵然夫前人已有渉獵成言便是此意何謂復爾觧折也席豫出鄭州刺史李傑出衢州刺史于郡出杭州刺史李朝隐出通州都督沈傳師出江西觀察使此等甚多得無欠為字乎盖出入字不同遷擢貶降例也開元中吐蕃金城公主求文籍四種于休烈欲勿與裴光庭駁之此當入光庭傳而載于休烈傳非也徳宗時官市事既詳見于張建封傳而李錡賛又列之重複矣舊史李石傳云延英議事中貴必引訓注以折文臣石嘗謂之曰京師之亂始自訓注而訓注之起始自何人仇士良等不䏻對其勢稍抑搢紳賴之新史云賴以爲强便過去了裴度與穆宗論劉承偕事云臣素知承偕怙寵悟不䏻堪嘗以書訴臣是時中人趙宏亮在行營知狀欲持悟書以奏陛下亦知之耶耶字當作乎帝曰頋悟誠惡之胡不自聞何哉胡即何也當去一字宇文士及嘗非時𬒳召其妻問曰向召何所事何所事不成語曷若但云問何故耶陽城傳常以木枕布衾質錢人重其賢爭售之售字為悖又云賦税不時時字意不足盖欠辨集等語也張巡傳睢陽雍邱賜徭税三年賜字便當得蠲免之意否許孟容傳云公主子有求𥙷崇文生者孟容固謂帝嘉其守蕭瑀傳云詔嘗下中書未即行帝譲其稽韋顗節儉自居天下推其尚曹憲註廣雅學者推其該韋表微以學者薄師道著九經師授譜詆其違守尚稽違該等字皆道不過必兩字然後成文王義方傳云魏徴欲妻以夫人之姪辭不取俄而徴薨乃娶人問其然曰初不附宰相今感知已故也楊慎矜傳云婢因史敬忠得至宫中見帝帝素聞敬忠挾術間質其然然字下不得通鑑載賈至論王去榮不當免死事李絳論不狥同年事蔣又論張茂宗奪服尚主事王式破仇甫事讀之亹亹可愛入新史中便覺索然無意味甚可惡也舊唐隐太子與秦王有隙元齡謂王曰國家患難今古何殊自非􅌖聖欽明不䏻安輯新史云國患世有惟聖人克之克字何足盡其意髙銖爲太常卿嘗罰禮生博士李慤折其非銖歎曰吾老不䏻退乃爲小兒所辱卒卒字如何定得薛元賞傳云都市多俠少年以黛墨鑱膚夸詭力剽􅐁坊閭夫鑱膚者針也黛墨所以爲色耳而云以黛墨鑱膚則不可舍文身不道而艱詭若此其亦勞甚矣乎李夷簡元和中爲相李師道方叛裴度當國帝倚以平賊夷簡自謂才不䏻有以過度乃求外遷言不䏻過或無以過則可不䏻有以則不成語矣康子元傳明皇時議封禅事趙冬曦駁之子元議挺不徙蘇珦傳亦云嘗按訊韓魯諸王天后詰之挺議無所撓使他人書之不過曰固執不移或云堅守前議而巳豈必如此詭異鄠縣令崔發繫獄遇赦不原張仲方訟之曰鴻㤙将布于天下而不行御前霈澤始被于昆蟲而獨遺崔發新史仲方傳併為一句云恩被天下流昆蟲而不行御前乎田令孜專權恣横孟昭圗論之曰天下者髙祖太宗之天下非北司之天下天子者四海九州之天子非北司之天子新史改其下句云陛下固九州天子武后恠有司多失出人罪徐有功對曰失出人臣之小過好生聖人之大徳新史則云失出臣小過好生陛下大德子京意以舊文類駢不古故變亂以就已作而不知其反謬也馬周嘗寓新豊逆旅逆旅者客邸也科舉子遂謂周為新豊逆旅以對洛陽年少予嘗笑之而新唐稱劉從諫命甄戈殺定州戍将戈因為逆旅上謁斬其首何耶李晟與張延賞有隙謂人曰文士難犯雖修睦乎外而蓄怨于内新史改為儒者儒者與文士自别止當從舊蔣儼進蒲州刺史發隐禁姦號良二千石案二千石漢之職名豈可通為長史之稱王孝傑為吐蕃所執賛普見之曰貎類吾父故不死歸之死字下不得吕元膺傳云居官始終無訾缺予謂訾者人所譏也缺者已所少也二字併用不得史傳稱人讀書敏速云五行俱下者盖甚言之耳實無此理也而唐史謂歐陽詢毎讀輙數行同盡尤不可也太宗稱薛仁貴曰朕不喜得遼東喜得卿也此乃本分語而子京改云喜得虓将可惡之甚禇遂良與太宗論舜造漆器事以為諍臣必諫其漸及其滿盈無所復諫此真語也新史則云必救其源既以漸為源因並易其下文曰及夫横流無復事矣義理雖同然當時豈有横流之語張柬之初與楊元琰共乘艫江中私語外家革命事柬之執政引為右羽林将軍謂曰江上之言君叵忘之蕭復言于徳宗曰自艱難以來始用宦者監軍此曹止可委宫掖事兵要政機叵使參領古人言叵信叵測叵量之類叵字固訓不可然施于戒辭則不順矣安禄山反詔切責許自歸禄山答書慢甚叵可忍葉法善以術髙卒叵之測此正作不字用則益不安至蘇頲傳云司馬皇甫恂使蜀檄取庫錢市不急物頲不肯予或謂曰明公在逺叵得忤上意吕才卜宅篇云世有五姓謂宫商角徴羽也按黄帝時獨姬姜数姓耳後世賜族者寝多至因官命氏因邑賜族本同末異叵為配宫商哉此又作豈字用尤乖戾也盖子京𥘉不詳其義故毎至謬誤焉武后問狄仁傑曰朕要一好漢任使有乎仁傑乃薦張柬之通鑑改好漢為佳士新史復作竒士好漢字誠為渉俗然佳士不足以當之矧曰竒乎寕存本語可也李光弼傳云史思明攻太原使卒于城下仰而侮罵光弼令穿地道擒之新史改為隧地固簡而文然隧字作得暗地道否且本傳先有云穴地頽土山者後又云令郝廷玉由地道入懐州何獨為此異也滹南遺老集卷之二十三
