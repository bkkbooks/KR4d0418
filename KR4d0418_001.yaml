front:
  text: 滹南遺老集卷之一
  hash: sha256:906f797a1d155bf58c50c2976ef29823da24b807fd9bc4f67e6c9637b01f185c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0418_SBCK_001-1a}
body:
  text: 滹南王若虚從之五經辨惑既明且哲以保其身詩所以羙仲山甫也疏云既能明曉善惡又能辨知是非以此明哲擇安去危而保全其身無有禍敗其説甚為明白盖人之所以陷于禍敗以至失身者由其愚暗妄行不知理義故耳然世之學者皆認為逺害自全之意凡以剛直諫諍不容于時者輒持此説以律之嗚呼山甫以忠臣遇明主一篇所頌無非建功立事以自効于公家者且此語之下以夙夜匪懈以事一人繼之何嘗有逺害自全之意哉予嘗深推之盖中庸有云國有道其言足以興國無道其黙足以容而引此詩為証學者因之錯㑹耳殊不知中庸所以引之者總結上文而非專舉一句之義也書無逸言祖甲知小人之依享國長久孔氏以為太甲鄭氏以為帝甲而疏從孔義盖以因國語説殷事云帝甲亂之七代而殞史記云帝甲淫亂殷道復衰也且曰太甲稱祖者殷家亦祖其功故爾子謂此説未安也按史記祖甲武丁之子與太甲分明是兩人周公所引自中宗髙宗以及祖甲而繼之曰自時厥後立王生則逸其次第不應為太甲然國語史記皆言其淫亂而致衰隕周公奚取焉是不然書聖經也史傳出于雑説者也周公去殷為近知其事為詳左氏司馬遷為逺其傳聞容有妄焉與其變易姓名以遷就其事寕舍史傳而從經可也左氏立弑君之例曰凡弑君稱君君無道也稱臣臣之罪也杜注曰稱君者唯書君名而稱國以弒言衆所共絶也稱臣者謂書弑者之名以示來世終為不義斯聖人之意乎曰非也以臣弑君豈復有例稱臣為臣之罪則稱君者非臣之罪乎稱臣為不義則稱君者果臣之罪乎君非上聖誰無失徳使此説果行皆可指爲無道而殺之矣長奸䧺之志生簒逆之階禁其一而開其一聖人之立教不如是也論天下之事者亦權其輕重而巳人之無道孰有大于弑君者釋乎此而懲乎彼是何輕重不倫所得之不償所失也孟子曰孔子作春秋而亂臣賊子懼所貴乎春秋者正名分别嫌疑爲亂臣賊子設耳今乃妄生義例以爲之資不亦乖乎許悼公之卒也經言世子止殺之而三傳皆以爲進藥不嘗而已信斯言也其防于疑似者一何嚴耶至于推刄之賊例以一已之私而敢為大逆天地之所不容禽獸之所不忍者乃或得以幸免而没其名春秋人情之書也若是之類可謂近于人情乎自傳考之稱國者未必無道稱臣者豈皆有道参差不齊自相為戾者多矣姑以一二明之晋靈之不君淫刑而厚斂愎諫而賊賢傳所載也兹不為無道乎而經書趙盾之名何耶楚靈之無厭民怒而叛從亂如歸兹不為衆所絶乎而經書公子比之名何耶陳恒弑簡公孔子沐浴而朝請討者且曰民之不與者半陳氏務施而結民心久矣然而不與者半則齊侯之惡未為衆所絶也而稱國以殺又何耶經書薛侯弑其君比而左氏無傳夫既稱國以弒薛侯之罪安得畧而不載使其無事可載則孔子之例何為而發哉宋昭之殞傳言其無道矣然荀林父伐宋而立文公則曰以失所稱人晋侯平宋而不討賊則曰以無功不叙杜注曰昭公雖以無道見弑而文公猶宜以弑君受討君雖不君臣不可不臣所以督大教盖其意亦有所不安者故反覆自救如此莒弑紀公左氏謂公生太子僕又生季佗爱季佗而黜僕且多行無禮于國故僕因國人以弑之公穀于此意亦同左氏之例而皆不著其事啖助曰弑君例懲暴君也施于君臣猶恐害教但慮暴君無所忌惮不得已而立此義豈有父為不道子可致逆聖人訓典故當不然遂削左氏之説然終不以其例為非也夫經於被弑之君皆書其名𥘉無不稱君之辨葢稱字不可也稱謚不可也書其人而不以名繋之則所稱者為誰耶左氏徒見有時而不著臣之名遂以有名者為稱臣而無者為稱君亦妄意耳杜注求合其例而有不得者皆遷就而為之説至薛侯無傳則亦漫曰無道而已近代胡安國既不廢此例而随事揣量卒無定論是皆不足據焉或曰如子之説則暴君無道終不當懲乎曰此聖人不得已之變而非所以為訓也以湯武之徳對桀紂之罪然後可耳易所以有革命之文而孟子所以有天吏之論也春秋之君罪不至于桀紂而為逆者皆亂臣賊子也聖人顧肯于此為訓哉書之稱湯武盖曰放桀伐紂而孟子則以為聞誅一夫而不聞弑君使春秋果有意焉其文自當有别夫既均稱為君而加之以弑豈得以一失臣名而生此義例哉然則何為有時而不稱臣曰吾不敢必也意者文之脱誤耳不然則實出于衆意而不可以一人當之也要之既曰弑君則罪有所歸矣一人弑之罪在一人衆弑之則罪在衆不容有輕重于其間也王通曰三傳作而春秋散歐陽子亦譏學者不從聖人而從三子君子之學亦求夫義理之安而巳聖人之所必無也傳為經作而經不為傳作信傳而誣經其陋儒巳矣左氏稱頴考叔純孝爱其母施及荘公得詩人錫類之義予謂舍肉遺母特以發荘公之問而為入言之機耳而遽謂之純孝何也豈考叔素行别有可見者耶抑觀其為人謀者如此足以知其孝于親也耶不然譽之太過矣晉欒盈之誅羊舌虎與馮虎叔向弟也左氏曰初叔向之母妬叔虎之母羙而不使其子皆諫其母其母曰深山大澤實生龍蛇彼羙余懼其生龍蛇以禍女女敝族也國多大寵不仁人間之不亦難乎余何爱焉使往視寝生叔虎羙而有勇力欒懐子嬖之故羊舌之族及于難竊謂此母之言無謂也深山大澤則固生龍蛇矣而羙婦必生惡子豈決定之理耶殆偶中耳使其言果當而知慮果及于此則可謂之賢而不可謂之妬寔出于妬則言雖有騐亦非其情而不足稱矣左氏既以為妬而又若著其賢者何也師曠對晋侯曰君神之主而民之望也若困民之主匱神之祀百姓絶望社稷無主将安用之陸氏釋音云夲或作之祀誤也竊詳文勢恐未必誤而所謂困民之主者乃復可疑盖上言神之主民之望下言百姓絶望社稷無主字皆相應不宜于此猶以主字属民且主豈可言困或者其生字也歟汲冡書云伊尹放太甲而自立太甲潜出殺之而復立伊尹子伊渉伊奮杜元凱特附于左傳之末而為之説曰左氏稱伊尹放太甲而相之卒無怨色然則太甲雖見放還殺伊尹而猶以其子為相也與尚書所記乖異不知老叟之伏生或致昏忘将此古書亦當時雑記未足以取審也謂其初有益于左氏故録之嗚呼伊尹聖人其大義貫乎天地詩書載之孔孟論之昭如日星有不可誣者世之小人往往以私意量之妄生訾毁而此説為尤甚然亦何能奪古今之正論哉元凱姑欲發明左氏因遂取之而反疑聖人之經亦巳陋矣案左傳之文初無太甲殺伊尹立其子之意而元凱云爾者盖傳文乃祁奚救叔向之辭而叔向之囚本為叔虎所累且上文云鯀殛而禹興下云管蔡為戮周公右王故為此附㑹以求合親属不相及之義抑不思祁奚止取其不以嫌隙廢公道而巳誼湏比類之親然則元凱于此不獨誣經而其于左氏亦所謂欲益而反弊也左氏春秋傳但云左氏而不著其名世皆以為邱明初未有疑之者劉歆謂其好惡與聖人同而杜預亦稱親受經于仲尼獨唐啖助言别有左氏其説曰左氏觧義多謬其書出于孔氏門人且論語所引率前世人若老彭伯夷等類非同時而言左邱明耻之邱亦恥之邱明盖如史佚遲任者後世便謂左氏為邱明非也張横渠程伊川雖未能必左氏之為誰然亦不主邱明以為莫考也盖不以助說為過而宋子京譏其鑿劉器之笑其怪然則果孰是乎曰啖子之論無害也然亦未免于畏其名論事者顧是非何如耳豈可以人而移之聖賢之言一是非也芻蕘之言一是非也盍亦獨論左傳之是非而已其主名不必究也自今觀之乖戾甚多使其果出于邱明可遂以為是乎劉歆之徒惑于論語之所稱乃謂好惡與聖人同既以為同時而親見之乃謂受經于仲尼是皆妄意之言也盖論語稱之者特所恥両端耳安知餘事之盡然而所謂親受者又何所據也孔子之于人取其一節而稱之者不知其㡬人而可皆以為聖人之徒耶且邱明親見孰與其弟子門人彼弟子門人日承訓誨然往往得其言而不得其所以言邱明何人哉使親受其經豈能盡得聖人之㫖哉然則劉歆之見固無異于免童啖助析辨其失可矣而必云别左氏則其意亦以邱明之賢不應至是耳故曰未免于畏其名也春秋桓公十四年春正月公㑹鄭伯于曹無氷夏五鄭伯使其弟語來盟秋八月壬申御廩災上書春正月下書秋八月而中云夏五其脱月字不論可知而公羊云夏五者何為聞焉爾嗚呼髙之觧經類以私意穿鑿詭異百端曽無忌惮顧乃于此著疑以示重慎豈不可笑哉榖梁云夏五傳疑也此亦非是孔子固嘗以闕文語人豈有特著一書以為大典乃猥存此等而不辨者况又非所可疑乎只是後來脱之耳春秋襄公二十九年宋灾伯姬卒公羊傳曰宋灾伯姬存焉有司復曰火至矣請出伯姬曰不可吾聞之也婦人夜出不見傅母不下堂傅至矣母未至也逮乎火而死穀梁左氏其説畧同公榖皆以為夫子賢之予謂伯姬知禮而不知禮似賢而近于愚其志可哀而其事不可法也夫授受不親男女之正而嫂溺者必援之以手事有不幸而莫能兩全亦權其輕重而處之耳婦無傅母宵不下堂者所以别嫌疑防淫慝平居無事之時可也火至而避初非失莭之汚就使旁無一人亦非不禁况左右有司之重足以自明獨不能權其輕重而必守此區區之文乎予是以哀伯姬之愚而鄙公榖之陋也左氏譏伯姬女而不婦以為女待人而婦義事予謂當此之時雖女亦得以從宜豈獨婦哉嗚呼夫子中庸之教朗如白日坦于夷塗而世每以矯拂難行不近人情為竒節不亦異乎曲禮云天子有后有夫人有世婦有嬪有妻有妾公侯有夫人有世婦有妻有妾又云天子之妃曰后諸侯曰夫人大夫曰孺人士曰婦人庶人曰妻夫妻者所以對夫嫡配之總稱也婦人者所以對男子女子之總稱也初無貴賤尊卑之别今乃以妻列于后夫人等下而别為一號􅌹指婦人為士之配然則天子之后公侯夫人軰不謂之妻乎非士之配者不謂之婦人乎鄭注内則云妻之言齊也以禮見問得與夫敵體也孔氏引之以為彼是判合齊體者此言齊者以進御于王時暫有齊同之義穿鑿可笑如此檀弓云子上之母死而不䘮門人問諸子思曰子之先君子䘮出母乎曰然子之不使白也䘮之何也子思曰吾先君子無所失道道隆則從而隆道汚則從而汚伋則安能為伋也妻者是為白也母不為伋也妻者是不為白也母孔氏之不䘮出母自子思始世言孔氏三世出妻此所謂先君子者只是伯魚而疏義以為夫子其説牽合盖不定取或問子思之處此何如曰非也夫婦之義雖絶而母子之恩不廢此聖人忠厚之教也意者彼于其婦怒之至深故為是忿激之詞而不顧耳不然道之失得其責在誰而自處其汚以變世守之禮乎此不可以為法也檀弓云子路有姊之䘮可以除之矣而弗除孔子問之子路曰吾寡兄弟而弗忍也孔子曰先王制禮行道之人皆弗忍也予嘗怪其文不順家語則云行道之人皆弗忍先王制禮過之者俯而就之不及者企而及之文乃順焉檀弓又云南宮敬叔反必載寳而朝夫子曰若是其貨也䘮不如速貧之愈也常病其事不詳家語則云敬叔以富得罪于定公奔衛衛侯請復之載其寳以朝夫子聞之曰若是其貨也不如速貧之愈富而不好禮殃也敬叔以富䘮矣而又弗改吾懼其有後患也事乃詳焉經傳之間可以互相發明者多矣是故聞見貴乎博也滹南遺老集卷一
