front:
  text: 滹南遺老集卷之三十三
  hash: sha256:3ee44373800476dc1d14f51d9345f35a5ed6ae98f7a4cb7ae4e5a9d800aa1f73
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0418_SBCK_033-1a}
body:
  text: 滹南王若虛從之謬誤雜辨公羊曰君親無將將而誅焉蓋接上文將弒君之辭也唐明皇廢王后詔云見無將之心劉從諌理王涯等冤云有如大臣挾有無將之謀自宜執付有司蕭遘斥時溥之姦云卑侮王室有無將之萌如何道來後人用此字往往不安也王戎問阮瞻老莊與聖人其㫖同異瞻以將無同答之戎咨嗟良久乃辟為掾時稱三語掾瞻意蓋言同耳晋人例重玄學故戎深喜而世多疑之夫將無云者猶無乃得無之類庾亮令禇裒認孟嘉于衆中裒指嘉曰此君小異將無是乎茍晞子從母求為將晞拒之曰吾不以王法貸人將無後悔邪劉𥙿受禪徐廣攀晋帝車泣涕謝晦謂之曰徐公得無小過皆是類也世說載禇裒語正作得無通鑑載謝晦語亦然以此可知其為同世說記三語事則又有衛玠嘲之之辭云一言可辟何假于三蓋欲直言其同而不必更加疑耳今通鑑所載既依夲文而溫公自節本乃改為無同異豈溫公于此亦未詳歟而林氏又為之說曰二則有同有同然後有異一則無同無同然復無異求其同且不可得尚可以求異乎何謬妄之甚也後漢陳煒謂孔融幼而聽慧大未必竒融曰觀君所言將不蚤慧乎將不亦猶無將也蓋以煒言融雖蚤慧而大未必竒故融復言煒既大而不竒則疑于蚤慧或謂實言其不蚤慧誤矣世說云殷仲堪之荆州王東亭曰德以居全為稱仁以不害為名今宰牧華夏處殺戮之任與本操將不乖乎殷曰臯陶造刑辟之制不為不賢孔邱居司寇之任未為不仁南史荀萬秋對策父昶以示釋道琳道琳答曰此不須看若非先見而答貧道能為若先見而答貧道奴皆能為昶曰此將不傷道德邪答曰大德所以不德竟不看焉推此類則其義可見矣學者多疑寧馨之義或以為美或以為鄙皆非也山濤目王衍曰何物老嫗生寧馨兒然誤天下蒼生者未必非此人此美之之辭也南史宋王太后怒廢帝曰將刀來破我腹那得生寧馨兒此鄙之之辭也夫寧馨猶言如此然也今世方言往往有近之者但聲之轉耳故張謂詩以對阿堵劉夢得送日本僧詩云為問中華學道者幾人雄猛得寧馨平仄雖殊其意一也宋書于太后語加如此字蓋誤而不足憑焉魏書作如馨是則大同而小異耳東坡和王居卿平山堂詩云六朝興廢餘邱壠空使姦雄笑寧馨殊無義理特迫于趂韻姑以為王衍之名而巳近觀吳曽漫録亦論此字併載王衍廢帝事云昔宋間人以寧馨為不佳故山濤王太后皆以此為詆叱之語豈非以兒為非馨香者邪張劉二詩蓋乖其義此大謬也山濤之言分明是歎美安得併謂之詆叱哉又以寧馨為非馨者其鄙陋可笑甚矣洪邁容齊隨筆云劉真長譏殷淵源曰田舍兒強學人作爾馨語又謂桓溫曰使君如馨地寧可戰鬪求勝王導與何充語曰正自爾馨王恬撥王胡之手曰冷如鬼手馨强來捉人臂至今吳中人語言多用寧馨字為問猶言若何也豫謂邁引晋人語為證是矣若何則義不然惟城陽居士桑榆雜録曰寧猶如此馨語助也此得其當城陽居士桑榆雜録云王衍呼錢為阿堵物東坡和陶詩以阿堵為墻或指佛書云理亦應阿堵上阿堵如俗言阿底也不應為墻若顧愷之所謂傳神寫照正在阿堵中則阿堵乃眸子耳此字當從目按東坡和陶詩云阿堵不解醉誰歟此頽然此亦指墻而言阿底與王衍之呼錢無異豈遂以為墻之名哉愷之語從目者蓋一時書寫之偶然或俗子以意改之其實訓義皆一不妨通用然則東坡未嘗以堵為墻而城陽妄認睹為眸子也世說陳元方子群季方子孝光各論其父功德爭之不决咨于太邱太邱曰元方難為兄季方難為弟蓋言其賢相等不能相勝也晋王珣弟珉名出珣右時人為之語曰法護非不佳僧彌難為兄法護珣小字僧彌珉小字也北齊邢子良愛王晞之清悟與晞兩兄書曰恐足下方難為兄不暇慮其不進此言弟過于兄也隋書杜正玄贊云華蕚相耀亦為難兄弟此言在昆季中最優也今人作書簡往往呼朋友為難弟難兄其義未安豈别有據乎賀知章曰見紫芝眉宇令人名利之心都盡紫芝元德秀字也今人書簡遂有紫宇之稱不成語矣司馬相如傳曰相如奏大人賦天子大悅飄飄有凌雲之氣似遊天地之間意蓋武帝好仙而相如所陳皆飛騰超世之語適當其心故自有凌雲之氣而學者多以為文辭可以凌雲何也李白詩云相如去蜀謁武帝安車駟馬生輝光一朝再覽大人作萬乘忽欲凌雲翔此得之矣彼有云髙義薄雲天凌雲健筆意縱橫者非本乎此自不妨左氏言病在膏肓膏肓者胸鬲之閒猶心膂肺腹之類耳或遂以膏肓對錮疾是豈病之目耶新唐書李靖傳至謂靖為蕭銑輔公祏之膏肓其謬益甚矣王言如絲其出如綸王言如綸其出如綍此特喻其所出寢大而已世遂以制誥為絲綸而職翰苑者謂之掌絲綸又有綸闈綸閣之稱古今相襲不以為怪不亦過乎主父偃傳附嚴安上書事索隱曰嚴本姓莊明帝諱後並改為嚴然則遷史本皆莊字而東漢人改書如此也然張湯傳先稱嚴助而復云莊助東越傳又云莊助田蚡張蒼傳入書莊青翟相如傳首書莊忌夫子至漢書申屠嘉田蚡傳皆作莊青翟而公孫弘傳始作嚴字雜亂不齊蓋校定者失之不精耳左傳齊景公更晏子之宅晏子毁之而為里室皆如其舊則使宅人及之且諺曰非宅是卜惟鄰是卜二三子先卜鄰矣吾敢違諸乎豫謂自諺以下皆晏子之語也而與傳者語尤無别可乎必有脫字書稱乃心乃祖乃父乃之訓汝也周瑜上孫權疏云是瑜乃心日夜所憂卻正教劉禪語云乃心而悲無日不思楊子雲逐貧賦云昔我乃祖宣其明德沮渠䝉遜謂其衆云吾之乃祖翼奬竇融保寧河右無乃悖乎史記言四皓定太子事云留侯本招此四人之力當作本留侯石慶數馬事云猶然如此當作然猶通鑑稱苻堅喜王猛誅諸豪强云吾始今知天下之有法當作今始郭從謹言于唐明皇云草野之臣必知有今日當作知必德宗聞李泌𥙷戍卒之說云如此天下復無事矣當作無復權德輿論光武封子密事云反乃爵以通侯當作乃反南史齊東昏侯游獵至蔣山定林寺一沙門病不能去應時殺之左右韓暉光曰老道人可念帝曰汝見麞鹿亦不射邪仍百箭俱發宋蕭琛預御筵醉伏上以棗投琛琛仍取栗擲上曰陛下投臣以赤心臣敢不報以戰栗劉瑱妹為齊鄱陽王妃王死妃追傷成疾瑱令陳郡殷蒨畫王與平日寵姬共照鏡狀如欲偶寢者密使媪妳示妃妃視畢仍唾之因罵云故宜其蚤死詳此三仍字皆當作乃南北史中此類甚多豈傳寫之誤耶古人言文集行于世者世間也或有云行于代者代字雖亦訓世義自差殊武三思言我不知代間何者謂之善人何者謂之惡人此本只是世字蓋當時記録者避太宗諱故易之而後之作史者遂相仍而不刪其實不成語也古人言底事底物底處有底作底底之訓何也今人或認為此字之義誤矣史記平凖書云天下大氐無慮皆鑄金錢漢書食貨志亦同師古曰太氐猶言大凡無慮亦謂大率然則語意重復矣史記稱莊周之書大抵率寓言率亦大抵也退之閔已賦云伊時勢而則然子厚夢愈膏盲疾賦云中醫攻有兆之者而則之者語病也科舉子或時犯之蓋不足怪孰謂二公而有是乎孔子言十五志于學至七十而從心所欲不踰矩蓋自述其平生次第如此非世之所共也而後人文字中便以知命耳順從心為歲數之稱既已非是而南齊書文惠太子傳云年始過立劉子玄自序云年已過立豈不愈謬哉曲禮所記自幼學至于期頥皆漢儒强名本無義理而世之俗學亦或以為年齡之目蘇易簡之死未及四十然已經執政矣或記其事云竟不登彊仕而卒可以一笑班伯與王許子弟為群在綺𥜗紈袴之間而非其好䊵綺貴戚子弟之服耳劉子元自述其兒童時事云年在紈綺此何謂哉潘嶽嘗言豫年三十有二始見二毛人之衰白早晚固自有不同而庾信哀江南賦序云信始二毛即逄喪亂亦非也楊大年嘗言禮稱四十強仕七十致事凡仕于公者古制不過三十年大年十一歲解褐甫四十以疾辭位蓋以此子謂曲禮之說出于漢儒所撰以意强名而謂之古制殆不然也夫年及七十不論古制自當退休必曰四十而後仕仕不過三十年則有何義理而考之古人亦曷嘗拘此哉退之叙張巡事云許遠與巡同年生月日後于巡呼巡為兄是巡年為長也而新唐書逺傳云逺與巡同年生而長故巡呼為兄未知孰是當更當考之文字中有曰同年而語一日之長者豫竟不曉同年二日之義當與知者商訂書言百姓凛凛若崩厥角釋者謂既崩摧其角無所容頭文理甚明而孟子引之曰非敵百姓也若崩厥角稽首已為乖異意者或有闕誤而班固論王莽乃云漢諸侯王厥角稽首舊唐書論太宗又云皇威所𬒳黎顙厥角復何謂邪孟子注昏不可曉未敢慿也論語稱有朋自逺方來而後周蕭大圜云有朋自遠揚榷古今豈成語哉然歐陽公集古録載後漢一碑巳有此語則其繆久矣南齊巴陵隱王寶義為太尉詔曰不言之化形于自逺尤不可也論語云夫子之言性與天道不可得而聞其文甚明非難辨也而唐太宗旌賞孫伏伽詔曰朕惟寡德不能性與天道長孫無忌對太宗之問曰陛下性與天道非臣等愚所及令狐德棻周書王褒庾信傳論曰闕里性與天道修六經以維其末何其繆耶論語稱夫子便便言唯謹爾惟語辭也史記石奮傳遂用唯謹字而後世史書凡言人性行謹者往往以此為成言豈非習遷之誤耶自東漢以來史傳文集中往往以貽厥為子孫之名友于為兄弟之名至有謂隆于友于傳諸貽厥者公然相襲恬不知怪近世或辨其繆矣然不特此也書稱知人則哲而范曄云則哲之鍳惟帝所難宋文帝云吾無則哲之明沈約云有以見武皇之則哲詩稱王赫斯怒而薛綜上孫權疏云抑雷霆之威忍赫斯之怒又有言發赫斯之命者論語稱色斯舉矣又曰樂云樂云鐘鼓云孚哉左雄上疏有云或因罪而引高或色斯以求名者書稱土爰稼穡范文正秋香亭賦云賦土爰之甘味劉平等傳引云鐘鼓非樂云之本孔子曰盍各言爾志又曰君子于其所不知蓋闕如也梁簡文論古今文體不同則有俱為盍各之辭司馬貞譏史記不傳季禮諸人則有何為蓋闕之語嗚呼學者于義訓幽深隱奧者容有差誤至于此類如辨白黑矣而鹵莽若是其與矇瞽何異哉東坡詩云聖善方當而立歲乃翁已及古稀年此則滑稽以為嬉笑者耳而藝苑雌黃與友于貽厥同譏過矣詩云澘焉出涕語云夫子喟然而嘆澘者涕之貌喟者嘆之聲耳詞人便有涕淚澘栻餘澘坐喟喟也等語殆不可也穀梁曰三軍之士粲然皆笑粲只是笑貌耳宋子京筆記曰粲明也萬衆皆啓齒齒既白故以粲義包之其謬論不必辨也栁文言世塗昏險云擬步如漆却是地黑也歐詩言夜色晦冥云舉手向空如抹􅃮却是皮膚黑也今韻略定上下字有可疑者其訓上字也在上聲則曰方將欲上去聲則曰元在物上及訓下字乃反之何邪栁下惠言伐國者不問仁人此蓋拒魯侯之辭耳慕容德勸燕主暐伐秦遂曰願獨斷聖慮無訪仁人豈所謂以意逆志者哉彼夷虜之人蓋不足責然世之書生類此者亦多矣蒯通曰天下丐丐爭欲為陛下所為顧力不能霍去病曰顧方略何如耳不至學古兵法師古訓顧為念揚雄解嘲云顧默而作太玄五千丈師古曰顧反也二義皆非蓋此等字不能形容但可意㑹耳茅璞三餘録云孟嘉墓志桓溫問聽妓絲不如竹竹不如肉之意答以漸近自然晋書更之曰漸近使之然殊失其㫖蓋肉聲者歌也不假于物故曰自然嘉之意謂絲聲之徦合不如竹聲之漸近竹聲之漸近又不如肉聲之自然也然古人以歌謳名者如王豹綿駒秦青之流皆男子也而此專言聽妓則知俚語所謂詞出佳人口者其來已久以古意推之歌舞管絃不必專言聽妓豫謂璞表出墓志之語以證晋書之失殊快人意至其分別漸近自然之義及辨論妓字皆非也蓋漸近自然總言三節只是一意而云假合不如漸近漸近不如自然何邪聽妓即聽音樂也本作伎教坊記謂太常樂人為聲伎兒舊唐李績臨終與家人別堂上奏女妓通鑑賀蘭敏之居喪釋衰絰奏妓蓋妓伎二字本通用也魏志鍾繇議田疇讓封爵事曰子路拒牛仲尼謂之止善雖可激清勵濁猶不足多裴松之曰按吕氏春秋子路拯溺者其人拜之以牛子路受之孔子曰魯人必拯溺矣與繇所引不同未審繇誤㦯别有所出豫謂此皆小說寓言縱有所出亦何足信哉魏略曰華歆與邴原管寧相善時號三人為一龍歆為頭原為腹寧為尾裴松之謂原之徽猷懿望無愧華公寧含德髙蹈恐難為尾魏略之言未可以定其先後所評固善然劉義慶世說亦載此事蓋云寧為頭歆為尾乃與松之意合不知所傳果孰為真也謝安𥘉不就徴辟夫人劉氏見家門冨貴而安獨靜退謂曰丈夫不如此也安掩鼻曰恐不免耳說者皆以為恐不免富貴而吳曽漫録云恐不免禍難此于不免字固亦可通然以掩鼻之意觀之似不爾也類說張尚書故實云梁武帝令殷鐡石于大王書中搨一千字不重者每字片𥿄雜碎無次召周興嗣曰卿有才思為我韻之興嗣一日編綴進上鬚髮皆白殆繆說也此文雖不足觀然皆偶儷韻語要是人之所撰豈有漫取不重之字而適能相就乎或言本晋武時鍾繇撰進年代久逺又因兵大壞亂不能成章上乃令興嗣韻之是則有理矣江鄰幾雜志云歐陽永叔知貢舉太學生劉幾試卷鑿紕俄有間歲詔幾懼改名輝既試永叔在詳定所升作狀元劉原父曰永叔有甚慿據豫謂不然公本疾其怪僻故特黜落以厲風俗及變其體則從而取之此乃有慿據也正使知其為幾亦必喜之矣且公以斯文為百世師豈幾輩可得而眩亂哉原父素與公爭名故多譏戲之語而鄰幾猥録之豫不得不辨滹南遺老集卷三十三
