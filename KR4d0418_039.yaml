front:
  text: 滹南遺老集卷之三十九
  hash: sha256:296a35343eef018a875ebdcb7a7e0179cc9ba5d0d810dd6b188a239b33bb3118
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0418_SBCK_039-1a}
body:
  text: 滹南王若虗從之詩話唐子西語録云古之作者𥘉無意于造語所謂因事陳辭老杜北征一篇直紀行役耳忽云或紅如丹砂或黑如點􅃮雨露之所濡甘苦齊結實此類是也文章即如人作家書乃是慵夫曰子西談何容易工部之詩工巧精深者何可勝數而摘其一二遂以為訓哉正如冷齊言樂天詩必使老嫗盡解也夫三百篇中亦有如家書及老嫗能解者而可謂其盡然乎且子西又嘗有所論矣曰詩在與人商論深求其疵而去之等閒一字放過則不可殆近法家難以言恕故謂之詩律立意之𥘉必有難易一途學者不能强所劣往往舍難而趨易文章不工每坐此也又曰吾作詩甚苦悲吟纍日僅能成萹𥘉未見可羞處明日取讀疵病百山輒復悲吟纍日反覆改正稍稍有加數日再讀疵病復出如此數四方敢示人然終不能竒也觀此二說又何其立法之嚴而用心之勞邪蓋喜為髙論而不本于中者未有不自相矛盾也退之曰文無難易唯其是耳豈復有病哉歐公寄常秩詩云笑殺汝隂常處士十年騎馬聽朝雞伊川云夙興趍朝非可笑事永叔不必道夫詩人之言豈可如是論哉程子之誠敬亦已甚矣荆公咏雪云試問火城將䇿試何如雲屋聼窗知苑極之不愛其上句山谷云管城子無食肉相孔方兄有絶交書極之不愛其下句此與人意暗同羅可雪詩有斜侵潘嶽鬢橫上馬良眉之句陳正敏以為信然却是假雪耳盧延讓有栗爆燒氈破猫跳觸鼎翻之句楊文公深愛而或者疑之子謂此語固無甚佳然讀之可以想見明窗溫爐間間坐之適楊公所愛蓋其境趣也耶東坡詩云文章豈在多一頌了伯倫朱少章云唐藝文志有劉伶文集三卷則非無他文章也坡豈偶忘于落筆之時乎抑别有所聞也豫謂不然按晉史云伶未嘗措意文翰惟著酒德頌一篇坡亦據此而巳且公意本謂只此一篇足以道盡平生傳名後世則他文有無亦不必論也東坡章質夫惠酒不至詩有白衣送酒舞淵明之句䂬溪詩話云或疑舞字太過及觀庾信答王褒餉酒云未能扶畢卓猶足舞王戎乃知有所本豫謂疑者但謂淵明身上不宜用耳何論其所本哉東坡題陽關圗云龍眠獨識殷勤處畫出陽關意外聲豫謂可言聲外意不可言意外聲也東坡酷愛歸去來辭既次其韵又衍為長短句又裂為集字詩破碎甚矣陶文信美亦何必爾是亦未免近俗也東坡和陶詩或謂其終不近或以為實過之是皆非所當論也渠亦因彼之意以見吾意云爾昌嘗心競而較其勝劣耶故但觀其眼目㫖趣之何如則可矣東坡云論畫以形似見與兒童鄰賦詩必此詩定非知詩人夫所貴于畫者為其似耳畫而不似則如勿畫命題而賦詩不必此詩果為何語然則坡之論非歟曰論妙在形似之外而非遺其形似不窘于題而要不失其題如是而巳耳世之人不本其實無得于心而借此論以為髙畫山水者未能正作一木一石而託雲煙杳靄謂之氣象賦詩者茫昧僻遠按題而索之不知所謂乃曰格律貴爾一有不然則必相嗤點以為淺易而尋常不求是而求竒真僞未知而先論髙下亦自欺而已矣豈坡公之本意也哉鄭厚云魏晋以來作詩倡和以文寓意近世倡和皆次其韵不復有真詩矣詩之有韵如風中之竹石間之泉柳上之鶯墻下之蛩風行鐸鳴自成音響豈容擬議夫笑而呵呵歎而唧唧皆天籟也豈有擇呵呵聲而笑擇唧唧聲而歎者哉慵夫曰鄭厚此論似乎太髙然次韵實作詩之大病也詩道至宋人巳自衰弊而又専以此相尚才識如東坡亦不免波蕩而從之集中次韵者幾三之一雖窮極伎巧傾動一時而害于天全多矣使蘇公而無此其去古人何逺哉東坡薄薄酒二篇皆安分知足之語而山谷稱其憤世嫉邪過矣或言山谷所擬勝東坡此皮膚之見也彼雖力加竒險要出第二何足多貴哉且東坡後篇自破前說此乃眼目而山谷兩篇只是東坡前篇意吾未見其勝之也東坡雁詞云㨂盡寒枝不肯棲以其不棲木故云爾蓋激詭之致詞人正貴其如此而或者以為語病是尚可與言哉近日張吉甫復以鴻漸于木為辨而怪昔人之寡聞此益可笑易象之言不當援引為證也其實雁何嘗捿木哉東坡送王緘詞云坐上別愁君未見歸來欲斷無腸此未别時語也而言歸來則不順矣欲斷無腸亦恐難道贈陳公密侍兒云夜來倚席曽親見此本即席所賦而下夜來字却是隔一日王直方詩話稱朝以道見東坡梅詞云便知道此老須過海只為古今人不曽道到此须罰教去苕溪漁隱曰此言鄙俚近于忌人之長幸人之禍直方無識載之詩話寧不畏人之訊誚乎慵夫曰此詞意屬朝雲也以道之言特戲云爾蓋世俗所謂放不過者豈有他意哉苕溪譏直方之無識而不知巳之不通也陳後山云子瞻以詩為詞雖工非本色今代詞手惟秦七黃九耳子謂後山以子瞻詞如詩似矣而以山谷為得體復不可曉朝無咎云東坡詞多不諧律吕蓋橫放傑出曲子中縛不住者其評山谷則曰詞固髙妙然不是當行家語乃著腔子唱如詩耳此言得之朝無咎云眉山公之詞短于情蓋不更此境耳陳後山曰宋玉不識巫山神女而能賦之豈待更而後知是直以公為不及于情也嗚呼風韻如東坡而謂不及于情可乎彼高人逸才正當如是其溢為小詞而間及于脂粉之閒所謂滑稽玩戲聊復爾爾者也若乃纎艷淫媟入人骨髓如田中行栁耆卿輩豈公之雅趣也哉陳後山謂子瞻以詩為詞大是妄論而世皆信之獨茅荆産辨其不然謂公詞為古今第一今翰林趙公亦云此與人意暗同蓋詩詞只是一理不容異觀自世之未作習為纎艷柔脆以投流俗之好髙人勝士亦或以是相勝而日趍于委靡遂謂其體當然而不知流弊之至此也文伯起曰先生慮其不幸而溺于彼故援而止之特立新意寓以詩人句法是亦不然公雄文大手樂府乃其遊戲顧豈與流俗爭勝哉蓋其天資不凡辭氣邁往故落筆皆絶塵耳東坡南行唱和詩序云昔人之文非能為之為工乃不能不為之為工也山川之有雲草木之有華實充滿勃欎而見于外雖欲無有其可得耶故豫為文至多而未嘗敢有作文之意時公年始冠耳而所有如此其肯與江西諸子終身爭句律哉東坡文中龍也理妙萬物氣吞九州縱橫奔放若遊戲然莫可測其端倪魯直區區持斤斧凖繩之說隨其後而與之爭至謂未知句法東坡而未知句法世豈復有詩人而渠所謂法者果安出哉老蘇論揚雄以為使有孟軻之書必不作太元魯直欲為東坡之邁往而不能于是髙談句律旁出樣度務以自立而相抗然不免居其下也彼其勞亦甚哉向使無坡壓之其措意未必至是世以坡之過海為魯直不幸由明者觀之其不幸也舊矣吳虎臣漫録云歐陽季默嘗問東坡魯直詩何處是好坡不答但極稱道季默復問如雪詩卧聼疏疏還密密起看整整復斜斜豈亦佳耶坡云正是佳處慵夫曰子于詩固無甚解至于此句猶知其不足賞也當是所傳妄耳徐師川亦嘗詠雪云積得重重那許重飛時片片又何輕曽端伯以為警䇿且言師川作此罷因誦山谷疏踈密密之句云我則不敢容易道意謂魯直草率而巳語為工也噫豫之惑滋甚矣王直方云東坡言魯直詩髙出古人數等獨步天下子謂坡公决無是論縱使有之亦非誠意也蓋公嘗跋魯直詩云每見魯直詩未嘗不絶倒然此卷語妙甚能絶倒者巳是可人又云讀魯直詩如見魯仲連李太白不敢復論鄙事雖若不適用然不為無𥙷于世又云如蝤蛑江瑶柱格韻髙絶􅌉餐盡廢然多食則發風動氣其許可果何如哉山谷之詩有竒而無妙有斬絶而無橫放鋪張學問以為富點化陳腐以為新而渾然天成如肺肝中流出者不足也此所以力追東坡而不及歟或謂論文者尊東坡言詩者右山谷此門生親黨之偏說而至今詞人多以為口實同者襲其迹而不知返異者畏其名而不敢非善乎吾舅周君之論也曰宋之文章至魯直巳是偏仄處陳後山而後不勝其弊矣人能中道而立以巨眼觀之是非真僞望而可見也若虗雖不解詩頗以為然近讀東都事略山谷傳云庭堅長于詩與秦觀張來朝𥙷之遊蘇軾之門號四學士獨江西君子以庭堅配軾謂之蘇黃蓋自當時巳不以是為公論矣山谷題陽關圗云渭城栁色關何事自是行人作許悲夫人有意而物無情固是矣然夜發分寧云我自只如常日醉滿川風月替人愁此復何理也山谷詩云語言少味無阿堵氷雪相看有此君夫阿堵者謂阿底耳顧愷之云傳神寫照正在阿堵中殷浩見佛經云理應阿堵上謝安指桓溫衛士云明公何須壁間阿堵輩是也今去物字猶此君去君字乃歇後之語安知其為錢乎山谷題嚴溪釣灘詩云能令漢家九鼎重桐江波上一絲風說者謂東漢多名莭之士賴以久存跡其本原正在子陵釣竿上來豫謂論則髙矣而風何與焉嘗質之吾舅周君君笑曰想渠下此字時其心亦必不能安也或曰詩人語不當如是論曰固也然亦須不害于理乃可如東坡眉石硯詩指胡馬于眉間與此是一箇規模也而豈有意病哉蘇黃各因玄真子漁父詞增為長短句而互相􅏺評山谷又取船子和尚詩為訴衷情而冷齊亦載之豫謂此皆為蛇畫足耳不可作也山谷詩云新婦磯邉眉黛愁女兒浦口眼波秋自謂以山色水光替却玉肌花貌真得漁父家風東坡謂其太瀾浪可謂善謔蓋漁父身上自不宜及此事也山谷最不愛集句目為百家衣且曰正堪一笑豫謂詞人滑稽未足深誚也山谷知惡此等則藥名之作建除之體八音列宿之類獨不可一笑耶山谷雨絲詩云烟雲杳靄合中稀霧雨空濛落更微園客繭絲抽萬緒蛛蝥網靣罩群飛風光錯綜天經緯草木文章帝杼機願染朝霞成五色為君王𥙷坐朝衣夫雨絲云者但謂其狀如絲而巳今直說出如許用度豫所不曉也山谷詞云杯行到手莫留殘不道月明人散嘗疑莫字不安昨見王德卿所收東坡書此詞墨跡乃是更字也滹南遺老集卷三十九
