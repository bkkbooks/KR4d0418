front:
  text: 滹南遺老集卷之三
  hash: sha256:4cb217449e06409cfdb1c9234c5d396367b205c9a5fcf60444a3ee9b39e81b69
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0418_SBCK_003-1a}
body:
  text: 滹南王若虛從之論語辨惑序解論語者不知其幾家義略偹矣然舊説多失之不及而新説每傷于太過夫聖人之意或不盡于言亦不外乎言也不盡于言而執其言以求之宜其失之不及也不外乎言而離其言以求之宜其傷于太過也盍亦揆以人情而約之中道乎嘗謂宋儒之議論不為無功而亦不能無罪焉彼其推明心術之微剖析義利之辨而斟酌時中之權委曲疏通多先儒之所未到斯固有功矣至于消息過深揄揚過侈以為句句必涵飬氣象而事事皆關造化將以尊聖人而不免反纍名為排異端而實流于其中亦豈為無罪也哉至于謝顯道張子韶之徒迂談浮夸往往令人發笑噫其甚矣永嘉葉氏曰今世學者以性為不可不言命為不可不知凡六經孔子之書無不牽合其論而上下其詞精深微妙茫然不可測識而聖賢之實猶未著也昔人之淺不求之于心也今世之妙不止之于心也不求于心不止于心皆非所以至聖賢者可謂切中其病矣晦庵刪取衆説最號簡當然尚有不安及未盡者竊不自揆嘗以所見正其失而補其遺凡若干章非敢以傳世也姑為吾家童蒙之訓云總論解論語者有三過焉過于深也過于髙也過于厚也聖人之言亦人情而巳是以明白而易知中庸而可久學者求之太過則其論雖美而要為失其實亦何貴乎此哉夫子之言性與天道子貢自謂其不得聞而宋儒皆以為實聞之問死問鬼神夫子不以告子路而宋儒皆以為實告之鄉黨所載乃聖人言動之常無意義者多矣而或謂與春秋相表裏終篇唐舜禹湯之事寂寥殘缺殆有闕文不當強解而或謂聖學所傳所以著明二十篇之大旨若是之類皆過于深者也聖人雖無名利之心然常就名利以誘人使之由人欲而識天理故雖中下之人皆可企而及兹其所以為教之周也如曰不患莫巳知求為可知也此正就名而使之求實耳而謝顯道曰是猶有求知之意非聖人之至論子張學干祿夫子為言得祿之道此正就利而使之思義耳而張九成曰聖人之門無為人謀求利之説祿之為義自足而已寧武子邦無道則愚夫子以為不可及楊龜山曰有知愚之名則非行其所無事言不可及則過乎中道矣蘧伯玉邦無道則卷而懷之夫子以為君子而張南軒曰此猶有卷懷之意未及乎潛龍之隱見果聖人之旨乎若是之類皆過于髙者也凡人有好則有惡有喜則有怒有譽則有毁聖人亦何以異哉而學者一以春風和氣期之凡忿疾譏斥之辭必周遮護諱而為之説子曰十室之邑必有忠信如邱者焉不如邱之好學也此蓋篤實教人欲其知所勉耳而衛􅗕以焉字屬下句意謂聖人不敢以不學待天下也此正繆戾而世或喜之子曰四十五十而無聞焉斯亦不足畏也巳年四十而見惡焉其終也巳人故有晚而改莭者亦概觀之亦可見其終身矣而蘇東坡皆疑其有為而言子貢問當時從政者夫子比之斗筲而不數蓋師弟之間商評之語何害于德而張九成極論以為自稱之辭至于杖叩原壤呼之為賊此其鄙棄無復可疑而范純夫猶有因其才而教誨之若是之類皆過于厚者也知此三者而聖人之實著矣滹南遺老集卷三
