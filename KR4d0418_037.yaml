front:
  text: 滹南遺老集卷之三十七
  hash: sha256:da956d2099cb1782c15e62e36d9b4d75e93fba4c5c9c9abd25bda244ea1ce1a9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0418_SBCK_037-1a}
body:
  text: 滹南王若虗從之文辨古人或自作傳大抵姑以託興云爾如五栁醉吟六一之類可也子由著潁濱遺老傳歷述平生出處言行之詳且詆訾衆人之短以自見始終萬數千言可謂好名而不知體矣既乃破之以空相之説而以為不必存蓋亦自覺其失也歟蘇叔黨思子臺賦步驟馳騁抑揚反復可謂竒作然引扶蘇事不甚切按始皇止以扶蘇數直諫故使監兵于外當時趙髙輩未敢逞其姦及帝病亟為書召扶蘇而髙輩矯遺詔賜死耳責始皇不蚤定儲嗣則可謂其信讒而殺之非也且秦何嘗築臺寄哀而云三后一律同名齊實乎幸曽孫之無恙聊可慰夫九原此兩句隔斷文勢宜去之其言晉惠事云寫餘哀于江陸發故臣之幽契夫江統陸機之作誄出于巳意而非上命則畦徑有礙亦當刪削其言曹操事云然後知鼠輩之果無此尤乖戾本以愛蒼舒相明而却似惜華他又云同舐犢于晚歲又何怨于老臞操問楊彪何瘦而答以老牛舐犢操為改容是豈有怨意哉但下疑怪等字可也蘇叔黨颶風賦云此颶之漸也少箇風字又云此颶之先驅耳却多颶字但云此其先驅足矣風息之後父老來唁酒漿羅列至于理草木葺軒檻輔茅茨塞墻垣則時巳久矣而云巳而山林寂然海波不興動者自止鳴者自停豈可與上文相應哉魯直白山茶賦云彼細腰之子孫與莊生之物化方壞户以思溫故無得而凌跨竹溪黨公曰此正謂冬無蜂蝶耳何用如許豫謂詞人狀物之言不當如是論然數句自非佳語細腰子孫既巳不典而又以莊生物化為蝶不亦謬乎江西道院賦最為精密然酌樽中之醁一句頗贅但云公試為我問山川之神足矣王元之待漏院記文殊不典人所以喜之者特取其規諷之意耳代古人為文者必彼有不到之意而吾為發之且得其體製乃可如栁子天對蘇氏候公説項羽之類蓋庶幾矣王元之擬伯益上憂啓子房招四皓等書既無佳意而語尤卑俗只是巳作其徒勞亦甚而選文者或録之又何其無識也張伯玉以六經閣記折困曽子固而卒自為之曰六經閣者諸子百氏皆在焉不書尊經也士大夫以為美談豫嘗于文鑑見其全篇冗長汗漫無甚可嘉不應遽勝子固也或言子固隂毁伯玉且當時薦譽者大盛故伯玉薄之云宋人稱胡旦喜玩人嘗草江仲甫升使額制云歸馬華山之陽朕雖無愧放牛桃林之野爾實有功江小字忙兒故也又行一巨璫誥詞云久淹禁署克慎行藏由是宦竪切齒夫制誥王言也而寓穢雜戲侮之語豈不可罪哉孫覿求退表有云聽貞元供奉之曲朝士無多見天寶時世之粧外人應笑新豐翁右臂巳折杜陵叟左耳又聾夫臣子陳情于君父自當以誠實懇惻為主而文用四六既巳非矣而又使事如此豈其體哉宋自過江後文弊甚矣舊説楊大年不愛老杜詩謂之村夫子語而近見傳獻簡嘉話云晏相常言大年尤不喜韓桞文恐人之學常橫身以蔽之嗚呼為詩而不取老杜為文而不取韓栁其識見可知矣吾舅周君德卿嘗云凡文章巧于外而拙于內者可以驚四筵而不可適獨坐可以取口稱而不可得首肯至哉其名言也杜牧之云杜詩韓筆愁來讀似倩麻姑癢處抓李義山云公之斯文若元氣先時巳入人肝脾此豈巧于外者之所能邪邵氏云楊劉四六之體必謹四字六字律令故曰四六然其弊類俳可鄙歐蘇力挽天河以滌之偶儷甚惡之氣一除而四六之法則亡矣夫楊劉惟謹于四六故其弊至此思欲反之則必當為歐蘇之橫放既惡彼之類俳而又以此為壞四六法非夢中顛倒語乎且四六之法亦何足惜也四六文章之病也而近世以來制誥表章率皆用之君臣上下之相告語欲其誠意交孚而駢儷浮辭不啻如俳優之鄙無乃失體耶後有明王賢大臣一禁絶之亦千古之快也科舉律賦不得預文章之數雖工不足道也而唐宋諸名公集往往有之蓋以編録者多愛不忍因而附入此適足為纍而巳栁子厚夢愈膏肓疾賦雖非科舉之作亦當去之凡人作文字其他皆得自由惟史書實録制誥王言決不可失體世之秉筆者往往不謹馳騁雕鐫無所不至自以為得意而讀者亦從而歆羡識真之士何其少也凡為文章須是典實過于浮華平易多于竒險始為知本求世之作者往往致力于其末而終身不返其顛倒亦甚矣或問文章有體乎曰無又問無體乎曰有然則果何如曰定體則無大體須有書傳中多有自今以來之語此亦疵病蓋由昔至今而來則順由今至後者言往可也宋玉稱鄰女之狀曰增之一分則太長減之一分則太短著粉則太白施朱則太赤豫謂上二太字不可下夫其紅白適中故著粉太白施朱太赤乃若長短則相形者也增一分既巳太長則先固長矣而減一分乃復太短却是元短豈不相窒乎是可去之史記屈原傳云每出一令平伐其功曰以為非我莫能為也曰字與以為意重復栁文鶻説云余疾夫今之説曰以喣喣而默徐徐而俯者善之徒翹翹而厲煙煙而白者暴之徒亦是類也史記田敬叔完世家云太史敫女竒法章狀貌以為非恆人而憐之梁鴻傳云鄰里耆老見鴻非恆人蔡雍狀異恆人孫權骨體不恆苻堅骨相不恆姚萇志度不恆此等恆字皆當作常蓋恆雖訓常止是久逺之意非尋常之常也張良問髙祖曰上平生所憎誰最甚者袁盎慰文帝曰上自寬天稱君為上自傍而言則可靣稱之似不安也張釋之言盜長陵一抔土抔掬也此本謂發冡而云一抔者蓋不敢指斥耳駱賓王檄武后書云一抔之土未乾世皆稱工而其語意實未安也而唐彥謙詩復有眼見愚民盜一抔之句豈不益謬哉張安世為光祿勳郎有小便殿上者主事白行法安世曰何以知其不反水漿耶何以字别却本意當云安知非耳後漢張升見黨事起去官歸鄉里與友人相抱而泣陳留老父見而謂曰網羅張天去將安所朱泚敗走失道問野人答曰天網恢恢逃將安所二所字不成語謂之往可也吳志蜀零陵太守郝普為吕蒙所紿而降慙恨入地此不成義理謂有欲入地之意則可直云入地可乎新唐記姚崇汰僧事云髮而農者餘萬二千人此本萬二千餘人耳如子京所云則是多餘許數也可謂求文而害理然此病人多犯之者不獨子京也范蜀公記狄青靣其事止云帶銅靣具而巳澠水燕談則曰靣銅具聞見録又曰帶銅鑄人靣豫謂邵氏語頗重濁燕談似簡而文然安知其為何具俱不若蜀公之真蓋靣具二字自有成言也通鑑云吳主孫皓惡人視已羣臣侍見莫敢舉目左丞相陸凱曰君臣無不相識之道猝有不虞不知所赴吳主乃聼凱自視而他人如故子謂自視字不安若云獨聼凱視可矣通鑑劉聰朝崔暐説太弟義曰四衛精兵不減五千晉孝武時幽州治中平規謂唐公洛曰控弦之士不減五十餘萬唐懿宗每月宴設不減十餘豫謂凡不減字止可于比對處言之而非所以料數也宇文泰謂賀拔嶽曰費也頭控弦之騎不下一萬是矣餘減字皆當作下新唐書劉仁軌諌校獵妨農事云役雖簡省猶不損數萬損字尤非也通鑑云謝安好聲律期功之慘不廢絲竹豫謂聲律字不安若作聲伎聲樂或音律則可矣通鑑云苻堅鋭意欲取江東寢不能旦旦字不妥通鑑宋紀蕭道成遣薛淵將兵助袁粲淵固辭道成曰但當努力無所多言齊紀豫章王嶷常慮盛滿求解揚州武帝不許曰畢汝一世無所多言二所字殊剩也通鑑魏中尉元匡劾于忠専恣云觀其此意欲以無上自處舊唐上官婉兒為節愍太子所索大呼曰觀其此意即當次索皇后以及大家周書言齊王憲善處嫌疑云髙祖亦悉其此心故得無患其此二字豈可一處用新唐李德𥙿論朋黨云仁人君子各行其巳不可交以私亦下不得其字史傳中間有不避俗語者以其文之則失真也齊後主欲殺斛律光使力士劉桃枝自後撲之不倒通鑑改為不仆仆亦倒也然擈字下便不宜用通鑑唐文皇時權萬紀言宣饒二州銀利事上曰卿欲以桓靈俟我邪俟當作待蓋俟雖訓待乃候待之待非待遇之待也通鑑云唐宣宗時吐畨大掠河西鄯廓等八州五千里赤地殆盡却是幾無也不若作遍字通鑑記周世宗禁銅事云唯官法物及寺觀鐘磬等聽留外自餘民間銅器悉令輸官既有外字不當更云自餘也然楚世家或説頃襄王之辭亦有外其餘字楊雄之經宋祁之史江西諸子之詩皆斯文之蠧也散一文至宋人始是真文字詩則反是矣滹南遺老集卷三十七
