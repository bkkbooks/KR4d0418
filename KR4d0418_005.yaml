front:
  text: 滹南遺老集卷之五
  hash: sha256:03a050cb985360794a5df9548da7a5dadb9b9cf611fac98803d2c77257562599
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0418_SBCK_005-1a}
body:
  text: 滹南王若虛從之論語辨惑二宰豫晝寢夫子有朽木糞土之喻且曰始也聼人之言則信其行今因豫而改之舊說以為廢墮于學嗚呼一晝寢之適雖聖人不免焉且夫學之勤惰行之真僞何足以卜之而夫子怒之至是乎蓋其惰也非止於一朝而夫子之怒亦有素矣特因是而發耳不然則豫之耽寢日以為常記者語簡而不盡其詳亦不可知荆公曰宰豫之大罪在于行不顧言則晝寢之過為不足責東坡曰晝居于內非有疾不可豫蓋好內而懷安者皆求之大過也其餘說者尚多迂陋益甚無足辨焉始吾於人此一章而再稱子曰胡氏疑其衍文或非一日之言豫謂以語法觀之只是一章其為衍文無疑也家語載夫子之言曰吾以言取人失之宰我以貌取人失之子羽斯果夫子之言乎曰非也好事者因論語而附㑹為之耳夫子所謂始吾于人聼其言而信其行今也聼其言而觀其行因豫改之者特一時忿怒之辭非謂平居一聼人言遂信其行也天下之人行不副言者多矣使夫子隨聼而遽信之所失者豈特宰豫邪言猶可也至于以貌取人雖愚夫知其不可而謂聖人為之乎夫子之於人好惡必察毁譽必試賜之辨師之堂堂曽不足以欺之顔子之愚猶必退省其私而後信何獨於宰豫子羽而鹵莽如是哉吾固疑非夫子之言也子貢曰我不欲人之加諸我也吾亦欲無加諸人夫子以為非爾所及范純夫曰君子修其在已者其在人者不可必也已欲無加諸人易使人無加于已難巳所不欲勿施於人則無加于人矣而欲人無加于巳雖聖人不能也顔子之行犯而不挍則巳矣豈能使人無犯乎其說甚好然注疏本如此程氏曰我不欲人之加諸我吾亦欲無加諸人仁也施諸已而不願亦勿施於人恕也恕或能勉之仁則非子貢所及强生穿鑿殊無謂也晦菴曰我不欲人之加諸我者我亦不欲以此加人却只是已所不欲勿施於人巳也字為者字於文為悖矣又云此仁者之事故非子貢所及豫謂如彼之說亦只是恕何足為仁乎林少頴曰此正已所不欲勿施于人之意然此以為非所及而彼則曰終身可行者蓋自謂能之則不許甘於不能則告之乃聖人抑揚之意皆是曲說無足取焉子貢曰夫子之文章可得而聞其言性與天道不可得而聞也考諸論語六經夫子實罕言之故雖髙弟有不得聞者蓋自漢以來學者莫敢輕議而近代諸公皆以為聞而歎美之辭或又曰聖人之文章句句字字無非性與天道者吾不知其果何所見也歐陽子嘗謂聖人不窮性為言或雖言而不究學者當力修人事之實而性命非其所急此於名教不為無功而衆共嗤黜以為不知道髙論既興末流日甚中才庸質例以上達自期章句之未知己指六經為糟粕談玄說妙聼者茫然而律其所行顛倒錯繆者十八九此亦何用于世哉愚謂歐陽子不失為通儒而是說譊譊者未必無罪于聖門也嗚呼度德量力切問而近思孔孟之教人必始于此後生小子盍亦少安寧失之固無涉于妄寧處其卑而不至于僣焉則善矣季文子三思而後行子聞之曰再斯可矣夫人之行事固不厭其思至于畏慎太過則亦不必也文子其太過也與故聖人以中道約之以為如是亦足而已近代李邦直獨得此意鄭氏曰賢而寡過不必三思蘇氏曰再愈於一而况三乎程氏曰再則定三則私意起其說皆偏而程氏尤甚思至于三何遽為私意邪程子又以文子使晉求喪之禮為證按文子至晉而果遭之則正得思之力也何過之有蓋事有不必再思亦有不止於三思者𥘉無定論也吕岱戒諸葛恪曰世方多難子每事必十思恪曰季文子三思而後行夫子曰再斯可矣今君令恪十思明恪之劣也岱無以答時咸謂之失言夫以元遜之流而剛狠自用卒至於殺身則吕君之戒固未為失然而無答者豈以彼既自護其短故不復與之辨與抑亦膠於夫子之言而未能以意逆志也夫子以微生髙為不直孔氏曰用意委曲非為直人東坡曰髙古之過直人也乞醯以應求非孔子之所謂不直而髙平日之所謂不直也凡人情之所安者皆髙之所不可至其重違人之求而乞以與之雖髙不免此之謂不繼孔子因其不繼而譏之耳無垢曰直謂直情徑行也髙殷勤委曲以徇人情如此孰謂其徑行而不恤乎夫子蓋美之也嗚呼從孔氏則幾于狷介而不通蘇張之論髙矣而於文勢訓義又為不順是三者猶未安也謝顯道云周濟急難何害為直然在當時其設心恐不若是夫子親見其事故語止于此而意已達矣今未可以乞醯認為不直林少穎云是必髙不謂之乞諸鄰而與故也二說與鄙意暗同夫人求于我我適無而鄰幸有公乞而明與之鄰不為病而求者之望備焉兩不相傷聖人將為之而安有不直之譏意者竊取諸鄰而名為已有紿其人而為惠耳僞而不真故聖人惡之晦菴譏其掠美市恩蓋得之矣子曰十室之邑必有忠信如丘者焉不如丘之好學也或訓焉為何而屬之下句廄焚子退朝曰傷人乎不問馬或讀不為否而屬之上句意謂聖人至謙必不肯言人之莫已若聖人至仁必不至賤畜而無所恤也義理之是非姑置勿論且道世之為文者有如此語法乎故凡解經其論雖髙而於文勢語法不順者亦未可遽從况未髙乎夫子以顔氏簟瓢陋巷不改其樂為賢周濓溪每令學者尋仲尼顔子樂處所樂何事夫樂天知命而胸中有道義之味則外物不能纍矣豈必有所指哉今乃如衲子下句曰什麼是受用吾門中何事此等語吕與叔詩云學如元凱方成癖文似相如反類俳獨立孔門無一事輸他顔子得心齊一時好事者爭諷誦之豫按論語中庸繫辭所載蓋夫子之於顔氏博之以文約之以禮使欲罷不能而彼其所從事者皆遷善改過服膺克已之實若乃墮支體黜聰明心齊坐忘等語此出於莊周之徒而吾黨引之以為美談誣先賢而惑後學其風殆不可長也子謂子夏曰女為君子儒無為小人儒均是儒也而有君子小人之辨蓋其心術不謹趨向一差則要利盜名文姦濟惡皆學之力也末流或至叛聖人害天下而不顧非小人而何程氏曰君子儒為已小人儒為人王平甫張南軒亦同荆公曰君子一以貫之小人尚雜博王補之亦同沈道原曰君子者楊雄所謂大知而小人則所謂小知也范純夫曰君子學其內小人徇其外君子所治者本小人所治者末劉原甫曰君子將行之小人將言之謝顯道曰君子志於義小人志於利尹材曰君子通其理小人誦其數皆不足以盡之吕東萊曰小人者非險賤不正之謂也果險險不正安得謂之儒蓋如言必信行必果之類豫謂不然儒者所業之名耳豈以行為小人遂不謂之儒乎夫小人之稱有二而指細民者不與焉其曰硜硜小人小人樊須從其小體為小人之類此謂所見淺狹對大人而言者耳自餘以對君子者皆險賤不正之屬也游夏之在聖門文學雖勝而行實未醇則夫子以是警之蓋不為過子曰回也其心三月不違仁伊川曰三月天道小變之節言其久也過此則聖人矣子由曰性之必仁如水之必清火之必明然方土之未去也水必有泥薪之未盡也火必有煙土去則水清薪盡則火明人而不仁物有以害之也物之害既盡心一而不雜未嘗不仁也若顔子者性亦治矣而土未盡去薪未盡化力有所未逮也故能三月不違而未能終身東坡云夫子默而察之閲三月之久而造次顛沛無一不出於仁是以知其終身弗畔也豫以東坡為當設使顔子有時而違仁亦必因事而發如所謂日月至焉者豈有恰限三月輒一次違之之理若云三月之後不復可保則何足為顔子乎淡臺滅明行不由徑非公事未嘗至宰室程氏曰由徑者謂踐田疇之類也使小道便於往來由之何害豫亦謂誠意苟通不必因公事而後可見滅明狷介之士不足為通方子遊特取其所長而巳王子微云大道甚夷而民好徑徑者邪也所行不由正道者皆徑也此論太髙恐非其實史記稱滅明狀貌甚惡孔子以為材薄既已受業退而修行明施乎諸侯孔子聞之曰吾以貌取人失之子羽而家語乃曰子羽有君子之容而行不勝其貌故孔子有是言又曰滅明有君子之姿孔子嘗以容貌望其才其才不克孔子之望何其相反邪以論語證之史記為近宰我問井有仁焉之說舊說以為仁者必濟人于患難聞有仁人墮井將自投下從而出之世儒多取林少穎謂仁當作人而伊川曰仁者好仁不避患難雖告之以赴井為仁亦將從之豫謂從舊注則仁字不安從伊川則逝字難說此當兩存之要之伊下闕未集豫小子其承厥志記曰武王善繼人之志善述人之事豈以武王行事而不以文王之心為心文王素所不欲者而一旦為之豈誣稱文王之志哉蓋孔子之所稱者勢可以取而不忍為也武王之卒伐者義至于盡而不容已也學者拘于世俗之見而不知聖賢公天下之大義豈足與語此哉子罕言利一章說者雖多皆牽强不通豫謂利者聖人之所不言仁者聖人之所常言所罕言者唯命耳然而云爾者豫不解也姑闕之子貢曰有美玉於斯韞櫝而藏諸求善賈而沽諸夫子答以待賈南軒曰待賈者循乎天理求善賈則心已先動矣其說甚好此便是義利之分子在川上曰逝者如斯夫不含晝夜注疏以為嘆時事之不留古今多取此意程氏曰此道體也天運而不已日往則月來寒往則暑來水流而不息物生而不窮皆與道為體運乎晝夜未嘗巳也君子法之自强不息及其至也純亦不已自漢以來儒者皆不識此意豫謂孔子指水而云其所寓意未可曉也諸子之言亦俱說得去然安知其果然哉程氏之論雖有益學者要為出于臆度而遂謂自漢以來無識之者何其自信之篤邪蓋未敢從子畏於匡沈道原曰君子畏乎在我者不畏其在天者不能窮理盡性而取禍此則在我者君子所當畏也既以窮理盡性矣雖有一朝之患君子不患矣然則孔子何為畏匡也曰此記者之云耳猶言作易者其有憂患乎以文王與紂之事也夫窮理盡性然後能作易何憂患之有故匡人之圍一事觀之則為可畏以理考之則非聖人之所畏也其說甚佳未可與權與唐棣之華詩舊說以為一章謂唐棣之華偏然反而復合權道亦先反常而後至于大順李清臣辨之曰權之為名猶物之在權能不失其輕重而已其於道之大經蓋未嘗戾而人倫之大經未嘗亂也公羊氏始有反經之說焉孔子言可與立未可與權既已句斷而别舉逸詩之文彼作詩者因兄弟之乖離而喻之以唐棣子曰未之思也夫何逺之有蓋云兄弟之不親由已之友悌不至耳意謂詩人失辭所以刪而不取而釋者附之于權以符公羊之說豈不妄哉此論為勝解詩之義雖未敢必而其為兩章者决無疑也晦菴不知詩之所指止當闕之而云上二句本無意義但以興起下句則當矣程氏曰自漢以下更無人識權字此言亦太峻矣唐德宗還自興元欲因迎扈軍威使人代李楚琳陸贄諫曰若此則事同脅執議者或謂之權臣竊未喻其理權之為義取類權衡易一帥而虧萬乘之義得一方而結四海之疑乃是重其所輕而輕其所重謂之權也不亦反乎以反道為權任數為智君上行之必失衆臣下用之必陷身歷代所以多喪亂而長姦邪由此誤也觀宣公之論豈可謂自漢以下無識權字者邪鄉黨一篇皆聖人起居飲食之常而弟子私記之雖左右周旋莫不中禮節然亦有本無意義者而學者求之太過如車中不內顧不疾言不親指食不語寢不言之類此止是端莊重厚耳不撤薑食不得其醬不食止是性之所嗜耳至于食不厭精膾不厭細食饐而餲魚餒肉敗色惡臭惡者不食凡人皆然何必孔子東坡以為雜記曲禮非獨孔子之事皆置不說此固太甚然如張九成輩妄為誇誕務以張大聖人而不知其非實至謂與春秋相表裏其不近人情亦豈足盡信哉晦菴釋不得其醬不食曰惡其不備也豫稱君子食無求飽又以士恥惡衣食為不足議夫豈以一物不備而不食哉彼事事必求義理則宜其陋之至是也晦菴解食不語寢不言云答述曰語自言曰言此何可分而妄為注釋只是變文耳康子饋藥拜而受之曰丘未達不敢嘗楊氏曰不敢嘗慎疾也必告之直也豫謂人以善意饋藥而告之以疑不敢嘗凡人交際皆知其不可况孔子之于康子乎且使饋藥無迫使面嘗之理何必以此語忤之當是退而謂人之辭記者簡其文故一曰字而足耳孔子廄焚而不問馬蓋其已見故不必問初豈有深意哉特弟子私疑而記之耳後人因其記之遂妄意而為之說本不須著此三字鄭氏以為貴人賤畜而然夫君子之待畜固輕于人然不應無情如此張子韶之說美矣至舉敝帷不棄等語以發明忠厚之心亦所謂矯枉過正也不疾言不親指孔子在車時其端重固如此而說者以為恐惑人不知此事有何惑人者若曲禮所謂登城不指城上不呼則有此理矣滹南遺老集卷五
