front:
  text: 滹南遺老集卷之二十七
  hash: sha256:f700acb73d7d22995c9fc6c82c85b5da9f718607813ef39cb8a9f95f2e86a6e8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0418_SBCK_027-1a}
body:
  text: 滹南王若虛從之臣事實辨揚子以子胥鞭尸藉館為非東坡曰父不受誅子復讎禮也生則斬首死則鞭尸發其至痛無所擇也是以昔之君子皆哀而恕之雄獨非人子乎子由論之則不然曰士不幸至此不足以言功名矣而至鞭舊君以逞志逆天而傷義卒以盡忠而喪其軀豈非天哉傭夫曰子由之論是矣君父之尊一也而君復統其父知有父而不知有君亦何以立天下員雖不仕然身居楚國而父為楚官則員亦楚之臣也臣無讐君之義楚子之淫刑固有罪矣而員之報之無乃已甚乎為員之計不過無食其祿而已夫君非至明誅殺之閒不能無濫使為臣子者皆得推刃而報之則國家豈復有法而逆亂之事何時而已也若員者勇而無禮敢為而不顧者也至其說吳王僚伐楚而王未即從因之進専諸於公子光而使弒之蓋求以逞其怨毒則凡可以得志者靡所不為既自賊其君而又賊人之君員真小人也哉揚子譏之未為過論而東坡以為非人子然則蘇氏獨非人臣乎張南軒嘗與人議員立廟事云在吳則可在楚則不可員而有靈必不享於楚地蓋謂忠於吳而不忠於楚耳豫謂員之於闔廬則忠於僚則賊其享於吳亦恐未安也退之論范蠡招文種事略曰為人謀而不忠有匡君之智而無事君之義若以長頸之狀難以同樂則舉吳之後還越之日泛輕舟逰五湖者豈唯范子乎其移文種之書猶拔勾踐之劍也勾踐何過哉其文辭不甚佳此必少年所作故黜於外集而世亦無稱道者獨宋孫漢公謂其意出千古豫以為然蠡雖功成然句踐之眷方隆而所期望者未艾也盍亦為之勉留而徐以禮請則終始之義庶幾兩全而决意不回若棄仇讎者王以誅賞動之則曰君行令臣行義卒潜遁去揆以人情王既不能堪矣乃又移書同志誦王之短而示已之見幾種也不智亦因謝病不朝王未嘗負二子而二子負王安得不發怒而殺之乎以史傳考之勾踐無不道之事惟種受誅而實其自取則長頸之相蓋亦無驗也嗚呼范蠡春秋之豪才略有餘而仁義不足者也以今日待其君如此其薄則向來所以黽勉從事者特假之以為功名之資耳夫豈誠意哉然而千古髙之以為美談其視貪榮嗜利死而不悔者固為賢矣以君子忠愛之道律之殆未滿人意也蕭何治未央宫事論者不一或以為非是或以為當然或又疑其所為有深意何其紛紛也彼以刀筆吏監土木功不能無過制者其對上之言姑以自解云爾此固不足深責然亦何可妄舉哉大抵漢𥘉君臣類無學術暗於義理其舉措之際亦多踈矣而後世每以聖賢事業期之宜其為說之多曲也程晏論曹參譬之飲牛於汚泥而不即清淵吕祖謙論陸賈叔孫通譬之避雨於荒城而不求大厦皆恨其不以三代之隆輔漢也嗚呼三代之事豈漢祖之可望而數子之才亦豈王者之佐乎彼自量其分而行其力之所及是矣而世儒每過期之此書生不通之論也昔人之論蓋有語病而意實不然者張釋之與文帝爭犯蹕事曰方其時上使誅之則巳近世儒者往往譏之以為開人主殺人之端固似有理然一時之意姑為守分而言何暇慮及此乎王肅諫魏明帝亦嘗引此曰廷尉天子之吏也猶不可以失平而天子之身反可以惑謬乎重於為巳而輕於為君不忠之甚也其貶尤深蓋帝性嚴急時督修宫室稽限者輒親召問言猶在口身首已分故肅言近於過者所以力戒帝之専殺耳不然釋之之罪詎至是哉張釋之與文帝爭論犯蹕罪名事云方其時上使誅之則已議者紛然以為開人主殺人之端而隋源師謂髙祖曰陛下𥘉便殺之自可不關文墨唐馬懷素謂武后曰陛下操生殺柄欲加之罪自當取决聖衷皆襲釋之之意者也其言之病豈不益甚哉尹賞病革戒其子曰為吏正坐殘賊免猶勝軟弱不勝任仇士良致仕語諸送者以為無使人主知書近賢臣則權常在我嗚呼凶人為不善惟日不足賞之酷士良之姦居之不疑亦巳極矣乃復將死而貽諸其子既去而傳諸其徒不仁者可與言哉漢元帝欲御樓船薛廣德諫曰臣當自刎以血汚車輪帝不恱及聞張猛之言然後喜曰曉人不當如是耶陳瑩中曰事有緩急言有輕重御船非過舉之大諌而不從何遽至於自刎哉使果不從廣德之死又何名乎劉子翬曰廣德誠大過然非先發此言以激上心則猛之言未必見聼也有犯無隱廣德以之豫謂推帝所以見聽之由則子翬之論得矣而廣德之過又豈可不戒哉君子於其言無所苟而巳矣漢許武以二弟晏普未顯欲令成名乃共割財産以為三分武自取肥田廣宅奴婢強者二弟所得並劣少鄉人皆稱弟克讓而鄙武貪婪晏等以此並得選舉武乃㑹宗親泣曰吾為兄不肖盜聲竊位二弟年長未豫榮祿所以求得分財自取人譏今理産所增三倍於前悉以推二弟一無所留於是逺近稱之君子曰武也欲成弟名自當委曲教之正使無成亦何愧於心而為此詭譎之事吾不知武之本意果如所說邪抑實出於貪鄙𥘉不自克而卒不自安邪使比及至是而其産破散或身先亡則何以辭於世乎所謂巧詐不如拙誠也姜肱與二弟友愛常共卧起及各娶妻相戀不能别寢以係嗣當立乃遞往就室三人之友愛則誠篤矣抑何不知禮之甚邪讀之令人發笑漢黨錮諸公既無申屠蟠之髙識而自貽伊戚可以逃則當如夏馥不能脫則當如范滂若張儉者望門投止使他人珍滅宗親而身獨幸免雖以夀終亦何顔於世哉而史臣稱美其賢陋矣劉翊豐財而好施獻帝西遷拜陳留太守散所捱珍玩惟餘車馬自載東歸見士大夫病亡道次翊以馬易棺殮之又逄知故困餒不忍委去因殺所駕牛以救其乏衆人止之翊曰視沒不救非志士也遂俱餓死東漢之士詭激好名而不量輕重如此悲夫或問荀彧荀攸於王通通曰皆賢者也生以救時死以明道荀氏有二仁焉賈瓊曰虐哉漢武未嘗從諌通曰漢武其生知乎雖不從諌未嘗不悅而容之噫漢武昏惑不道幾至亂亡晚節末路僅能少悔而通以為生知荀彧之徒黨附曹賊以取天下皆漢室之罪人而通以為仁者其謬論不待辨也董昭為曹操謀九錫之事荀彧以為君子愛人以德不宜如此操不恱彧飲藥而死蘇子由曰文若始從曹公於東郡致其算略以摧滅群雄固以帝王之業許之矣豈其晚節復疑而不與哉當是時中原略定中外之望屬於曹公雖無九錫天下不歸曺氏而將焉往劫而取之不若徐而俟之要之必得而免爭奪之纍此文若之本心也吕伯恭曰或阻撓昭議者其本情特不悅計非已出而巳答昭之詞蓋忠順云豫謂二說皆通或必居一於此要之不可謂忠於漢也而或者曲為文飾猥加褒譽溫公則曰功先管仲東坡則曰道似伯夷謂之殊可怪笑夫管仲合諸侯以奬王室曷嘗助賊臣而篡國乎伯夷不與惡人言不立惡人之朝而肯為曺氏之腹心乎彧之飲藥不得已焉耳以操隂謀多忌彧之智力乃出其右一旦隙生豈有免理至饋之食而發視乃空器其意可知彧不自裁亦終𬒳害將有慘於是者此陳夀所謂以憂薨也烏在其為死節邪嗚呼人臣至於荀彧馮道其邪正逆順不待辨矣而議者之蔽時或如此天下之事豈易曉哉諸葛誕為司馬昭所誅麾下數百人坐不降見斬皆曰為諸葛公死不恨魏志所記止於如此而注引干寶晉記云數百人拱手為列每斬一人輒降之竟不變至盡時人比之田橫此幾大過也當時既知其不可屈則概殺之矣何至一一遍問而數百人者雖信感恩亦不應盡能如此然而通鑑取之豈多愛不忍雖溫公未免歟劉子翬不信田橫客俱死事以為溢美之言豫於此亦云管寧華歆共鋤園菜見地有金寧揮鋤與瓦石不異歆捉而擲之世皆優寧而劣歆豫謂以心術觀之固如世之所論至其不近人情不盡物理則相去亦無幾矣畢竟金玉與瓦石豈無别者哉此莊列之徒自以為逹而好名之士聞風而恱之者也若夫君子之正論則不然貴賤輕重未嘗不與人同特取舍之際有義存焉耳陳夀評孫皓以為肆行殘暴虐用其民宜腰首分離以謝百姓既䝉不死之詔復加歸命之寵豈非過厚之恩曠蕩之澤意若微譏晉武而孫安國亦謂皓罪為逋寇虐過辛癸梟首素旗不足謝冤魂而優以顯命仍加寵錫非伐罪弔民之義二子之言是矣然湯武之師本以救天下是故誅其君弔其民而議者亦曰為匹夫匹婦復讎也後世伐人者例皆志於奪國則既得而止矣詎有誠意為民者蓋不獨晉武為然也𥘉羊祜陳伐吳之䇿曰皓暴虐巳甚於今可不戰而克若皓不幸而沒吳人更立令主雖有百萬之衆長江未可窺也嗚呼果使吳人更立令主民得樂業於一方釋而存之以為外歡豈非好事今乃幸其無道而易取惟恐失之此其心曷嘗在民邪武帝不足責也若羊公者世所謂仁人君子而為謀亦爾則是舉也尚可以湯武之事繩之哉東坡詩云景山沉迷阮籍傲畢車竊盜劉伶顛貪狂嗜怪無足取世俗喜異稱其賢雖詩人一時之言其實公論也然志林復云籍本有志於世遭魏晉多故乃一寓於酒何邪晉人放蕩本其習俗而好事者每為解說子由所為借通逹以濟淫欲者誠中其病古之君子避世全身固自有道其不幸而不免則命也何必穢汚昏醉為名教之罪人邪蓋籍嘗戒其子矣曰仲容已預吾此流汝不得復爾則亦心知其非而不能自克而已滹南遺老集卷二十七
