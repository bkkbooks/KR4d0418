front:
  text: 滹南遺老集卷之十九
  hash: sha256:aa8a3c3b5de93e534e08f579d3346c6be7289b959e13285da3eeabbb13e63be5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0418_SBCK_019-1a}
body:
  text: 滹南王若虚從之史記辨惑十一雜辨鄭荘公稱其母為姜氏陸生晁錯父稱子為公皆于義不安殆邱明子長之失未必當時本語也楚世家云荘王圍鄭鄭伯降楚羣臣曰王勿許荘王曰其君能下人必能信用其民庸可絶乎遂許之平此盖本乎左氏也至鄭世家則云荘王曰所為伐伐不服也今已服尚何求乎二者果孰是宋世家云荘王圍宋宋華元出告子反曰城中析骨而炊易子而食荘王曰誠哉言楚世家亦載王語云君子哉二者果孰是此類甚多不可殫述也史記載伍貟父子語言本傳與世家参差不同或云此變文也予謂不然言出于一人之口書出于一人之手而自變其文人何以取信哉晋世家云唐叔虞姓姬氏武王之子按周紀自有姓氏既云武王之子何必更言姓也且魯衛管蔡等世家類皆不著而此獨著何哉晉世家云趙盾昆弟将軍趙穿灌夫傳云竇甫竇太后昆弟也未暁昆弟之義宋世家云襄公及楚人戦于泓公曰君子不困人于阨不鼔不成列子魚曰如公言即奴事之耳又何戦為奴事字不似當時語盖遷撰出者三傳𥘉無此意也抑其句法亦是不順凡尊奉其人則有曰師事父事兄事者鄙賤其人則有曰奴使奴親奴畜者上一字属乎彼而巳今此奴字以意則属乎我以句法則属乎彼豈非思之不審欤孫武傳云吴王闔廬問曰子之十三篇吾盡觀之矣可以小試勒兵乎對曰可闔廬曰可試以婦人乎曰可于是許之出宫中羙人此王問武而非武所請也何用許之字老父相髙祖曰君相貴不可言髙祖乃謝曰誠如父言不敢忘徳此但其術可貴耳何徳之有漢封候公為平國君匿弗肎復見曰此天下辨士所居傾國故號為平國君予謂匿弗肎復見字當在號為平國君下高祖紀云稱劉季者在當時人可也而遷亦数稱之不唯于文體為非而臣子之道亦不當爾也漢書正之為是髙祖紀云父老皆曰平生所聞劉季諸珍􅏜當貴珍字不安漢書改為竒是矣太公家令云髙祖雖子人主也是時未有髙祖號劉子元辨之誠中其病漢書改為皇帝是矣陳丞相世家云平從攻韓王信于代至平城為匃奴所圍七日不得食髙祖用平竒計使單于閼氏圍以得開而其計秘世莫得聞桓譚應劭意其以漢有羙女動之世或喜其説然吾觀韓王信傳云上出白登匈奴騎圍之上乃使人厚遺閼氏閼氏乃説冐頓曰今得漢地猶不能居且兩主不相厄居七日胡騎稍引去漢出圍入平城救兵亦到胡騎遂觧去匈奴傳畧同而又云冒頓與韓王信之将王黄趙利期而黄利兵不来疑其與漢有謀亦取閼氏之言乃觧圍之一角信如此説則漢之所以動閼氏者止于重賂而胡騎之所以觧去者又不專因閼氏之力也烏有所謂不傳之竒計哉其言反覆殆未足信張敖傳云趙相貫高等欲殺髙祖壁人柏人上過欲宿心動問縣名為何曰柏人柏人者廹于人也不宿而去予謂廹人之意本出髙祖非縣名本有此理又非史氏所當言則宜加上以二字漢書又去也字猶覺不圎荆燕世家云荆王劉賈諸劉者不知其何属諸劉字絶下不得其曰燕王劉澤諸劉逺属則是矣梁孝王世家云孝文帝兄四男長子曰太子是為孝景帝次子武次子参次子勝夫上既言男則子字皆贅太子非名則曰字亦不安法當云其長景帝也次曰某次曰某淮南厲王長謀反召至長安丞相臣張蒼典客臣馮敬行御史大夫事宗正臣逸廷尉臣賀備盗賊中尉臣福昧死言云云制曰朕不忍致法于王其與列侯二千石議臣蒼臣敬臣逸臣福臣賀昧死言云云夫稱臣某等昧死言者當時所奏語史家輙爾書之無乃不可乎遷固毎毎如是而後世亦或襲之竊所未喻田仁傳云武帝時拜爲司直数歲坐太子事時左丞相自将兵令司直田仁主閉守城門坐縱太子下吏誅死仁發兵長陵令車千秋上變仁仁族死陘城始但言坐太子事而復言坐縱太子誅死又言因千秋上變族死語意重叠昏晦甚矣遷之叙事此類尤多田敬仲世家云齊宣王好文思之士自如騮衍淳于髠之徒皆賜列第荀卿傳云自如孟子至于吁子世多有其書自如二字連用不得十二諸侯年表序用及如字尤不安也儒林傳序云孟子荀卿之列咸遵夫子之業而潤色之别字不安子胥傳云公子光令專諸襲刺吴王僚如何下襲字田横二客自剄髙帝聞之乃大驚以田横之客皆賢吾聞其餘尚五百人在海中使使召之至則聞田横死亦皆自殺予謂聞之乃大驚剰乃字吾聞其餘尚五百人剰吾字吕后紀云吕后祓還過軹道見物如蒼犬㨿髙后掖吕后髙后似是兩人但云據其掖可矣丁公窘髙祖彭城西沛公顧曰兩賢豈相阨哉方言髙祖遽曰沛公此亦同病也留侯世家記圯上老父事云良因恠之跪曰諾劉貢父漢書刋誤以為恠字合在因字上此固是矣然漢書之文本縁史記且其下又有云良因異之者則非獨孟堅之誤也張良賛曰余以為其人計魁梧竒偉至見其圖状貌乃如婦人好女盖孔子曰以貌取人失之子羽留侯亦云以為字與計字相窒留侯亦云上當有余於二字留侯世家云留侯性多病多病何關性事韓信傳賛云假令韓信學道謙讓不伐巳功不矝其能則庻幾哉於漢家勲可以比周召太公之徒後世血食矣假令字下不得哉字亦不便於文勢呂后紀孝惠為人仁弱髙祖以為不類我常欲廢太子立戚姬子如意如意類我再言如意類我於文為複且我字不順去之可也蕭何傳云益封何二千户以常甞繇咸陽時何送我獨嬴奉錢二也我字悖文帝聞馮唐言歎曰吾獨不得亷頗李牧時為吾将時字甚悖伍𬒳諫淮南王王於是氣怨結而不掦涕滿匡而横流其詞不典殆似古賦豈史氏實録之體哉衛綰傳云建元年中以景帝疾時諸官囚多坐不辜者而君不任職免之君字悖禮書首云太史公曰洋洋羙徳乎宰制萬物役使羣衆豈人力也哉洋洋羙徳孰遽知其爲禮遷文無首尾毎如此律書賛太史公曰故璇璣玉衡以齊七政按故字自是因上接下之辭首句如何便用得石奮傳云子孫勝冠者在側雖燕居必冠申申如也僅僕訢訢如也唯謹其執䘮哀戚甚悼唯謹甚悼字俱不安范睢傳云魏聞秦且東伐韓魏魏使湏賈於秦多一魏字又云穣侯為秦将欲越韓魏而伐齊欲以廣其陶封多一欲字藺相如請王齋五日乃上壁秦王度之終不可疆奪遂許齋五日多却之字留侯世家云劉敬説高帝曰都閼中多却曰字左右大臣多勸上都雒陽雒陽東有成臯西有殽黽却少一曰字袁盎賛曰時以變易及吴楚一説説雖行哉然復不遂上三句語意不接亦不成語韓信傳云此所謂驅市人而戰之之字不安趙堯薦周昌曰其人有堅忍質直何用有字燕太子請荆軻曰日已盡矣荆卿豈有意哉范睢傳云湏賈問范睢曰今吾事之去留在張君孺子豈有客習于相君者哉婁敬説髙帝曰陛下都雒陽豈欲與周室比隆哉哉字皆不安作乎字可也范蠡傳載楚王之言曰寡人雖不徳耳柰何以朱公之子故而施惠乎耳字不安去之可也荆軻傳云軻雖㳺于酒人乎乎字尤乖灌夫傳云諸公莫弗稱之莫弗字不成語楚昭王病甚譲其弟公子閭為王五譲乃後許乃後不成語趙世家云智伯與趙韓魏盡分其范中行故地多其字田完世家云田乞事齊景公為大夫其收賦税於民以小斗受之其粟予民以大斗多粟字循吏傳序云綱漏於吞舟之魚多却於字范睢傳云散家財物盡以報所嘗困戹者所嘗字不安李斯出獄與其中子俱執遂父子相哭此而夷三族此而不成語李斯賛曰人皆以斯極忠而𬒳五刑死察其本乃與俗議之異之字極難下蒙恬自責曰塹萬餘里此其中不能無絶地脈哉不字當作豈髙祖令張良獻白壁玉斗于項羽范増張良曰謹諾謹字道不得髙祖紀云老父相魯元公主亦皆貴皆字不安武渉說韓信足下雖自以與漢王爲厚交爲之盡力用兵終爲之所禽矣之所二字當去其一又云足下所以得湏臾至今者以項王尚存也湏㬰字亦道不過孫叔敖問市令市亂事曰如此幾何頃乎市令曰三月矣頃字道不得田横曰吾烹人之兄與其弟併肩而事其主縱彼畏天子之詔不敢動我我獨不媿于心乎人字與弟字相窒當云烹人之兄而與之併肩事主或云烹人而與其弟併肩事主則可矣燕世家云齊湣王謂燕太子平曰雖然則唯太子所以令之則字下不得項羽對項梁云劍一人敵不足學學萬人敵此句不圓漢書加耳字是也陸賈謂陳平曰天下雖有變即權不分即當作而項籍見始皇曰彼可取而代也梁掩其口母妄言族矣其語不圓趙禹傳云今上時禹以刀筆吏積勞稍遷為御史時字不安申屠嘉傳云髙帝時大臣又皆多死皆多二字不可連用嘉對文帝責鄧通上曰君勿言吾私之罷朝坐府申嘉爲檄召鄧通此語法不順不若言府檄召也聶政曰嚴仲子奉百金爲親夀我雖不受然是者徒深知政也然是字不成語屈源傳秦昭王欲與懐王㑹懐王稚子子蘭勸王行奈何絶秦歡少曰字荆軻傳田光謂燕太子曰太子聞光盛壮之時不知臣精巳消亡矣雖然光不敢以圖國事所善荆卿可使也雖然字悖王温舒傳爲廣平都尉擇郡中豪敢以爲瓜牙督盗賊以其故齊趙之郊盗賊不敢近廣平多其字史記太史公自序云民倍本多巧姧軌㺯法善人不能化唯一切嚴削爲能齊之作酷吏傳夫事人君能說主耳自和主顔色而獲親近非獨色愛能亦各有所長作侫倖傳夫酷吏侫倖類皆小人史之立傳大抵著其罪惡以為世戒而遷獨有取于此等然則是非之謬豈特㳺俠貨殖之論哉自序云嘉尚父之謀作齊世家嘉且金縢作魯世家其序燕云嘉甘棠之詩其序衛云嘉彼康誥序宋則云嘉微子問太師序晋則云嘉文公錫珪鬯此類甚多夫史書實録也事所當記善惡必存豈因嘉一事而後作乎大抵諸序傳皆不足觀刪之可也吕氏大事記云太史公於夏紀則稱孔子正夏時於殷紀則稱孔子善殷輅聖人損益四代之大意不可謂不略窺之矣予謂遷特因孔子之言而猥引之耳既非巳見又不能别有發明而吕氏遽以為知損益之意何遽過譽之甚也大事記史記文帝紀多載詔書至景帝紀則皆不載盖以為不足載也其㫖微矣予謂史書實録也詔誥一時之大事縱使帝之所行不能副其言豈容悉沒之乎此自遷之私憤而吕氏深取之遂以判班馬之才識予未敢知也班固譏遷論㳺俠述貨殖之非世稱其當而秦少㳺辨之以為遷𬒳腐刑家貧不能自贖而交㳺莫救故發憤而云此誠得其本意然信史将為法于萬世非一巳之書也豈所以發其私憤者哉滹南遺老集卷之十九
