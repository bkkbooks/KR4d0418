front:
  text: 滹南遺老續集卷之四十六
  hash: sha256:12eeea9f2ebf60eecf2b3f36d5033f5c8223be39cb48d55f9e8e3ec89bcd56ec
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0418_SBCK_046-1a}
body:
  text: 滹南王若虛從之攄憤非存驕謇心非徼正直譽浩然方寸間自有太髙處平生少諧合舉足逄怨怒禮義𥘉不愆謗訕亦奚顧孔子自知明桓魋非所懼孟軻本不逄豈為臧氏沮天命有窮逹人情私好惡以此常泰然不作身外慮贈王士衡王生非狂者乃以善哭稱每至欲悲時不間醉與醒音詞初惻愴涕泗隨縱橫問之無所言坐客笑且驚王生不暇恤若出諸其誠嗟我與生友此意猶未明絲染動墨悲麟亡傷孔情韓哀峻嶺陟阮感窮途行涕流賈太傳音抗唐衢生古來哭者多其哭非無名生其偶然歟何苦摧形神如其果有為為爾同發聲感秋西風撼庭柯踈葉鳴䇿䇿天地一蕭條羇懷亦岑寂青春恍如昨轉盻年半百自從長大來轉覺日月迫功名非所慕老大不足恤怛然感時心自亦不能釋清晨梳短髮己見數莖白刀鑷雖可施殆似兒子劇此身委蛻耳毁棄無足惜况于毛髮間而乃强修飾青青如陸展星星行復出畢竟白滿頭復將何所摘生日自祝空囊無一錢羸軀兼百疾况味何蕭條生意渾欲失清晨聞喧呼親舊作生日𥘉我未免俗隨分略修飾舉觴即自祝醉語盡情實神仙恐無從富貴安可必修短卒同歸何足喜與戚一祈粗康健二願早閒適衣食無大望但要了晨夕萬事不我攖一心常自得優遊終吾身志願從此畢失子妍妍掌中兒舍我一何遽其來誰使之而復奄然去平生三舉子隨滅如朝露顧我能無悲其如有天數自從學道來衆苦頗易度有後固所期誠無亦何懼人生得清安政以纍輕故婚娶眼前勞託遺身後慮百年曽幾何為此雛稚誤顧語長號妻此理亦應喻憶之純三首幼歲求真契中年得偉人傾懷當一靣投分許終身燈火談元夜鶯花逐勝春何時重一笑胸次欲生塵其二靣目三年隔音書萬里遙宦途俱蹭蹬日事各蕭條志大謀常拙身孤道易消夲無當世用隱處㑹相招其三俊氣䡖天下髙情到古人銜杯曼卿放下筆老坡神時論誰優劣人材自屈伸窮愁須理遣不必淚沾巾復寄二首志大言髙與世違拂衣真作竹林㱕黃塵道口風波惡未必先生自處非其二自笑趨塵亦強顔食謀未免敢言間紫芝果可充饑腹從子玉屏巖石間病中二首學道今何得謀生久不成藍衫幾棄物絳帳亦虛名事拙應天意交踈即世情煩憂時自解感觸又還生其二欎欎窮愁意營營久病身詩情渾欲減藥物但相親未得驅窮鬼終須問大鈞三時勞慰拊甚愧古人真感懷枉却全家仰此身書生那是治生人百憂耿耿填胸臆强作歡顔慰老親自笑酒得數杯還已足詩過兩韻不能神何須豪逸攀時傑我自世間隨分人别家到了身安是本圖何須身外覓浮虛誰能置我無饑地却把微官乞與渠慵夫自號身世飄然一瞬間更將辛苦送朱顔時人莫笑慵夫拙差比時人得少間西城賞蓮呈晦之晦之自號放翁舊賞回頭已隔年髙花又見出新妍偶成濁酒狂歌㑹恰及斜風細雨天樂事適來偏有興間身常得分無緣作詩莫怪多誇語差比放翁先著鞭滹南遺老續集卷四十六
