front:
  text: 滹南遺老集卷之十五
  hash: sha256:638b3ea34ed20de46d4312069433be15bc605200a070d8203c7262b858f95460
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0418_SBCK_015-1a}
body:
  text: 滹南王若虚從之史記辨惑七字語冗複辨舜本紀云瞽叟更娶妻而生象象傲瞽叟愛後妻子常欲殺舜舜避逃及有小過則受罪順事父沒後母與弟日以䔍謹匪有懈後又云舜父瞽叟頑母嚚弟象傲皆欲殺舜舜順適不失子道兄弟孝慈欲殺不可得即求常在側字語重復而兄弟孝慈一句亦不成義理周本紀齊世家稱武王觀兵諸侯不期而㑹盟津者八百諸侯諸侯皆曰紂可伐矣無乃剰諸侯諸侯字冗衞世家云宣公以子伋爲太子令右公子傅之右公子爲太子取齊女求入室而宣公見所欲爲太子婦者好說而自取之何不但云宣公見其羙而煩重如是乎又云齊女子朔䜛惡太子伋宣公乃使伋于齊而令盗摭界上殺之與太子白旄而告界盗見持白旄者殺之何若但云使伋于齊與之白旄而令盗于界上視持旄者殺之乎又云朔之兄夀知朔之惡太子而君欲殺之乃謂太子曰界盗見太子白旄即殺太子太子可母行何若但云知之以告太子使母行乎又云太子朔立是為惠公左右公子不平朔之立也惠公四年左右公子怨恵公之䜛殺前太子伋而代立乃作亂語意重複但存不平朔之立一句足矣又云翟殺懿公也衞人憐之思復立宣公前死太子伋之後伋子又死而代伋死者子夀又無子此但云思復立太子伋之後而伋子亦死夀又無子可也安用許多字耶趙世家云趙朔及程嬰謂公孫杵臼曰朔之婦有遺腹若幸而男吾奉之居無何而朔婦免身生男多朔婦免身字子貢傳云子貢一出存魯亂齊破吴彊晉而覇越子貢一使使勢相破十年之中五國各有變文意重複矣越世家云莊生謂陶朱公長男曰若自入室取金長男即自入室取金但云男即取之可也曹沬為魯將與齊戰三敗北魯莊公懼乃獻遂邑之地以和柯之盟沬刼齊桓公乃許盡歸魯之侵地既而桓公欲倍其約管仲曰不可于是桓公乃遂割魯侵地曹沬三戰所亡地盡復予魯但云桓公乃從可矣何必重叠如此孔子世家云其先宋人也孔防叔至叔梁紇禱于尼邱得孔子生而首上圩頂故因名曰邱云字仲尼姓孔氏既云孔防叔又言孔子生何必更注姓氏乎鄭世家云孔子嘗過鄭與子産如兄弟云及聞子産死孔子為泣曰古之遺愛也兄事子産予謂言孔子為泣則聞字亦着不得或只云及聞其死泣曰更為簡省也夫既如兄弟而子産年長則何必復言兄事哉兼已死之後及此其次第亦不應爾春申君言所幸李園女弟于楚王楚王召入幸之遂生子男立為太子以李園女弟為王后楚王貴李園園用事李園既入其女弟立為王后子為太子恐春申君語泄而益驕隂飬死士欲殺春申君以滅口自園用事以下冗複重濁殆不可讀以精當律之當云園用事益驕恐春申君語泄隂養死士欲殺之以滅口楚考烈王卒李園盡滅春申君之家而李園女弟𥘉幸春申君有身而入之王所生子者遂立是為楚幽王予謂遷先記李園女弟事既巳詳悉備見于此但云園女弟所生子立或直云太子立足矣何必費辭如是趙簡子疾五日不知人既寤語大夫曰我之帝所有一熊欲來援我帝命我射之中熊熊死又有一熊來我又射之中熊熊死予謂中熊字不須要中熊事但云我又射殺之可也趙襄子滅智伯豫譲曰智伯知我我必為報仇而死以報智伯則吾魂魄不愧矣多以報智伯字石奢爲楚相行縣道有殺人者追之乃其父也縱其父而還自繫焉但云縱之可也趙奢傳云亷頗之免長平歸也失勢之時故客盡去免歸即失勢時也何必再下此句魯仲連傳云仲連游于趙趙孝成王時秦兵圍邯鄲魏安釐王使客將軍新垣衍間入邯鄲因平原君謂趙王曰趙誠發使尊秦昭王爲帝秦必喜罷兵去平原君猶豫未有所决時魯仲連適游趙㑹秦圍趙聞魏將欲令趙尊秦爲帝乃見平原君曰云云此文理重複但云仲連聞之乃見平原君可也仲連謂新垣衍曰吾將使秦王烹醢梁王新垣衍曰噫嘻亦太甚矣先生之言也多先生言字必欲存之當在太甚字上聶政欲爲嚴仲子刺韓相俠累仲子請益車騎壯士爲輔翼政言不可遂謝車騎人徒聶政乃辭獨行伏劍至韓多聶政乃辭四字又云刺殺俠累因自皮面決眼自屠出腸遂以死何必遂字又云韓取聶政尸暴于市購問莫知誰子于是韓購縣之有能言殺相俠累者予千金久之莫知也政姊嫈聞人有刺殺韓相者賊不得國不知其名姓暴尸而縣之千金乃於邑曰云云但言政姊嫈聞之于邑豈不簡快乎又曰市行者諸衆人皆曰此人暴虐吾國相多諸衆人字李斯出獄與其中子俱執顧謂其中子曰多下其中子三字張儀傳云昔趙襄子令工人作為金斗長其尾令可以擊人與代王飲隂告厨人曰即酒酣樂進熱啜及斗以擊代王殺之但云厨人如其言擊殺之范睢傳云須賈謂范睢曰非大車駟馬吾固不出范睢曰願為君借大車駟馬于主人翁范睢歸取大車駟馬此當云願為君借於主人翁即歸取車馬項羽紀諸侯無不人人惴恐無不人人字意重項羽紀云漢王與韓信彭越期㑹擊楚軍至固陵而信越之兵不㑹張子房曰君王能自陳以東傅海盡與韓信睢陽以北至穀城以與彭越使各自為戰則楚易敗也漢王乃發使者告韓信彭越曰并力擊楚楚破自陳以東傅海與齊上睢陽以北至穀城與彭相國此當云發使者告之也留侯世家云良與客狙擊秦皇帝秦皇帝大怒大索天下求賊甚急為張良故不須言為良意淮隂侯傳云漢王欲拜信為大將諸將皆喜人人各自以為得大將多各自字至拜大將乃韓信也一軍皆驚此但當云至拜一軍皆驚曹相國世家云卿大夫已下吏及賓客見參不事事來者皆欲有言至者參輒飲以醇酒來者至者重複又云相舍後園近吏舍吏舎日飲歌呼從吏惡之無如之何乃請參逰園中聞吏醉歌呼從吏幸相國召按之曷若但云乃請参遊園中幸其聞而召按也叔孫通以惠帝作複道勸之立原廟上乃詔有司立之則立廟之由已自見矣而復云原廟起以複道故此句安用哉前漢削之當矣陳丞相世家云始陳平曰我多隂謀是道家之所禁吾世即廢亦已矣終不能復起以吾多隂􅍔也然其後曾孫陳掌以衞氏親貴戚願得續封陳氏然終不得多兩然字吾多隂􅍔一句亦不須也賈生傳云懐王隨馬而死無後賈生自傷爲傅無狀哭泣歲餘亦死賈生之死時年三十三矣不必再言賈生之死馮唐言李牧之事云當是之時趙幾覇其後會趙王遷立其母倡也王遷立乃用郭𨳩䜛卒誅李牧再言王遷立何也張釋之傳文帝問上林尉諸禽獸薄尉左右視盡不能對虎圈嗇夫從旁代尉對上所問禽獸薄甚悉止云從旁代對甚悉豈不善乎張釋之傳有人盗髙廟坐前玉環捕得文帝怒下廷尉廷尉治釋之按律盗宗廟服御物者為奏不須廷尉治三字又曰有如萬分之一假令愚民有盗長陵一抔土但云有如或云萬一或云假令足矣煩重如此殆不可讀申屠嘉傳云是時大中大夫鄧通方隆愛幸文帝嘗燕飲通家其寵如是是時丞相入朝而通居上傍有怠慢之禮再下是時字不惟文勢重叠意亦不愜也其寵如是一句亦不必道嘉困辱通上使使者召通既至為文帝泣多為文帝字鄧通傳云文帝崩景帝立劉子元謂不必言帝崩固當矣然遷史類此者甚多夫文景相繼猶或可也至賈生傳云孝文崩孝武皇帝立既隔景帝而亦書之豈不愈無謂也袁盎稱文帝西向譲天子位者再南靣譲天子位者三何必重言天子位太倉公傳云詔召問所為治病死生驗者幾何人主名為誰詔問故太倉長臣意方伎所長及所能治病者有其書無有皆安受學受學幾何嵗甞有所騐何縣里人也何病醫藥已史通作與其病之狀皆何如具悉以對文勢重叠如此是必前者遷所叙而後乃當時詔語倉公引之耳不必并而為一云詔召問曰意對曰則簡而明矣吳王濞傳云景帝與吳太子博争道引博局提殺之吳王由此稍失藩臣之禮稱病不朝京師知其以子故稱病不朝但當云知其故也寗成遷濟南都尉而郅都為守如史記作始前數都尉皆歩入府因吏謁守如縣令其畏郅都如此及成往直陵都出其上剰其畏郅都如此一句王温舒為河内太守捕郡中豪猾郡中豪猾相連坐千餘家不須再道郡中豪猾司馬相如病甚天子曰可往從悉取其書使所忠往而相如巳死家無書問其妻對曰長卿固未嘗有書也時時著書人又取去即空居長卿未死時為一卷書曰有使者來求書奏之無他書其遺札書言封禪事奏所忠所忠奏其書天子異之其書曰凡用十書字何其繁也若云相如已死其妻曰長卿固未嘗有書時有所著人又取去且死獨遺一卷曰有使者來即奏之其書乃言封禪事也既奏天子異焉其辭云云不亦可乎李廣見草中石以為虎而射之中石没鏃視之石也因復更射終不能復入石矣凡多三石字當云以為虎而射之没鏃既知其石因復更射終不能入或云嘗見草中有虎射之没鏃視之石也亦可又云其射見敵急非在數十歩之内度不中不發度不中三字重叠若此句存則上句宜去也又言廣自剄軍士大夫一軍皆哭但云一軍足矣或去此二字亦可汲黯傳云東越相攻使黯往視之不至至吳而還多不至字鄭當時傳云存諸故人請謝賓客夜以繼日至其明旦常恐不徧剰至其明旦字申公傳云天子問治亂之事申公時已八十餘老對曰云云伏生傳云年九十餘老不能行老字贅矣竇太后使轅固入圈刺豕正中其心一刺豕應手而倒多一刺豕字張湯傳云湯嘗病天子至自視病當作視之或云臨視也又云三長史皆害湯欲陷之據下文不須用此語觀者可見又云或告湯姦事下減宣宣嘗與湯有郤及得此事窮竟其事當云窮竟之也郭解傳既稱為人短小精悍不飲酒而後又云為人短小不飲酒何耶雒陽人有相仇者解夜見仇家仇家曲聽解解夜去不使人知曰且無用待我待我去令雒陽豪居其間乃聽之疑重用待我字貨殖傳云魯人曹邴氏以鐵冶起富至巨萬鄒魯以其故去文學而趍利者以曹邴氏也既言以其故則不必更云以曹邴氏也匈奴傳云單于頭曼欲廢太子冒頓作為鳴鏑習勒其騎射令曰鳴鏑所射而不悉射者斬之行獵鳥獸有不射鳴鏑所射者輒斬之前後凡用八鳴鏑字據文勢相蒙其餘可盡去也晉張輔論遷固史云遷記二千年事而五十萬言固記二百年事乃八十萬言繁簡不同優劣可知此説大謬劉子元既辨其大莭矣抑予嘗考之遷記事踈畧而剰語甚多固記事詳偹而刪削精當然則遷似簡而實繁固似繁而實簡也安得以是為優劣哉滹南遺老集卷之十五
