front:
  text: 滹南遺老集卷之六
  hash: sha256:c62da8b0e956339548c55da680e4138935a1986c4d336e60e8f74d35cc8205a2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0418_SBCK_006-1a}
body:
  text: 滹南王若虚從之論語辨惑三顔淵死顔路請子之車以為之椁孔子不許東坡曰古者行禮視其所有而已遇其有則脱驂于舊館人及其無不捨車于顔淵胡氏曰葬可以無椁驂可以脫而復求大夫不可徒行命車不可以與人而鬻諸市且為所識窮乏者得我而勉强以副其意非誠心與直道也君子之用財頋義可否豈獨視有無而巳哉予謂胡氏之論若勝于東坡然䘮具稱其家貲而不以死傷生古之道也雖于父母且然况卑㓜者乎以子之椁而奪師之車其不量彼已不識重輕亦甚矣在禮意人情自當拒之何必如胡氏之辨析哉味夫子才不才之言吾不徒行之語其責誚于路者可見矣若夫脫驂之賻則我周之也我自周之何所不可子路問事鬼神子曰未能事人焉能事鬼問死則曰未知生焉知死葢以子路不能切問近思以盡人事之寔而妄意幽逺寔拒而不告也而宋儒之説曰人鬼之情同死生之理一知事人則知事鬼知生則知死矣不告者乃所以深告之其論信美但恐聖人言下初不及此意而子路分上亦不應設此機也子曰由之瑟奚為于邱之門門人不敬子路子曰由也升堂矣未入于室也説者以為因孔子之言而不敬子路故孔子復以此觧之夫子路之為人門人知之亦􅌻矣鼓瑟一事雖夫子所不取亦未為大過也而遽不敬焉何好惡之輕乎盖其所以不敬者不獨在此也當是兩章柴也愚参也魯師也辟由也喭吴氏曰此章之首脱子曰二字或疑下章子曰字當移于此通為一章詳其文勢大似有理或併移回賜事亦可也司馬牛問仁子曰仁者其言也訒横渠曰司馬牛多言而躁就其人之材而言之便曰其言也訒告仲弓又别告顔子又别樊遲最其下者故告之以愛人楊龜山曰司馬牛問仁而告以其言也訒則曰斯謂之仁巳乎問君子而告之以不憂不懼則曰斯謂之君子巳乎此非切問近思者其易于言可知矣夫人不可易為之則言之固宜訒也游定夫曰夫子荅樊遲曰先難而後獲荅司馬牛曰其言也訒皆未可言仁故也三説甚得夫子本意子夏告司馬牛以四海皆兄弟姑以寛觧其憂云耳非謂真如已之兄弟也故胡氏以為意圎而語滯晦菴亦云不得已之詞讀者當以意逆志而楊龜山遂曰天下歸仁非兄弟而何士或以無兄弟為憂者皆自私之過然則塗人無非我親而天属不足貴矣而可乎楊氏語録以郭子儀不問發父塚之盗為能忘物我傷義既甚而今復有此論豈非流入于異端而不覺耶林少頴曰子夏之言近于墨氏之兼爱意則廣而言有病又云子夏工于謀人而拙于謀已䘮其子而䘮其明何不曰四海之内皆吾子也予謂林氏既知病其言則此言不必出但云何不以寛牛之意自寛則可矣子貢問政夫子荅以民信之又曰民無信不立夫民信之者為民所信也民無信者不為民信也為政而至于不為民信則號令日輕紀綱日弛賞不足勸而罰不可懲委靡頽堕無事不能立矣故寧去食而不可失信盖理所必至非徒立教之空言也注䟽甚明固無以易而晦菴過為曲説夫三者初無先後而曰兵食足而後吾之信可以孚于民信于民者在我而曰以民德而言則信者民之所固有不立者國之事也而曰民有以自立其義迂囬皆不足取雖然此一信字古今誤認者多矣豈獨朱氏而巳哉子曰片言可以折獄者由也至必使無訟此自三章不相干渉但記者以類相附耳尹材曰子路言簡而中理故片言可使罪人服子路重然諾恐不果踐言故無宿諾此說爲是晦菴曰子路忠信明决而人信服之故能以片言折獄而所以取信于人者自夫素無宿諾而飬之過矣夫然諾之信豈所以服罪人者哉林少頴曰子路一聞夫子見與之言遂有驕恣之心方且無宿夜然諾不待明日必條而行之欲天下之人信也孔子見其如此故復抑之盖三句只是一叚與乗桴浮海衣敝緼𫀆章同例其說益迂不足取也所謂片言者特甚之之詞自當以意逆志而晦菴遂云不待其詞之畢過矣樊遲問知子曰知人樊遲未達則繼之以舉直錯枉之言子夏廣之而及于舜湯舉伊臯之效此一叚皆論知人之智耳與問仁之意全不相関故南軒觧能使枉者直則曰知人之功用如此觧不仁者逺則曰此可見知人之爲大文理甚明而龜山晦菴無垢之徒皆以爲兼仁智而言其意含糊了不可暁豈以樊遲屡疑子夏深嘆且有逺不仁之說故委曲求之而至于是與竊所不取子貢問友子曰忠告而善道之不可則止母自辱焉古今觧者未嘗有異說而張無垢曰自者由也如自天祐之之自朋友之道所以不終者多由取辱之路以交之也設数以鈐制而不忠告之取辱也危言以控阨而不以善道之取辱也制之于巳然禁之于巳發非所謂不可則止取辱也平居探其所志觀其所趨倘有不善之萌非道之念則要之以禮正之以義所謂不可則止也其迂謬可笑甚矣而反以先儒為非此亦過于厚而不知君子之中道者定公問一言而可以致興䘮者子曰言不可以若是其幾也幾近也即下文不幾乎之幾耳三字自為一句一言得失何遽至于興䘮然亦有近之者此意甚明𥘉無可疑而晦菴乃訓曰為期未可以如此而必期其效無謂甚矣子貢問當時從政者子曰斗筲之人何足算也蘓氏曰此有謂而言不知其謂誰子貢之問必有所指不然從政之人非一而舉以為斗筲可乎此論亦有理張無垢乃曰禮居是邦不非其大夫子貢正犯夫子之禁故夫子自稱如此予謂天子之過庶人得以議之而謂士不可非其大夫乎此説盖出于孫卿未必聖門之事就使誠然但不可昌言于衆耳師弟之閒真寔語話何必周謹如是哉子貢曰鄉人皆好之何如子曰未可也鄉人皆惡之何如子曰未可也不如鄉人之善者好之其不善者惡之晦菴曰善者好之而惡者不惡必其有茍合之行惡者惡之而善者不好必其無可取之實其説是矣東坡曰此未足以為君子也為問者言也以為賢于問者而巳君子之居鄉也善者以勸不善者以恥夫何惡之有予謂此論雖髙然善惡異類猶氷炭也妬賢醜正亦小人之天資豈能盡以媿恥望之哉使凡不善者皆知見善人而恥之則世無小人矣抑孔子之觀人初不以此若曰衆好之必察焉衆惡之必察焉則亦親求其實而巳豈徒取决于鄉人之好惡哉胡氏曰憲問一篇疑皆原憲所記慵夫曰論語本無萹名今之篇亦不成義理如學而述而子罕之類是何等語且章自爲指不相附属豈可以兩字冠之此盖後儒以簡冊煩多欲記習之便因其科節以爲號前輩既已辨之矣胡氏徒見前章如原憲自稱者遂謂一篇悉原憲所記此臆度之說豈可必哉又疑里仁篇自吾道一貫至君子欲訥于言十章出曾子門人公冶長篇多出子貢之徒益無所據刪之可也夫子不荅南宫适之問説者不一或謂明理而無所疑故不荅或謂嫌以禹稷比已故不荅或謂禹稷之有天下止于躬稼其言不盡故不荅或謂為善非以干禄而禄以天下尤非學者所宜言故不荅或謂雖不形言必有目擊首肯之意是皆臆度非必其真張無垢曰此章全在不荅處聖人立論坐見萬世之後要不使有時而窮無力非所以取天下也然以有力而得之者徳固宜其有天下也而不得者亦多矣是适言雖美有時而窮也夫子将言其非恐害名教欲言其是則其病猶适也故将付之不荅而已至其既出而謂之尚徳君子者盖稱其用心耳此說為善殊勝諸家也或問子西於孔子子曰彼哉彼哉鄭大夫公孫夏椘令尹公子申皆字子西馬注兩存之東坡曰或謂椘子西非也昭王之失國微子西椘不國矣潁濵曰公孫夏無是言者非所以當問此盖椘子西也昭王欲用孔子子西知孔子之賢而疑其不利椘國遂沮之使聖人之功不見于世世之不知孔子者衆矣皆未甞疾而獨于子西者以其知我而疑我耳予謂潁濵以公孫夏不足問固似有理其自為説亦未當也夫子之論人毁譽抑揚一以至公而無容心焉今以沮巳而遂短之是其言出于私怨也聖人恐不如是晦菴曰子西能讓椘國立昭王而改紀其政亦賢大夫也然昭王欲用孔子而子西止之其後又召白公勝以致亂則其人可知矣此説頗安雖然以子産管晏而夫子不過稱其一節子西之事業雖有可取在聖人觀之亦何足多道哉恐不必深求其故也子路問成人章胡氏以今之成人者何必然為子路之語此盖惑于曰字耳觀其文勢殆不然也前漢鄒陽為梁孝王説王長君云魯哀姜薨于口口子曰法而不譎以為過也顔師古曰言齊人守法而行不能用權以免其死予按語稱桓公正而不譎盖縂言其行事直而不詭賢于晉文耳鄒陽之説殊為乖戾然東坡引為證而又以納辰嬴實晉文之譎其失愈甚魯哀姜下不接有脱字管仲不死子紏之難孔子曰如其仁程子曰桓公兄子紏弟仲私于所事輔之以争國非義也桓公殺之雖過而子紏之死寔當仲始與之同謀遂與之同死可也知輔之以争為不義自免以圖後功亦可也故聖人不責其死而稱其功而春秋書之亦曰公伐齊納紏不書子不當立也齊小白入于齊繫之齊當有齊也若使桓公弟子紏兄仲所輔者正桓奪其國而殺之則仲之與桓不可同世之讐也計其後功而與其事桓聖人之言無乃害義之甚啟萬世反覆不忠之亂乎道學諸公多主此説然司馬遷杜元凱皆以子紏為長而諸子傳記言桓公殺兄者多獨漢薄昭嘗稱桓公殺弟以反國而韋昭注云子紏兄也言弟者諱也今宋儒遂以紏為弟豈别有所從乎若止以薄昭為據則其説固未定也左傳經槩云納子糾而公榖之經不書子夫三家所傳原有得矣今徒以順于巳意遂獨是公榖則其説亦未定也其言齊小白入于齊者彼自是齊人耳文勢固然恐無他意則其説又未定也以未定之説而断然自謂得聖人之旨安能使後世必信哉然則奈何曰不必論也使子糾果何弟則三尺之童皆知其不當争管召固不必死而子路之徒亦何所疑乎盖家語亦載此事矣孔子言之曰管仲不死子糾量輕重也子糾未成君管仲未成臣家語浮誇未必真出于聖人然其義有可以發明乎此者夫子糾桓公皆襄公之庶弟而非冡嫡各因畏禍而出奔當是之時立者従之亦唯國人之聼而巳桓公以髙國之召自莒先入國人奉以為君勃無異議則齊既為桓公之有子糾雖長而勢不得争寔未成君也管仲無必死之義而有匡天下救生民之功所慊者小所成者大孔子權其輕重而論之故不以管仲為非仁而亦不以召忽為不當死邢氏䟽義畧得之矣如其云幾近之謂也言亦可以為仁耳注䟽晦菴以為誰如其仁其于辭義俱為不順南軒曰夫子所以稱管仲者皆仁之功也問其仁而獨稱仁之功則其淺深可知只為子路疑其未仁子貢疑其非仁故舉其功以告之若二子問管仲仁乎則所以告之者異矣葢聖人抑揚之意其説甚善東坡曰以管仲為仁則召忽為不仁乎曰量力而行之度徳而處之管仲不死仁也召忽死之亦仁也伍尚歸死于父孝也伍員逃之亦孝也時有大小耳此論甚佳子路子貢以召忽為仁管仲為非仁孔子獨明管仲之事而不論召忽則召忽之為仁可知矣其言匹夫匹婦之諒此自别指無名而徒死者耳意不在召忽也忽豈自經溝瀆之類哉程子又言王魏當死建成而不當事文皇此猶不然是時髙祖固在位也建成未成君而文皇之立寔髙祖之命則二子因難而死固好不死而事文皇亦可也胡氏觧孔子請討陳恒事云春秋之義殺君之賊人得而討之仲尼此舉先發後聞可也嗚呼此何等事且孔子有何權而得擅發之邪其紕繆可笑亦已甚矣滹南遺老集卷之六
