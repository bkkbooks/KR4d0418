front:
  text: 滹南遺老集卷之四十二
  hash: sha256:409a65ee78f94e0f94600c4f7c30c1225c5b5ff6ca459bf255d5690d0ab6cc44
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0418_SBCK_042-1a}
body:
  text: 滹南王若虛從之千户賈侯父墓銘保塞賈侯嘗識豫於東垣丁酉夏六月不逺八舍致書見招至則館其家禮意甚厚已而言曰某也不天生六嵗而失怙恃今四十年矣而未有紀述而不朽之託負愧良深雖不及志諸幽猶得以表其隧某既幼孤家譜世系不復能知而先君之事幸存其大略敢丐一言以傳信嗚呼墓有碑碑有文所從來尚矣且禮不忘其本而孝莫大于顯親親有善而揄揚之大書深刻以申其追慕尊崇之意此天道之自然人情之同欲而子職之所當盡者也不亦務乎吾觀近世自一介之微稍躋貴顯者爭先樹建以為華榮螭首龜趺亭亭相望宜我侯之不敢緩也既辱侯知能勿成其美按公諱字巨平祁之蒲隂人其先皆隱德不仕公長身美風姿賦性淳篤事父母以孝悌聞待友朋以忠信稱鄉黨宗族莫不服其德而又重氣節急患難有貸其錢者雖至百萬不問儻期議者以為難𥘉長兄儀次兄成憐公生父母屬念且公等幹蠱可嘉故曲極友愛儀子弗嗣屢請析居儀輒紿曰二親既有命書矣卒舉資産付公州二髙君亦謂其可妻也以女歸焉承安丁已春三月以疾終于家享年五十九即以其月葬于里之先塋公凡四娶皆同郡巨室子而最後為李氏尤賢淑備婦德男一人曰輔李所出即侯也一女適宋氏男孫三女孫二人當貞祐兵火之餘城邑幾廢遺黎無依侯以完復安輯之功為衆所推由本縣尉至為州刺史及歸聖朝勳績益著自招撫使纍遷河北東西等路左副都元帥甲午中朝廷更定官稱選充行軍千户云侯儀度魁傑胸次灑落其才術器識類皆不凡而愛民喜士為河朔稱首蓋一代之偉人也嗚呼源深則流長本根固則枝葉茂物有常理君子每以為積善獲福之喻視履考祥以人占天如影響之敏符契之不可無也昔有預髙閭門俾容軒蓋手植庭槐期生三公者𥘉若妄意已而果然冥冥之中昭昭者存焉是故即其所享可以推其始之所自來由其所為可以卜其終之所必至夫何疑哉侯以妙年遭遇驟至顯榮富貴功名無不如志諸子岐嶷稱其佳兒此决非出于偶然者固足以知其世積之善矣而躬行之實不替益隆于先有光又可見其方來之報則賈氏之餘慶殊未艾也是宜書故書之而系以銘曰厥土惟腴厥木惟敷有崇其􅉌于城之隅閟之深封之固過者必恭賈公之墓太一三代度師蕭公墓表太一之數興於金朝天眷閒衛郡蕭真人其始祖也靈異之跡上動至尊敕賜觀名太一萬壽世嗣其法一再傳而得師焉師諱志冲字用道博州堂邑人本姓王氏祖某父某並受真人法籙師幼頴悟誦書日千言而沉靜寡言不好戲弄年十六父兄議婚師曰性喜出家不願娶也强之不可因而逃去隱于冠氏李守竒家遂與守竒詣衛州參二代師為門弟子始事尊宿霍子華子華故有淹疾師侍奉惟謹前後十年無懈倦之色或衣不解帶者數月人以為難大定十六年朝廷普試僧道師初密誦經文人人不知一旦中選儕類甚驚及當給據言于考官曰師兄蕭道宗纍𬒳黜落年過四十乞以據授道宗某方壯徐為後圖未晚也考官不許而多其讓十七年授度保充衛州管內威儀領教門事二代師將退席密語道宗曰吾門徒數萬而試經具戒者完顔志寧及王某而巳志寧資雖明敏而頗輕肆非主教之才不如王某純粹亷潔為可屬乃以為法嗣而改姓凡法嗣皆從蕭氏蓋祖師之訓也師素不為辭章及升堂諭衆隨意而言悉成文理勸戒深切聽者聳然內外相慶以為宗門得人矣居無何有司選奏四方髙德之士𥙷住中都天長觀師首應之既而河犯郡城居人往往他徙而本觀道衆亦旅寓于蘇門師聞而還聲望既隆求教者接跡而至歲所傳無慮數千人先是汲縣閻村有觀曰朝元荒廢已久而額籍具存師請諸官遷于西門墳園之側以處其衆明年河復本觀殿宇頺毁且盡師次第繕完尋復一新而增創者幾倍所費不資明昌間前尚書右丞劉公偉自大名移鎮河中道出淇上謁師甚恭州倅移刺者先以常流待師見劉加禮心猶疑之其後數屏人獨往而師常靜坐無為因問先生于此有何受用師曰靜中自有所得非語言可以形容若無得者雖片時不能安况終身乎其人乃服曰劉公誠有知矣師自重修觀舍深居簡出外人多不識其面承安改元日食正旦父老懼災請師作醮于神霄宫士庶畢集師少時白晳而癯至是色如紫玉目光炯然冠佩整肅若自天而下觀者嘆仰以為真人復生也少長貴賤悉歸禮之泰和𥘉章廟春秋已髙皇嗣未立設普天大醮于亳之太清宫閒歲報謝師皆與焉五年河南道士籍少既以再祈皇嗣𬒳召過師問之師曰向來作醮例遣重臣所在供擬多傷物命其違天意甚矣自今宜罷之至于與醮官吏皆須禁止葷酒務行善事庶可達誠雖然再三則瀆亦恐徒勞耳籍至闕以勿遣重臣為言上可之而令籍詣太清行事如初師與俱往既又同赴中都太極宫誦經百日時户部侍郎胥鼎方提控寺觀恐師南還率朝士十餘候之曰今明主臨朝尊元重道天長才廢隨建此宫如師者人天眼目不容遽去也㑹宫衆亦堅挽之遂勉為留七年大蝗上遣中官問提點郭元長禳治法元長敕其徒閲道藏求之師從傍曰道藏如海豈易討尋就使有之亦未敢必其應吾祖真人嘗留經籙三百餘階內有祕章今可用也遂取以進上喜曰天垂此教以利生民即命師依科作醮比行禮大雨師呪信香一炷禱于真人其雨立止翌日有㫖問蝗絶之期對以三日據法有灑壇符而灑時當留一面使蝗有所歸師則留其西西乃大山也及期則羣飛入山而死詔加賞賚師固辭曰道人救物安用賞為上曰真道人也當别議旌表郭元長告免提點職詔師繼之仍賜號元通大師內人賈病逾年諸醫莫療上曰此非藥餌所及前禳蝗王某殆是異人或能起之師奉命直抵宫闈治以符水而愈宫闈非閹寺不得到蓋以道重師也衛紹即位特賜上清大洞法服一襲當時榮之師嘗謂人生貴適意顧名雖尊顯而身甚勞浩然有休息志乃因胥公舉汾西李大方以自代而歸實大安二年之春也一日集衆曰祖師立教代代相承如續燈然無有窮盡今弟子中蕭輔道者祖師再從孫吾當付之於是退處西堂髙拱淵默不復以世務關意貞祐二年四代師主亳之太清師亦從焉四年閏七月丙午忽謂門人曰速具湯沐吾將歸寂門人亟加冠履未畢而逝有鶴數十旋繞久之時天氣猶暑閲餘旬而體不變八月庚申權殯于宫之塋其日隂晦重甚衆方以時刻為疑俄樹杪雲開如席許得以不誤已而隂晦如故又聞香風四來送者幾萬人咸嘆異之𥘉師之將誕也有桑生于宅中不半歲成樹比十年其髙數尋狀如層樓世所未見至是亦無故而枯相與始終尤可怪訝也師平生無喜愠恂恂似不能言至遇事而發雖衆所難决者三數語輒定老莊之外兼通諸史諸書而尤長于左氏春秋其智識有大過人者享年六十六歲戒臘四十自號元朴子云四代師字公弼既返河朔將復迎師骨以祔于真人而求所以表其墓者俾豫文之公弼一世偉人所交皆天下之士而竊幸與之遊昔已嘗為作真人傳矣而又有兹命是不以蕪陋見鄙也義不得辭則據其事狀而具著焉清虛大師侯公墓碣師諱元仙字子真趙州人也大父澄以胥吏起身至河北西路漕司掾才幹既優而行巳無玷尤以孝友著稱議者謂不見用于時則必有得于道母殁慨然曰所以區區塵土間者為親故也今不侍養復何為哉聞淇上蕭真人立太一大教因往參為門弟子真人一見愛之授名道净傳太一三元法得以便宜行化乃即本州及真定之第各建太一堂奉持香火以符藥濟人大定二年凡釋道之居無名額者許進輸賜之公遂投牒以在州道院為太清觀而在府者為迎祥真人每批經籙必先授公而後傳前後千品公曰天寶下降要當永劫流行一日去世誰其保之密禱上真願于私屬生繼嗣其後男琳得子相貌殊常即師也生不茹葷始學語能辨三官之像少長嬉戲則教群兒禮北斗澄大喜以為祈禱有徴而得所託矣㑹朝廷鬻祠牒由是度為道士年十四已克主大醮詞音清亮逈出一時儕輩翕然推服明昌初以髙德應詔入住中都天長觀自泰和改元國家事祈禳連設大醮羽流極天下之選而師皆與焉仍常居要職出諸人右功完賞賚甚渥賜紫衣德號曰觀妙尋佩符馳傳降御香于岱嶽長白等山頃之以親老辭歸鄉里崇慶間召住太極宫用進𥙷軍儲恩改授今號宣宗南巡𬒳命入汴提控上清宫敕有司一依天長故事逾年而退未幾太清宫請為宗主三返益勤不得已應之時院門凌替殆莫能支加以歲賦數百斛為病尤甚師下車未浹旬以狀上聞悉獲蠲免衆賴其庇已而拂袖棲遲于洧川正大庚寅正月為士左崇等作醮于鈞臺法事勝絶舉壇欣幸以為未始遇也既畢將還忽示微疾衆欲召醫候之師不許曰世緣已盡自可長往安用療為越三日日中命置髙座面處之顧至未刻則口占一頌舉首端坐項中戛然有聲兩手握子文而逝時年六十九矣逺近士庶炷香拜禮者纍日神色宛如生人已酉焚化於郭西從遺命也下火之際紫雲見其北蒼鶴十數翔舞空中移時乃散送者幾萬人莫不以手加額嗚呼異哉其超脫明白如此亦世所罕聞也丙戌塔于潁濵之崇真觀豫素知師名而不及識每以為恨然嘗與其門人悟詮遊悟詮業履清修而讀書好事亦落落不凡者以大元辛丑年正月二十日改葬師于平棘縣明信鄉之鄭村原屬豫銘其墓渠意既堅而竊亦樂為之道也乃叙而銘之曰其生也為賢其沒也為仙人而如此足矣又何加焉著之琬琰以永其傳贈昭毅大將軍髙公墓碣慶源軍節度使髙侯因教授王君進士陳生來見曰不肖不天生四年而先君捐館舍訓誨不得聞奉養不及致其為不幸可知也逮其成長事與心違曷勝風樹之悲顧瞻松楸未嘗不流涕太息今將刻石墓隧以垂之無窮事實始末雖不能詳而故老所傳猶得見其為人之大略兹敢以託豫謝非其才而請益堅重以王陳雅故義不可辭則勉為之叙次曰公諱顯髙邑人其先皆農隱弗耀公敦朴簡靜而辭色溫溫接物極愷悌輕財務施喜周困窮其事親處兄弟孝友尤篤至教人亦必先此里閭宗戚無貴賤踈近交口稱為吉人無間言者明昌七年五月壬午以疾終于家享年四十即葬其鄉之先塋夫人韓氏婦德無缺亦著賢譽後公十九年卒子三人長曰慶終本縣丞次曰進不仕次曰添祿即節度也男孫四人女三人正大中以節度恩特贈昭毅大將軍夫人封號如例初節度當再罹兵火之後寇盜並興道路蓁蕪城邑頺廢而能紏集義旅撫安遺黎內守外攘以鳩完復之功闔境晏然遂成樂土有司嘉其能擢柏鄉令纍遷今職治聲甚美公望甚重其福祿方隆而未艾異時所至有詎量者嗚呼積善之家必有餘慶不及其身則在其後物有定理聖賢有成言古今有同然之效昭乎其不可誣也今患不能為善為之未始無徵髙氏世居畎畝沒沒于常流殆與草木共腐而一旦子孫蕃昌門地烜赫以為邦人之榮推原其自豈偶然也哉是誠可書故揭之以勸來者而系以銘曰身雖不顯而後也昌夀雖不永而所存者長褒恤有命紀述有章以播其芳以揚其光是之謂不亡滹南遺老集卷四十二
