front:
  text: 滹南遺老集卷之二
  hash: sha256:74804046ce745ecebfd10ac9d86e460c0b51176e571a87798f3a7450bc7b6434
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0418_SBCK_002-1a}
body:
  text: 滹南王若虛從之五經辨惑孔子言喪欲速貧死欲速朽曽子信之有若疑之子游證之更相辨明而其理乃定有若之賢似過于曾子要皆以孔子為凖而非其所自見也使孟子處之當不如此蓋君子之道人情而已喪而遂欲速貧死而遂欲速朽非人情也不近人情便非君子之道檀弓云穆伯之喪敬姜晝哭文伯之喪晝夜哭孔子曰知禮矣鄭氏曰喪夫不夜哭嫌思情性也坊記亦有寡婦不夜哭之文注又曰嫌思人道也豫謂哀戚之至無暇避嫌先王制禮亦必不委曲至此特出于漢儒之私意耳又云文伯之喪敬姜據其牀而不哭曰吾有斯子也吾以將為賢人也今及其死也朋友諸臣未有出涕者而內人皆行哭失聲斯子也必多曠于禮矣夫豫謂朋友諸臣未有出涕者是或文伯之無取至于妻妾行哭此則人情之常義所當然者豈所以卜其賢否哉母子天屬也一有所恨而遂忘其哀亦太忍而不慈矣又何足為賢而録之且前既言文伯之喪敬姜晝夜哭而又此說非自相反覆耶鄭氏釋三老五更之義曰三老五更各一人皆年老更事致仕者也名以三五者取象三辰五星天所因以照明天下其說甚陋以更為更誤字既已不安而三五之稱又不知從何而知為星辰也古人命名定不如此及注樂記則曰三老五更言之皆老人更知三德五事者孔頴達見其矛盾則從而為之說曰其義相包夫以一經一事一人解之而自立二義可乎宋均注孝經援神契曰三老知天地之事者五更知五行之更代者劉原父云天地之事當作天地人事此又以三才五行當之也臆說呶呶孰知真是蔡雍謂更當為叟蓋長老之稱字與更相似書者遂誤為更耳嫂字女傍叟今亦為更以是知應為叟又以三為三人五為五人此最近于人情故裴松之稱其有四而穎達以非鄭義不取何獨言鄭氏之専也漢官儀曰三老五更皆取有首妻男女全具者無謂之甚尤為可笑抑此皆不足辨也蓋經㫖迂誕自非先王之禮耳天子之尊賢至于師之盡矣優其禮貌厚其祿賜有謀則就而不敢召唐虞三代不過如是而巳何至躬親侍膳袒而割牲執醬而饋執爵而酳著冕持干而舞乎稷契臯陶伊尹傅說太公周召之徒不聞有當此禮者餘復何人而可以當之哉雖委巷之談不至是矣說者又謂以父兄飬之所以示天下孝悌嗚呼親其親長其長孝悌者旌之不然者懲之可以教天下矣耆老縱賢要亦臣子而以父兄事之不亦悖乎蓋漢儒集禮雜取異說以亂聖人之經時君世主好名而輕信則或勉強而一行然見于史者才三數人豈非為下者慙怍而不能安為上者矯拂而不可久耶胡致堂徒怪其行之者寡傷古道難復而不知此等實非可行之事也三樵林東獨鄙其說以為漢儒撰出而不之取正與愚意暗同然千載之間而能知其非者唯一見此人則夫特達不惑之士世豈易得哉或問禮記三宥制刑之說何如曰先王之法亦求其實而已哀矜審慎則有之至于當罪無疑而必有三宥焉以為有司當執法而人主貴收恩此後世之虛文而非先王之正道也成王命君陳曰豫曰辟爾惟勿辟豫曰宥爾惟勿宥惟厥中斯則得其正道矣文王世子萹既言文王為世子朝王季之法繼言武王夢帝與九齡周公撻伯禽之事而終之曰文王之為世子也既言凡學世子及學士必時之法繼以釋奠養老之事而終之曰教世子既言三王教世子之法繼以周公踐阼之事而終之曰周公踐阼此三語者其于文勢為贅恐亦如子貢問樂之類而鄭氏皆云題上事吾所不曉也文王世子云武王夢帝與九齡文王曰我百爾九十吾與爾三焉鄭注謂文王以勤憂損壽武王以逸樂延年紕繆之甚固不必辨孔氏既知天定之數不可增減而云文王言與女三者示其傳基業于武王欲使武王承其所傳之業乃教戒之義訓非自然之理審如此言則帝與之數復何以說蓋不知經文詭誕自不足信也禮器云禮之近于人情者非其至者也此最害禮夫聖人制禮未嘗不出于人情而曰近之者非其至是豈君子之言耶內則曰聘則為妻奔則為妾夫次室而下皆妾也非􅌹指奔者而言使奔而為嫡遂不謂之妻乎彼所謂天子諸侯之妾亦皆出于奔者乎鄭氏曰妾之言接也聞彼有禮走而往焉以得接見于君子豫謂女之奔人直淫佚耳亦鑽穴踰墻之類豈因有禮而往亦豈君子之所當接者哉樂記末章子貢與師乙問答聲歌之義而終之曰子貢問樂此必重出或有闕文而鄭氏曰上下同美之也大是繆說無足信焉三代損益不同制度名物容有差殊然漢儒所記遂事事分别雖道德理義萬世不可易者亦或以為異尚而偏勝不亦過乎如忠敬質文之說前人既有辨其非者矣至表記云夏道先賞而後罰殷人先罰而後賞周之賞罰用爵列讀之令人失笑夫賞罰之用視乎功罪而巳先後輕重皆以類相從而謂夏必先賞而後罰殷必先罰而後賞周之賞罰惟以官爵尊卑為差雖三尺之童亦知其甚繆而學者信之以為先王之法聖人之經悲夫至于尊而不親親而不尊等說皆不足取也喪服之制親疏䡖重固有等差至其哭主于哀則一而已而記禮者曰斬衰之哭往而不反齊衰之哭若往而反大功之哭三曲而偯小功緦麻哀容可也注云三曲者一舉聲而三折也偯聲餘從容也哭母而降父一等已為可笑至大功而下又有曲折從容之度是與教歌謳無異豈復有哀耶甚矣漢儒之怪也禮小功不稅而曾子譏之吾以為是孔氏皆喪出母而子思變之吾以為非禮者人情而已矣東萊云周禮者古帝王之舊典禮經也始于上古而成于周故曰周禮豫謂此書迂濶煩瀆不可施之于世謂之周禮已自不可信又可謂古帝王之典乎孝經稱君子事君將順其美夫人主有善因而誘引成就之所謂將順也北齊常山王演數諫文宣王晞止之曰一旦禍出理外將奈殿下家業何乞且將順日慎一日太宗嘗責宇文士及之佞對曰南衙諸臣面折廷諍陛下不得舉手臣若不少有將順雖貴為天子亦何聊此乃為阿諛而巳豈孝經之義哉孔子誅少正卯事誰所傳乎其始見于荀卿之書而吕氏春秋劉向說苑家語史記皆取而載之作王制者亦依倣其意者著為必殺之令後世遂信以為聖人之大莭而不復疑以豫觀之殆妄焉耳刑者君子之所慎不淂巳而後用者罪不至于當死其敢以意殺之乎故曰與其殺不辜寧失不經殺一不辜雖得天下而不為此聖賢相傳以為忠厚之至者若乃誣其疑似發其隱伏逆詐以為明徑行以為果按之無迹加之無名而曰吾以懲奸雄而防禍亂是則申商曺馬隂賊殘忍之術而君子不貴也昔者四凶天下之所同患而帝堯亦固知之矣然卒不誅逮舜之世而後有流竄放殛之事猶不盡置之死蓋古人之重殺如此少正卯魯之聞人自子貢不就其罪就如孔子之說亦何遽至于當死而乃一朝無故而尸諸朝天下其能無議而孔子之心亦豈得安乎夫卯兼五者之惡借或可除而曰有一于人皆所不免然則世之被戮者不勝其衆矣尹諧潘正之屬不見于經傳姑置無論如管蔡王室之親敢為叛逆罪孰大于是者而卯與之同罰無乃不倫乎至于華士尤非其比韓非曰華士自言不臣天子不友諸侯耕而食掘而飲無求于人不仕而事力太公聞之曰不臣天子是望不得而臣也不友諸侯是望不得而使也無求于人不仕而事力是望不得以賞罰勸禁也遂執而殺之信斯言也則華士特介潔之流雖非中行詎可殺之王肅惟知韓子之不足憑而不知荀卿所傳亦自無稽也東坡蘇氏曰此叟自知命薄必不久在相位故及其未去發之苟少遲疑巳為卯所圖矣夫君子循理而行不可則止寧人負我母我負人使卯誠當死自有常刑豈必如仇敵相軋以先舉為得計哉蘇氏常以晋武不殺劉元海明皇不殺安祿山為盛德事其論甚髙可為萬世法顧復有此說何耶嗚呼士生千載之後不獲親見聖人是真僞無從而質之則亦求乎義理之安而合乎人情之常而巳自三傳而下託聖賢以駕已說者何可勝數蓋不足盡信焉三山林少頴近代之名儒也其于孔氏兵萊人墮三都等皆排之而不取且曰說者徒謂聖人嘗用于魯必當有功故欲以是加其美而不知反汚辱之可謂切中陋學之病矣誅卯之事亦此類也哉荀卿又曰有父子訟者孔子同狴執之三月不别其父請正孔子舍之季孫不說孔子為言教化不至不當遂民之意幾三百語永嘉葉氏曰少正卯之誅果于察姦非先王之正刑不治父子訟以待其心之自回所謂正刑也竊亦以為不然考諸論語孔子之告子張不教而殺謂之虐曾子之戒陽膚曰上失其道民散久矣如得其情則哀矜而勿喜荀卿之說推此意而為之耳方之誅卯固若近厚至其過正而非人情則一也審可罪也當即刑之審可恕也當諭而遣之并執其父三月不别至于請止而後赦吾不知彼之請止果其心之回耶抑不勝囚縶之苦而求脫也使彼心不回而終莫之請孔子將何以處之且教化不至非一日之故也上未可責其遽行下未可望其遽服而况有罪者皆持此說以貸之則小人得以藉口而益輕犯法矣病痛發于身而却藥投石委之不治曰是攝養之不至也夫攝養不至則信有罪矣而已發之疾亦安得不治乎蓋論語云不教而殺者謂其先務之不知而專事其末耳非以刑為可廢也哀矜而勿喜者恐其以察慧為能而幸于殺人耳非謂遂不治其罪也荀卿因此設過正之事以驚世俗以為衆疑于無罪者而遽誅之疑于必殺者而卒赦之操縱無常開闔不測此孔子所以異于凡人者而不知聖人正不如是也家語載孔子之言曰婦有七出三不去七出謂不順父母者無子者淫僻者嫉妬者惡疾者多口舌者竊盜者三不出謂有所取無所歸也與共更三年之喪也先貧賤而後富貴也後世本之以為律令雖犯七出而有三不去之名者亦不得出斯果孔子意乎曰非也惡疾無子出于不幸而非其罪自不當出若乃失莭而淫僻不孝而違父母是則罪之大者雖有不去之名亦安得存之至于嫉妬口舌之類量其輕重而處之可也又曰女有五不取謂逆家子亂家子世有刑人子有惡疾子喪父長子此亦非也君子之娶婦固有所擇而此五者固在所疑然不至皆可棄也今立言而使之勿取是絶物也聖無絶物之法左傳椘子將死屬群臣以窀穸之事窀穸二字從穴無疑其為塜壙之稱也而杜氏以為長夜晏子之論陳氏曰民人疾痛而燠休之燠休云者亦溫煦安息之意耳而杜氏以為痛念之聲未曉其說也衛獻公復國大夫逆于門者頷之而巳頷蓋微㸃首之貌而注以為搖頭誤矣左傳定公五年三月于越入吳注以於為發聲竊謂經語發聲之體此字不安闕疑可也楚子圍蕭還無社號申叔展叔展曰有麥麴乎曰無有山鞠窮乎曰無河魚腹疾奈何曰目于眢井而極之若為茅經哭井則已明日蕭潰申叔視其井則茅經存焉號而出之杜氏以茅經哭井為叔展教無社以文勢觀之殆是無社教叔展也曲禮云若夫生如尸立如齊若夫云者止是語辭而注云若欲為文夫行道之人皆弗忌也行道猶言行路耳孟子所謂行道之人弗受陳軫所謂行道之人盡知之是也而注以為行仁義至于君子不盡人之歡不竭人之忠則曰歡謂飲食忠謂衣服之物吾不知歡何以為飲食而忠何以為衣服之物也鄭氏之謬妄如此禮記有閒傳其義未詳鄭氏云記喪服之間輕重所宜此特以經文意之耳一間字如何包許意史記吳世家云子胥將死曰抉吾眼置之吳東門以觀越之滅吳此特一時忿詞而已而吕氏春秋言夫差實抉其目著之門殆未可信揚子論子胥曰諫吳不式不能去卒眼之注引史記為說豫謂眼之絶不成語或者字之訛也歟若果用此事則正當引吕氏春秋耳滹南遺老集卷二
