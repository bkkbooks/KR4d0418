front:
  text: 滹南遺老集卷之四十四
  hash: sha256:61d66ad13bc5a5af3e122a364a389e30b9127467efe3623826cdc4736c72529f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0418_SBCK_044-1a}
body:
  text: 滹南王若虚從之鄜州龍興寺明極軒記鄜為州在深山窮谷間荒凉鄙陋其風土固然無池臺苑囿之觀可以娱人者官閒無事散歩而盤桓不過道流釋子之居耳而龍興寺明極軒最為佳處由三門廵廊而西其隅為雄師院而院之東南則明極在焉其始為隙地故節度郝公見而愛之謂其爽塏便安可以為待賔之所頋而命雄此軒户所以構也深静而明夏凉而冬燠髙纔丈許而平揖前山俯瞰闤闠視縁山諸刹勢欲與之争衡也始予以狂放不羈為上官所捃宴㳺戯劇悉禁絶之雖所親愛非公故不得相往来逄于道路歛避辭謝莫敢立談者出門倀然其無歸也深居髙臥讀書以自遣而乆復無聊因思所謂道流釋子之居而時一訪之晏坐清談焚香煮茗猶得差樂而無罪盖大像之致爽開元之冷筠皆所素愛而甞逰者然以其登渉之艱固不若明極之為数雄亦開朗好客樂與予言而不厭由是有興輒至至輒為留竟日公退飯餘呼馬而岀僕夫或不請所之知其必適是也比及其門呵喝有聲主人者趨迎而笑知其必為吾也予甞以雄見待之厚許為作記以報之而未果其後官事日繁而私禁稍寛非役于簿書期㑹之勤則奪于聲色紛華之樂而予之蹟至明極者数矣與雄相見未甞不笑且歎焉今将東歸雄以前言為請嗚呼吾負此軒乆矣是猶可得而辭乎乃書其地形之大概與夫平昔㳺衍之熟者以授若其命名之意則出于西方之書非予之所學也畧而不及以待夫知其說者茅先生道院記嵩山之陽有承天谷谷有道院焉隐君子茅公之所建也公開封人名從易字縉甫始以進士干有司数竒不偶乃棄家爲方外逰隨意去留𥘉無定居既至承天則欣然曰吾可以休于是矣闢地築室爲終焉計日葺月𥙷盖累年而後有成軒曰䨇清以景名也庵曰虚静以道命也竹木蕭然都無塵土氣由是為嵩陽之一觀夫嵩少海内名山其間勝跡殆不可殫記蕞爾茅公之廬宜若無足道者而人甞以不到為恨到必􅌉桓而不忍去則亦以其主人之賢故也公以髙蹈聞四方賢愚少長莫不仰其風觀其擺落世紛悽心扵冲漠之境始終四十年處之甚安壽考康寕翛然而往非胸中真有所得疇能爾耶時羣盗縱掠而公夷然視之神色自若且能化暴為馴使之逡廵退却而不敢犯非獨自免而又有以庇人其道徳所服至扵如此豈老氏所謂虎無所措其爪兵無所容其刄者欤予世之散人也才能無取于人而功名不切于已雖寄跡市朝而邱壑之念未甞一日忘慕公而願見者乆矣俗累拘牽竟莫之遂盖毎為之嘆息嗚呼公則已矣而其姪守明與予為忘形交出公所繪院圖及所以自叙者請紀其事予披玩再三恍如即其地而見其人忽焉自失盖覺官味如嚼蠟守明亦自可人由刀筆中一朝有所省年踰四十而屏酒肉却聲色日與名流逹士逰學貫三家畧窺其妙其剛果超詣庶幾能嗣公者予雖不及識公而有斯人在㑹當同往杖履相從訪公之故居而躡其遺蹤臥公白雲䕃公青松逍遥徜徉以卒歲乎其中公之精爽故應不昧或者其亦一笑而見容也乃為書之既以發茅公之光且為吾他日踐言之盟云趙州齊参謀新修悟真庵記趙州道院曰悟真庵者參謀齊君大年之所建也君鄜畤人也開朗倜儻乆行善事壬辰中從軍河南既還留寓于趙因而家焉自以薦經䘮亂而卒獲安存生理益優身名俱遂無不足于心者盖神明之所相也思有以荅謝殊貺亦其天資本静道念素深故買城隅特建此庵以待全真之士且為他年歸宿之所云肇基扵甲午之春凡再期而迄役聖位雲堂齋厨方丈搃為屋十餘楹像設供具隨事一新繚以崇垣抱以隙地藥畦蔬圃井井可觀雖宏麗未極而體則具矣喧囂既逺境界清涼洒然有絶塵之趣居人瞻仰莫不歡喜讃嘆自是一方逺近以至過客皆知有齊氏之庵大師李公曰圓明子者故與君逰乃延致而事之其徒無慮三十人君色色資給無外求者稍暇無事婆娑其間頋而樂之自謂有所得也予数以事至趙始也聞其經营再則覩其次第三則及其成就焉一日造之盤桓周覧殆欲忘還君因以記文爲請予與大年三十年之舊有命自不當辤况其用心之果爲力之勤寔可喜而足稱耶抑予衰矣險阻偹甞煩勞乆厭閲興亡之大變悟荣辱之真空殘喘僅存百念灰冷方當脱屣俗累優㳺瀟洒以畢其餘生雖不足與聞玄理厠跡羽流而杖屨往来陪君爲方外之交庶無愧焉至其㑹意忘形不知孰主孰客則君之庵猶我有也能勿成其志乎乙未年終十二月晦日滹南遺老記答張仲傑書某啓仲傑縣令方深渇想辱惠好音曷勝慰喜羶根之賜甚愜老饕正恐踏破菜園為藏神所怪耳所論道學自是儒者本分事抑老夫衰謬日負𥘉心不足進也吾子年壮氣鋭乃能屏去豪華之習而專力于此好之樂之自謂有得他時所至殆未可量老夫将受教之不暇而反能為之發藥哉州郡之職古稱人况此多虞必道頗聞吾子一以和緩處之所望正如此民之憔悴乆矣縱弗能救又忍加暴乎君子有徳政而無異政史不傳能吏而傳循吏若夫趨上而虐下借衆命以易一身流血刻骨而求幹濟之譽今之所謂能吏古之所謂民賊也誠不願吾子效之吾儕讀孔孟仁義之書其用心自當有間寕獲罪于人無獲罪于天昔宋討元昊闗右困于征歛杜祁公在永興謂其民曰吾非能免汝也而能使之不勞于是量所有無寛其期限民得以次而輸之而費省十六七及王氏法行官吏不堪其廹邵康節門人之從仕者皆欲投檄以歸康節止之曰此正賢者用力時新法甚嚴能寛一分則民受一分之賜嗚呼古人逺矣如此等事尚可行之造次顛沛無忘是念始可謂不忘所學矣老人家益貧而官益拙鮎魚上竿可笑可憫雖然逺依餘庇大小幸安不必過煩念慮也遽中奉報草草不宣道學發源後序韓愈原道曰孟軻之死不淂其傳其論斬然君子不以為過夫聖人之道亘萬世而常存者也軻死而遂無傳焉何耶愚者昧之邪者蠧之駁而不純者汨之而真儒莫繼則雖存而幾乎息矣秦漢以来日就微滅治經者局于章句訓詁之末而立行者䧟于功名利欲之私至其語道則又例為荒忽之空談而不及于世用彷彿疑似而失其真支離汗漫而無所統其弊可勝言哉故士有讀書萬卷辨如懸河而不免為陋儒負絶人之竒節髙世之美名而毫釐之差反入于惡者惟其不合于大公至正之道故也韓愈固知言矣然其所得亦未至于深微之地則信其果無傳己自宋儒發揚秘奥使千古之絶學一朝復續開其致知格物之端而力明乎天理人欲之辨始扵至粗極于至精皆前人之所未見然後天下釋然知所適從如權衡指南之可信其有功于吾道豈淺淺哉國家承平既乆特以經術取人使得参稽衆論之所長以求夫義理之真而不專于傳疏其所以開廓之者至矣而鳴道之説亦未甚行三数年来其傳乃始浸廣好事者往往聞風而悦之今省庭諸君尤為致力慨然以興起斯文為已任且将與未知者共之此發源之書所以汲汲于鋟木也學者甞試觀之其必有所見矣心術既明趋向既正由是而之焉雖至于聖域無難猶發源不已則汪洋東注放諸海而後止嗚呼其可量哉亦任之而已矣僕嘉諸君樂善之功為人之周而喜為天下道也故畧書其末云東垣王某序揚子法言微㫖序法言之行于世尚矣始註釋者四家而已踈略粗淺無甚可觀其後益而為十二互有所長視其舊殊勝而猶未盡也今禮部尚書趙公素嗜此書得其機要因復為之訓觧參取衆説析之以已見號曰分章微㫖論髙而意新盖奇作也予甞窃怪子雲之自叙以為法言論語之體耳隨問更端錯雜無次而獨取篇首二字以為名而冠之無乃失其宜耶及觀公觧則終始貫穿通為一義燦有條理而不亂乃知子雲之意𥘉非苟然但學者未之深考也昔人以杜預顔師古為邱明孟堅忠臣今公于子雲之書辨明是正厥功多矣至扵進退隐見之際尤為反覆而致意使千載之疑可以盡釋而無遺恨兹不亦忠之大者欤古澤陳氏者将購工板行以廣其傳友人張君茂進實賛成之而属予為序嗚呼公一代巨儒徳業文章皆可師法自少年名满四海間平生著述殆不可勝紀而晚年益勤心醉乎義理之學六經百子莫不討綸迄今孜孜筆不停綴其所以發揮往典而啟廸来者非特一書而止也如鄙不肖曷足為公重輕而斯書之傳豈待予言而後信雖然陳氏細民而能子事如此其用心固已可喜且不肖于公門下士也辱知為深是區區者而敢辭乎乃書而授之元光元年九月望日中議大夫守平凉府判王某序送王士衡赴舉序潦浄途平風髙氣清馬駿車輕送君此行頋非掩泣扵湓浦悲歌扵渭城者何必愴快而含情雖然有以規子也親老弟弱室廬蕭然燠寒華枯将于子乎属之所責重矣尚其朂哉决科猶戰也請以戰喻肩摩踵曵鱗集毛萃旴衡厲吻扼腕揚𬒮賈餘勇而甞素技者皆吾敵也攘而却之吾子亦勞矣寕執非敵武王所以誓衆臨事而懼仲尼所以語門人賁育之不戒童子扼之魯雞之不期蜀雞踣之勍敵在前若之何勿畏吾子講學甚力涵飬且乆則兵既厲而馬既秣矣然而猶有病焉氣揚而無降志色驕而無俯容或者其将振而矜之欤懼猶不足又振而矜之恐乗隙擣虚瑕者畢堅而勝負之勢未可料也鞍之役不介馬而馳之齊師敗績伐羅之舉趾髙而心不固莫敖以亡厥監不逺吾子其圖之吾子辱與不肖㳺又辱賜之誠是行也窃将鼓譟以從其後不幸而北其曷忍諸㨗音一報凱歌言旋兹豈惟吾子之所獲抑不肖實與光焉敢不盡言聞之曰仁者送人以言仁者之名豈賤子所堪抑朋友之道将善也故以告送吕鵬舉赴試序始予得管城而将行也故人王士衡寔送之且見属曰或稱鄭下有一佳少年而不詳其姓名第聞筆勢翩翻可以與之進也子以經學嗣名師之傳而為後生之倡者有年矣則誘翼成就豈得辭其責乎予謝而識之既至而求之得吾鵬舉焉聴其議論窺其文辭知其必士衡所謂也輒不自量欲遂薄有所云以𥙷萬一而官事如毛無頃刻暇盖未甞不為之歎息今鵬舉方将求售于春官余復黙黙無乃員士衡之所教乎夫經義雖科舉之文然不盡其心不足以造其妙辭欲其精意欲其明勢欲其若傾故必探語孟之淵源擷歐蘇之菁英削以斤斧約諸凖䋲歛而節之無乏作者之氣象肆而馳之無失有司之度程勿怪勿僻勿猥而并若是者所向如志敵功無勁可以髙視而横行矣沽美玉者不憂無善價騂犢且角山川其舍諸鵬舉勉矣京邑英豪所聚而士衡在焉予既因士衡以得子子其因予而求識士衡復因士衡徧求吾師友門人之凡未識者磨礱浸灌以益其髙而極于逺至于大有成焉而副吾徒之望可也送彭子升之任兾州序成王戒卿士以謂推賢讓能則庶官和不和政且亂而秦穆之誓亦曰人必能容而後可以保民古之君子有道相為徒而其徒相為用故能有濟也有虞之時衆賢和于其朝而無乖争之患垂讓于殳斨伯夷譲于䕫龍臯陶之不知者以問諸禹禹所不知者以質諸益賢于已而不妬不賢于已而不侮師于人而不恥告于人而不吝志同氣合不知物我之爲二盖其量誠宏而其徳誠厚此其能共成一代之極治者歟予嘗悲夫㫺人之難見而病後世士風之薄也忌嫉之心勝而推譲之道絶自待者重待人者輕相誇以其所長而相鄙以其所短鰓鰓然惟恐人之愈乎我也凡得一職必先審問其同僚者何如人聞其不能而不已若也則幸而喜如其能焉往往不樂曰是何以彰我故其至也莫不角其智力而争其權至于不相容以敗事處公家之事而敗之以其私罪孰大焉吾子始踐仕途而得李君者為長官彼其才幹有餘而能聲益著盖吾子之幸也而吾子性明志強臨事有决亦自為過人者誠能相與戮力而無求勝之心一司之治何憂而不舉哉子行矣幸不至如吾之所病且併謝李君其亦以是而待子焉可也滹南遺老集卷四十四
